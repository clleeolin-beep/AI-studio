function hexToRgba(hex, opacity = 1) { let r = parseInt(hex.substring(1, 3), 16), g = parseInt(hex.substring(3, 5), 16), b = parseInt(hex.substring(5, 7), 16); return `rgba(${r}, ${g}, ${b}, ${opacity})`; }

function randn() { let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random(); return Math.sqrt(-2.0*Math.log(u))*Math.cos(2.0*Math.PI*v); }
function simpleNoise(x, y, z=0) { let n = Math.sin(x * 12.9898 + y * 78.233 + z * 37.719) * 43758.5453; return n - Math.floor(n); }

// 【修正核心】統一經緯度轉三維座標系，保證標籤與 Mesh 完美重合
function latLonToLocal(lat, lon, r) {
    let latRad = lat * Math.PI / 180;
    let lonRad = lon * Math.PI / 180;
    return [
        r * Math.cos(latRad) * Math.cos(lonRad),
        r * Math.cos(latRad) * Math.sin(lonRad),
        r * Math.sin(latRad)
    ];

        let getDynBH = (id) => { if(dyn[id]) return dyn[id]; let bh = BLACK_HOLES.find(b => b.id === id); return bh && bh.offset ? bh.offset : [0,0,0]; };

        if (vis.landmarks && level_idx >= 3) {
            BLACK_HOLES.forEach(bh => { if (bh.dist_scale <= SCALE_LIMITS[level_idx] * 1.5) t.push(...this.createBlackHole(getDynBH(bh.id), bh.name, bh.desc, bh.is_mega, rotationAngle, expandFactor)); });
        }

        if (level_idx === 0) { // L1: 地月系統 (修正：乾淨無噪聲的高科技地球、完美對齊的月面)
            let earth_angle = time * 0.5; // 地球自轉
            let earthBase = this.precalcSphere('earth_base', 1.0, 30);
            let earthTf = TransformEngine.apply(earthBase.x, earthBase.y, earthBase.z, earth_angle, 1.0);
            t.push({ type: 'mesh3d', x: earthTf.x, y: earthTf.y, z: earthTf.z, i: earthBase.i, j: earthBase.j, k: earthBase.k, color: '#0f52ba', hoverinfo: 'none', lighting: {ambient: 0.4, diffuse: 0.9, specular: 0.5, roughness: 0.1} });
            
            let moon_d = 12.0, moon_angle = time * 1.5; let mx = moon_d * Math.cos(moon_angle), my = moon_d * Math.sin(moon_angle);
            let moonBase = this.precalcMoonBase('moon_base', 1.5, 25);
            let moonTf = TransformEngine.apply(moonBase.x, moonBase.y, moonBase.z, moon_angle, 1.0, mx, my, 0);
            t.push({ type: 'mesh3d', x: moonTf.x, y: moonTf.y, z: moonTf.z, i: moonBase.i, j: moonBase.j, k: moonBase.k, intensity: moonBase.intensity, colorscale: [['0', '#555555'], ['1', '#AAAAAA']], showscale: false, hoverinfo: 'none', lighting: {ambient: 0.6, diffuse: 0.8} });

            // 繪製月球公轉軌道虛線
            if (vis.streams) {
                let moonOrbitX = [], moonOrbitY = [];
                for(let i=0; i<=100; i++) { let th = (i/100) * 2 * Math.PI; moonOrbitX.push(moon_d * Math.cos(th)); moonOrbitY.push(moon_d * Math.sin(th)); }
                t.push({ type: 'scatter3d', x: moonOrbitX, y: moonOrbitY, z: Array(101).fill(0), mode: 'lines', line: {color: 'rgba(255,255,255,0.3)', dash: 'dot', width: 1.5}, hoverinfo: 'none', showlegend: false });
            }

            if(vis.landmarks) {
                // 地球設施 (隨地球自轉)
                EARTH_POIS.forEach(poi => { 
                    let loc = latLonToLocal(poi.lat, poi.lon, 1.01);
                    let tf = TransformEngine.apply([loc[0]], [loc[1]], [loc[2]], earth_angle, 1.0);
                    if (poi.label) t.push(this.createLabel([tf.x[0], tf.y[0], tf.z[0]], poi.c, poi.name, poi.s, 'circle')); 
                    if (poi.ray) {
                        let tfRay = TransformEngine.apply([loc[0]*1.4], [loc[1]*1.4], [loc[2]*1.4], earth_angle, 1.0);
                        t.push({ type: 'scatter3d', x: [tf.x[0], tfRay.x[0]], y: [tf.y[0], tfRay.y[0]], z: [tf.z[0], tfRay.z[0]], mode: 'lines+markers', line: {color: poi.c, width: 1}, marker:{size:2, color:poi.c}, hoverinfo: 'none', showlegend: false });
                        t.push(this.createLabel([tfRay.x[0]*1.05, tfRay.y[0]*1.05, tfRay.z[0]*1.05], poi.c, poi.name, 1, 'circle'));
                    }
                });
                
                // 衛星網
                let iss_v = time * 7.6; let iss_pos = {x: 1.15*Math.cos(iss_v), y: 1.15*Math.sin(iss_v)*Math.cos(0.9), z: 1.15*Math.sin(iss_v)*Math.sin(0.9)};
                t.push(this.createLabel([iss_pos.x, iss_pos.y, iss_pos.z], '#FFD700', '🛰️ ISS', 5, 'diamond'));
                let tss_v = time * 7.8; let tss_pos = {x: 1.12*Math.cos(tss_v+2), y: 1.12*Math.sin(tss_v+2)*Math.cos(0.7), z: 1.12*Math.sin(tss_v+2)*Math.sin(0.7)};
                t.push(this.createLabel([tss_pos.x, tss_pos.y, tss_pos.z], '#FF4500', '🛰️ 天宮', 4, 'diamond'));
                for(let k=0; k<6; k++) {
                    let fs_v = time * 6.5 + (k * Math.PI/3); let fs_pos = {x: 1.3*Math.cos(fs_v), y: 1.3*Math.sin(fs_v)*Math.cos(0.4), z: 1.3*Math.sin(fs_v)*Math.sin(0.4)};
                    t.push(this.createLabel([fs_pos.x, fs_pos.y, fs_pos.z], '#00FFFF', k===0?'福衛7號':'', 2, 'square'));
                }

                // 歷史登月點 (完美貼附月表)
                MOON_LANDINGS.forEach(ld => {
                    let loc = latLonToLocal(ld.lat, ld.lon, 1.52);
                    let tf = TransformEngine.apply([loc[0]], [loc[1]], [loc[2]], moon_angle, 1.0, mx, my, 0);
                    t.push(this.createLabel([tf.x[0], tf.y[0], tf.z[0]], ld.c, ld.name, ld.s, 'x'));
                });
                // 鵲橋
                t.push(this.createLabel([moon_d * 1.15 * Math.cos(moon_angle) + 0.8 * Math.cos(time * 5), moon_d * 1.15 * Math.sin(moon_angle), 0.8 * Math.sin(time * 5)], '#FF00FF', '🛰️ 鵲橋', 3, 'diamond'));
            }
        }
        else if (level_idx === 1) { // 太陽系全貌
            if(vis.landmarks) t.push(this.createLabel([0,0,0], '#FF5500', '太陽', 10, 'circle'));
            PLANETS.forEach(p => {
                let pos = getKeplerPos(p.a, p.e, p.i, time, p.T);
                if(vis.landmarks) t.push(this.createLabel([pos.x, pos.y, pos.z], p.c, p.name, p.s, 'circle'));
                if(vis.streams) { let orb = this.precalcKeplerOrbit(`orb_${p.id}`, p.a, p.e, p.i); t.push({ type: 'scatter3d', x: orb.x, y: orb.y, z: orb.z, mode: 'lines', line: {color: 'rgba(255,255,255,0.2)', width: 1.0}, hoverinfo: 'none', showlegend: false }); }
                if(p.hasRing && vis.particles) t.push(this.createPlanetaryRing(pos, p.s*0.15, p.s*0.35, 300, p.c, p.i));
            });
            if (vis.particles) {
                let bx=[], by=[], bz=[];
                for(let i=0; i<2000; i++) { let r = rand(30, 48), th = rand(0, 2*Math.PI); bx.push(r*Math.cos(th)); by.push(r*Math.sin(th)); bz.push(randn()*2.0); }
                t.push({ type: 'scatter3d', x: bx, y: by, z: bz, mode: 'markers', marker: {size: 1.5, color: 'rgba(150, 200, 255, 0.2)'}, hoverinfo: 'none', showlegend: false });
            }
        }
        else if (level_idx === 2) { // 太陽系螺旋衝浪
            let sunVec = [-4.0, -4.0, 2.0], sunPos = {x: time * sunVec[0], y: time * sunVec[1], z: time * sunVec[2]};
            if(vis.landmarks) t.push(this.createLabel([sunPos.x, sunPos.y, sunPos.z], '#FF5500', '太陽', 8, 'circle'));
            PLANETS.forEach(p => {
                let loc = getKeplerPos(p.a, p.e, p.i, time, p.T), world = {x: loc.x + sunPos.x, y: loc.y + sunPos.y, z: loc.z + sunPos.z};
                if(vis.landmarks) t.push(this.createLabel([world.x, world.y, world.z], p.c, p.name, p.s, 'circle'));
                if(vis.streams && isPlaying) t.push(this.createSurfingTrail(p, time, sunVec));
            });
        }
        else if (level_idx === 3) { // 銀河系核心
            if(vis.landmarks) { t.push(this.createLabel([8,0,0], '#FF0000', '<上一層: 太陽系>', 4, 'circle', rotationAngle, 1.0)); t.push(this.createLabel([2, -4, -5], '#DDDDDD', '大麥哲倫星系', 3, 'circle', rotationAngle, 1.0)); }
            if(vis.streams) {
                let arms = this.precalcSpiralArms(`L${level_idx}_arms`, dyn.mw, 16, 4); t.push(...this.drawSpiralArmsDynamic(arms, 'rgba(0, 255, 255, 0.6)', rotationAngle, 1.0));
                let accretion = this.precalcTurbulentAccretion(`L${level_idx}_accretion`, dyn.mw, 25.0, 180); t.push(...this.drawStreamlinesDynamic(accretion, 'rgba(0, 100, 255, 0.35)', rotationAngle, 1.0));
                let bubbles = this.precalcFermiBubbles(`L${level_idx}_bubbles`, dyn.mw, 18.0, 6.0, 400); t.push(...this.drawFermiBubblesDynamic(bubbles, rotationAngle, 1.0));
            }
        }
        else if (level_idx >= 4 && level_idx <= 7) { 
            if(vis.landmarks) { t.push(this.createLabel(dyn.mw, '#FF0000', '本星系群', 4, 'circle', 0, 1.0)); if (level_idx >= 6) t.push(this.createLabel(dyn.virgo, '#FFAA00', '室女座星系團', 5, 'circle', 0, 1.0)); }
            if(vis.streams) {
                let seeds = this.getSeeds(`L${level_idx}`, [0,0,0], 100.0, 180);
                let attractors = level_idx < 6 ? [{pos: dyn.mw, mass: 1.0, axis:[0,0,1], spin:0.5}, {pos: dyn.m31, mass: 1.5, axis:[0.2,0,1], spin:0.5}] : [{pos: dyn.mw, mass: 1.0, axis:[0,0,1], spin:0.1}, {pos: dyn.virgo, mass: 20.0, axis:[-0.5,0.8,1], spin: 1.2}];
                let streams = this.calcDynamicStreamlines(seeds, 100.0, attractors, false);
                let color = level_idx < 6 ? 'rgba(0,255,100,0.4)' : 'rgba(200,50,255,0.4)';
                t.push(...this.drawStreamlinesDynamic(streams, color, 0, 1.0));
            }
        }
        else if (level_idx === 8 || level_idx === 9) { 
            if(vis.landmarks) { t.push(this.createLabel(dyn.mw, '#FF0000', '本星系群', 5, 'diamond', 0, 1.0)); t.push(this.createLabel(dyn.ga, '#FFFFFF', '巨引源', 6, 'circle', 0, 1.0)); }
            if(vis.streams) {
                let seeds = this.getSeeds(`L9`, [50, -20, 20], 280.0, 200);
                let attractors = [{pos: dyn.perseus, mass: 90.0, axis:[1,1,0], spin:0.8}, {pos: dyn.ga, mass: 150.0, axis:[-1,0.5,1], spin: 1.5}, {pos: dyn.shapley, mass: 120.0, axis:[0,0,1], spin:0.2}];
                let streams = this.calcDynamicStreamlines(seeds, 280.0, attractors, false);
                t.push(...this.drawLaniakeaWatershedDynamic(streams, 1, 0, 1.0, vis.web));
            }
        }
        else if (level_idx >= 10) { 
            let sim_scale = 2500.0;
            if(vis.landmarks) { t.push(this.createLabel(dyn.mw, '#FF0000', '本星系群', 5, 'diamond', 0, expandFactor)); t.push(this.createLabel(dyn.ga, '#FFFFFF', '拉尼亞凱亞', 5, 'circle', 0, expandFactor)); }
            
            if (level_idx === 10 || level_idx === 11) {
                if(vis.landmarks) t.push(this.createLabel(dyn.shapley, '#9900FF', '夏普力', 6, 'circle', 0, expandFactor));
                if(vis.streams) {
                    let seeds = this.getSeeds(`L11`, [0,0,0], 1000.0, 200);
                    let attractors = [{pos: dyn.perseus, mass: 90.0, axis:[1,1,0], spin:0.8}, {pos: dyn.ga, mass: 150.0, axis:[-1,0.5,1], spin: 1.5}, {pos: dyn.shapley, mass: 250.0, axis:[0,0,1], spin:1.0}];
                    let streams = this.calcDynamicStreamlines(seeds, 1000.0, attractors, false);
                    t.push(...this.drawLaniakeaWatershedDynamic(streams, 1, 0, expandFactor, vis.web));
                }
                if(level_idx === 11 && vis.cones) { let cones = this.precalcCones(`L12`, 1000.0, 100); t.push(this.drawConesDynamic(cones, 0, expandFactor)); }
            } else {
                if(vis.landmarks) { t.push(this.createLabel(dyn.sloan, '#FF5500', '史隆長城', 6, 'circle', 0, expandFactor)); t.push(this.createLabel(dyn.hcb, '#FFFFFF', '北冕座長城', 6, 'diamond', 0, expandFactor)); t.push(this.createLabel([1500, -800, 600], '#AAAAAA', '英仙-雙魚座', 5, 'circle', 0, expandFactor)); }
                if(vis.web) {
                    let anchors = [[0,0,0], dyn.sloan, dyn.hcb, dyn.shapley, dyn.perseus, [1500, -800, 600], [-1200, 1000, -500]];
                    let webData = this.precalcDensityWeb(`L14_Gaussian`, [0,0,0], sim_scale, 800, anchors); t.push(...this.drawDensityWeb(webData, expandFactor));
                }
                if(vis.streams) { let seeds = this.getSeeds(`L14_EXP`, [0,0,0], sim_scale, 250); let streams = this.calcDynamicStreamlines(seeds, sim_scale, null, true); t.push(...this.drawStreamlinesDynamic(streams, 'rgba(100,150,255,0.4)', 0, expandFactor)); }
                if(vis.cones) { let cones = this.precalcCones(`L14_cone`, sim_scale, 150); t.push(this.drawConesDynamic(cones, 0, expandFactor)); }
            }
        }
        
        if (vis.particles && level_idx >= 2) {
            let px=[], py=[], pz=[]; for(let i=0; i<800; i++) { px.push(randn() * SCALE_LIMITS[level_idx]*0.8); py.push(randn() * SCALE_LIMITS[level_idx]*0.8); pz.push(randn() * SCALE_LIMITS[level_idx]*0.8); }
            t.push({ type: 'scatter3d', x: px, y: py, z: pz, mode: 'markers', marker: {size: 1.5, color: 'rgba(200,200,255,0.3)'}, hoverinfo: 'none', showlegend: false });
        }
        return t;
    }
}

const selLevel = document.getElementById('level-select');
if (selLevel) { LEVELS.forEach((lv, i) => { let opt = document.createElement('option'); opt.value = i; opt.text = lv; selLevel.appendChild(opt); }); }

let globalTime = 0, isPlaying = false, animReq = null, lastTimestamp = 0, isFirstRender = true, isUserInteracting = false; 
const renderBtn = document.getElementById('render-btn'), playBtn = document.getElementById('play-btn');

// 修復相機卡頓：在捕獲階段優先攔截所有滑鼠/觸控事件
window.addEventListener('mousedown', (e) => { if(e.target.closest('.js-plotly-plot') || e.target.closest('#plotly-div')) isUserInteracting = true; }, true);
window.addEventListener('mouseup', () => { isUserInteracting = false; }, true);
window.addEventListener('touchstart', (e) => { if(e.target.closest('.js-plotly-plot') || e.target.closest('#plotly-div')) isUserInteracting = true; }, {capture: true, passive: true});
window.addEventListener('touchend', () => { isUserInteracting = false; }, {capture: true, passive: true});
window.addEventListener('mouseleave', () => { isUserInteracting = false; }, true);

const tourPanel = document.getElementById('tour-panel'), tourTitle = document.getElementById('tour-title'), tourContent = document.getElementById('tour-content'), toggleTour = document.getElementById('toggle-tour'), nextTourBtn = document.getElementById('next-tour-btn');

function updateTour() {
    if(!toggleTour || !tourPanel || !selLevel) return;
    if(!toggleTour.checked) { tourPanel.style.display = 'none'; return; }
    let idx = parseInt(selLevel.value);
    let storyIdx = STORY_MAP[idx] || 0;
    if(tourTitle) tourTitle.innerText = STORY_SCRIPT[storyIdx].title;
    if(tourContent) tourContent.innerHTML = STORY_SCRIPT[storyIdx].content;
    tourPanel.style.display = 'block';
    if(nextTourBtn) nextTourBtn.style.display = (idx < LEVELS.length - 1) ? 'block' : 'none';
}
if(toggleTour) toggleTour.addEventListener('change', updateTour);
if(nextTourBtn) nextTourBtn.addEventListener('click', () => { selLevel.value = parseInt(selLevel.value) + 1; selLevel.dispatchEvent(new Event('change')); });

function drawFrame(forceResetCamera = false) {
    let conf = { 
        colors: { bg: safeVal('color-bg', '#050A14'), grid: safeVal('color-grid', '#00FFFF'), particle: safeVal('color-particle', '#C8C8C8') }, 
        opacities: { bg: 100, grid: 20 }, 
        vis: { landmarks: safeCheck('toggle-landmarks', true), streams: safeCheck('toggle-streams', true), particles: safeCheck('toggle-particles', true), web: safeCheck('toggle-web', true), cones: safeCheck('toggle-cones', true) } 
    };
    let engine = new UniverseEngine(conf.colors, conf.opacities);
    let idx = selLevel ? parseInt(selLevel.value) : 0; if(isNaN(idx)) idx = 0;
    
    let traces = engine.buildLevelTraces(idx, conf.vis, globalTime);
    let limit = SCALE_LIMITS[idx]; 
    let axis_config = { showgrid: true, gridcolor: engine.gridColor, zeroline: false, showline: false, showbackground: false, showspikes: false, range: [-limit, limit] };
    
    let layout = { title: `<b>${LEVELS[idx]}</b> <span style="font-size:12px;color:#aaa;">(T: ${globalTime.toFixed(2)}s)</span>`, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)', scene: { bgcolor: 'rgba(0,0,0,0)', xaxis: axis_config, yaxis: axis_config, zaxis: axis_config, aspectmode: 'cube' }, margin: { l: 0, r: 0, b: 0, t: 50 }, uirevision: 'true' };

    let div = document.getElementById('plotly-div');
    if (div) {
        if (forceResetCamera || isFirstRender) { layout.scene.camera = { eye: {x: 1.5, y: 1.5, z: 0.8} }; isFirstRender = false; Plotly.newPlot(div, traces, layout); } 
        else { Plotly.react(div, traces, layout); }
    }
    updateTour();
}

function animatePhysics(timestamp) {
    if (!isPlaying) return;
    animReq = requestAnimationFrame(animatePhysics); 
    let dt = (timestamp - lastTimestamp) / 1000; lastTimestamp = timestamp;
    if(dt > 0.1) dt = 0.016; 
    
    let speed = parseFloat(safeVal('op-speed', 10));
    globalTime += dt * (speed * 0.1);

    if (!isUserInteracting) drawFrame(false); 
}

if(playBtn) {
    playBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        if (isPlaying) { playBtn.innerText = "⏸ 暫停時空演化"; playBtn.classList.add('playing'); lastTimestamp = performance.now(); animReq = requestAnimationFrame(animatePhysics); } 
        else { playBtn.innerText = "▶ 啟動時空演化"; playBtn.classList.remove('playing'); cancelAnimationFrame(animReq); drawFrame(false); }
    });
}

if(renderBtn) renderBtn.addEventListener('click', () => { globalTime = 0; drawFrame(true); });

if(selLevel) {
    selLevel.addEventListener('change', () => {
        let overlay = document.getElementById('loading-overlay');
        if(overlay) overlay.style.display = "flex";
        setTimeout(() => { globalTime = 0; drawFrame(true); if(overlay) overlay.style.display = "none"; }, 100);
    });
}

setTimeout(() => {
    const statusText = document.getElementById('loading-status');
    const startBtn = document.getElementById('start-btn');
    if(statusText) { statusText.innerText = "系統就緒 (System Ready)"; statusText.style.color = "#2ECC71"; }
    if(startBtn) startBtn.classList.add('ready');
}, 1500);

let startBtn = document.getElementById('start-btn');
if(startBtn) {
    startBtn.addEventListener('click', () => {
        let splash = document.getElementById('splash-screen');
        if(splash) splash.style.opacity = '0';
        setTimeout(() => { if(splash) splash.style.display = 'none'; drawFrame(true); }, 1000);
    });
}

['toggle-landmarks', 'toggle-streams', 'toggle-particles', 'toggle-web', 'toggle-cones'].forEach(id => { 
    let el = document.getElementById(id); 
    if(el) el.addEventListener('change', () => { if(!isUserInteracting) drawFrame(false); }); 
});
</script>
</body>
</html>
