<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多尺度宇宙動力學 - 真實觀測海綿拓樸版</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #050A14; color: white; display: flex; }
        
        #control-panel { width: 310px; min-width: 310px; background-color: #2C3E50; padding: 20px; box-sizing: border-box; overflow-y: auto; border-right: 2px solid #1a252f; z-index: 10; }
        #control-panel::-webkit-scrollbar { width: 6px; }
        #control-panel::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.2); border-radius: 3px; }
        
        #plot-container { flex-grow: 1; height: 100vh; position: relative; }
        
        h3 { margin-top: 15px; font-size: 15px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px; color: #00FFFF; }
        h3:first-child { margin-top: 0; }
        
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 8px; }
        select { width: 100%; padding: 8px; background-color: white; color: black; border: none; border-radius: 4px; font-weight: bold; font-size: 13px; cursor: pointer; }
        
        .toggle-row { display: flex; align-items: center; margin-bottom: 8px; font-weight: normal; cursor: pointer; font-size: 13px; opacity: 0.9; transition: opacity 0.2s; }
        .toggle-row:hover { opacity: 1; }
        .toggle-row input[type="checkbox"] { margin-right: 10px; cursor: pointer; width: 16px; height: 16px; accent-color: #E74C3C; }
        
        .color-picker-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 5px; }
        .color-picker-row span { font-size: 12px; }
        input[type="color"] { border: 1px solid rgba(255,255,255,0.5); width: 35px; height: 25px; padding: 0; cursor: pointer; background: transparent; border-radius: 3px; }
        
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00FFFF; }
        .range-val { font-size: 12px; float: right; color: #00FFFF; }
        
        button.action-btn { width: 100%; background-color: #34495E; color: white; font-weight: bold; border: 1px solid #00FFFF; padding: 10px; border-radius: 5px; cursor: pointer; transition: 0.2s; font-size: 14px; margin-top: 5px; }
        button.action-btn:hover { background-color: #00FFFF; color: black; }
        
        button#play-btn { background-color: #E74C3C; border-color: #E74C3C; margin-top: 15px; padding: 15px; font-size: 15px; }
        button#play-btn.playing { background-color: #2ECC71; border-color: #2ECC71; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); } 100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); } }

        #loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 10, 20, 0.8); display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; color: #00FFFF; z-index: 100; backdrop-filter: blur(5px); display: none; }
    </style>
</head>
<body>

    <div id="control-panel">
        <h3>🌌 觀測尺度切換</h3>
        <div class="control-group">
            <select id="level-select"></select>
        </div>

        <h3>⏱️ 軌道與角動量流體引擎</h3>
        <div class="control-group">
            <button id="play-btn" class="action-btn">▶ 啟動巨引源軌道與角動量</button>
            <label style="margin-top: 15px;">時空流逝速度: <span id="val-speed" class="range-val">1.0x</span></label>
            <input type="range" id="op-speed" min="1" max="100" value="10">
            <p style="font-size: 11px; color: #aaa; line-height: 1.4; margin-top: 5px;">
                *L5以上：引力勢線將隨超星系團移動而即時扭曲，展示暗物質暈角動量。<br>*L12以上：哈伯空間擴張。
            </p>
        </div>

        <h3>👁️ 顯示項目控制</h3>
        <div class="control-group">
            <label class="toggle-row"><input type="checkbox" id="toggle-landmarks" checked> <span>重要天體與黑洞標註</span></label>
            <label class="toggle-row"><input type="checkbox" id="toggle-streams" checked> <span>引力場、角動量漩渦與軌道</span></label>
            <label class="toggle-row"><input type="checkbox" id="toggle-particles" checked> <span>背景微星體粒子</span></label>
            <label class="toggle-row"><input type="checkbox" id="toggle-web" checked> <span>暗物質海綿網/分水嶺網格</span></label>
            <label class="toggle-row"><input type="checkbox" id="toggle-cones" checked> <span>宇宙膨脹流向箭頭</span></label>
        </div>

        <h3>🎨 視覺調色盤</h3>
        <div class="control-group">
            <div class="color-picker-row"><span>宇宙背景顏色</span><input type="color" id="color-bg" value="#050A14"></div>
            <div class="color-picker-row"><span>空間網格顏色</span><input type="color" id="color-grid" value="#00FFFF"></div>
            <div class="color-picker-row"><span>背景星體顏色</span><input type="color" id="color-particle" value="#C8C8C8"></div>
            <div class="color-picker-row"><span>重要天體標籤</span><input type="color" id="color-text" value="#FFFF00"></div>
        </div>

        <h3>🎚️ 參數微調</h3>
        <div class="control-group">
            <label>背景透明度: <span id="val-bg-op" class="range-val">95%</span></label>
            <input type="range" id="op-bg" min="0" max="100" value="95">
        </div>
        <div class="control-group">
            <label>網格透明度: <span id="val-grid-op" class="range-val">20%</span></label>
            <input type="range" id="op-grid" min="0" max="100" value="20">
        </div>

        <button id="render-btn" class="action-btn">🔄 重置時空與相機視角</button>
    </div>

    <div id="plot-container">
        <div id="loading-overlay">⏳ 引力種子預計算中...</div>
        <div id="plotly-div" style="width:100%; height:100%;"></div>
    </div>

<script>
/**
 * 多尺度宇宙動力學 - 引力流體即時積分引擎 (真實海綿拓樸版)
 */

const LEVELS = [
    "01. 太陽系內側 (行星軌道與引力阱)", "02. 太陽系全貌 (氣體巨星與柯伊伯帶)",
    "03. 獵戶座旋臂局部 (近鄰恆星)", "04. 銀河系全貌 (引力螺旋與 Sgr A*)",
    "05. 銀河系與衛星星系 (麥哲倫星流)", "06. 本星系群局部 (雙軸鞍點)",
    "07. 本星系群全貌 (Local Group)", "08. 周邊星系群 (Local Sheet)",
    "09. 室女座超星系團局部 (M87*)", "10. 室女座超星系團骨架 (引力角動量漩渦)",
    "11. 拉尼亞凱亞次級網絡", "12. 拉尼亞凱亞核心 (動態巨引源)",
    "13. 拉尼亞凱亞全貌 (動態分水嶺轉移)", "14. 周邊超星系團 (暗能量介入)",
    "15. 巨型宇宙網 (海綿泡沫結構)", "16. 可觀測宇宙 (極端哈伯擴張)"
];

const BLACK_HOLES = [
    {id: 'mw', dist_scale: 15, name: '人馬座 A*', desc: '430萬太陽質量', is_mega: false},
    {id: 'cyg', dist_scale: 15, name: '天鵝座 X-1', desc: '21倍太陽質量', is_mega: false, offset: [2, 2, 0.5]},
    {id: 'm31', dist_scale: 35, name: 'M31* (仙女座)', desc: '1.4億太陽質量', is_mega: false},
    {id: 'virgo', dist_scale: 120, name: 'M87*', desc: '65億太陽質量', is_mega: false},
    {id: 'cenA', dist_scale: 120, name: '半人馬座 A', desc: '5500萬太陽質量', is_mega: false, offset: [-20, -50, -5]},
    {id: 'perseus', dist_scale: 280, name: 'NGC 1277', desc: '170億太陽質量', is_mega: false},
    {id: 'ga', dist_scale: 280, name: 'Abell 3627', desc: '巨引源核心', is_mega: false},
    {id: 'shapley', dist_scale: 500, name: '夏普力主黑洞群', desc: '暗流核心', is_mega: false},
    {id: 'phoenix', dist_scale: 2500, name: '鳳凰座 A*', desc: '1000億太陽質量', is_mega: true, offset: [1200, -600, 400]},
    {id: 'ton', dist_scale: 2500, name: 'TON 618', desc: '660億太陽質量', is_mega: true, offset: [-1500, 900, -1000]}
];

const SCALE_LIMITS = [5, 50, 50, 25, 35, 35, 60, 100, 100, 150, 280, 280, 280, 1000, 2500, 3000];

const CACHE = { seeds: {}, webs: {}, cones: {} };

function hexToRgba(hex, opacity = 1) {
    let r = parseInt(hex.substring(1, 3), 16), g = parseInt(hex.substring(3, 5), 16), b = parseInt(hex.substring(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${opacity})`;
}
function rand(min, max) { return Math.random() * (max - min) + min; }
function randn() { let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random(); return Math.sqrt(-2.0*Math.log(u))*Math.cos(2.0*Math.PI*v); }

class TransformEngine {
    static apply(arrX, arrY, arrZ, expandFactor) {
        let len = arrX.length;
        let outX = new Array(len), outY = new Array(len), outZ = new Array(len);
        for(let i=0; i<len; i++) {
            if (arrX[i] === null) {
                outX[i] = null; outY[i] = null; outZ[i] = null;
            } else {
                outX[i] = arrX[i] * expandFactor;
                outY[i] = arrY[i] * expandFactor;
                outZ[i] = arrZ[i] * expandFactor;
            }
        }
        return {x: outX, y: outY, z: outZ};
    }
}

class UniverseEngine {
    constructor(colors, opacities) {
        this.bgColor = hexToRgba(colors.bg, opacities.bg / 100);
        this.gridColor = hexToRgba(colors.grid, opacities.grid / 100);
        this.particleColor = hexToRgba(colors.particle, 0.5);
        this.textColor = colors.text;
    }

    createLandmark(pos, color, name, size, symbol, scale) {
        return {
            type: 'scatter3d', x: [pos[0]*scale], y: [pos[1]*scale], z: [pos[2]*scale],
            mode: 'markers+text', marker: { size: size, color: color, symbol: symbol, line: {color:'white', width:0.5} },
            text: [name], textposition: "top center", textfont: {color: this.textColor, size: 10}, hoverinfo: 'none', showlegend: false
        };
    }

    createBlackHole(pos, name, desc, is_mega, scale) {
        let bh_size = is_mega ? 7 : 4; 
        let core = {
            type: 'scatter3d', x: [pos[0]*scale], y: [pos[1]*scale], z: [pos[2]*scale],
            mode: 'markers+text', marker: { size: bh_size, color: '#000000', symbol: 'circle', line: {color: is_mega ? '#FFD700' : '#000000', width: 2} },
            text: [is_mega ? `👑 ${name}` : `🕳️ ${name}`], textposition: "bottom right", textfont: {color: is_mega ? '#FFD700' : this.textColor, size: 10}, hoverinfo: 'none', showlegend: false
        };

        let ring_x = [], ring_y = [], ring_z = [];
        let r = is_mega ? 1.0 : 0.5; 
        for(let i=0; i<=40; i++) {
            let theta = (i / 40) * 2 * Math.PI;
            ring_x.push(pos[0] + r * Math.cos(theta)); ring_y.push(pos[1] + r * Math.sin(theta)); ring_z.push(pos[2]);
        }
        let tf_ring = TransformEngine.apply(ring_x, ring_y, ring_z, scale);
        let ring = { type: 'scatter3d', x: tf_ring.x, y: tf_ring.y, z: tf_ring.z, mode: 'lines', line: {color: is_mega ? 'rgba(255, 50, 50, 0.8)' : 'rgba(255, 0, 255, 0.6)', width: 2}, hoverinfo: 'none', showlegend: false };
        return [core, ring];
    }

    createOrbit(radius, color, scale) {
        let x=[], y=[], z=[];
        for(let i=0; i<=60; i++) {
            let theta = (i/60) * 2 * Math.PI;
            x.push(radius * Math.cos(theta)); y.push(radius * Math.sin(theta)); z.push(0);
        }
        let tf = TransformEngine.apply(x, y, z, scale);
        return { type: 'scatter3d', x: tf.x, y: tf.y, z: tf.z, mode: 'lines', line: {color: color, width: 1.5, dash: 'dot'}, hoverinfo: 'none', showlegend: false };
    }

    createSolarWind(timePhase, scale) {
        let x=[], y=[], z=[], c=[];
        for(let i=0; i<150; i++) {
            let phi = (i * 13.1) % Math.PI, theta = (i * 81.3) % (2*Math.PI);
            let r = ((i * 5.7 + timePhase * 1.5) % 2.5); 
            x.push(r * Math.sin(phi) * Math.cos(theta)); y.push(r * Math.sin(phi) * Math.sin(theta)); z.push(r * Math.cos(phi) * 0.3); 
            c.push(`rgba(255, 150, 0, ${Math.max(0, 1 - r/2.5)})`); 
        }
        let tf = TransformEngine.apply(x, y, z, scale);
        return { type: 'scatter3d', x: tf.x, y: tf.y, z: tf.z, mode: 'markers', marker: {size: 2, color: c}, hoverinfo: 'none', showlegend: false };
    }

    createBackgroundParticles(num, radius, center, scale) {
        let x=[], y=[], z=[], actualNum = isPlaying ? Math.floor(num * 0.3) : num; 
        for(let i=0; i<actualNum; i++) {
            let r = radius * Math.cbrt(((i*17.3)%100)/100);
            let theta = ((i*31.7)%100)/100 * 2 * Math.PI;
            let phi = Math.acos(1 - 2 * (((i*43.1)%100)/100));
            x.push(center[0] + r * Math.sin(phi) * Math.cos(theta)); y.push(center[1] + r * Math.sin(phi) * Math.sin(theta)); z.push(center[2] + r * Math.cos(phi));
        }
        let tf = TransformEngine.apply(x, y, z, scale);
        return { type: 'scatter3d', x: tf.x, y: tf.y, z: tf.z, mode: 'markers', marker: {size: 1.5, color: this.particleColor}, hoverinfo: 'none', showlegend: false };
    }

    getSeeds(key, center, max_scale, point_density) {
        if(CACHE.seeds[key]) return CACHE.seeds[key];
        let seeds = [];
        for(let i=0; i<point_density; i++) {
            let r = max_scale * Math.cbrt(((i*7.1)%100)/100);
            let phi = ((i*11.3)%100)/100 * Math.PI;
            let theta = ((i*19.7)%100)/100 * 2*Math.PI;
            seeds.push([
                center[0] + r * Math.sin(phi) * Math.cos(theta),
                center[1] + r * Math.sin(phi) * Math.sin(theta),
                center[2] + r * Math.cos(phi)
            ]);
        }
        CACHE.seeds[key] = seeds; return seeds;
    }

    calcDynamicStreamlines(seeds, max_scale, attractors, isExpansion) {
        let streams = [], steps = 30, dt = max_scale / (steps * 1.2);
        
        for(let i=0; i<seeds.length; i++) {
            let cx = seeds[i][0], cy = seeds[i][1], cz = seeds[i][2];
            let path_x=[cx], path_y=[cy], path_z=[cz], basin_id = -1;

            for(let step=0; step<steps; step++) {
                let gx=0, gy=0, gz=0;
                
                if (isExpansion) {
                    gx = cx * 0.05; gy = cy * 0.05; gz = cz * 0.05;
                } else if (attractors) {
                    for(let a=0; a<attractors.length; a++) {
                        let attr = attractors[a];
                        let dx = attr.pos[0]-cx, dy = attr.pos[1]-cy, dz = attr.pos[2]-cz;
                        let dist = Math.hypot(dx, dy, dz) + 1e-5;
                        let pull = attr.mass / Math.pow(dist, 1.5); 
                        
                        gx += (dx/dist)*pull; gy += (dy/dist)*pull; gz += (dz/dist)*pull;
                        
                        if(attr.spin && attr.axis) {
                            let ax = attr.axis[0], ay = attr.axis[1], az = attr.axis[2];
                            let vpx = (dy/dist)*az - (dz/dist)*ay;
                            let vpy = (dz/dist)*ax - (dx/dist)*az;
                            let vpz = (dx/dist)*ay - (dy/dist)*ax;
                            
                            let spin_force = attr.spin * pull * 0.6;
                            gx += vpx * spin_force; gy += vpy * spin_force; gz += vpz * spin_force;
                        }
                    }
                }

                let f_mag = Math.hypot(gx, gy, gz) + 1e-10;
                cx += (gx/f_mag)*dt; cy += (gy/f_mag)*dt; cz += (gz/f_mag)*dt;
                path_x.push(cx); path_y.push(cy); path_z.push(cz);
                
                if (attractors && !isExpansion) {
                    for(let a=0; a<attractors.length; a++) {
                        if (Math.hypot(cx-attractors[a].pos[0], cy-attractors[a].pos[1], cz-attractors[a].pos[2]) < dt*1.5) {
                            basin_id = a; break;
                        }
                    }
                }
                if (basin_id !== -1) break;
            }
            streams.push({path_x, path_y, path_z, basin_id});
        }
        return streams;
    }

    drawStreamlines(streams, color, scale) {
        let all_x=[], all_y=[], all_z=[];
        streams.forEach(s => { all_x.push(...s.path_x, null); all_y.push(...s.path_y, null); all_z.push(...s.path_z, null); });
        let tf = TransformEngine.apply(all_x, all_y, all_z, scale);
        return [{ type: 'scatter3d', x: tf.x, y: tf.y, z: tf.z, mode: 'lines', line: {color: color, width: 1.5}, hoverinfo: 'none', showlegend: false }];
    }

    drawLaniakeaWatershed(streams, target_basin_id, scale, drawMesh) {
        let traces = [], target_x=[], target_y=[], target_z=[], outer_x=[], outer_y=[], outer_z=[], basin_x=[], basin_y=[], basin_z=[];
        streams.forEach(stream => {
            if (stream.basin_id === target_basin_id) {
                target_x.push(...stream.path_x, null); target_y.push(...stream.path_y, null); target_z.push(...stream.path_z, null);
                if(drawMesh) for(let i=0; i<stream.path_x.length; i+=3) { basin_x.push(stream.path_x[i]); basin_y.push(stream.path_y[i]); basin_z.push(stream.path_z[i]); }
            } else {
                outer_x.push(...stream.path_x, null); outer_y.push(...stream.path_y, null); outer_z.push(...stream.path_z, null);
            }
        });
        let tf_target = TransformEngine.apply(target_x, target_y, target_z, scale), tf_outer = TransformEngine.apply(outer_x, outer_y, outer_z, scale);
        traces.push({ type: 'scatter3d', x: tf_target.x, y: tf_target.y, z: tf_target.z, mode: 'lines', line: {color: 'rgba(255, 204, 0, 0.6)', width: 1.5}, hoverinfo: 'none', showlegend: false });
        traces.push({ type: 'scatter3d', x: tf_outer.x, y: tf_outer.y, z: tf_outer.z, mode: 'lines', line: {color: 'rgba(50, 150, 255, 0.35)', width: 1.5}, hoverinfo: 'none', showlegend: false });
        if (drawMesh && basin_x.length > 10) {
            let tf_mesh = TransformEngine.apply(basin_x, basin_y, basin_z, scale);
            traces.push({ type: 'mesh3d', x: tf_mesh.x, y: tf_mesh.y, z: tf_mesh.z, alphahull: 4, opacity: 0.15, color: 'goldenrod', hoverinfo: 'none', showlegend: false });
        }
        return traces;
    }

    /**
     * 真實海綿狀宇宙網演算法 (Cosmic Web Foam)
     * 利用 3D Gyroid 干涉波函數產生真實的宇宙空洞與纖維
     */
    precalcDensityWeb(key, center, radius, num_halos, anchor_arrays) {
        if(CACHE.webs[key]) return CACHE.webs[key];
        let halos = [];

        // 1. 均向性海綿結構 (Cosmic Web Foam) - 75% 星系
        let freq = radius / 3.5;
        let target_bg = Math.floor(num_halos * 0.75);
        let attempt = 0;

        while(halos.length < target_bg && attempt < 15000) {
            let px = (Math.random() - 0.5) * 2 * radius;
            let py = (Math.random() - 0.5) * 2 * radius;
            let pz = (Math.random() - 0.5) * 2 * radius;

            // 確保分布在球體內 (可視宇宙邊界)
            if (px*px + py*py + pz*pz > radius*radius) { attempt++; continue; }

            // 3D 密度干涉函數 (模擬暗物質纖維與巨大空洞)
            let density = Math.sin(px/freq)*Math.cos(py/freq) + Math.sin(py/freq)*Math.cos(pz/freq) + Math.sin(pz/freq)*Math.cos(px/freq);

            // 保留纖維上的點，偶爾在空洞中散落孤立星系
            if (density > 0.3 || Math.random() > 0.97) {
                halos.push([center[0] + px, center[1] + py, center[2] + pz]);
            }
            attempt++;
        }

        // 2. 已知超大質量結構錨點 (長城) - 25% 星系
        if(anchor_arrays && anchor_arrays.length > 0) {
            let halos_per_anchor = Math.floor((num_halos * 0.25) / anchor_arrays.length);
            anchor_arrays.forEach(cp => {
                for(let i=0; i<halos_per_anchor; i++) {
                    halos.push([cp[0] + randn()*radius*0.12, cp[1] + randn()*radius*0.12, cp[2] + randn()*radius*0.12]);
                }
            });
        }
        
        let line_x=[], line_y=[], line_z=[], px=[], py=[], pz=[], psize=[];
        let max_link_dist = radius * 0.25; // 限制連線距離，避免穿越巨大空洞

        for(let i=0; i<halos.length; i++) {
            let h = halos[i];
            px.push(h[0]); py.push(h[1]); pz.push(h[2]); psize.push(((i*7.7)%2) + 1.5); 
            
            let dists = [];
            for(let j=0; j<halos.length; j++) {
                if(i === j) continue;
                let d = Math.hypot(h[0]-halos[j][0], h[1]-halos[j][1], h[2]-halos[j][2]);
                if (d < max_link_dist) dists.push({idx: j, d: d});
            }
            dists.sort((a,b) => a.d - b.d);
            
            // 每個節點最多連 3 條線，形成典型的纖維網
            for(let k=0; k<Math.min(3, dists.length); k++) {
                let neighbor = halos[dists[k].idx];
                line_x.push(h[0], neighbor[0], null);
                line_y.push(h[1], neighbor[1], null);
                line_z.push(h[2], neighbor[2], null);
            }
        }
        CACHE.webs[key] = {line: {x:line_x, y:line_y, z:line_z}, points: {x:px, y:py, z:pz, size:psize}};
        return CACHE.webs[key];
    }

    drawDensityWeb(webData, scale) {
        let tf_line = TransformEngine.apply(webData.line.x, webData.line.y, webData.line.z, scale);
        let tf_pts = TransformEngine.apply(webData.points.x, webData.points.y, webData.points.z, scale);
        return [
            { type: 'scatter3d', x: tf_line.x, y: tf_line.y, z: tf_line.z, mode: 'lines', line: {color: 'rgba(180, 50, 255, 0.45)', width: 1.5}, hoverinfo: 'none', showlegend: false },
            { type: 'scatter3d', x: tf_pts.x, y: tf_pts.y, z: tf_pts.z, mode: 'markers', marker: {size: webData.points.size, color: 'rgba(255, 255, 150, 0.9)'}, hoverinfo: 'none', showlegend: false }
        ];
    }

    buildLevelTraces(level_idx, vis, time) {
        let t = [];
        let loopTime = time % 30.0;
        let expandFactor = (level_idx >= 12 && isPlaying) ? (1.0 + loopTime * 0.04) : 1.0;

        // 巨引源與超星系團的動態軌道方程
        let dyn = {
            mw: [10*Math.cos(time*0.1), 10*Math.sin(time*0.1), 2*Math.sin(time*0.05)],
            m31: [25 - 5*Math.cos(time*0.1), 10 - 5*Math.sin(time*0.1), 5 - 2*Math.sin(time*0.05)],
            virgo: [60 + 15*Math.cos(time*0.05), 40 + 15*Math.sin(time*0.05), 20],
            ga: [150 + 30*Math.cos(time*0.03), -50 + 30*Math.sin(time*0.03), 40 + 10*Math.sin(time*0.02)],
            perseus: [-100 + 20*Math.sin(time*0.04), 80 + 20*Math.cos(time*0.04), -40],
            shapley: [300, -150, 100], 
            sloan: [600, 400, -200], hcb: [2000, 1500, -1000]
        };
        
        let getDynBH = (id) => {
            if(dyn[id]) return dyn[id];
            let bh = BLACK_HOLES.find(b => b.id === id);
            return bh && bh.offset ? bh.offset : [0,0,0];
        };

        if (vis.landmarks && level_idx >= 3) {
            BLACK_HOLES.forEach(bh => {
                if (bh.dist_scale <= SCALE_LIMITS[level_idx] * 1.5) {
                    t.push(...this.createBlackHole(getDynBH(bh.id), bh.name, bh.desc, bh.is_mega, expandFactor));
                }
            });
        }

        if (level_idx <= 2) {
            let W_earth = 0.15, W_moon = 2.09, W_merc = 0.6, W_venus = 0.25, W_mars = 0.08, W_jup = 0.03, W_sat = 0.01;
            let e_x = 1.0 * Math.cos(time * W_earth), e_y = 1.0 * Math.sin(time * W_earth);
            let m_x = e_x + 0.08 * Math.cos(time * W_moon), m_y = e_y + 0.08 * Math.sin(time * W_moon);
            
            if(vis.landmarks) {
                t.push(this.createLandmark([0,0,0], '#FF5500', '太陽 (Sun)', 5, 'circle', 1.0));
                if (level_idx === 0) {
                    t.push(this.createLandmark([0.39 * Math.cos(time * W_merc), 0.39 * Math.sin(time * W_merc), 0], '#AAAAAA', '水星', 3, 'circle', 1.0));
                    t.push(this.createLandmark([0.72 * Math.cos(time * W_venus), 0.72 * Math.sin(time * W_venus), 0], '#FFCC00', '金星', 3, 'circle', 1.0));
                    t.push(this.createLandmark([e_x, e_y, 0], '#00AAFF', '地球', 3, 'circle', 1.0));
                    t.push(this.createLandmark([m_x, m_y, 0], '#FFFFFF', '月球', 2, 'circle', 1.0));
                    t.push(this.createLandmark([1.52 * Math.cos(time * W_mars), 1.52 * Math.sin(time * W_mars), 0], '#FF3300', '火星', 3, 'circle', 1.0));
                }
            }
            if(vis.streams && level_idx === 0 && isPlaying) t.push(this.createSolarWind(time, 1.0));
            if(vis.streams && level_idx === 0) [0.39, 0.72, 1.0, 1.52].forEach(r => t.push(this.createOrbit(r, 'rgba(255,255,255,0.2)', 1.0)));
            
            if (level_idx === 1) {
                if(vis.landmarks) t.push(this.createLandmark([5.2*Math.cos(time*W_jup), 5.2*Math.sin(time*W_jup), 0], '#DDAA77', '木星', 4, 'circle', 1.0), this.createLandmark([9.5*Math.cos(time*W_sat), 9.5*Math.sin(time*W_sat), 0], '#EEEEBB', '土星', 4, 'circle', 1.0));
                if(vis.streams) [5.2, 9.5].forEach(r => t.push(this.createOrbit(r, 'rgba(255,255,255,0.2)', 1.0)));
            }
            if (level_idx === 2 && vis.landmarks) t.push(this.createLandmark([4.3, 2, 1], '#FFFFFF', '半人馬座 α', 4, 'circle', 1.0));
            if(vis.particles && !isPlaying) t.push(this.createBackgroundParticles(300, 50.0, [0,0,0], 1.0));
        } 
        else if (level_idx === 3 || level_idx === 4) {
            if(vis.landmarks) t.push(this.createLandmark([8,0,0], '#FF0000', '<上一層: 太陽系>', 4, 'circle', 1.0));
            if(level_idx === 4 && vis.landmarks) t.push(this.createLandmark([2, -4, -5], '#DDDDDD', '大麥哲倫星系', 3, 'circle', 1.0));
            if(vis.particles) t.push(this.createBackgroundParticles(1000, 25, [0,0,0], 1.0));
            if(vis.streams) {
                let seeds = this.getSeeds(`L${level_idx}`, dyn.mw, 25.0, 150);
                let attractors = [{pos: dyn.mw, mass: 2.0, axis: [0,0,1], spin: 1.5}];
                let streams = this.calcDynamicStreamlines(seeds, 25.0, attractors, false);
                t.push(...this.drawStreamlines(streams, 'rgba(0,255,255,0.4)', 1.0));
            }
        }
        else if (level_idx >= 5 && level_idx <= 9) {
            if(vis.landmarks) {
                t.push(this.createLandmark(dyn.mw, '#FF0000', '本星系群', 4, 'circle', 1.0));
                if (level_idx >= 7) t.push(this.createLandmark(dyn.virgo, '#FFAA00', '室女座星系團', 5, 'circle', 1.0));
            }
            if(vis.streams) {
                let seeds = this.getSeeds(`L${level_idx}`, [0,0,0], 100.0, 180);
                let attractors = level_idx < 8 ? 
                    [{pos: dyn.mw, mass: 1.0, axis:[0,0,1], spin:0.5}, {pos: dyn.m31, mass: 1.5, axis:[0.2,0,1], spin:0.5}] : 
                    [{pos: dyn.mw, mass: 1.0, axis:[0,0,1], spin:0.1}, {pos: dyn.virgo, mass: 20.0, axis:[-0.5,0.8,1], spin: 1.2}];
                let streams = this.calcDynamicStreamlines(seeds, 100.0, attractors, false);
                let color = level_idx < 8 ? 'rgba(0,255,100,0.4)' : 'rgba(200,50,255,0.4)';
                t.push(...this.drawStreamlines(streams, color, 1.0));
            }
            if(vis.particles) t.push(this.createBackgroundParticles(1500, 100, [0,0,0], 1.0));
        }
        else if (level_idx === 10 || level_idx === 11) {
            if(vis.landmarks) {
                t.push(this.createLandmark(dyn.mw, '#FF0000', '本星系群', 5, 'diamond', 1.0));
                t.push(this.createLandmark(dyn.ga, '#FFFFFF', '巨引源', 6, 'circle', 1.0));
            }
            if(vis.streams) {
                let seeds = this.getSeeds(`L10`, [50, -20, 20], 280.0, 200);
                let attractors = [
                    {pos: dyn.perseus, mass: 90.0, axis:[1,1,0], spin:0.8}, 
                    {pos: dyn.ga, mass: 150.0, axis:[-1,0.5,1], spin: 1.5}, 
                    {pos: dyn.shapley, mass: 120.0, axis:[0,0,1], spin:0.2}
                ];
                let streams = this.calcDynamicStreamlines(seeds, 280.0, attractors, false);
                t.push(...this.drawLaniakeaWatershed(streams, 1, 1.0, vis.web));
            }
            if(vis.particles) t.push(this.createBackgroundParticles(2000, 300, [0,0,0], 1.0));
        }
        else if (level_idx >= 12) {
            let sim_scale = 2500.0;
            if(vis.landmarks) {
                t.push(this.createLandmark(dyn.mw, '#FF0000', '本星系群 (我們)', 5, 'diamond', expandFactor));
                t.push(this.createLandmark(dyn.ga, '#FFFFFF', '拉尼亞凱亞', 5, 'circle', expandFactor));
            }
            
            if (level_idx === 12 || level_idx === 13) {
                if(vis.landmarks) t.push(this.createLandmark(dyn.shapley, '#9900FF', '夏普力超星系團', 6, 'circle', expandFactor));
                if(vis.streams) {
                    let seeds = this.getSeeds(`L12`, [0,0,0], 1000.0, 200);
                    let attractors = [
                        {pos: dyn.perseus, mass: 90.0, axis:[1,1,0], spin:0.8}, 
                        {pos: dyn.ga, mass: 150.0, axis:[-1,0.5,1], spin: 1.5}, 
                        {pos: dyn.shapley, mass: 250.0, axis:[0,0,1], spin:1.0}
                    ];
                    let streams = this.calcDynamicStreamlines(seeds, 1000.0, attractors, false);
                    t.push(...this.drawLaniakeaWatershed(streams, 1, expandFactor, vis.web));
                }
            } else {
                if(vis.landmarks) {
                    t.push(this.createLandmark(dyn.sloan, '#FF5500', '史隆長城', 6, 'circle', expandFactor));
                    t.push(this.createLandmark(dyn.hcb, '#FFFFFF', '北冕座長城', 6, 'diamond', expandFactor));
                    t.push(this.createLandmark([1500, -800, 600], '#AAAAAA', '英仙-雙魚座超星系團', 5, 'circle', expandFactor));
                }
                if(vis.web) {
                    // 海綿狀宇宙網 (Spongy Cosmic Web)
                    let anchors = [[0,0,0], dyn.sloan, dyn.hcb, dyn.shapley, dyn.perseus, [1500, -800, 600], [-1200, 1000, -500]];
                    let webData = this.precalcDensityWeb(`L14_Spongy`, [0,0,0], sim_scale, 1000, anchors);
                    t.push(...this.drawDensityWeb(webData, expandFactor));
                }
                if(vis.streams) {
                    let seeds = this.getSeeds(`L14_EXP`, [0,0,0], sim_scale, 250);
                    let streams = this.calcDynamicStreamlines(seeds, sim_scale, null, true); 
                    t.push(...this.drawStreamlines(streams, 'rgba(100,150,255,0.4)', expandFactor));
                }
            }
        }
        return t;
    }
}

// === UI 與動態迴圈引擎 ===
const selLevel = document.getElementById('level-select');
LEVELS.forEach((lv, i) => {
    let opt = document.createElement('option'); opt.value = i; opt.text = lv; selLevel.appendChild(opt);
});

document.getElementById('op-speed').addEventListener('input', e => document.getElementById('val-speed').innerText = (e.target.value / 10).toFixed(1) + 'x');
document.getElementById('op-bg').addEventListener('input', e => document.getElementById('val-bg-op').innerText = e.target.value + '%');
document.getElementById('op-grid').addEventListener('input', e => document.getElementById('val-grid-op').innerText = e.target.value + '%');

let globalTime = 0, isPlaying = false, animReq = null, lastTimestamp = 0, isFirstRender = true; 
const renderBtn = document.getElementById('render-btn'), playBtn = document.getElementById('play-btn'), loading = document.getElementById('loading-overlay');

function getEngineConfig() {
    return {
        colors: { bg: document.getElementById('color-bg').value, grid: document.getElementById('color-grid').value, particle: document.getElementById('color-particle').value, text: document.getElementById('color-text').value },
        opacities: { bg: document.getElementById('op-bg').value, grid: document.getElementById('op-grid').value },
        vis: { landmarks: document.getElementById('toggle-landmarks').checked, streams: document.getElementById('toggle-streams').checked, particles: document.getElementById('toggle-particles').checked, web: document.getElementById('toggle-web').checked, cones: document.getElementById('toggle-cones').checked }
    };
}

function drawFrame(forceResetCamera = false) {
    let conf = getEngineConfig(), engine = new UniverseEngine(conf.colors, conf.opacities);
    let idx = parseInt(selLevel.value);
    
    let traces = engine.buildLevelTraces(idx, conf.vis, globalTime);
    
    let max_limit = SCALE_LIMITS[idx] * 2.2; 
    let axis_config = { showgrid: true, gridcolor: engine.gridColor, zeroline: false, showline: false, showbackground: false, showspikes: false, range: [-max_limit, max_limit] };
    
    let loopTime = globalTime % 30.0;
    let expProgress = (idx >= 12 && isPlaying) ? ` | 擴張週期: ${((loopTime/30)*100).toFixed(0)}%` : '';

    let layout = {
        title: `<b>${LEVELS[idx]}</b> <span style="font-size:12px;color:#aaa;">(T: ${globalTime.toFixed(1)}s${expProgress})</span>`,
        paper_bgcolor: engine.bgColor, plot_bgcolor: engine.bgColor,
        scene: { bgcolor: engine.bgColor, xaxis: axis_config, yaxis: axis_config, zaxis: axis_config },
        margin: { l: 0, r: 0, b: 0, t: 50 },
        uirevision: 'true' 
    };

    if (forceResetCamera || isFirstRender) {
        layout.scene.camera = { eye: {x: 1.2, y: 1.2, z: 0.8} };
        isFirstRender = false;
        Plotly.newPlot('plotly-div', traces, layout);
    } else {
        Plotly.react('plotly-div', traces, layout);
    }
}

function animatePhysics(timestamp) {
    if (!isPlaying) return;
    let dt = (timestamp - lastTimestamp) / 1000;
    if(dt > 0.1) dt = 0.016; 
    lastTimestamp = timestamp;

    globalTime += dt * (document.getElementById('op-speed').value / 10);
    drawFrame(false); 
    animReq = requestAnimationFrame(animatePhysics);
}

playBtn.addEventListener('click', () => {
    isPlaying = !isPlaying;
    if (isPlaying) {
        playBtn.innerText = "⏸ 暫停軌道與引力流體"; playBtn.classList.add('playing');
        lastTimestamp = performance.now(); animReq = requestAnimationFrame(animatePhysics);
    } else {
        playBtn.innerText = "▶ 啟動巨引源軌道與角動量"; playBtn.classList.remove('playing');
        cancelAnimationFrame(animReq); drawFrame(false);
    }
});

renderBtn.addEventListener('click', () => {
    loading.style.display = "flex";
    setTimeout(() => { globalTime = 0; if(isPlaying) playBtn.click(); drawFrame(true); loading.style.display = "none"; }, 50);
});

selLevel.addEventListener('change', () => {
    if(isPlaying) playBtn.click(); 
    loading.style.display = "flex";
    setTimeout(() => { globalTime = 0; drawFrame(true); loading.style.display = "none"; }, 50);
});

['toggle-landmarks', 'toggle-streams', 'toggle-particles', 'toggle-web', 'toggle-cones'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => drawFrame(false));
});

setTimeout(() => drawFrame(true), 100);
</script>
