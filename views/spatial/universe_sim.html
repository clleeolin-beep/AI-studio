const safeVal = (id, def) => { const el = document.getElementById(id); return el ? el.value : def; };
const safeCheck = (id, def) => { const el = document.getElementById(id); return el ? el.checked : def; };
function rand(min, max) { return Math.random() * (max - min) + min; }
function randn() { let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random(); return Math.sqrt(-2.0*Math.log(u))*Math.cos(2.0*Math.PI*v); }
function solveKepler(M, e) { let E = M; for(let i=0; i<5; i++) E = E - (E - e*Math.sin(E) - M) / (1 - e*Math.cos(E)); return E; }
function latLonToLocal(lat, lon, radius) { let phi = (90 - lat) * (Math.PI / 180); let theta = (lon + 180) * (Math.PI / 180); return { x: -(radius * Math.sin(phi) * Math.cos(theta)), z: (radius * Math.sin(phi) * Math.sin(theta)), y: (radius * Math.cos(phi)) }; }

// ============================================================================
// 引擎 1：Three.js (L1 專用)
// ============================================================================
class RealEarthEngine {
    constructor(containerId) {
        this.container = document.getElementById(containerId);
        this.isActive = false;
        this.scene = null; this.camera = null; this.renderer = null; this.controls = null; this.objects = {};
        this.init();
    }
    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(45, this.container.clientWidth / this.container.clientHeight, 0.1, 1000);
        this.camera.position.set(0, 0, 4);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.container.appendChild(this.renderer.domElement);
        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true; this.controls.dampingFactor = 0.05;
        this.scene.add(new THREE.AmbientLight(0x333333));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2); directionalLight.position.set(5, 3, 5); this.scene.add(directionalLight);
        
        const textureLoader = new THREE.TextureLoader();
        const earthGeo = new THREE.SphereGeometry(1, 64, 64);
        const earthMat = new THREE.MeshPhongMaterial({
            map: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'),
            specularMap: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg'),
            normalMap: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg'),
            specular: new THREE.Color(0x333333), shininess: 15
        });
        this.objects.earth = new THREE.Mesh(earthGeo, earthMat);
        this.scene.add(this.objects.earth);

        const cloudGeo = new THREE.SphereGeometry(1.015, 64, 64);
        const cloudMat = new THREE.MeshPhongMaterial({ map: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png'), transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false });
        this.objects.clouds = new THREE.Mesh(cloudGeo, cloudMat); this.scene.add(this.objects.clouds);

        this.objects.moonGroup = new THREE.Group();
        const moonMat = new THREE.MeshPhongMaterial({ map: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/moon_1024.jpg'), bumpMap: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/moon_1024.jpg'), bumpScale: 0.02 });
        this.objects.moon = new THREE.Mesh(new THREE.SphereGeometry(0.27, 32, 32), moonMat);
        this.objects.moonGroup.add(this.objects.moon); this.scene.add(this.objects.moonGroup);

        window.addEventListener('resize', () => {
            if(!this.isActive) return;
            this.camera.aspect = this.container.clientWidth / this.container.clientHeight; this.camera.updateProjectionMatrix();
            this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
        });
        this.animate();
    }
    activate() { document.getElementById('plotly-div').style.display = 'none'; this.container.style.display = 'block'; document.getElementById('threejs-ui-overlay').style.display = 'block'; this.isActive = true; }
    deactivate() { this.container.style.display = 'none'; document.getElementById('plotly-div').style.display = 'block'; document.getElementById('threejs-ui-overlay').style.display = 'none'; this.isActive = false; }
    updatePhysics(time) {
        if (!this.isActive) return;
        this.objects.earth.rotation.y = time * 0.5; this.objects.clouds.rotation.y = time * 0.55; 
        let mAng = time * 1.5; this.objects.moonGroup.position.set(5.0 * Math.cos(mAng), 0, 5.0 * Math.sin(mAng)); this.objects.moonGroup.rotation.y = -mAng + Math.PI/2; 
    }
    animate() { requestAnimationFrame(() => this.animate()); if (this.isActive) { this.controls.update(); this.renderer.render(this.scene, this.camera); } }
}

// ============================================================================
// 引擎 2：Plotly 動力學演算法
// ============================================================================
class UniverseEngine {
    createLabel(pos, color, name, size, symbol) { 
        return { type: 'scatter3d', x: [pos[0]], y: [pos[1]], z: [pos[2]], mode: 'markers+text', marker: { size: size, color: color, symbol: symbol, line: {color:'white', width:0.5} }, text: [name], textposition: "top center", textfont: {color: color, size: 10, weight: 'bold'}, hoverinfo: 'none', showlegend: false }; 
    }
    
    getOrbitPos(a, e, time, T) { 
        let M = time * T, E = solveKepler(M, e), v = 2 * Math.atan(Math.sqrt((1+e)/(1-e)) * Math.tan(E/2)), r = a * (1 - e * Math.cos(E)); 
        return [r * Math.cos(v), r * Math.sin(v), 0]; 
    }

    applyHubble(points, time, baseScale) {
        let H0 = 0.05 * (100000 / baseScale);
        let expFactor = Math.exp(H0 * time);
        return points.map(p => [p[0]*expFactor, p[1]*expFactor, p[2]*expFactor]);
    }

    buildLevelTraces(idx, vis, time) {
        let t = [];
        let rAng = time * -0.15; // 銀河系自轉常數

        // 自資料庫提取當前階層資料
        let localData = GLOBAL_DATABASE.filter(item => item.level.includes(idx));

        // -----------------------------------------------------------
        // L2 & L3: 太陽系 (引力軌道)
        // -----------------------------------------------------------
        if (idx === 1 || idx === 2) {
            if(vis.landmarks) t.push(this.createLabel([0,0,0], '#FF5500', '太陽', 10, 'circle'));
            localData.forEach(p => {
                let pos = this.getOrbitPos(p.a, p.e, time, p.T);
                if(vis.landmarks) t.push(this.createLabel(pos, p.c, p.name, p.s, 'circle'));
                if(vis.streams) {
                    let ox=[], oy=[], oz=[];
                    for(let step=0; step<=150; step++) {
                        let M = (step/150)*2*Math.PI, E = solveKepler(M, p.e), v = 2*Math.atan(Math.sqrt((1+p.e)/(1-p.e))*Math.tan(E/2)), r = p.a*(1-p.e*Math.cos(E));
                        ox.push(r*Math.cos(v)); oy.push(r*Math.sin(v)); oz.push(0);
                    }
                    t.push({ type: 'scatter3d', x: ox, y: oy, z: oz, mode: 'lines', line: {color: 'rgba(255,255,255,0.2)', width: 1.0}, hoverinfo: 'none', showlegend: false });
                }
            });
        }
        // -----------------------------------------------------------
        // L4: 局部恆星際雲 (獵戶座懸臂邊緣)
        // -----------------------------------------------------------
        else if (idx === 3) {
            localData.forEach(s => {
                let pos = [s.pos[0] + s.v[0]*time, s.pos[1] + s.v[1]*time, s.pos[2] + s.v[2]*time];
                if(vis.landmarks) t.push(this.createLabel(pos, s.c, s.name, s.s, 'circle'));
                if(vis.streams) t.push({ type: 'scatter3d', x: [s.pos[0], pos[0]], y: [s.pos[1], pos[1]], z: [s.pos[2], pos[2]], mode: 'lines', line: {color: 'rgba(255,255,255,0.3)', width: 2, dash: 'dot'}, hoverinfo: 'none', showlegend: false });
            });
            // 建立 LIC 纖維空間感，取代無意義的隨機粒子
            if(vis.web || vis.streams) {
                let fx=[], fy=[], fz=[];
                for(let i=0; i<200; i++) {
                    let u = rand(-15, 15);
                    let v = randn() * 3; // 纖維的粗細
                    fx.push(u); fy.push(u * 0.5 + v); fz.push(randn()*2);
                }
                t.push({ type: 'scatter3d', x: fx, y: fy, z: fz, mode: 'markers', marker: {size: 3, color: 'rgba(100, 200, 255, 0.25)'}, hoverinfo: 'none', showlegend: false });
            }
        }
        // -----------------------------------------------------------
        // L5: 銀河系 (軌道方程式嚴格同步)
        // -----------------------------------------------------------
        else if (idx === 4) {
            if(vis.landmarks) t.push(this.createLabel([0,0,0], '#FFFFFF', '人馬座 A*', 8, 'circle'));
            
            let rMax = 50; // 銀河半徑 50 Kly
            let b = 0.3;   // 對數螺旋線纏繞系數
            let a = rMax * 0.1;

            if(vis.particles || vis.web) {
                let gx=[], gy=[], gz=[], gc=[], gs=[];
                for(let i=0; i<3000; i++) {
                    let isBulge = i < 800;
                    let r = isBulge ? Math.abs(randn()) * (rMax * 0.15) : Math.pow(Math.random(), 1.5) * rMax + a;
                    // 落後臂方程式，逆時針展開
                    let thetaIdeal = isBulge ? rand(0, 2*Math.PI) : (1/b) * Math.log(r/a) + (i%4)*(Math.PI/2) + randn()*0.2;
                    // 加上銀河系全局順時針自轉
                    let theta = thetaIdeal + rAng;
                    gx.push(r * Math.cos(theta)); gy.push(r * Math.sin(theta)); gz.push(randn() * (rMax*0.05) * Math.exp(-r/rMax));
                    gc.push(isBulge ? '#FFFDE7' : (r/rMax < 0.4 ? '#FFF59D' : '#81D4FA')); gs.push(isBulge ? rand(1.5, 3) : rand(0.8, 2));
                }
                t.push({ type: 'scatter3d', x: gx, y: gy, z: gz, mode: 'markers', marker: {size: gs, color: gc, opacity: 0.6}, hoverinfo: 'none', showlegend: false });
            }
            
            // 太陽系鎖死在獵戶座懸臂 (指定 offset = PI)
            let sunR = 26; 
            let sunThetaIdeal = (1/b) * Math.log(sunR/a) + Math.PI;
            // 太陽在懸臂上的即時角度，隨銀河系完全同步旋轉
            let sunTheta = sunThetaIdeal + rAng; 
            let sunP = [sunR * Math.cos(sunTheta), sunR * Math.sin(sunTheta), 0.5];
            
            if(vis.landmarks) t.push(this.createLabel(sunP, '#FF5500', '太陽系', 6, 'circle'));
            if(vis.streams) {
                let tx=[], ty=[], tz=[], tc=[], ts=[];
                // 畫出隨懸臂一同自轉的過去歷史軌跡
                for(let i=0; i<=20; i++) {
                    let ht = time - 3.0*(1 - i/20);
                    if(ht < 0) continue;
                    let hAng = sunThetaIdeal + (ht * -0.15); // 回推歷史全局自轉
                    tx.push(sunR*Math.cos(hAng)); ty.push(sunR*Math.sin(hAng)); tz.push(0.5);
                    tc.push(`rgba(255,100,0,${Math.max(0.1, i/20)})`); ts.push(1.0 + 2.0*(i/20));
                }
                t.push({ type: 'scatter3d', x: tx, y: ty, z: tz, mode: 'lines+markers', line: {color:'rgba(255,100,0,0.5)', width:2}, marker: {size: ts, color: tc}, hoverinfo: 'none', showlegend: false });
            }
        }
        // -----------------------------------------------------------
        // L6 ~ L10: 引力塌縮區 (加入具體的流線網格判斷上下左右)
        // -----------------------------------------------------------
        else if (idx >= 5 && idx <= 9) {
            let limit = SCALE_LIMITS[idx];
            
            if(vis.landmarks) {
                localData.forEach(node => {
                    t.push(this.createLabel(node.pos, node.c, node.name, node.s, 'circle'));
                });
            }

            // 尋找此層的最重天體作為引力盆地 (Basin)
            let attractor = localData.reduce((prev, current) => (prev.s > current.s) ? prev : current);

            if(vis.streams || vis.web) {
                let sx=[], sy=[], sz=[];
                // 生成散佈整個空間的測試點，畫出引力流線以呈現立體空間感
                let stepSize = limit / 6;
                for(let px = -limit; px <= limit; px += stepSize) {
                    for(let py = -limit; py <= limit; py += stepSize) {
                        for(let pz = -limit/2; pz <= limit/2; pz += stepSize*1.5) {
                            let cur = [px + randn()*stepSize*0.2, py + randn()*stepSize*0.2, pz];
                            let distToCenter = Math.hypot(cur[0]-attractor.pos[0], cur[1]-attractor.pos[1], cur[2]-attractor.pos[2]);
                            if (distToCenter < limit * 0.1 || distToCenter > limit * 1.5) continue;

                            for(let step=0; step<15; step++) { // 向引力源運算 15 步
                                let dx = attractor.pos[0] - cur[0], dy = attractor.pos[1] - cur[1], dz = attractor.pos[2] - cur[2];
                                let dist = Math.hypot(dx, dy, dz) + 0.1;
                                let pull = limit / (dist * 5); // 引力勢能函數
                                cur[0] += (dx/dist)*pull; cur[1] += (dy/dist)*pull; cur[2] += (dz/dist)*pull;
                                sx.push(cur[0]); sy.push(cur[1]); sz.push(cur[2]);
                            }
                            sx.push(null); sy.push(null); sz.push(null); // 斷開線條
                        }
                    }
                }
                if(vis.streams) t.push({ type: 'scatter3d', x: sx, y: sy, z: sz, mode: 'lines', line: {color: 'rgba(100, 200, 255, 0.4)', width: 1.5}, hoverinfo: 'none', showlegend: false });
                if(vis.web) t.push({ type: 'mesh3d', x: sx.filter(x=>x!=null), y: sy.filter(y=>y!=null), z: sz.filter(z=>z!=null), alphahull: 6, opacity: 0.08, color: '#00FFFF', hoverinfo: 'none', showlegend: false });
            }
        }
        // -----------------------------------------------------------
        // L11 ~ L15: 宇宙膨脹區 (暗能量主導)
        // -----------------------------------------------------------
        else if (idx >= 10) {
            let limit = SCALE_LIMITS[idx];
            let expMatrix = 1.0 + (time * 0.02); // 哈伯膨脹系數緩慢增加

            if(vis.landmarks) {
                localData.forEach(nd => {
                    let ep = [nd.pos[0]*expMatrix, nd.pos[1]*expMatrix, nd.pos[2]*expMatrix];
                    t.push(this.createLabel(ep, nd.c, nd.name, nd.s, 'circle'));
                });
            }

            if(vis.web || vis.streams) {
                let wx=[], wy=[], wz=[], ptsX=[], ptsY=[], ptsZ=[];
                for(let i=0; i<400; i++) {
                    let r = Math.pow(Math.random(), 1.5) * limit * 0.8;
                    let th = rand(0, 2*Math.PI), ph = Math.acos(2*Math.random()-1);
                    // 套用膨脹
                    let bx = r*Math.sin(ph)*Math.cos(th)*expMatrix;
                    let by = r*Math.sin(ph)*Math.sin(th)*expMatrix;
                    let bz = r*Math.cos(ph)*expMatrix;
                    ptsX.push(bx); ptsY.push(by); ptsZ.push(bz);
                    if(i > 0 && i % 4 === 0) { wx.push(bx, ptsX[i-1], null); wy.push(by, ptsY[i-1], null); wz.push(bz, ptsZ[i-1], null); }
                }
                if(vis.web) t.push({ type: 'scatter3d', x: wx, y: wy, z: wz, mode: 'lines', line: {color: 'rgba(255, 100, 100, 0.3)', width: 1}, hoverinfo: 'none', showlegend: false });
                if(vis.streams) t.push({ type: 'scatter3d', x: ptsX, y: ptsY, z: ptsZ, mode: 'markers', marker: {size: 3, color: 'rgba(255, 200, 150, 0.8)'}, hoverinfo: 'none', showlegend: false });
            }
        }
        return t;
    }
}

// ============================================================================
// UI 與動態迴圈控制 (解決相機鎖死問題)
// ============================================================================
const selLevel = document.getElementById('level-select');
if (selLevel) { LEVELS.forEach((lv, i) => { let opt = document.createElement('option'); opt.value = i; opt.text = lv; selLevel.appendChild(opt); }); }

let globalTime = 0, isPlaying = false, animReq = null, lastTimestamp = 0, isFirstRender = true, lastDrawTime = 0; 
const renderBtn = document.getElementById('render-btn'), playBtn = document.getElementById('play-btn');
const threeEngine = new RealEarthEngine('threejs-container');
const tourPanel = document.getElementById('tour-panel'), tourTitle = document.getElementById('tour-title'), tourContent = document.getElementById('tour-content'), toggleTour = document.getElementById('toggle-tour'), nextTourBtn = document.getElementById('next-tour-btn');

function updateTour() {
    if(!toggleTour || !tourPanel || !selLevel) return;
    if(!toggleTour.checked) { tourPanel.style.display = 'none'; return; }
    let idx = parseInt(selLevel.value);
    if(tourTitle) tourTitle.innerText = STORY_SCRIPT[idx].title;
    if(tourContent) tourContent.innerHTML = STORY_SCRIPT[idx].content;
    tourPanel.style.display = 'block';
    if(nextTourBtn) nextTourBtn.style.display = (idx < LEVELS.length - 1) ? 'block' : 'none';
}

if(toggleTour) toggleTour.addEventListener('change', updateTour);
if(nextTourBtn) nextTourBtn.addEventListener('click', () => { selLevel.value = parseInt(selLevel.value) + 1; selLevel.dispatchEvent(new Event('change')); });

function drawFrame(forceResetCamera = false) {
    let idx = selLevel ? parseInt(selLevel.value) : 0; if(isNaN(idx)) idx = 0;
    
    if (idx === 0) {
        threeEngine.activate();
        threeEngine.updatePhysics(globalTime);
    } else {
        threeEngine.deactivate();
        
        let conf = { vis: { landmarks: safeCheck('toggle-landmarks', true), streams: safeCheck('toggle-streams', true), particles: safeCheck('toggle-particles', true), web: safeCheck('toggle-web', true) } };
        let engine = new UniverseEngine();
        let traces = engine.buildLevelTraces(idx, conf.vis, globalTime);
        let limit = SCALE_LIMITS[idx]; 
        let axis_config = { showgrid: true, gridcolor: '#00FFFF', zeroline: false, showline: false, showbackground: false, showspikes: false, range: [-limit, limit] };
        
        // uirevision: 'true' 是解除 Plotly 阻擋使用者滑鼠事件的核心屬性
        let layout = { title: `<b>${LEVELS[idx]}</b> <span style="font-size:12px;color:#aaa;">(T: ${globalTime.toFixed(2)}s)</span>`, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)', scene: { bgcolor: 'rgba(0,0,0,0)', xaxis: axis_config, yaxis: axis_config, zaxis: axis_config, aspectmode: 'cube' }, margin: { l: 0, r: 0, b: 0, t: 50 }, uirevision: 'true' };

        let div = document.getElementById('plotly-div');
        if (div) {
            if (forceResetCamera || isFirstRender) {
                // 只有第一次載入或強制重置時，才指派初始相機位置
                layout.scene.camera = { eye: {x: 1.5, y: 1.5, z: 0.8}, center: {x: 0, y: 0, z: 0}, up: {x: 0, y: 0, z: 1} };
                isFirstRender = false; 
                Plotly.newPlot(div, traces, layout);
            } else {
                // 動畫更新時，絕不覆蓋 layout.scene.camera，全權交給 uirevision 保留使用者當前視角
                Plotly.react(div, traces, layout);
            }
        }
    }
    updateTour();
}

function animatePhysics(timestamp) {
    if (!isPlaying) return;
    animReq = requestAnimationFrame(animatePhysics); 
    
    let dt = (timestamp - lastTimestamp) / 1000; lastTimestamp = timestamp;
    if(dt > 0.1) dt = 0.016; 
    let speed = parseFloat(safeVal('op-speed', 10));
    globalTime += dt * (speed * 0.1);

    let idx = selLevel ? parseInt(selLevel.value) : 0;
    if (idx === 0) { 
        threeEngine.updatePhysics(globalTime); 
    } else { 
        // 渲染頻率降載 (Throttle)：限制每秒約 15-20 次 Plotly 更新，釋放效能給滑鼠事件，徹底解決相機卡死。
        if (timestamp - lastDrawTime > 60) {
            drawFrame(false); 
            lastDrawTime = timestamp;
        }
    }
}

if(playBtn) {
    playBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        if (isPlaying) { playBtn.innerText = "⏸ 暫停時空演化"; playBtn.classList.add('playing'); lastTimestamp = performance.now(); animReq = requestAnimationFrame(animatePhysics); } 
        else { playBtn.innerText = "▶ 啟動時空演化"; playBtn.classList.remove('playing'); cancelAnimationFrame(animReq); drawFrame(false); }
    });
}

if(renderBtn) renderBtn.addEventListener('click', () => { globalTime = 0; isFirstRender = true; drawFrame(true); });

if(selLevel) {
    selLevel.addEventListener('change', () => {
        let overlay = document.getElementById('loading-overlay');
        if(overlay) overlay.style.display = "flex";
        setTimeout(() => { globalTime = 0; isFirstRender = true; drawFrame(true); if(overlay) overlay.style.display = "none"; }, 100);
    });
}

setTimeout(() => {
    const statusText = document.getElementById('loading-status'); const startBtn = document.getElementById('start-btn');
    if(statusText) { statusText.innerText = "系統就緒 (System Ready)"; statusText.style.color = "#2ECC71"; }
    if(startBtn) startBtn.classList.add('ready');
}, 1500);

let startBtnObj = document.getElementById('start-btn');
if(startBtnObj) {
    startBtnObj.addEventListener('click', () => {
        let splash = document.getElementById('splash-screen');
        if(splash) splash.style.opacity = '0';
        setTimeout(() => { if(splash) splash.style.display = 'none'; drawFrame(true); }, 1000);
    });
}

['toggle-landmarks', 'toggle-streams', 'toggle-particles', 'toggle-web'].forEach(id => { 
    let el = document.getElementById(id); 
    if(el) el.addEventListener('change', () => { drawFrame(false); }); 
});
</script>
