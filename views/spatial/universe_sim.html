<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多尺度宇宙動力學 - 真實物理矩陣轉動版</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #050A14; color: white; display: flex; }
        
        #control-panel { width: 310px; min-width: 310px; background-color: #2C3E50; padding: 20px; box-sizing: border-box; overflow-y: auto; border-right: 2px solid #1a252f; z-index: 10; }
        #control-panel::-webkit-scrollbar { width: 6px; }
        #control-panel::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.2); border-radius: 3px; }
        
        #plot-container { flex-grow: 1; height: 100vh; position: relative; }
        
        h3 { margin-top: 15px; font-size: 15px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px; color: #00FFFF; }
        h3:first-child { margin-top: 0; }
        
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 8px; }
        select { width: 100%; padding: 8px; background-color: white; color: black; border: none; border-radius: 4px; font-weight: bold; font-size: 13px; cursor: pointer; }
        
        .toggle-row { display: flex; align-items: center; margin-bottom: 8px; font-weight: normal; cursor: pointer; font-size: 13px; opacity: 0.9; transition: opacity 0.2s; }
        .toggle-row:hover { opacity: 1; }
        .toggle-row input[type="checkbox"] { margin-right: 10px; cursor: pointer; width: 16px; height: 16px; accent-color: #E74C3C; }
        
        .color-picker-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 5px; }
        .color-picker-row span { font-size: 12px; }
        input[type="color"] { border: 1px solid rgba(255,255,255,0.5); width: 35px; height: 25px; padding: 0; cursor: pointer; background: transparent; border-radius: 3px; }
        
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00FFFF; }
        .range-val { font-size: 12px; float: right; color: #00FFFF; }
        
        button.action-btn { width: 100%; background-color: #34495E; color: white; font-weight: bold; border: 1px solid #00FFFF; padding: 10px; border-radius: 5px; cursor: pointer; transition: 0.2s; font-size: 14px; margin-top: 5px; }
        button.action-btn:hover { background-color: #00FFFF; color: black; }
        
        button#play-btn { background-color: #E74C3C; border-color: #E74C3C; margin-top: 15px; padding: 15px; font-size: 15px; }
        button#play-btn.playing { background-color: #2ECC71; border-color: #2ECC71; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); } 100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); } }

        #loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 10, 20, 0.8); display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; color: #00FFFF; z-index: 100; backdrop-filter: blur(5px); display: none; }
    </style>
</head>
<body>

    <div id="control-panel">
        <h3>🌌 觀測尺度切換</h3>
        <div class="control-group">
            <select id="level-select"></select>
        </div>

        <h3>⏱️ 實體引力旋轉引擎</h3>
        <div class="control-group">
            <button id="play-btn" class="action-btn">▶ 啟動模型物理演化</button>
            <label style="margin-top: 15px;">時空流逝速度: <span id="val-speed" class="range-val">1.0x</span></label>
            <input type="range" id="op-speed" min="1" max="100" value="10">
            <p style="font-size: 11px; color: #aaa; line-height: 1.4; margin-top: 5px;">
                *相機視角將鎖定不動，由底層矩陣驅動「引力場勢線、宇宙網與天體」進行真實物理轉動與膨脹。
            </p>
        </div>

        <h3>👁️ 顯示項目控制</h3>
        <div class="control-group">
            <label class="toggle-row"><input type="checkbox" id="toggle-landmarks" checked> <span>重要天體與黑洞標註</span></label>
            <label class="toggle-row"><input type="checkbox" id="toggle-streams" checked> <span>引力場、流線與太陽風</span></label>
            <label class="toggle-row"><input type="checkbox" id="toggle-particles" checked> <span>背景微星體粒子</span></label>
            <label class="toggle-row"><input type="checkbox" id="toggle-web" checked> <span>暗物質宇宙網/分水嶺網格</span></label>
            <label class="toggle-row"><input type="checkbox" id="toggle-cones" checked> <span>宇宙膨脹流向箭頭</span></label>
        </div>

        <h3>🎨 視覺調色盤</h3>
        <div class="control-group">
            <div class="color-picker-row"><span>宇宙背景顏色</span><input type="color" id="color-bg" value="#050A14"></div>
            <div class="color-picker-row"><span>空間網格顏色</span><input type="color" id="color-grid" value="#00FFFF"></div>
            <div class="color-picker-row"><span>背景星體顏色</span><input type="color" id="color-particle" value="#C8C8C8"></div>
            <div class="color-picker-row"><span>重要天體標籤</span><input type="color" id="color-text" value="#FFFF00"></div>
        </div>

        <button id="render-btn" class="action-btn">🔄 重置時空與相機視角</button>
    </div>

    <div id="plot-container">
        <div id="loading-overlay">⏳ 物理陣列預計算中...</div>
        <div id="plotly-div" style="width:100%; height:100%;"></div>
    </div>

<script>
/**
 * 多尺度宇宙動力學 - 真實物理矩陣轉動版 (靜止相機 + 實體變換)
 */

const LEVELS = [
    "01. 太陽系內側 (輻射狀引力阱)", "02. 太陽系全貌 (氣體巨星與柯伊伯帶)",
    "03. 獵戶座旋臂局部 (近鄰恆星)", "04. 銀河系全貌 (引力螺旋與 Sgr A*)",
    "05. 銀河系與衛星星系 (麥哲倫星流)", "06. 本星系群局部 (雙軸鞍點)",
    "07. 本星系群全貌 (Local Group)", "08. 周邊星系群 (Local Sheet)",
    "09. 室女座超星系團局部 (M87*)", "10. 室女座超星系團骨架 (3D 渦旋場)",
    "11. 拉尼亞凱亞次級網絡", "12. 拉尼亞凱亞核心 (Great Attractor)",
    "13. 拉尼亞凱亞全貌 (Nature 黃金分水嶺)", "14. 周邊超星系團 (暗能量介入)",
    "15. 巨型宇宙網 (最大黑洞現身與膨脹箭頭)", "16. 可觀測宇宙 (極端相變凍結)"
];

const BLACK_HOLES = [
    {pos: [0, 0, 0], dist_scale: 15, name: '人馬座 A*', desc: '430萬太陽質量', is_mega: false},
    {pos: [2, 2, 0.5], dist_scale: 15, name: '天鵝座 X-1', desc: '21倍太陽質量', is_mega: false},
    {pos: [25, 10, 5], dist_scale: 35, name: 'M31* (仙女座)', desc: '1.4億太陽質量', is_mega: false},
    {pos: [60, 40, 20], dist_scale: 120, name: 'M87*', desc: '65億太陽質量', is_mega: false},
    {pos: [40, -10, 15], dist_scale: 120, name: '半人馬座 A', desc: '5500萬太陽質量', is_mega: false},
    {pos: [-100, 80, -40], dist_scale: 280, name: 'NGC 1277', desc: '170億太陽質量', is_mega: false},
    {pos: [150, -50, 40], dist_scale: 280, name: 'Abell 3627', desc: '巨引源核心', is_mega: false},
    {pos: [300, -150, 100], dist_scale: 500, name: '夏普力主黑洞群', desc: '暗流核心', is_mega: false},
    {pos: [1200, -600, 400], dist_scale: 2500, name: '鳳凰座 A*', desc: '1000億太陽質量', is_mega: true},
    {pos: [-1500, 900, -1000], dist_scale: 2500, name: 'TON 618', desc: '660億太陽質量', is_mega: true}
];

const SCALE_LIMITS = [5, 50, 50, 25, 35, 35, 60, 100, 100, 150, 280, 280, 280, 1000, 2500, 3000];

// 全局快取池 (避免每幀重複計算複雜微積分)
const CACHE = { streamlines: {}, webs: {}, spiral: {}, cones: {} };

function hexToRgba(hex, opacity = 1) {
    let r = parseInt(hex.substring(1, 3), 16), g = parseInt(hex.substring(3, 5), 16), b = parseInt(hex.substring(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${opacity})`;
}
function rand(min, max) { return Math.random() * (max - min) + min; }
function randn() { let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random(); return Math.sqrt(-2.0*Math.log(u))*Math.cos(2.0*Math.PI*v); }

// === 核心：頂點變換矩陣 ===
class TransformEngine {
    // 處理點、線、網格的空間旋轉與膨脹
    static apply(arrX, arrY, arrZ, angle, scale) {
        let len = arrX.length;
        let outX = new Array(len), outY = new Array(len), outZ = new Array(len);
        let cosA = Math.cos(angle), sinA = Math.sin(angle);
        
        for(let i=0; i<len; i++) {
            if (arrX[i] === null) {
                outX[i] = null; outY[i] = null; outZ[i] = null;
            } else {
                let sx = arrX[i] * scale;
                let sy = arrY[i] * scale;
                outX[i] = sx * cosA - sy * sinA;
                outY[i] = sx * sinA + sy * cosA;
                outZ[i] = arrZ[i] * scale;
            }
        }
        return {x: outX, y: outY, z: outZ};
    }

    // 專門處理向量場(Cone)的方向旋轉
    static applyVector(arrU, arrV, arrW, angle) {
        let len = arrU.length;
        let outU = new Array(len), outV = new Array(len), outW = new Array(len);
        let cosA = Math.cos(angle), sinA = Math.sin(angle);
        
        for(let i=0; i<len; i++) {
            outU[i] = arrU[i] * cosA - arrV[i] * sinA;
            outV[i] = arrU[i] * sinA + arrV[i] * cosA;
            outW[i] = arrW[i];
        }
        return {u: outU, v: outV, w: outW};
    }
}

class UniverseEngine {
    constructor(colors, opacities) {
        this.bgColor = hexToRgba(colors.bg, opacities.bg / 100);
        this.gridColor = hexToRgba(colors.grid, opacities.grid / 100);
        this.particleColor = hexToRgba(colors.particle, 0.5);
        this.textColor = colors.text;
    }

    createLandmark(pos, color, name, size, symbol, angle, scale) {
        let tf = TransformEngine.apply([pos[0]], [pos[1]], [pos[2]], angle, scale);
        return {
            type: 'scatter3d', x: tf.x, y: tf.y, z: tf.z,
            mode: 'markers+text', marker: { size: size, color: color, symbol: symbol, line: {color:'white', width:0.5} },
            text: [name], textposition: "top center", textfont: {color: this.textColor, size: 10},
            hoverinfo: 'none', showlegend: false
        };
    }

    createBlackHole(pos, name, desc, is_mega, angle, scale) {
        let tf = TransformEngine.apply([pos[0]], [pos[1]], [pos[2]], angle, scale);
        let bh_size = is_mega ? 7 : 4; 
        
        let core = {
            type: 'scatter3d', x: tf.x, y: tf.y, z: tf.z,
            mode: 'markers+text', marker: { size: bh_size, color: '#000000', symbol: 'circle', line: {color: is_mega ? '#FFD700' : '#000000', width: 2} },
            text: [is_mega ? `👑 ${name}` : `🕳️ ${name}`], textposition: "bottom right", textfont: {color: is_mega ? '#FFD700' : this.textColor, size: 10}, hoverinfo: 'none', showlegend: false
        };

        let ring_x = [], ring_y = [], ring_z = [];
        let r = is_mega ? 1.0 : 0.5; 
        for(let i=0; i<=40; i++) {
            let theta = (i / 40) * 2 * Math.PI;
            ring_x.push(pos[0] + r * Math.cos(theta));
            ring_y.push(pos[1] + r * Math.sin(theta));
            ring_z.push(pos[2]);
        }
        let tf_ring = TransformEngine.apply(ring_x, ring_y, ring_z, angle, scale);
        let ring = {
            type: 'scatter3d', x: tf_ring.x, y: tf_ring.y, z: tf_ring.z,
            mode: 'lines', line: {color: is_mega ? 'rgba(255, 50, 50, 0.8)' : 'rgba(255, 0, 255, 0.6)', width: 2}, hoverinfo: 'none', showlegend: false
        };
        return [core, ring];
    }

    createOrbit(radius, color, angle, scale) {
        let x=[], y=[], z=[];
        for(let i=0; i<=60; i++) {
            let theta = (i/60) * 2 * Math.PI;
            x.push(radius * Math.cos(theta));
            y.push(radius * Math.sin(theta));
            z.push(0);
        }
        let tf = TransformEngine.apply(x, y, z, angle, scale);
        return { type: 'scatter3d', x: tf.x, y: tf.y, z: tf.z, mode: 'lines', line: {color: color, width: 1.5, dash: 'dot'}, hoverinfo: 'none', showlegend: false };
    }

    createSolarWind(timePhase, angle, scale) {
        let x=[], y=[], z=[], c=[];
        for(let i=0; i<150; i++) {
            let phi = (i * 13.1) % Math.PI;
            let theta = (i * 81.3) % (2*Math.PI);
            let r = ((i * 5.7 + timePhase * 1.5) % 2.5); 
            x.push(r * Math.sin(phi) * Math.cos(theta));
            y.push(r * Math.sin(phi) * Math.sin(theta));
            z.push(r * Math.cos(phi) * 0.3); 
            c.push(`rgba(255, 150, 0, ${Math.max(0, 1 - r/2.5)})`); 
        }
        let tf = TransformEngine.apply(x, y, z, angle, scale);
        return { type: 'scatter3d', x: tf.x, y: tf.y, z: tf.z, mode: 'markers', marker: {size: 2, color: c}, hoverinfo: 'none', showlegend: false };
    }

    createBackgroundParticles(num, radius, center, angle, scale) {
        let x=[], y=[], z=[];
        let actualNum = isPlaying ? Math.floor(num * 0.3) : num; 
        for(let i=0; i<actualNum; i++) {
            let r = radius * Math.cbrt(((i*17.3)%100)/100);
            let theta = ((i*31.7)%100)/100 * 2 * Math.PI;
            let phi = Math.acos(1 - 2 * (((i*43.1)%100)/100));
            x.push(center[0] + r * Math.sin(phi) * Math.cos(theta));
            y.push(center[1] + r * Math.sin(phi) * Math.sin(theta));
            z.push(center[2] + r * Math.cos(phi));
        }
        let tf = TransformEngine.apply(x, y, z, angle, scale);
        return { type: 'scatter3d', x: tf.x, y: tf.y, z: tf.z, mode: 'markers', marker: {size: 1.5, color: this.particleColor}, hoverinfo: 'none', showlegend: false };
    }

    // --- 預計算與實體動態繪製 ---
    precalcStreamlines(key, field_type, center, max_scale, attractors, point_density) {
        if(CACHE.streamlines[key]) return CACHE.streamlines[key];
        
        let streams = [];
        let steps = 35; 
        let dt = max_scale / (steps * 1.2);

        for(let i=0; i<point_density; i++) {
            let r = max_scale * Math.cbrt(((i*7.1)%100)/100);
            let phi = ((i*11.3)%100)/100 * Math.PI;
            let theta = ((i*19.7)%100)/100 * 2*Math.PI;
            let cx = center[0] + r * Math.sin(phi) * Math.cos(theta);
            let cy = center[1] + r * Math.sin(phi) * Math.sin(theta);
            let cz = center[2] + r * Math.cos(phi);
            
            let path_x=[cx], path_y=[cy], path_z=[cz];
            let basin_id = -1;

            for(let step=0; step<steps; step++) {
                let gx=0, gy=0, gz=0;
                
                if (field_type === 'spiral') {
                    let dx=center[0]-cx, dy=center[1]-cy, dz=center[2]-cz;
                    let dist = Math.hypot(dx, dy, dz) + 1e-5;
                    gx=(dx/(dist*dist)) + (dy*1.5/dist);
                    gy=(dy/(dist*dist)) - (dx*1.5/dist);
                    gz=(dz/(dist*dist)) * 2.0;
                } else if (field_type === 'multi_axis' && attractors) {
                    for(let a=0; a<attractors.length; a++) {
                        let attr = attractors[a];
                        let dx=attr.pos[0]-cx, dy=attr.pos[1]-cy, dz=attr.pos[2]-cz;
                        let dist = Math.hypot(dx, dy, dz) + 1e-5;
                        let pull = attr.mass / Math.pow(dist, 1.5);
                        gx += (dx/dist)*pull; gy += (dy/dist)*pull; gz += (dz/dist)*pull;
                        
                        let vaX = Math.sin(a), vaY = Math.cos(a), vaZ = 1.0;
                        let norm = Math.hypot(vaX, vaY, vaZ);
                        vaX/=norm; vaY/=norm; vaZ/=norm;
                        
                        let vpx = (dy/dist)*vaZ - (dz/dist)*vaY;
                        let vpy = (dz/dist)*vaX - (dx/dist)*vaZ;
                        let vpz = (dx/dist)*vaY - (dy/dist)*vaX;
                        
                        gx += vpx * (pull*0.4); gy += vpy * (pull*0.4); gz += vpz * (pull*0.4);
                    }
                } else if (field_type === 'expansion') {
                    gx = cx * 0.05; gy = cy * 0.05; gz = cz * 0.05;
                }

                let f_mag = Math.hypot(gx, gy, gz) + 1e-10;
                cx += (gx/f_mag)*dt; cy += (gy/f_mag)*dt; cz += (gz/f_mag)*dt;
                path_x.push(cx); path_y.push(cy); path_z.push(cz);

                if (attractors && field_type === 'multi_axis') {
                    for(let a=0; a<attractors.length; a++) {
                        if (Math.hypot(cx-attractors[a].pos[0], cy-attractors[a].pos[1], cz-attractors[a].pos[2]) < dt) {
                            basin_id = a; break;
                        }
                    }
                }
                if (basin_id !== -1) break;
            }
            streams.push({path_x, path_y, path_z, basin_id});
        }
        CACHE.streamlines[key] = streams;
        return streams;
    }

    drawStreamlinesDynamic(streams, color, angle, scale) {
        let all_x=[], all_y=[], all_z=[];
        streams.forEach(s => {
            all_x.push(...s.path_x, null); all_y.push(...s.path_y, null); all_z.push(...s.path_z, null);
        });
        let tf = TransformEngine.apply(all_x, all_y, all_z, angle, scale);
        return [{ type: 'scatter3d', x: tf.x, y: tf.y, z: tf.z, mode: 'lines', line: {color: color, width: 1.5}, hoverinfo: 'none', showlegend: false }];
    }

    drawLaniakeaWatershedDynamic(streams, target_basin_id, angle, scale, drawMesh) {
        let traces = [];
        let target_x=[], target_y=[], target_z=[];
        let outer_x=[], outer_y=[], outer_z=[];
        let basin_x=[], basin_y=[], basin_z=[];

        streams.forEach(stream => {
            if (stream.basin_id === target_basin_id) {
                target_x.push(...stream.path_x, null); target_y.push(...stream.path_y, null); target_z.push(...stream.path_z, null);
                if(drawMesh) {
                    for(let i=0; i<stream.path_x.length; i+=3) { basin_x.push(stream.path_x[i]); basin_y.push(stream.path_y[i]); basin_z.push(stream.path_z[i]); }
                }
            } else {
                outer_x.push(...stream.path_x, null); outer_y.push(...stream.path_y, null); outer_z.push(...stream.path_z, null);
            }
        });

        let tf_target = TransformEngine.apply(target_x, target_y, target_z, angle, scale);
        let tf_outer = TransformEngine.apply(outer_x, outer_y, outer_z, angle, scale);

        traces.push({ type: 'scatter3d', x: tf_target.x, y: tf_target.y, z: tf_target.z, mode: 'lines', line: {color: 'rgba(255, 204, 0, 0.55)', width: 1.5}, hoverinfo: 'none', showlegend: false });
        traces.push({ type: 'scatter3d', x: tf_outer.x, y: tf_outer.y, z: tf_outer.z, mode: 'lines', line: {color: 'rgba(50, 150, 255, 0.35)', width: 1.5}, hoverinfo: 'none', showlegend: false });
        
        if (drawMesh && basin_x.length > 10) {
            let tf_mesh = TransformEngine.apply(basin_x, basin_y, basin_z, angle, scale);
            traces.push({ type: 'mesh3d', x: tf_mesh.x, y: tf_mesh.y, z: tf_mesh.z, alphahull: 4, opacity: 0.15, color: 'goldenrod', hoverinfo: 'none', showlegend: false });
        }
        return traces;
    }

    precalcDensityWeb(key, center, radius, num_halos, cluster_pos) {
        if(CACHE.webs[key]) return CACHE.webs[key];
        
        let halos = [];
        for(let i=0; i<num_halos; i++) {
            let u = (i*13.3)%1, v = (i*29.7)%1, w = (i*41.1)%1;
            halos.push([center[0] + (u-0.5)*2*radius, center[1] + (v-0.5)*2*radius, center[2] + (w-0.5)*2*radius]);
        }
        if(cluster_pos) {
            for(let i=0; i<Math.floor(num_halos/2); i++) {
                halos.push([cluster_pos[0] + randn()*radius*0.15, cluster_pos[1] + randn()*radius*0.15, cluster_pos[2] + randn()*radius*0.15]);
            }
        }
        
        let line_x=[], line_y=[], line_z=[];
        let px=[], py=[], pz=[], psize=[];
        
        for(let i=0; i<halos.length; i++) {
            let h = halos[i];
            px.push(h[0]); py.push(h[1]); pz.push(h[2]); psize.push(((i*7.7)%3) + 2); 
            
            let dists = [];
            for(let j=0; j<halos.length; j++) {
                if(i === j) continue;
                let d = Math.hypot(h[0]-halos[j][0], h[1]-halos[j][1], h[2]-halos[j][2]);
                dists.push({idx: j, d: d});
            }
            dists.sort((a,b) => a.d - b.d);
            
            for(let k=0; k<Math.min(4, dists.length); k++) {
                let neighbor = halos[dists[k].idx];
                line_x.push(h[0], neighbor[0], null);
                line_y.push(h[1], neighbor[1], null);
                line_z.push(h[2], neighbor[2], null);
            }
        }
        CACHE.webs[key] = {line: {x:line_x, y:line_y, z:line_z}, points: {x:px, y:py, z:pz, size:psize}};
        return CACHE.webs[key];
    }

    drawDensityWebDynamic(webData, angle, scale) {
        let tf_line = TransformEngine.apply(webData.line.x, webData.line.y, webData.line.z, angle, scale);
        let tf_pts = TransformEngine.apply(webData.points.x, webData.points.y, webData.points.z, angle, scale);
        return [
            { type: 'scatter3d', x: tf_line.x, y: tf_line.y, z: tf_line.z, mode: 'lines', line: {color: 'rgba(180, 50, 255, 0.35)', width: 1.5}, hoverinfo: 'none', showlegend: false },
            { type: 'scatter3d', x: tf_pts.x, y: tf_pts.y, z: tf_pts.z, mode: 'markers', marker: {size: webData.points.size, color: 'rgba(255, 255, 150, 0.9)'}, hoverinfo: 'none', showlegend: false }
        ];
    }

    precalcCones(key, scale_val, num) {
        if(CACHE.cones[key]) return CACHE.cones[key];
        let x=[], y=[], z=[], u=[], v=[], w=[];
        for(let i=0; i<num; i++) {
            let r = scale_val * (((i*11.1)%50+40)/100); 
            let phi = ((i*17.3)%100)/100 * Math.PI;
            let theta = ((i*23.9)%100)/100 * 2*Math.PI;
            let px = r * Math.sin(phi) * Math.cos(theta);
            let py = r * Math.sin(phi) * Math.sin(theta);
            let pz = r * Math.cos(phi);
            x.push(px); y.push(py); z.push(pz);
            u.push(px); v.push(py); w.push(pz);
        }
        CACHE.cones[key] = {x, y, z, u, v, w, scale_val};
        return CACHE.cones[key];
    }

    drawConesDynamic(coneData, angle, scale) {
        let tf_pos = TransformEngine.apply(coneData.x, coneData.y, coneData.z, angle, scale);
        let tf_vec = TransformEngine.applyVector(coneData.u, coneData.v, coneData.w, angle);
        return { type: 'cone', x: tf_pos.x, y: tf_pos.y, z: tf_pos.z, u: tf_vec.u, v: tf_vec.v, w: tf_vec.w, colorscale: 'Blues', sizemode: "absolute", sizeref: coneData.scale_val*0.1*scale, opacity: 0.7, showscale: false, hoverinfo: 'none' };
    }

    // 核心建立圖層
    buildLevelTraces(level_idx, vis, time) {
        let t = [];
        
        // --- 物理轉動與擴張變數 ---
        // 矩陣旋轉角度：所有結構都會跟著旋轉 (相機不動)
        let rotationAngle = isPlaying ? time * 0.15 : 0; 
        
        // 哈伯擴張常數 (僅 L12 以上大尺度受影響)
        let loopTime = time % 30.0;
        let expandFactor = (level_idx >= 12 && isPlaying) ? (1.0 + loopTime * 0.04) : 1.0;

        let mw_center_L4=[0,0,0], sun_pos_L4=[8,0,0];
        let m31_pos_L6=[25, 10, 5], virgo_pos_L9=[60, 40, 20];
        let great_attractor_pos_L12=[150, -50, 40], perseus_pos=[-100, 80, -40], shapley_pos=[300, -150, 100];
        let local_group_pos=[0, 0, 0];
        let sloan_wall_pos=[600, 400, -200], hcb_wall_pos=[2000, 1500, -1000];

        if (vis.landmarks && level_idx >= 3) {
            BLACK_HOLES.forEach(bh => {
                if (bh.dist_scale <= SCALE_LIMITS[level_idx] * 1.5) {
                    t.push(...this.createBlackHole(bh.pos, bh.name, bh.desc, bh.is_mega, rotationAngle, expandFactor));
                }
            });
        }

        if (level_idx <= 2) {
            // Level 1: 太陽系局域動力學 (不套用銀河系旋轉，展示自身軌道)
            let W_earth = 0.15, W_moon = 2.09, W_merc = 0.6, W_venus = 0.25, W_mars = 0.08;
            let e_x = 1.0 * Math.cos(time * W_earth), e_y = 1.0 * Math.sin(time * W_earth);
            let m_x = e_x + 0.08 * Math.cos(time * W_moon), m_y = e_y + 0.08 * Math.sin(time * W_moon);
            let me_x = 0.39 * Math.cos(time * W_merc), me_y = 0.39 * Math.sin(time * W_merc);
            let v_x = 0.72 * Math.cos(time * W_venus), v_y = 0.72 * Math.sin(time * W_venus);
            let ma_x = 1.52 * Math.cos(time * W_mars), ma_y = 1.52 * Math.sin(time * W_mars);

            if(vis.landmarks) {
                t.push(this.createLandmark([0,0,0], '#FF5500', '太陽 (Sun)', 5, 'circle', rotationAngle, 1.0));
                if (level_idx === 0) {
                    // 行星加入全局旋轉
                    t.push(this.createLandmark([me_x, me_y, 0], '#AAAAAA', '水星', 3, 'circle', rotationAngle, 1.0));
                    t.push(this.createLandmark([v_x, v_y, 0], '#FFCC00', '金星', 3, 'circle', rotationAngle, 1.0));
                    t.push(this.createLandmark([e_x, e_y, 0], '#00AAFF', '地球', 3, 'circle', rotationAngle, 1.0));
                    t.push(this.createLandmark([m_x, m_y, 0], '#FFFFFF', '月球', 2, 'circle', rotationAngle, 1.0));
                    t.push(this.createLandmark([ma_x, ma_y, 0], '#FF3300', '火星', 3, 'circle', rotationAngle, 1.0));
                }
            }
            if(vis.streams && level_idx === 0 && isPlaying) t.push(this.createSolarWind(time, rotationAngle, 1.0));
            if(vis.streams && level_idx === 0) [0.39, 0.72, 1.0, 1.52].forEach(r => t.push(this.createOrbit(r, 'rgba(255,255,255,0.2)', rotationAngle, 1.0)));
            
            if (level_idx === 1 && vis.landmarks) t.push(this.createLandmark([5.2, 3, 0], '#DDAA77', '木星', 4, 'circle', rotationAngle, 1.0), this.createLandmark([-9.5, 0, 0], '#EEEEBB', '土星', 4, 'circle', rotationAngle, 1.0));
            if (level_idx === 2 && vis.landmarks) t.push(this.createLandmark([4.3, 2, 1], '#FFFFFF', '半人馬座 α', 4, 'circle', rotationAngle, 1.0));
            if(vis.particles && !isPlaying) t.push(this.createBackgroundParticles(300, 50.0, [0,0,0], rotationAngle, 1.0));
        } 
        else if (level_idx === 3 || level_idx === 4) {
            if(vis.landmarks) t.push(this.createLandmark(sun_pos_L4, '#FF0000', '<上一層: 太陽系>', 4, 'circle', rotationAngle, 1.0));
            if(level_idx === 4 && vis.landmarks) t.push(this.createLandmark([2, -4, -5], '#DDDDDD', '大麥哲倫星系', 3, 'circle', rotationAngle, 1.0));
            if(vis.particles) t.push(this.createBackgroundParticles(1000, 25, [0,0,0], rotationAngle, 1.0));
            if(vis.streams) {
                let streams = this.precalcStreamlines(`L${level_idx}`, 'spiral', mw_center_L4, 25.0, null, 150);
                t.push(...this.drawStreamlinesDynamic(streams, 'rgba(0,255,255,0.4)', rotationAngle, 1.0));
            }
        }
        else if (level_idx >= 5 && level_idx <= 9) {
            if(vis.landmarks) {
                t.push(this.createLandmark(mw_center_L4, '#FF0000', '本星系群', 4, 'circle', rotationAngle, 1.0));
                if (level_idx >= 7) t.push(this.createLandmark(virgo_pos_L9, '#FFAA00', '室女座星系團', 5, 'circle', rotationAngle, 1.0));
            }
            if(vis.streams) {
                let attractors = level_idx < 8 ? [{pos: mw_center_L4, mass: 1.0}, {pos: m31_pos_L6, mass: 1.5}] : [{pos: [0,0,0], mass: 1.0}, {pos: virgo_pos_L9, mass: 20.0}];
                let streams = this.precalcStreamlines(`L${level_idx}`, 'multi_axis', [0,0,0], 100.0, attractors, 180);
                let color = level_idx < 8 ? 'rgba(0,255,100,0.3)' : 'rgba(200,50,255,0.3)';
                t.push(...this.drawStreamlinesDynamic(streams, color, rotationAngle, 1.0));
            }
            if(vis.particles) t.push(this.createBackgroundParticles(1500, 100, [0,0,0], rotationAngle, 1.0));
        }
        else if (level_idx === 10 || level_idx === 11) {
            if(vis.landmarks) {
                t.push(this.createLandmark(local_group_pos, '#FF0000', '本星系群', 5, 'diamond', rotationAngle, 1.0));
                t.push(this.createLandmark(great_attractor_pos_L12, '#FFFFFF', '巨引源', 6, 'circle', rotationAngle, 1.0));
            }
            if(vis.streams) {
                let attractors = [{pos: perseus_pos, mass: 90.0}, {pos: great_attractor_pos_L12, mass: 150.0}, {pos: shapley_pos, mass: 120.0}];
                let streams = this.precalcStreamlines(`L10`, 'multi_axis', [50, -20, 20], 280.0, attractors, 200);
                t.push(...this.drawLaniakeaWatershedDynamic(streams, 1, rotationAngle, 1.0, vis.web));
            }
            if(vis.particles) t.push(this.createBackgroundParticles(2000, 300, [0,0,0], rotationAngle, 1.0));
        }
        else if (level_idx >= 12) {
            let sim_scale = 2500.0;
            if(vis.landmarks) {
                t.push(this.createLandmark(local_group_pos, '#FF0000', '本星系群 (我們)', 5, 'diamond', rotationAngle, expandFactor));
                t.push(this.createLandmark(great_attractor_pos_L12, '#FFFFFF', '拉尼亞凱亞', 5, 'circle', rotationAngle, expandFactor));
            }
            
            if (level_idx === 12 || level_idx === 13) {
                if(vis.landmarks) t.push(this.createLandmark(shapley_pos, '#9900FF', '夏普力超星系團', 6, 'circle', rotationAngle, expandFactor));
                if(vis.streams) {
                    let attractors = [{pos: perseus_pos, mass: 90.0}, {pos: great_attractor_pos_L12, mass: 150.0}, {pos: shapley_pos, mass: 250.0}];
                    let streams = this.precalcStreamlines(`L12`, 'multi_axis', [0,0,0], 1000.0, attractors, 200);
                    t.push(...this.drawLaniakeaWatershedDynamic(streams, 1, rotationAngle, expandFactor, vis.web));
                }
                if(level_idx === 13 && vis.cones) {
                    let cones = this.precalcCones(`L13`, 1000.0, 100);
                    t.push(this.drawConesDynamic(cones, rotationAngle, expandFactor));
                }
            } else {
                if(vis.landmarks) {
                    t.push(this.createLandmark(sloan_wall_pos, '#FF5500', '史隆長城', 6, 'circle', rotationAngle, expandFactor));
                    t.push(this.createLandmark(hcb_wall_pos, '#FFFFFF', '北冕座長城', 6, 'diamond', rotationAngle, expandFactor));
                }
                if(vis.web) {
                    let webData = this.precalcDensityWeb(`L14`, [0,0,0], sim_scale, 400, hcb_wall_pos);
                    t.push(...this.drawDensityWebDynamic(webData, rotationAngle, expandFactor));
                }
                if(vis.streams) {
                    let streams = this.precalcStreamlines(`L14`, 'expansion', [0,0,0], sim_scale, null, 250);
                    t.push(...this.drawStreamlinesDynamic(streams, 'rgba(100,150,255,0.4)', rotationAngle, expandFactor));
                }
                if(vis.cones) {
                    let cones = this.precalcCones(`L14_cone`, sim_scale, 150);
                    t.push(this.drawConesDynamic(cones, rotationAngle, expandFactor));
                }
            }
        }
        return t;
    }
}

// === UI 與動態迴圈引擎 ===
const selLevel = document.getElementById('level-select');
LEVELS.forEach((lv, i) => {
    let opt = document.createElement('option');
    opt.value = i; opt.text = lv;
    selLevel.appendChild(opt);
});

document.getElementById('op-speed').addEventListener('input', e => document.getElementById('val-speed').innerText = (e.target.value / 10).toFixed(1) + 'x');
document.getElementById('op-bg').addEventListener('input', e => document.getElementById('val-bg-op').innerText = e.target.value + '%');
document.getElementById('op-grid').addEventListener('input', e => document.getElementById('val-grid-op').innerText = e.target.value + '%');

let globalTime = 0;
let isPlaying = false;
let animReq = null;
let lastTimestamp = 0;
let isFirstRender = true; // 確保首次載入相機視角正確

const renderBtn = document.getElementById('render-btn');
const playBtn = document.getElementById('play-btn');
const loading = document.getElementById('loading-overlay');

function getEngineConfig() {
    return {
        colors: { bg: document.getElementById('color-bg').value, grid: document.getElementById('color-grid').value, particle: document.getElementById('color-particle').value, text: document.getElementById('color-text').value },
        opacities: { bg: document.getElementById('op-bg').value, grid: document.getElementById('op-grid').value },
        vis: { landmarks: document.getElementById('toggle-landmarks').checked, streams: document.getElementById('toggle-streams').checked, particles: document.getElementById('toggle-particles').checked, web: document.getElementById('toggle-web').checked, cones: document.getElementById('toggle-cones').checked }
    };
}

function drawFrame(forceResetCamera = false) {
    let conf = getEngineConfig();
    let engine = new UniverseEngine(conf.colors, conf.opacities);
    let idx = parseInt(selLevel.value);
    
    // 計算圖層與矩陣變換
    let traces = engine.buildLevelTraces(idx, conf.vis, globalTime);
    let axis_config = { showgrid: true, gridcolor: engine.gridColor, zeroline: false, showline: false, showbackground: false, showspikes: false };
    
    let loopTime = globalTime % 30.0;
    let expProgress = (idx >= 12 && isPlaying) ? ` | 擴張週期: ${((loopTime/30)*100).toFixed(0)}%` : '';

    let layout = {
        title: `<b>${LEVELS[idx]}</b> <span style="font-size:12px;color:#aaa;">(T: ${globalTime.toFixed(1)}s${expProgress})</span>`,
        paper_bgcolor: engine.bgColor, plot_bgcolor: engine.bgColor,
        scene: { bgcolor: engine.bgColor, xaxis: axis_config, yaxis: axis_config, zaxis: axis_config },
        margin: { l: 0, r: 0, b: 0, t: 50 },
        uirevision: 'true' // 【關鍵】永遠保持相機鎖定，任由使用者自由觀測！
    };

    // 如果是強制重置，或者第一次載入，設定相機初始位置
    if (forceResetCamera || isFirstRender) {
        layout.scene.camera = { eye: {x: 1.2, y: 1.2, z: 0.8} };
        isFirstRender = false;
        Plotly.newPlot('plotly-div', traces, layout);
    } else {
        Plotly.react('plotly-div', traces, layout);
    }
}

function animatePhysics(timestamp) {
    if (!isPlaying) return;
    let dt = (timestamp - lastTimestamp) / 1000;
    if(dt > 0.1) dt = 0.016; 
    lastTimestamp = timestamp;

    let speedMulti = document.getElementById('op-speed').value / 10;
    globalTime += dt * speedMulti;

    drawFrame(false); 
    animReq = requestAnimationFrame(animatePhysics);
}

playBtn.addEventListener('click', () => {
    isPlaying = !isPlaying;
    if (isPlaying) {
        playBtn.innerText = "⏸ 暫停物理演化";
        playBtn.classList.add('playing');
        lastTimestamp = performance.now();
        animReq = requestAnimationFrame(animatePhysics);
    } else {
        playBtn.innerText = "▶ 啟動模型物理演化";
        playBtn.classList.remove('playing');
        cancelAnimationFrame(animReq);
        drawFrame(false);
    }
});

renderBtn.addEventListener('click', () => {
    loading.style.display = "flex";
    setTimeout(() => {
        globalTime = 0; 
        if(isPlaying) playBtn.click(); // 強制停止
        drawFrame(true); 
        loading.style.display = "none";
    }, 50);
});

selLevel.addEventListener('change', () => {
    if(isPlaying) playBtn.click(); 
    loading.style.display = "flex";
    setTimeout(() => {
        globalTime = 0;
        drawFrame(true);
        loading.style.display = "none";
    }, 50);
});

['toggle-landmarks', 'toggle-streams', 'toggle-particles', 'toggle-web', 'toggle-cones'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => drawFrame(false));
});

// 首次載入
setTimeout(() => drawFrame(true), 100);

</script>
</body>
