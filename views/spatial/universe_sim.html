// ============================================================================
// 引擎 1：Three.js 照片級地球渲染器 (專屬 L1 地月系統)
// 備註：此類別未來可直接抽離至 components/EarthEngine.js
// ============================================================================
class RealEarthEngine {
    constructor(containerId) {
        this.container = document.getElementById(containerId);
        this.isActive = false;
        this.scene = null;
        this.camera = null;
        this.renderer = null;
        this.controls = null;
        this.objects = {};
        this.init();
    }

    init() {
        // 1. 場景與相機
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(45, this.container.clientWidth / this.container.clientHeight, 0.1, 1000);
        this.camera.position.set(0, 0, 4);

        // 2. 渲染器 (開啟反鋸齒)
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.container.appendChild(this.renderer.domElement);

        // 3. 控制器
        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;
        this.controls.dampingFactor = 0.05;

        // 4. 光源 (模擬太陽光)
        const ambientLight = new THREE.AmbientLight(0x333333); // 弱環境光
        this.scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
        directionalLight.position.set(5, 3, 5);
        this.scene.add(directionalLight);

        // 5. 載入真實材質 (使用開源免費的地球貼圖)
        const textureLoader = new THREE.TextureLoader();
        
        // --- 地球本體 ---
        const earthGeo = new THREE.SphereGeometry(1, 64, 64);
        const earthMat = new THREE.MeshPhongMaterial({
            map: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'),
            specularMap: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg'),
            normalMap: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg'),
            specular: new THREE.Color(0x333333),
            shininess: 15
        });
        this.objects.earth = new THREE.Mesh(earthGeo, earthMat);
        this.scene.add(this.objects.earth);

        // --- 大氣雲層 ---
        const cloudGeo = new THREE.SphereGeometry(1.015, 64, 64);
        const cloudMat = new THREE.MeshPhongMaterial({
            map: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png'),
            transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false
        });
        this.objects.clouds = new THREE.Mesh(cloudGeo, cloudMat);
        this.scene.add(this.objects.clouds);

        // --- 月球 ---
        const moonGeo = new THREE.SphereGeometry(0.27, 32, 32);
        const moonMat = new THREE.MeshPhongMaterial({
            map: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/moon_1024.jpg'),
            bumpMap: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/moon_1024.jpg'),
            bumpScale: 0.02
        });
        this.objects.moon = new THREE.Mesh(moonGeo, moonMat);
        this.scene.add(this.objects.moon);

        // --- ISS 國際太空站 (簡易幾何代表) ---
        const issGeo = new THREE.BoxGeometry(0.05, 0.05, 0.05);
        const issMat = new THREE.MeshBasicMaterial({ color: 0xFFD700 });
        this.objects.iss = new THREE.Mesh(issGeo, issMat);
        this.scene.add(this.objects.iss);

        // 監聽視窗縮放
        window.addEventListener('resize', () => {
            if(!this.isActive) return;
            this.camera.aspect = this.container.clientWidth / this.container.clientHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
        });

        // 啟動專屬渲染迴圈
        this.animate();
    }

    activate() {
        document.getElementById('plotly-div').style.display = 'none';
        this.container.style.display = 'block';
        document.getElementById('threejs-ui-overlay').style.display = 'block';
        this.isActive = true;
    }

    deactivate() {
        this.container.style.display = 'none';
        document.getElementById('plotly-div').style.display = 'block';
        document.getElementById('threejs-ui-overlay').style.display = 'none';
        this.isActive = false;
    }

    // 根據外部 globalTime 更新軌道
    updatePhysics(time) {
        if (!this.isActive) return;
        
        // 地球自轉
        this.objects.earth.rotation.y = time * 0.5;
        this.objects.clouds.rotation.y = time * 0.55; // 雲層漂移稍快
        
        // 月球公轉與自轉 (潮汐鎖定)
        let moonDist = 5.0; // 在 Three.js 中適度縮小視覺距離
        let moonAngle = time * 1.5;
        this.objects.moon.position.set(moonDist * Math.cos(moonAngle), 0, moonDist * Math.sin(moonAngle));
        this.objects.moon.rotation.y = -moonAngle + Math.PI/2; // 鎖定面向地球

        // ISS 軌道
        let issAngle = time * 7.6;
        let issH = 1.15;
        this.objects.iss.position.set(issH * Math.cos(issAngle), issH * Math.sin(issAngle) * Math.sin(0.9), issH * Math.sin(issAngle) * Math.cos(0.9));
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        if (this.isActive) {
            this.controls.update();
            this.renderer.render(this.scene, this.camera);
        }
    }
}

function solveKepler(M, e) { let E = M; for(let i=0; i<5; i++) E = E - (E - e*Math.sin(E) - M) / (1 - e*Math.cos(E)); return E; }
function getKeplerPos(a, e, i_angle, time, T) { let M = time * T; let E = solveKepler(M, e); let v = 2 * Math.atan(Math.sqrt((1+e)/(1-e)) * Math.tan(E/2)); let r = a * (1 - e * Math.cos(E)); let px = r * Math.cos(v), py = r * Math.sin(v); return {x: px, y: py * Math.cos(i_angle), z: py * Math.sin(i_angle)}; }

class TransformEngine {
    static apply(arrX, arrY, arrZ, angle, scale, tx=0, ty=0, tz=0) {
        let len = arrX.length; let outX = new Array(len), outY = new Array(len), outZ = new Array(len);
        let cosA = Math.cos(angle), sinA = Math.sin(angle);
        for(let i=0; i<len; i++) {
            if (arrX[i] === null) { outX[i] = null; outY[i] = null; outZ[i] = null; } 
            else { 
                let sx = arrX[i] * scale, sy = arrY[i] * scale; 
                outX[i] = sx * cosA - sy * sinA + tx; 
                outY[i] = sx * sinA + sy * cosA + ty; 
                outZ[i] = arrZ[i] * scale + tz; 
            }
        }
        return {x: outX, y: outY, z: outZ};
    }
}

class UniverseEngine {
    constructor() { this.textColor = '#FFFF00'; }
    
    createLabel(pos, color, name, size, symbol) { 
        return { type: 'scatter3d', x: [pos[0]], y: [pos[1]], z: [pos[2]], mode: 'markers+text', marker: { size: size, color: color, symbol: symbol, line: {color:'white', width:0.5} }, text: [name], textposition: "top center", textfont: {color: color, size: 10, weight: 'bold'}, hoverinfo: 'none', showlegend: false }; 
    }
    
    precalcKeplerOrbit(key, a, e, i_angle) {
        if(CACHE.orbits[key]) return CACHE.orbits[key];
        let x=[], y=[], z=[];
        for(let step=0; step<=150; step++) {
            let M = (step/150) * 2 * Math.PI, E = solveKepler(M, e), v = 2 * Math.atan(Math.sqrt((1+e)/(1-e)) * Math.tan(E/2)), r = a * (1 - e * Math.cos(E));
            x.push(r * Math.cos(v)); y.push(r * Math.sin(v) * Math.cos(i_angle)); z.push(r * Math.sin(v) * Math.sin(i_angle));
        }
        CACHE.orbits[key] = {x, y, z}; return CACHE.orbits[key];
    }

    createPlanetaryRing(planetPos, inner_r, outer_r, count, colorHex, i_angle) {
        let x=[], y=[], z=[], c=[];
        for(let i=0; i<count; i++) {
            let r = rand(inner_r, outer_r), theta = rand(0, 2*Math.PI);
            x.push(planetPos.x + r * Math.cos(theta)); y.push(planetPos.y + r * Math.sin(theta) * Math.cos(i_angle)); z.push(planetPos.z + r * Math.sin(theta) * Math.sin(i_angle));
            c.push(`rgba(200,200,200,0.4)`);
        }
        return { type: 'scatter3d', x, y, z, mode: 'markers', marker: {size: 1.0, color: c}, hoverinfo: 'none', showlegend: false };
    }

    createSurfingTrail(planet, time, sunVelocityVec) {
        let x=[], y=[], z=[], c=[]; let tailLength = 20.0, steps = 100;
        for(let step=0; step<=steps; step++) {
            let histTime = time - tailLength + (step/steps) * tailLength;
            if (histTime < 0) continue;
            let pos = getKeplerPos(planet.a, planet.e, planet.i, histTime, planet.T);
            x.push(pos.x + histTime * sunVelocityVec[0]); y.push(pos.y + histTime * sunVelocityVec[1]); z.push(pos.z + histTime * sunVelocityVec[2]);
            c.push(`rgba(200,200,200,${Math.pow(step/steps, 2) * 0.7})`); 
        }
        return { type: 'scatter3d', x, y, z, mode: 'lines', line: {color: c, width: 2.0}, hoverinfo: 'none', showlegend: false };
    }

    // 引力流體與暗物質纖維網演算法 (保留完整邏輯)
    precalcTurbulentAccretion(key, center, max_scale, num_lines) {
        if(CACHE.streams[key]) return CACHE.streams[key];
        let streams = [], steps = 60, dt = 0.1;
        for(let i=0; i<num_lines; i++) {
            let r = max_scale * rand(0.6, 1.2), theta = rand(0, 2*Math.PI), z = rand(-max_scale*0.6, max_scale*0.6); 
            let cx = center[0] + r*Math.cos(theta), cy = center[1] + r*Math.sin(theta), cz = center[2] + z, path_x=[cx], path_y=[cy], path_z=[cz];
            for(let step=0; step<steps; step++) {
                let dx = cx - center[0], dy = cy - center[1], dz = cz - center[2], current_r = Math.hypot(dx, dy) + 0.01;
                let v_r = -0.8 * dx / current_r, v_theta = 1.5, v_z = -1.5 * dz / (Math.abs(dz) + 1.0); 
                cx += (v_r * Math.cos(theta) - v_theta * Math.sin(theta)) * dt; cy += (v_r * Math.sin(theta) + v_theta * Math.cos(theta)) * dt; cz += v_z * dt; theta += (v_theta / current_r) * dt;
                path_x.push(cx); path_y.push(cy); path_z.push(cz);
                if(current_r < 2.0 && Math.abs(cz) < 0.2) break;
            }
            streams.push({x: path_x, y: path_y, z: path_z});
        }
        CACHE.streams[key] = streams; return streams;
    }

    buildLevelTraces(level_idx, vis, time) {
        let t = [];
        if (level_idx === 0) {
            // L1 交由 Three.js 處理，這裡回傳空陣列
            return [];
        }
        else if (level_idx === 1) { // 太陽系全貌
            if(vis.landmarks) t.push(this.createLabel([0,0,0], '#FF5500', '太陽', 10, 'circle'));
            PLANETS.forEach(p => {
                let pos = getKeplerPos(p.a, p.e, p.i, time, p.T);
                if(vis.landmarks) t.push(this.createLabel([pos.x, pos.y, pos.z], p.c, p.name, p.s, 'circle'));
                if(vis.streams) { let orb = this.precalcKeplerOrbit(`orb_${p.id}`, p.a, p.e, p.i); t.push({ type: 'scatter3d', x: orb.x, y: orb.y, z: orb.z, mode: 'lines', line: {color: 'rgba(255,255,255,0.2)', width: 1.0}, hoverinfo: 'none', showlegend: false }); }
                if(p.hasRing && vis.particles) t.push(this.createPlanetaryRing(pos, p.s*0.15, p.s*0.35, 300, p.c, p.i));
            });
            if (vis.particles) {
                let bx=[], by=[], bz=[];
                for(let i=0; i<2000; i++) { let r = rand(30, 48), th = rand(0, 2*Math.PI); bx.push(r*Math.cos(th)); by.push(r*Math.sin(th)); bz.push(randn()*2.0); }
                t.push({ type: 'scatter3d', x: bx, y: by, z: bz, mode: 'markers', marker: {size: 1.5, color: 'rgba(150, 200, 255, 0.2)'}, hoverinfo: 'none', showlegend: false });
            }
        }
        else if (level_idx === 2) { // 太陽系螺旋衝浪
            let sunVec = [-4.0, -4.0, 2.0], sunPos = {x: time * sunVec[0], y: time * sunVec[1], z: time * sunVec[2]};
            if(vis.landmarks) t.push(this.createLabel([sunPos.x, sunPos.y, sunPos.z], '#FF5500', '太陽', 8, 'circle'));
            PLANETS.forEach(p => {
                let loc = getKeplerPos(p.a, p.e, p.i, time, p.T), world = {x: loc.x + sunPos.x, y: loc.y + sunPos.y, z: loc.z + sunPos.z};
                if(vis.landmarks) t.push(this.createLabel([world.x, world.y, world.z], p.c, p.name, p.s, 'circle'));
                if(vis.streams && isPlaying) t.push(this.createSurfingTrail(p, time, sunVec));
            });
        }
        else if (level_idx >= 3) { // 深空與大尺度結構
            let center = [0,0,0];
            if(vis.landmarks) t.push(this.createLabel(center, '#FF0000', '觀測中心', 5, 'diamond'));
            
            if (level_idx === 3 && vis.streams) {
                let streams = this.precalcTurbulentAccretion('l5_accretion', center, 25, 100);
                streams.forEach(s => t.push({ type: 'scatter3d', x: s.x, y: s.y, z: s.z, mode: 'lines', line: {color: 'rgba(100, 50, 255, 0.4)', width: 1.5}, hoverinfo: 'none', showlegend: false }));
            }
            
            if(vis.particles) {
                let px=[], py=[], pz=[]; let limit = SCALE_LIMITS[level_idx] * 0.8;
                for(let i=0; i<800; i++) { px.push(randn() * limit); py.push(randn() * limit); pz.push(randn() * limit); }
                t.push({ type: 'scatter3d', x: px, y: py, z: pz, mode: 'markers', marker: {size: 1.5, color: 'rgba(200,200,255,0.3)'}, hoverinfo: 'none', showlegend: false });
            }
        }
        return t;
    }
}

// === UI 與動態迴圈控制 ===
const selLevel = document.getElementById('level-select');
if (selLevel) { LEVELS.forEach((lv, i) => { let opt = document.createElement('option'); opt.value = i; opt.text = lv; selLevel.appendChild(opt); }); }

let globalTime = 0, isPlaying = false, animReq = null, lastTimestamp = 0, isFirstRender = true, isUserInteracting = false; 
const renderBtn = document.getElementById('render-btn'), playBtn = document.getElementById('play-btn');

// --- 捕獲階段監聽：解決 Plotly 動畫時相機卡死問題 ---
window.addEventListener('mousedown', (e) => { if(e.target.closest('#engine-container')) isUserInteracting = true; }, true);
window.addEventListener('mouseup', () => { isUserInteracting = false; }, true);
window.addEventListener('touchstart', (e) => { if(e.target.closest('#engine-container')) isUserInteracting = true; }, {capture: true, passive: true});
window.addEventListener('touchend', () => { isUserInteracting = false; }, {capture: true, passive: true});
window.addEventListener('mouseleave', () => { isUserInteracting = false; }, true);

const tourPanel = document.getElementById('tour-panel'), tourTitle = document.getElementById('tour-title'), tourContent = document.getElementById('tour-content'), toggleTour = document.getElementById('toggle-tour'), nextTourBtn = document.getElementById('next-tour-btn');

function updateTour() {
    if(!toggleTour || !tourPanel || !selLevel) return;
    if(!toggleTour.checked) { tourPanel.style.display = 'none'; return; }
    let idx = parseInt(selLevel.value);
    let storyIdx = STORY_MAP[idx] || 0;
    if(tourTitle) tourTitle.innerText = STORY_SCRIPT[storyIdx].title;
    if(tourContent) tourContent.innerHTML = STORY_SCRIPT[storyIdx].content;
    tourPanel.style.display = 'block';
    if(nextTourBtn) nextTourBtn.style.display = (idx < LEVELS.length - 1) ? 'block' : 'none';
}
if(toggleTour) toggleTour.addEventListener('change', updateTour);
if(nextTourBtn) nextTourBtn.addEventListener('click', () => { selLevel.value = parseInt(selLevel.value) + 1; selLevel.dispatchEvent(new Event('change')); });

function drawFrame(forceResetCamera = false) {
    let idx = selLevel ? parseInt(selLevel.value) : 0; if(isNaN(idx)) idx = 0;
    
    // 雙引擎切換邏輯
    if (idx === 0) {
        threeEngine.activate();
        threeEngine.updatePhysics(globalTime);
    } else {
        threeEngine.deactivate();
        
        let conf = { 
            colors: { bg: safeVal('color-bg', '#050A14'), grid: safeVal('color-grid', '#00FFFF') }, 
            opacities: { bg: 100, grid: 20 }, 
            vis: { landmarks: safeCheck('toggle-landmarks', true), streams: safeCheck('toggle-streams', true), particles: safeCheck('toggle-particles', true) } 
        };
        let engine = new UniverseEngine();
        let traces = engine.buildLevelTraces(idx, conf.vis, globalTime);
        let limit = SCALE_LIMITS[idx]; 
        let axis_config = { showgrid: true, gridcolor: engine.gridColor, zeroline: false, showline: false, showbackground: false, showspikes: false, range: [-limit, limit] };
        let layout = { title: `<b>${LEVELS[idx]}</b> <span style="font-size:12px;color:#aaa;">(T: ${globalTime.toFixed(2)}s)</span>`, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)', scene: { bgcolor: 'rgba(0,0,0,0)', xaxis: axis_config, yaxis: axis_config, zaxis: axis_config, aspectmode: 'cube' }, margin: { l: 0, r: 0, b: 0, t: 50 }, uirevision: 'true' };

        let div = document.getElementById('plotly-div');
        if (div) {
            if (forceResetCamera || isFirstRender) { layout.scene.camera = { eye: {x: 1.5, y: 1.5, z: 0.8} }; isFirstRender = false; Plotly.newPlot(div, traces, layout); } 
            else { Plotly.react(div, traces, layout); }
        }
    }
    updateTour();
}

function animatePhysics(timestamp) {
    if (!isPlaying) return;
    animReq = requestAnimationFrame(animatePhysics); 
    let dt = (timestamp - lastTimestamp) / 1000; lastTimestamp = timestamp;
    if(dt > 0.1) dt = 0.016; 
    
    let speed = parseFloat(safeVal('op-speed', 10));
    globalTime += dt * (speed * 0.1);

    // 三維引擎可隨時更新，Plotly 引擎則避開使用者拖曳期間更新以防衝突
    let idx = selLevel ? parseInt(selLevel.value) : 0;
    if (idx === 0) {
        threeEngine.updatePhysics(globalTime);
    } else if (!isUserInteracting) {
        drawFrame(false); 
    }
}

if(playBtn) {
    playBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        if (isPlaying) { playBtn.innerText = "⏸ 暫停時空演化"; playBtn.classList.add('playing'); lastTimestamp = performance.now(); animReq = requestAnimationFrame(animatePhysics); } 
        else { playBtn.innerText = "▶ 啟動時空演化"; playBtn.classList.remove('playing'); cancelAnimationFrame(animReq); drawFrame(false); }
    });
}

if(renderBtn) renderBtn.addEventListener('click', () => { globalTime = 0; drawFrame(true); });

if(selLevel) {
    selLevel.addEventListener('change', () => {
        let overlay = document.getElementById('loading-overlay');
        if(overlay) overlay.style.display = "flex";
        setTimeout(() => { globalTime = 0; drawFrame(true); if(overlay) overlay.style.display = "none"; }, 100);
    });
}

setTimeout(() => {
    const statusText = document.getElementById('loading-status');
    const startBtn = document.getElementById('start-btn');
    if(statusText) { statusText.innerText = "系統就緒 (System Ready)"; statusText.style.color = "#2ECC71"; }
    if(startBtn) startBtn.classList.add('ready');
}, 1500);

let startBtn = document.getElementById('start-btn');
if(startBtn) {
    startBtn.addEventListener('click', () => {
        let splash = document.getElementById('splash-screen');
        if(splash) splash.style.opacity = '0';
        setTimeout(() => { if(splash) splash.style.display = 'none'; drawFrame(true); }, 1000);
    });
}

['toggle-landmarks', 'toggle-streams', 'toggle-particles'].forEach(id => { 
    let el = document.getElementById(id); 
    if(el) el.addEventListener('change', () => { if(!isUserInteracting) drawFrame(false); }); 
});
</script>
</body>
