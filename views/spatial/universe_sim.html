<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio - 15級宇宙動力學 (纖維流體完全體)</title>
    
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #000; color: white; display: flex; }
        #splash-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #0a1128 0%, #000000 100%); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1s ease-out; }
        #splash-screen h1 { font-size: 3rem; color: #00FFFF; letter-spacing: 5px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(0,255,255,0.5); }
        #start-btn { background: transparent; color: #00FFFF; border: 2px solid #00FFFF; padding: 15px 40px; font-size: 1.2rem; cursor: pointer; border-radius: 30px; transition: all 0.3s; opacity: 1; }
        #start-btn:hover { background: #00FFFF; color: #000; box-shadow: 0 0 20px rgba(0,255,255,0.8); }
        #control-panel { width: 310px; min-width: 310px; background-color: #1A252F; padding: 20px; box-sizing: border-box; overflow-y: auto; border-right: 2px solid #00FFFF; z-index: 10; }
        #engine-container { flex-grow: 1; height: 100vh; position: relative; }
        #plotly-div { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #tour-panel { position: absolute; bottom: 30px; right: 30px; width: 350px; background: rgba(10, 17, 40, 0.85); border: 1px solid #00FFFF; border-radius: 10px; padding: 20px; z-index: 100; backdrop-filter: blur(10px); display: none; }
        button.action-btn { width: 100%; background-color: #2C3E50; color: #00FFFF; border: 1px solid #00FFFF; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .toggle-row { display: flex; align-items: center; margin-bottom: 8px; font-size: 13px; cursor: pointer; color: #B0C4DE; }
        .toggle-row input { margin-right: 10px; }
        select { width: 100%; padding: 8px; background: #eee; color: #000; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1>AI STUDIO</h1>
        <p>宇宙大尺度結構流場模擬 - 纖維化重構</p>
        <button id="start-btn">進入纖維觀測模式</button>
    </div>

    <div id="control-panel">
        <h3>🌌 尺度切換</h3>
        <div class="control-group"><select id="level-select"></select></div>
        <h3>⏱️ 時空演化</h3>
        <button id="play-btn" class="action-btn">▶ 啟動演化</button>
        <label>流速倍率: <input type="range" id="op-speed" min="1" max="100" value="10"></label>
        <h3>👁️ 圖層控制</h3>
        <label class="toggle-row"><input type="checkbox" id="toggle-landmarks" checked> 核心定錨點</label>
        <label class="toggle-row"><input type="checkbox" id="toggle-streams" checked> 宇宙纖維流線</label>
        <label class="toggle-row"><input type="checkbox" id="toggle-particles" checked> 高密度粒子雲</label>
        <button id="render-btn" class="action-btn">🔄 重置相機</button>
    </div>

    <div id="engine-container">
        <div id="plotly-div"></div>
        <div id="tour-panel">
            <h4 id="tour-title" style="color:#FFD700; margin-top:0;"></h4>
            <div id="tour-content" style="font-size:13px; line-height:1.6;"></div>
            <button id="next-tour-btn" class="action-btn" style="margin-top:15px;">進行尺度躍遷</button>
        </div>
    </div>

<script>
// ============================================================================
// 1. 尺度與資料庫定義 (移除均質化，強化結構辨識)
// ============================================================================
const LEVELS = ["地月系","太陽系","星際雲","銀河系","本星系群","室女座團","拉尼亞核心","拉尼亞全貌","超星系團鏈","史隆長城","武仙長城","暗物質骨架","觀測宇宙邊緣"];
const SCALE_LIMITS = [1, 50, 20, 50, 3000, 15000, 60000, 250000, 1000000, 2500000, 10000000, 25000000, 46500000];

const GLOBAL_DATABASE = [
    { name: '太陽系', level: [1,2,3,4,5], pos: [0,0,0], c: '#FF5500', s: 8 },
    { name: '人馬座 A*', level: [4], pos: [0,0,0], c: '#FFF', s: 10 },
    { name: 'M31 仙女座', level: [5,6], pos: [200, 150, -50], c: '#88CCFF', s: 12 },
    { name: '室女座心 (M87)', level: [6,7], pos: [-4000, 3000, 1000], c: '#FFAA00', s: 15 },
    { name: '巨引源', level: [7,8], pos: [-15000, 8000, -5000], c: '#FFFFFF', s: 20 },
    { name: '夏普力超星系團', level: [8,9], pos: [-35000, 12000, -8000], c: '#AA55FF', s: 22 },
    { name: '史隆長城', level: [10], pos: [0,0,0], c: '#FF5555', s: 25 }
];

const randn = () => { let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random(); return Math.sqrt(-2.0*Math.log(u))*Math.cos(2.0*Math.PI*v); };

// ============================================================================
// 2. 宇宙動力學引擎 (重構大尺度纖維邏輯)
// ============================================================================
class UniverseEngine {
    createLabel(pos, color, name, size) { 
        return { type: 'scatter3d', x: [pos[0]], y: [pos[1]], z: [pos[2]], mode: 'markers+text', marker: { size: size, color: color }, text: [name], textposition: "top center", textfont: {color: color, size: 10}, hoverinfo: 'none', showlegend: false }; 
    }

    buildLevelTraces(idx, vis, time) {
        let t = [];
        let limit = SCALE_LIMITS[idx];
        let rAng = time * -0.15;
        let localData = GLOBAL_DATABASE.filter(d => d.level.includes(idx + 1));

        // 核心定錨
        if(vis.landmarks) localData.forEach(d => t.push(this.createLabel(d.pos, d.c, d.name, d.s)));

        // --- 銀河系處理 (維持優異的辨識度) ---
        if (idx === 3) {
            let gx=[], gy=[], gz=[], gc=[]; let rMax=50, b=0.3, a=5;
            for(let i=0; i<3000; i++) {
                let isBulge = i<800;
                let r = isBulge ? Math.abs(randn())*6 : Math.pow(Math.random(),1.5)*rMax + a;
                let theta = isBulge ? Math.random()*Math.PI*2 : (1/b)*Math.log(r/a) + (i%4)*(Math.PI/2) + rAng;
                gx.push(r*Math.cos(theta)); gy.push(r*Math.sin(theta)); gz.push(randn()*(rMax*0.05)*Math.exp(-r/rMax));
                gc.push(isBulge ? '#FFFDE7' : '#81D4FA');
            }
            t.push({ type:'scatter3d', x:gx, y:gy, z:gz, mode:'markers', marker:{size:1.5, color:gc, opacity:0.6}, hoverinfo:'none' });
        }

        // --- 大尺度重構：層次纖維流 (L6-L15) ---
        else if (idx >= 5) {
            let sx=[], sy=[], sz=[], sc=[];
            let attractors = localData.filter(d => d.s >= 15);
            if (attractors.length === 0) attractors = [{pos:[0,0,0]}];

            // 替代均質區塊：生成受引力場導向的定向流線
            let numSeeds = 40; 
            for(let i=0; i<numSeeds; i++) {
                let cur = [randn()*limit*0.8, randn()*limit*0.8, randn()*limit*0.8];
                let color = idx > 8 ? 'rgba(255,100,100,0.3)' : 'rgba(0,255,255,0.25)';
                
                for(let s=0; s<25; s++) { // 步進生成纖維
                    let force = [0,0,0];
                    attractors.forEach(a => {
                        let dx=a.pos[0]-cur[0], dy=a.pos[1]-cur[1], dz=a.pos[2]-cur[2], d=Math.hypot(dx,dy,dz)+0.1;
                        force[0]+=dx/d * (limit/10); force[1]+=dy/d * (limit/10); force[2]+=dz/d * (limit/10);
                    });
                    cur[0]+=force[0]*0.15; cur[1]+=force[1]*0.15; cur[2]+=force[2]*0.15;
                    sx.push(cur[0]); sy.push(cur[1]); sz.push(cur[2]);
                }
                sx.push(null); sy.push(null); sz.push(null);
            }
            if(vis.streams) t.push({ type:'scatter3d', x:sx, y:sy, z:sz, mode:'lines', line:{color:'rgba(0,255,255,0.4)', width:1.5}, hoverinfo:'none' });

            // 生成結構粒子，模擬「分水嶺」與「節點」
            if(vis.particles) {
                let px=[], py=[], pz=[], pc=[];
                for(let i=0; i<800; i++) {
                    let r = Math.pow(Math.random(), 0.5) * limit;
                    let th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
                    let x=r*Math.sin(ph)*Math.cos(th), y=r*Math.sin(ph)*Math.sin(th), z=r*Math.cos(ph);
                    // 向最近節點收縮，形成纖維感
                    let target = attractors[i % attractors.length];
                    let weight = 0.4;
                    px.push(x*(1-weight) + target.pos[0]*weight);
                    py.push(y*(1-weight) + target.pos[1]*weight);
                    pz.push(z*(1-weight) + target.pos[2]*weight);
                    pc.push(idx > 8 ? '#FF8888' : '#88FFFF');
                }
                t.push({ type:'scatter3d', x:px, y:py, z:pz, mode:'markers', marker:{size:2, color:pc, opacity:0.4}, hoverinfo:'none' });
            }
        }
        return t;
    }
}

// ============================================================================
// 3. UI 控制與循環 (支援相機同步)
// ============================================================================
const selLevel = document.getElementById('level-select');
LEVELS.forEach((lv, i) => { let opt = document.createElement('option'); opt.value = i; opt.text = `${(i+1).toString().padStart(2,'0')}. ${lv}`; selLevel.appendChild(opt); });

let globalTime = 0, isPlaying = false, animReq = null;
const engine = new UniverseEngine();

function drawFrame(resetCam = false) {
    let idx = parseInt(selLevel.value);
    let vis = { landmarks: true, streams: true, particles: true };
    let traces = engine.buildLevelTraces(idx, vis, globalTime);
    let limit = SCALE_LIMITS[idx];
    
    let layout = {
        title: `<b>${LEVELS[idx]}</b> (尺度: ${limit.toLocaleString()} 單位)`,
        paper_bgcolor: 'black', plot_bgcolor: 'black',
        scene: { 
            xaxis: {range:[-limit, limit], color:'#0FF', gridcolor:'#1A252F'},
            yaxis: {range:[-limit, limit], color:'#0FF', gridcolor:'#1A252F'},
            zaxis: {range:[-limit, limit], color:'#0FF', gridcolor:'#1A252F'},
            aspectmode: 'cube'
        },
        margin: {l:0, r:0, b:0, t:50}, uirevision: 'true'
    };

    if (resetCam) layout.scene.camera = { eye: {x: 1.5, y: 1.5, z: 1.2} };
    Plotly.react('plotly-div', traces, layout);
}

document.getElementById('start-btn').onclick = () => {
    document.getElementById('splash-screen').style.opacity = 0;
    setTimeout(() => { document.getElementById('splash-screen').style.display='none'; drawFrame(true); }, 1000);
};

document.getElementById('play-btn').onclick = function() {
    isPlaying = !isPlaying;
    this.innerText = isPlaying ? "⏸ 暫停演化" : "▶ 啟動演化";
    this.style.backgroundColor = isPlaying ? "#E74C3C" : "#2ECC71";
    if (isPlaying) animate(); else cancelAnimationFrame(animReq);
};

function animate() {
    let speed = document.getElementById('op-speed').value / 100;
    globalTime += speed;
    drawFrame(false);
    animReq = requestAnimationFrame(animate);
}

document.getElementById('render-btn').onclick = () => drawFrame(true);
selLevel.onchange = () => drawFrame(true);
</script>
</body>
</html>
