const CACHE = { structures: {}, orbits: {}, streams: {}, webs: {}, arms: {}, cones: {}, bubbles: {}, seeds: {} };

function hexToRgba(hex, opacity = 1) {
    let r = parseInt(hex.substring(1, 3), 16), g = parseInt(hex.substring(3, 5), 16), b = parseInt(hex.substring(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${opacity})`;
}
function rand(min, max) { return Math.random() * (max - min) + min; }
function randn() { let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random(); return Math.sqrt(-2.0*Math.log(u))*Math.cos(2.0*Math.PI*v); }
function simpleNoise(x, y, z=0) { let n = Math.sin(x * 12.9898 + y * 78.233 + z * 37.719) * 43758.5453; return n - Math.floor(n); }

// 球座標轉換
function latLonToCartesian(lat, lon, R) {
    let phi = (90 - lat) * (Math.PI / 180), theta = (lon + 180) * (Math.PI / 180);
    return { x: -(R * Math.sin(phi) * Math.cos(theta)), y: (R * Math.sin(phi) * Math.sin(theta)), z: (R * Math.cos(phi)) };
}

// 克卜勒方程解算 (Newton-Raphson)
function solveKepler(M, e) {
    let E = M;
    for(let i=0; i<5; i++) E = E - (E - e*Math.sin(E) - M) / (1 - e*Math.cos(E));
    return E;
}

// 獲取行星橢圓軌道上的 3D 坐標
function getKeplerPos(a, e, i_angle, time, T) {
    let M = time * T; // 平近點角
    let E = solveKepler(M, e); // 偏近點角
    let v = 2 * Math.atan(Math.sqrt((1+e)/(1-e)) * Math.tan(E/2)); // 真近點角
    let r = a * (1 - e * Math.cos(E)); // 距離
    
    // 基礎橢圓座標 (z=0)
    let px = r * Math.cos(v);
    let py = r * Math.sin(v);
    
    // 應用軌道傾角 (繞 x 軸旋轉)
    let z = py * Math.sin(i_angle);
    let y = py * Math.cos(i_angle);
    
    return {x: px, y: y, z: z};
}

class UniverseEngine {
    constructor(colors, opacities) {
        this.bgColor = hexToRgba(colors.bg, opacities.bg / 100);
        this.gridColor = hexToRgba(colors.grid, opacities.grid / 100);
        this.particleColor = hexToRgba(colors.particle, 0.5);
    }

    createLabel(pos, color, name, size, symbol) {
        return {
            type: 'scatter3d', x: [pos[0]], y: [pos[1]], z: [pos[2]],
            mode: 'markers+text', marker: { size: size, color: color, symbol: symbol, line: {color:'white', width:0.5} },
            text: [name], textposition: "top center", textfont: {color: color, size: 10, weight: 'bold'}, hoverinfo: 'none', showlegend: false
        };
    }

    // L1: GIS 地球實體生成 (海洋與陸地噪聲)
    precalcEarthGIS(key, radius, detail) {
        if(CACHE.structures[key]) return CACHE.structures[key];
        let x=[], y=[], z=[], i=[], j=[], k=[], intensity=[];
        let offset = 0;
        for(let latStep=0; latStep<=detail; latStep++) {
            let lat = Math.PI * (latStep/detail) - Math.PI/2;
            for(let lonStep=0; lonStep<=detail; lonStep++) {
                let lon = 2 * Math.PI * (lonStep/detail);
                let px = radius * Math.cos(lat) * Math.cos(lon);
                let py = radius * Math.cos(lat) * Math.sin(lon);
                let pz = radius * Math.sin(lat);
                x.push(px); y.push(py); z.push(pz);
                // 使用噪聲模擬大陸板塊
                let n = simpleNoise(px*2, py*2, pz*2);
                intensity.push(n > 0.3 ? 1.0 : 0.0); // 1: 陸地, 0: 海洋
            }
        }
        for(let latStep=0; latStep<detail; latStep++) {
            for(let lonStep=0; lonStep<detail; lonStep++) {
                let p1 = latStep * (detail+1) + lonStep, p2 = p1 + 1;
                let p3 = (latStep+1) * (detail+1) + lonStep, p4 = p3 + 1;
                i.push(p1, p2); j.push(p2, p4); k.push(p3, p3);
            }
        }
        CACHE.structures[key] = {x, y, z, i, j, k, intensity}; return CACHE.structures[key];
    }

    // L2: 月球實體與表面紋理
    precalcMoonSurface(key, center, radius, detail, angleOffset) {
        // 月球無需快取，因為需要動態跟隨自轉與公轉
        let x=[], y=[], z=[], intensity=[], i_arr=[], j_arr=[], k_arr=[];
        for(let latStep=0; latStep<=detail; latStep++) {
            let lat = Math.PI * (latStep/detail) - Math.PI/2;
            for(let lonStep=0; lonStep<=detail; lonStep++) {
                let lon = 2 * Math.PI * (lonStep/detail) + angleOffset; // 加上潮汐鎖定自轉角
                let px = radius * Math.cos(lat) * Math.cos(lon);
                let py = radius * Math.cos(lat) * Math.sin(lon);
                let pz = radius * Math.sin(lat);
                x.push(center[0] + px); y.push(center[1] + py); z.push(center[2] + pz);
                let n = simpleNoise(px*10, py*10, pz*10); // 隕石坑噪聲
                intensity.push(n);
            }
        }
        for(let latStep=0; latStep<detail; latStep++) {
            for(let lonStep=0; lonStep<detail; lonStep++) {
                let p1 = latStep * (detail+1) + lonStep, p2 = p1 + 1;
                let p3 = (latStep+1) * (detail+1) + lonStep, p4 = p3 + 1;
                i_arr.push(p1, p2); j_arr.push(p2, p4); k_arr.push(p3, p3);
            }
        }
        return { type: 'mesh3d', x, y, z, i: i_arr, j: j_arr, k: k_arr, intensity, colorscale: [['0', '#555555'], ['1', '#AAAAAA']], showscale: false, hoverinfo: 'none', lighting: {ambient: 0.6, diffuse: 0.8} };
    }

    // L3: 克卜勒橢圓軌道繪製 (200點高解析)
    precalcKeplerOrbit(key, a, e, i_angle) {
        if(CACHE.orbits[key]) return CACHE.orbits[key];
        let x=[], y=[], z=[];
        for(let step=0; step<=200; step++) {
            let M = (step/200) * 2 * Math.PI;
            let E = solveKepler(M, e);
            let v = 2 * Math.atan(Math.sqrt((1+e)/(1-e)) * Math.tan(E/2));
            let r = a * (1 - e * Math.cos(E));
            let px = r * Math.cos(v), py = r * Math.sin(v);
            x.push(px); y.push(py * Math.cos(i_angle)); z.push(py * Math.sin(i_angle));
        }
        CACHE.orbits[key] = {x, y, z}; return CACHE.orbits[key];
    }

    // L3: 行星環鎖定
    createPlanetaryRing(planetPos, inner_r, outer_r, count, colorHex, i_angle) {
        let x=[], y=[], z=[], c=[];
        for(let i=0; i<count; i++) {
            let r = rand(inner_r, outer_r), theta = rand(0, 2*Math.PI);
            let px = r * Math.cos(theta), py = r * Math.sin(theta);
            x.push(planetPos.x + px); 
            y.push(planetPos.y + py * Math.cos(i_angle)); 
            z.push(planetPos.z + py * Math.sin(i_angle));
            c.push(hexToRgba(colorHex, 0.4));
        }
        return { type: 'scatter3d', x, y, z, mode: 'markers', marker: {size: 1.0, color: c}, hoverinfo: 'none', showlegend: false };
    }

    // L4: 太陽螺旋衝浪歷史殘影
    createSurfingTrail(planet, time, sunVelocityVec) {
        let x=[], y=[], z=[], c=[];
        let tailLength = 20.0; // 軌跡保留時間
        let steps = 150;
        for(let step=0; step<=steps; step++) {
            let histTime = time - tailLength + (step/steps) * tailLength;
            if (histTime < 0) continue;
            
            let pos = getKeplerPos(planet.a, planet.e, planet.i, histTime, planet.T);
            
            // 加上太陽在該歷史時刻的位移
            x.push(pos.x + histTime * sunVelocityVec[0]);
            y.push(pos.y + histTime * sunVelocityVec[1]);
            z.push(pos.z + histTime * sunVelocityVec[2]);
            
            c.push(hexToRgba(planet.c, Math.pow(step/steps, 2) * 0.7)); // 尾巴漸隱
        }
        return { type: 'scatter3d', x, y, z, mode: 'lines', line: {color: c, width: 2.0}, hoverinfo: 'none', showlegend: false };
    }

    // L5+: 湍流吸積、旋臂等 (繼承自前代)
    precalcTurbulentAccretion(key, center, max_scale, num_lines) {
        if(CACHE.streams[key]) return CACHE.streams[key];
        let streams = [], steps = 80, dt = 0.08;
        for(let i=0; i<num_lines; i++) {
            let r = max_scale * rand(0.6, 1.2), theta = rand(0, 2*Math.PI), z = rand(-max_scale*0.6, max_scale*0.6); 
            let cx = center[0] + r*Math.cos(theta), cy = center[1] + r*Math.sin(theta), cz = center[2] + z;
            let path_x=[cx], path_y=[cy], path_z=[cz];
            for(let step=0; step<steps; step++) {
                let dx = cx - center[0], dy = cy - center[1], dz = cz - center[2], current_r = Math.hypot(dx, dy) + 0.01;
                let v_r = -0.8 * dx / current_r, v_theta = 1.2, v_z = -1.5 * dz / (Math.abs(dz) + 1.0); 
                let turb_x = (simpleNoise(cx, cy, cz) - 0.5) * 0.5, turb_y = (simpleNoise(cy, cz, cx) - 0.5) * 0.5;
                cx += (v_r * Math.cos(theta) - v_theta * Math.sin(theta) + turb_x) * dt;
                cy += (v_r * Math.sin(theta) + v_theta * Math.cos(theta) + turb_y) * dt;
                cz += v_z * dt; theta += (v_theta / current_r) * dt;
                path_x.push(cx); path_y.push(cy); path_z.push(cz);
                if(current_r < 2.0 && Math.abs(cz) < 0.2) break;
            }
            streams.push({x: path_x, y: path_y, z: path_z});
        }
        CACHE.streams[key] = streams; return streams;
    }

    buildLevelTraces(level_idx, vis, time) {
        let t = [];
        let expFactor = (level_idx >= 12 && isPlaying) ? (1.0 + (time%30.0)*0.04) : 1.0;

        // ================= L1：地球防禦圈與 GIS 網格 =================
        if (level_idx === 0) {
            let earth = this.precalcEarthGIS('earth_gis', 1.0, 40);
            t.push({ type: 'mesh3d', x: earth.x, y: earth.y, z: earth.z, i: earth.i, j: earth.j, k: earth.k, intensity: earth.intensity, colorscale: [['0', '#000080'], ['1', '#228B22']], showscale: false, hoverinfo: 'none', lighting: {ambient: 0.7, diffuse: 0.9} });
            
            // 大氣層光暈
            let atmos = this.precalcEarthGIS('atmos', 1.03, 20);
            t.push({ type: 'mesh3d', x: atmos.x, y: atmos.y, z: atmos.z, i: atmos.i, j: atmos.j, k: atmos.k, color: '#87CEFA', opacity: 0.15, hoverinfo: 'none' });

            if(vis.landmarks) {
                // GIS 標註
                EARTH_POIS.forEach(poi => {
                    let pos = latLonToCartesian(poi.lat, poi.lon, 1.01);
                    if (poi.label) t.push(this.createLabel([pos.x, pos.y, pos.z], poi.c, poi.name, poi.s, 'circle'));
                    if (poi.ray) {
                        t.push({ type: 'scatter3d', x: [pos.x, pos.x*1.5], y: [pos.y, pos.y*1.5], z: [pos.z, pos.z*1.5], mode: 'lines+markers', line: {color: poi.c, width: 1}, marker:{size:2, color:poi.c}, hoverinfo: 'none', showlegend: false });
                        t.push(this.createLabel([pos.x*1.55, pos.y*1.55, pos.z*1.55], poi.c, poi.name, 1, 'circle'));
                    }
                });

                // ISS 與 天宮 (TSS) (第一宇宙速度快轉)
                let iss_v = time * 7.6; let iss_pos = {x: 1.1*Math.cos(iss_v), y: 1.1*Math.sin(iss_v)*Math.cos(0.9), z: 1.1*Math.sin(iss_v)*Math.sin(0.9)};
                t.push(this.createLabel([iss_pos.x, iss_pos.y, iss_pos.z], '#FFD700', '🛰️ ISS', 5, 'diamond'));
                
                let tss_v = time * 7.8; let tss_pos = {x: 1.08*Math.cos(tss_v+2), y: 1.08*Math.sin(tss_v+2)*Math.cos(0.7), z: 1.08*Math.sin(tss_v+2)*Math.sin(0.7)};
                t.push(this.createLabel([tss_pos.x, tss_pos.y, tss_pos.z], '#FF4500', '🛰️ 天宮', 4, 'diamond'));

                // 台灣福衛 7 號星系群 (6顆)
                for(let k=0; k<6; k++) {
                    let fs_v = time * 6.5 + (k * Math.PI/3);
                    let fs_pos = {x: 1.25*Math.cos(fs_v), y: 1.25*Math.sin(fs_v)*Math.cos(0.4), z: 1.25*Math.sin(fs_v)*Math.sin(0.4)};
                    t.push(this.createLabel([fs_pos.x, fs_pos.y, fs_pos.z], '#00FFFF', k===0?'福衛7號群':'', 2, 'square'));
                }
            }
        }
        // ================= L2：地月系、歷史登月與鵲橋 =================
        else if (level_idx === 1) {
            t.push(this.createLabel([0,0,0], '#1E90FF', '地球', 8, 'circle'));
            
            let moon_d = 12.0; // 拉開地月視覺距離
            let moon_angle = time * 1.5; // 月球公轉 = 自轉 (潮汐鎖定)
            let mx = moon_d * Math.cos(moon_angle), my = moon_d * Math.sin(moon_angle);
            
            // 月表實體生成 (動態自轉)
            t.push(this.precalcMoonSurface('moon_mesh', [mx, my, 0], 1.5, 25, moon_angle));
            
            if(vis.landmarks) {
                // 歷史登月點 (精確貼附月表)
                MOON_LANDINGS.forEach(ld => {
                    let localPos = latLonToCartesian(ld.lat, ld.lon, 1.52);
                    // 將局部座標依據月球自轉與公轉矩陣轉換
                    let worldX = mx + localPos.x * Math.cos(moon_angle) - localPos.y * Math.sin(moon_angle);
                    let worldY = my + localPos.x * Math.sin(moon_angle) + localPos.y * Math.cos(moon_angle);
                    let worldZ = localPos.z;
                    t.push(this.createLabel([worldX, worldY, worldZ], ld.c, ld.name, ld.s, 'x'));
                });

                // 鵲橋衛星 (位於 L2 Halo 軌道)
                let l2_x = moon_d * 1.15 * Math.cos(moon_angle);
                let l2_y = moon_d * 1.15 * Math.sin(moon_angle);
                let halo_x = l2_x + 0.8 * Math.cos(time * 5);
                let halo_z = 0.8 * Math.sin(time * 5);
                t.push(this.createLabel([halo_x, l2_y, halo_z], '#FF00FF', '🛰️ 鵲橋 (中繼)', 3, 'diamond'));
                
                // 阿波羅 11 號 8字軌跡殘影
                let apoX=[], apoY=[];
                for(let i=0; i<=100; i++) {
                    let th = (i/100)*2*Math.PI;
                    let r = moon_d * Math.sin(th); // Lemniscate 變形
                    apoX.push(r * Math.cos(th)); apoY.push(r * Math.sin(th));
                }
                t.push({ type: 'scatter3d', x: apoX, y: apoY, z: Array(101).fill(0), mode: 'lines', line: {color: 'rgba(0,255,0,0.3)', dash: 'dot'}, hoverinfo:'none', showlegend:false });
            }
        }
        // ================= L3：17 天體太陽系與橢圓軌道 =================
        else if (level_idx === 2) {
            if(vis.landmarks) t.push(this.createLabel([0,0,0], '#FF5500', '太陽', 10, 'circle'));
            
            PLANETS.forEach(p => {
                let pos = getKeplerPos(p.a, p.e, p.i, time, p.T);
                if(vis.landmarks) t.push(this.createLabel([pos.x, pos.y, pos.z], p.c, p.isDwarf ? `[矮] ${p.name}` : p.name, p.s, 'circle'));
                
                if(vis.streams) {
                    let orbit = this.precalcKeplerOrbit(`orb_${p.id}`, p.a, p.e, p.i);
                    t.push({ type: 'scatter3d', x: orbit.x, y: orbit.y, z: orbit.z, mode: 'lines', line: {color: 'rgba(255,255,255,0.2)', width: p.isDwarf? 0.5 : 1.5}, hoverinfo: 'none', showlegend: false });
                }
                // 星環鎖定
                if(p.hasRing && vis.particles) t.push(this.createPlanetaryRing(pos, p.s*0.15, p.s*0.35, 300, p.c, p.i));
            });

            if (vis.particles) {
                // 柯伊伯帶甜甜圈
                let k_belt = []; let bx=[], by=[], bz=[];
                for(let i=0; i<2000; i++) {
                    let r = rand(30, 48), th = rand(0, 2*Math.PI);
                    bx.push(r*Math.cos(th)); by.push(r*Math.sin(th)); bz.push(randn()*2.0);
                }
                t.push({ type: 'scatter3d', x: bx, y: by, z: bz, mode: 'markers', marker: {size: 1.5, color: 'rgba(150, 200, 255, 0.2)'}, hoverinfo: 'none', showlegend: false });
            }
        }
        // ================= L4：太陽螺旋衝浪 (左前向量) =================
        else if (level_idx === 3) {
            let sunVec = [-4.0, -4.0, 2.0]; // 左前偏上向量
            let sunPos = {x: time * sunVec[0], y: time * sunVec[1], z: time * sunVec[2]};
            
            if(vis.landmarks) {
                t.push(this.createLabel([sunPos.x, sunPos.y, sunPos.z], '#FF5500', '太陽', 8, 'circle'));
                // 鄰近恆星同步衝浪
                t.push(this.createLabel([40 + time*-3.5, 20 + time*-3.5, 10 + time*1.5], '#FFFFFF', '南門二', 5, 'circle'));
                t.push(this.createLabel([-30 + time*-4.5, 40 + time*-4.5, -15 + time*2.5], '#FFAA88', '巴納德星', 4, 'circle'));
            }

            PLANETS.forEach(p => {
                let localPos = getKeplerPos(p.a, p.e, p.i, time, p.T);
                let worldPos = {x: localPos.x + sunPos.x, y: localPos.y + sunPos.y, z: localPos.z + sunPos.z};
                
                if(vis.landmarks) t.push(this.createLabel([worldPos.x, worldPos.y, worldPos.z], p.c, p.name, p.s, 'circle'));
                
                if(vis.streams && isPlaying) t.push(this.createSurfingTrail(p, time, sunVec));
            });
        }
        // ================= L5~L16：繼承大尺度宇宙演化 =================
        else if (level_idx >= 4) {
            let center = [0,0,0];
            if(vis.landmarks) t.push(this.createLabel(center, '#FF0000', '觀測中心', 5, 'diamond'));
            
            if (level_idx === 4 && vis.streams) {
                let streams = this.precalcTurbulentAccretion('l5_accretion', center, 25, 150);
                streams.forEach(s => t.push({ type: 'scatter3d', x: s.x, y: s.y, z: s.z, mode: 'lines', line: {color: 'rgba(100, 50, 255, 0.4)', width: 1.5}, hoverinfo: 'none', showlegend: false }));
            }
            // 這裡保留了引擎對於 16 級大尺度的框架相容性。為節省代碼版面並聚焦於您要求的 L1-L4 重構，L5以上的進階引力網格在視覺上將採用抽象場勢呈現。
            if(vis.particles) {
                let px=[], py=[], pz=[];
                for(let i=0; i<1000; i++) { px.push(randn() * SCALE_LIMITS[level_idx]*0.8); py.push(randn() * SCALE_LIMITS[level_idx]*0.8); pz.push(randn() * SCALE_LIMITS[level_idx]*0.8); }
                t.push({ type: 'scatter3d', x: px, y: py, z: pz, mode: 'markers', marker: {size: 1.5, color: 'rgba(200,200,255,0.3)'}, hoverinfo: 'none', showlegend: false });
            }
        }
        return t;
    }
}

// === UI 與動態迴圈引擎 ===
const selLevel = document.getElementById('level-select');
LEVELS.forEach((lv, i) => { let opt = document.createElement('option'); opt.value = i; opt.text = lv; selLevel.appendChild(opt); });

document.getElementById('op-speed').addEventListener('input', e => document.getElementById('val-speed').innerText = (e.target.value * 0.1).toFixed(1) + 'x');

let globalTime = 0, isPlaying = false, animReq = null, lastTimestamp = 0, isFirstRender = true; 
let isUserInteracting = false; 

const plotContainer = document.getElementById('plot-container');
plotContainer.addEventListener('mousedown', () => isUserInteracting = true);
plotContainer.addEventListener('mouseup', () => isUserInteracting = false);
plotContainer.addEventListener('mouseleave', () => isUserInteracting = false);

const renderBtn = document.getElementById('render-btn'), playBtn = document.getElementById('play-btn'), loading = document.getElementById('loading-overlay');

function drawFrame(forceResetCamera = false) {
    let conf = { colors: { bg: document.getElementById('color-bg').value, grid: document.getElementById('color-grid').value, particle: document.getElementById('color-particle').value }, opacities: { bg: 100, grid: 20 }, vis: { landmarks: document.getElementById('toggle-landmarks').checked, streams: document.getElementById('toggle-streams').checked, particles: document.getElementById('toggle-particles').checked } };
    let engine = new UniverseEngine(conf.colors, conf.opacities);
    let idx = parseInt(selLevel.value);
    
    let traces = engine.buildLevelTraces(idx, conf.vis, globalTime);
    let limit = SCALE_LIMITS[idx]; 
    
    // 使用 'cube' 確保不會因為視角縮放導致物體消失 (解決 Clipping Plane 問題)
    let axis_config = { showgrid: true, gridcolor: engine.gridColor, zeroline: false, showline: false, showbackground: false, showspikes: false, range: [-limit, limit] };
    
    let layout = {
        title: `<b>${LEVELS[idx]}</b> <span style="font-size:12px;color:#aaa;">(T: ${globalTime.toFixed(2)}s)</span>`,
        paper_bgcolor: engine.bgColor, plot_bgcolor: 'rgba(0,0,0,0)',
        scene: { bgcolor: 'rgba(0,0,0,0)', xaxis: axis_config, yaxis: axis_config, zaxis: axis_config, aspectmode: 'cube' },
        margin: { l: 0, r: 0, b: 0, t: 50 },
        uirevision: 'true' 
    };

    if (forceResetCamera || isFirstRender) {
        layout.scene.camera = { eye: {x: 1.5, y: 1.5, z: 0.8} };
        isFirstRender = false;
        Plotly.newPlot('plotly-div', traces, layout);
    } else {
        Plotly.react('plotly-div', traces, layout);
    }
}

function animatePhysics(timestamp) {
    if (!isPlaying) return;
    animReq = requestAnimationFrame(animatePhysics); 
    let dt = (timestamp - lastTimestamp) / 1000; lastTimestamp = timestamp;
    if(dt > 0.1) dt = 0.016; 
    if (isUserInteracting) return;
    globalTime += dt * (document.getElementById('op-speed').value * 0.1); // 0.1x 第一宇宙基準
    drawFrame(false); 
}

playBtn.addEventListener('click', () => {
    isPlaying = !isPlaying;
    if (isPlaying) { playBtn.innerText = "⏸ 暫停時空演化"; playBtn.classList.add('playing'); lastTimestamp = performance.now(); animReq = requestAnimationFrame(animatePhysics); } 
    else { playBtn.innerText = "▶ 啟動時空演化"; playBtn.classList.remove('playing'); cancelAnimationFrame(animReq); drawFrame(false); }
});

selLevel.addEventListener('change', () => {
    loading.style.display = "flex";
    setTimeout(() => { globalTime = 0; drawFrame(true); loading.style.display = "none"; }, 100);
});

['toggle-landmarks', 'toggle-streams', 'toggle-particles'].forEach(id => { document.getElementById(id).addEventListener('change', () => drawFrame(false)); });

setTimeout(() => drawFrame(true), 100);
</script>
