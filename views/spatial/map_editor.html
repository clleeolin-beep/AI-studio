<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖資編輯工具 | AI Studio</title>
    
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    <link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.css" rel="stylesheet" />

    <style>
        :root { --accent-cyan: #00f2ff; --bg-dark: #0b0e14; --panel-bg: rgba(20, 30, 48, 0.9); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-dark); color: white; font-family: 'Microsoft JhengHei', sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100%; background: #1a1a1a; }
        
        .editor-panel { 
            position: absolute; top: 20px; left: 20px; width: 300px; 
            background: var(--panel-bg); border: 1px solid var(--accent-cyan); 
            border-radius: 8px; padding: 15px; z-index: 100; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }
        
        h3 { margin: 0 0 15px 0; color: var(--accent-cyan); border-bottom: 1px solid #34495e; padding-bottom: 5px; }
        .tool-group { margin-bottom: 10px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        button { 
            background: #1A5276; border: 1px solid var(--accent-cyan); 
            color: white; padding: 8px; border-radius: 4px; cursor: pointer; 
            font-size: 13px; transition: 0.2s;
        }
        button:hover { background: var(--accent-cyan); color: #000; }
        button.active { background: #e74c3c; border-color: #ff4444; }
        
        textarea { 
            width: 100%; height: 100px; background: #000; 
            border: 1px solid #34495e; color: var(--accent-cyan); 
            font-family: monospace; font-size: 11px; padding: 8px; 
            margin-top: 10px; border-radius: 4px; resize: none; 
            box-sizing: border-box;
        }
        .status { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="editor-panel">
    <h3>🛠️ 圖資編輯工具</h3>
    <div class="tool-group">
        <div class="btn-grid">
            <button id="draw-point" onclick="setMode('point')">📍 標註點</button>
            <button id="draw-line" onclick="setMode('line')">📏 測距線</button>
            <button id="draw-poly" onclick="setMode('polygon')">⬢ 繪多邊形</button>
            <button onclick="clearMap()" style="background:#555;">🗑️ 清除全部</button>
        </div>
    </div>
    
    <textarea id="wkt-output" readonly placeholder="繪製完成後自動生成 WKT..."></textarea>
    <button onclick="copyWKT()" style="width:100%; margin-top:8px;">📋 複製 WKT 座標</button>
    <div id="editor-status" class="status">狀態: 準備就緒</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.js"></script>
<script src="../../components/MapEngine.js"></script>

<script>
    function log(msg, level = "INFO") {
        if (window.parent) {
            window.parent.postMessage({ type: 'debug', module: 'MapEditor', msg: msg, level: level }, '*');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        log("編輯器載入中...", "INFO");
        if (typeof MapEngine !== 'undefined') {
            MapEngine.init('map', { center: [121.50, 25.04], zoom: 14 });
            log("地圖引擎就緒", "SUCCESS");
        }
    });

    function setMode(mode) {
        document.querySelectorAll('.btn-grid button').forEach(b => b.classList.remove('active'));
        const btnMap = {'point':'draw-point', 'line':'draw-line', 'polygon':'draw-poly'};
        if(btnMap[mode]) document.getElementById(btnMap[mode]).classList.add('active');

        // 呼叫引擎
        MapEngine.startDrawing(mode, (result) => {
            document.getElementById('wkt-output').value = result.wkt;
            log("WKT 資料已成功更新", "SUCCESS");
            document.querySelectorAll('.btn-grid button').forEach(b => b.classList.remove('active'));
            document.getElementById('editor-status').innerText = `狀態: 繪製完成`;
        });
        
        document.getElementById('editor-status').innerText = `狀態: 正在繪製 ${mode}...`;
    }

    function clearMap() {
        if(confirm("確定清除所有內容？")) {
            MapEngine.clear();
            document.getElementById('wkt-output').value = "";
            log("地圖暫存已清除", "WARN");
        }
    }

    function copyWKT() {
        const area = document.getElementById('wkt-output');
        if(!area.value) return;
        area.select();
        document.execCommand('copy');
        log("WKT 已複製", "INFO");
        alert("已複製 WKT 座標");
    }
</script>
</body>
</html>
