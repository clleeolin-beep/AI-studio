<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Map Editor | AI Studio Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.css" />

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Microsoft JhengHei, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; background: #222; }
        .map-controls-group { position: absolute; top: 15px; right: 15px; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
        .btn-lab-tool { width: 42px; height: 42px; background: white; border: 1px solid #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.1); transition: 0.2s; cursor: pointer; }
        .btn-lab-tool:hover { background: #f8f9fa; transform: translateY(-2px); color: #00f2ff; }
        .btn-active { background: #212529 !important; color: #00f2ff !important; }
        .map-status-bar { position: absolute; bottom: 15px; left: 15px; z-index: 100; background: rgba(33, 37, 41, 0.85); color: #00f2ff; padding: 4px 15px; border-radius: 20px; font-size: 11px; border: 1px solid rgba(0,242,255,0.3); backdrop-filter: blur(4px); }
        .editor-section { border-bottom: 1px solid #eee; padding-bottom: 12px; margin-bottom: 12px; }
        .category-scroll-box { max-height: 110px; overflow-y: auto; background: #fff; border: 1px solid #dee2e6; padding: 8px; border-radius: 6px; }
        .search-result-item { cursor: pointer; border-bottom: 1px solid #f8f9fa; transition: 0.2s; font-size: 13px; }
        .search-result-item:hover { background: #e9ecef; color: #0d6efd; padding-left: 5px; }
        .maplibregl-ctrl-bottom-left { display: none; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="map-controls-group">
        <button id="btn-switch-base" class="btn-lab-tool" title="切換道路/航照"><i class="bi bi-map"></i></button>
        <button id="btn-toggle-3d" class="btn-lab-tool" title="3D 地形開關"><i class="bi bi-layers-half"></i></button>
        <button id="btn-reset-pitch" class="btn-lab-tool" title="重置垂直視角"><i class="bi bi-box"></i></button>
        <button id="btn-reset-north" class="btn-lab-tool" title="重置正北"><i class="bi bi-compass"></i></button>
    </div>

    <div class="map-status-bar">
        <span id="txt-north">N: 0°</span> | 
        <span id="txt-scale">Zoom: --</span> | 
        <span id="txt-coords">0.00000, 0.00000</span>
    </div>

<script type="module">
    // [AI Lab 強化區塊：偵錯橋接器]
    // 必須在所有邏輯執行前啟動，確保攔截到所有 console 輸出
    const setupDebugBridge = () => {
        ['log', 'warn', 'error'].forEach(type => {
            const original = console[type];
            console[type] = (...args) => {
                original.apply(console, args);
                if (window.parent) {
                    window.parent.postMessage({
                        source: 'AI_STUDIO_APP', // 對應 DebugSystem 的監聽規則
                        type: type === 'log' ? 'info' : type,
                        content: `[MapEditor] ${args.join(' ')}`
                    }, '*');
                }
            };
        });
    };
    setupDebugBridge();

import MapEngine from '../../components/MapEngine.js';
import DraggablePanel from '../../components/DraggablePanel.js';
import EditorDataService from '../../components/EditorDataService.js';

    let engine, dataService, editorPanel, draw;

    async function init() {
        console.log("正在啟動地圖編輯器環境...");
        try {
            const configResp = await fetch('../../manifest.json');
            if (!configResp.ok) throw new Error("無法讀取 manifest.json 配置檔");
            const manifest = await configResp.json();
            
            const SHEET_ID = manifest.ai_lab_config.env.CASE_SHEET_ID;
            if (!SHEET_ID) throw new Error("manifest.json 中未定義 CASE_SHEET_ID");

            // 1. 初始化引擎
            engine = new MapEngine('map', { center: [121.50, 23.90], zoom: 7, pitch: 0 });
            
            // 2. 掛載繪圖工具
            draw = engine.initDrawingTools();

            // 3. 讀取資料服務
            dataService = new EditorDataService(SHEET_ID);
            await dataService.fetchSheetData();

            // 4. 初始化介面
            setupUI();
            bindMapEvents();
            
            console.log(`系統啟動成功，資料源：${SHEET_ID.substring(0, 8)}...`);
            
        } catch (error) {
            console.error(`[CRITICAL] 初始化失敗: ${error.message}`);
        }
    }

    function setupUI() {
        editorPanel = new DraggablePanel({
            id: 'main-editor',
            title: '圖資編輯與資料鎖定',
            width: 380
        });

        const html = `
            <div class="editor-section">
                <label class="form-label small fw-bold text-dark">案件搜尋鎖定</label>
                <div class="input-group input-group-sm">
                    <input type="text" id="ipt-search" class="form-control" placeholder="案號或名稱關鍵字...">
                    <button class="btn btn-dark" id="btn-search-trigger"><i class="bi bi-search"></i></button>
                </div>
                <div id="search-res-list" class="list-group mt-2 shadow-sm" style="max-height:110px; overflow-y:auto;"></div>
            </div>
            <div class="editor-section bg-light p-2 rounded border">
                <div class="row g-2">
                    <div class="col-5"><small class="text-muted">案號</small><div id="info-id" class="fw-bold text-primary">--</div></div>
                    <div class="col-7"><small class="text-muted">案件簡稱</small><div id="info-name" class="fw-bold">--</div></div>
                </div>
                <div class="mt-2">
                    <label class="small text-muted">WKT 座標數據 (繪圖後自動更新)</label>
                    <textarea id="val-wkt" class="form-control form-control-sm font-monospace" rows="2" style="font-size:10px; background:#f1f3f5;" readonly></textarea>
                </div>
            </div>
            <div class="editor-section">
                <div class="row g-2">
                    <div class="col-6">
                        <label class="small fw-bold">類別 (複選)</label>
                        <div class="category-scroll-box" id="cat-class-box">${renderCheckboxes(dataService.categoryData.class, 'class')}</div>
                    </div>
                    <div class="col-6">
                        <label class="small fw-bold">案件狀態</label>
                        <div class="category-scroll-box" id="cat-status-box">${renderCheckboxes(dataService.categoryData.status, 'status')}</div>
                    </div>
                </div>
            </div>
            <div class="d-grid gap-2">
                <button class="btn btn-primary btn-sm" id="btn-copy-wkt"><i class="bi bi-clipboard"></i> 複製座標資料</button>
            </div>
        `;
        editorPanel.setContent(html);
        document.getElementById('btn-search-trigger').onclick = executeSearch;
    }

    function renderCheckboxes(list, type) {
        if (list.length === 0) return '<small class="text-muted">無資料</small>';
        return list.map(item => `
            <div class="form-check">
                <input class="form-check-input chk-filter" type="checkbox" value="${item}" data-type="${type}" id="chk-${type}-${item}">
                <label class="form-check-label small" style="font-size:11px;" for="chk-${type}-${item}">${item}</label>
            </div>
        `).join('');
    }

    function executeSearch() {
        const query = document.getElementById('ipt-search').value;
        const filters = { class: [], status: [] };
        document.querySelectorAll('.chk-filter:checked').forEach(el => {
            filters[el.dataset.type].push(el.value);
        });
        const results = dataService.search(query, filters);
        const listEl = document.getElementById('search-res-list');
        listEl.innerHTML = results.map(r => `
            <div class="list-group-item search-result-item p-2" onclick="window.lockCase('${r.id}')">
                <span class="badge bg-secondary me-1">${r.id}</span> ${r.name}
            </div>
        `).join('');
        if(results.length === 0) listEl.innerHTML = '<div class="p-2 small text-muted text-center">查無相符案件</div>';
    }

    window.lockCase = (id) => {
        const target = dataService.rawRecords.find(r => r.id === id);
        if (!target) return;
        document.getElementById('info-id').innerText = target.id;
        document.getElementById('info-name').innerText = target.name;
        document.getElementById('val-wkt').value = target.wkt;
        if (target.wkt && target.wkt.trim() !== "") {
            const feature = engine.parseWKT(target.wkt);
            if (feature) {
                draw.deleteAll();
                draw.add(feature);
                engine.flyToWKT(target.wkt);
            }
        }
        console.log(`[Action] 鎖定案件: ${id}`);
    };

    function syncMapToField() {
        const data = draw.getAll();
        if (data.features.length > 0) {
            const wktArr = engine.featuresToWKT(data.features);
            document.getElementById('val-wkt').value = wktArr.join('; ');
            console.log("座標資料同步成功 (WKT Update)");
        }
    }

    function bindMapEvents() {
        const map = engine.map;
        document.getElementById('btn-switch-base').onclick = () => {
            const isSat = engine.switchBaseMap();
            document.getElementById('btn-switch-base').classList.toggle('btn-active', isSat);
        };
        document.getElementById('btn-toggle-3d').onclick = () => {
            const is3D = engine.toggle3D();
            document.getElementById('btn-toggle-3d').classList.toggle('btn-active', is3D);
            map.easeTo({ pitch: is3D ? 45 : 0 });
        };
        document.getElementById('btn-reset-pitch').onclick = () => engine.resetView();
        document.getElementById('btn-reset-north').onclick = () => map.easeTo({ bearing: 0 });
        
        map.on('rotate', () => document.getElementById('txt-north').innerText = `N: ${Math.round(map.getBearing())}°`);
        map.on('zoom', () => document.getElementById('txt-scale').innerText = `Zoom: ${map.getZoom().toFixed(1)}`);
        map.on('mousemove', (e) => {
            document.getElementById('txt-coords').innerText = `${e.lngLat.lng.toFixed(5)}, ${e.lngLat.lat.toFixed(5)}`;
        });
        
        map.on('draw.create', syncMapToField);
        map.on('draw.update', syncMapToField);
        map.on('draw.delete', syncMapToField);
    }

    window.onload = init;
</script>
</body>
</html>
