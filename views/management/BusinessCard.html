<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名片智能彙整檢索工具</title>
    <script src="https://unpkg.com/tesseract.js@v5.0.0/dist/tesseract.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f7f6; padding: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        .btn-blue { background-color: #3498db; }
        .btn-green { background-color: #27ae60; }
        input[type="text"] { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        #contactList { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .contact-card { border-left: 4px solid #3498db; padding: 10px; background: #f9f9f9; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2>1. 授權與同步</h2>
    <p style="font-size: 13px; color: #666;">授權後可將名片資料自動更新至 Google Drive 試算表</p>
    <button class="btn btn-blue" id="authBtn">🔗 授權 Google 雲端</button>
    <span id="authStatus" style="margin-left: 10px; color: #27ae60;">未授權</span>
</div>

<div class="card">
    <h2>2. 📸 名片拍照/上傳辨識</h2>
    <input type="file" id="fileInput" accept="image/*" capture="environment">
    <div id="loader" style="display:none; color:#d35400; font-weight:bold; margin-top:10px;">⚙️ 正在精準分析名片資訊中...</div>
    
    <div id="editForm" style="display:none; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
        <label>公司名稱：</label><input type="text" id="inpCompany">
        <label>職稱：</label><input type="text" id="inpTitle">
        <label>姓名：</label><input type="text" id="inpName">
        <label>原始辨識內容 (可作為備註)：</label><input type="text" id="inpRawText">
        <button class="btn btn-green" onclick="saveToCloud()">💾 儲存並上傳至 Google Sheets</button>
    </div>
</div>

<div class="card">
    <h2>3. 🔍 快速檢索</h2>
    <input type="text" id="searchInput" placeholder="輸入姓名、職稱、公司名稱關鍵字..." onkeyup="filterContacts()">
    <div id="contactList">
        </div>
</div>

<script>
    // --- Google 授權設定 (參考 WeatherData.html) ---
    const CLIENT_ID = '992099032000-u34bqjlpetm2qma995nksbu2ot0rhk6f.apps.googleusercontent.com'; // 替換為您的 Client ID
    const TARGET_SPREADSHEET_ID = '您的Google_Sheets_ID'; 
    let accessToken = null;
    let tokenClient;
    let localContacts = []; // 暫存本地名單用於搜尋

    window.onload = () => {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/spreadsheets',
            callback: (resp) => { 
                accessToken = resp.access_token; 
                document.getElementById('authStatus').innerText = "✅ 已授權";
                loadContactsFromCloud(); // 授權後自動載入既有資料
            }
        });
        document.getElementById('authBtn').onclick = () => tokenClient.requestAccessToken();
    };

    // --- OCR 辨識邏輯 (參考 doc.html) ---
    document.getElementById('fileInput').addEventListener('change', async function() {
        const file = this.files[0]; 
        if (!file) return;
        
        const loader = document.getElementById('loader');
        const editForm = document.getElementById('editForm');
        loader.style.display = 'block'; 
        editForm.style.display = 'none';
        
        try {
            // 使用 Tesseract 進行辨識
            const result = await Tesseract.recognize(file, 'chi_tra+eng');
            let text = result.data.text;
            
            // 基礎資料萃取 (這裡需要依據實際名片排版調整 Regex 規則)
            // 這裡做一個非常基礎的示範：假設最長的一行是公司，有特定職稱關鍵字的是職稱，三個字的是姓名
            let lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            
            // 簡單的猜測邏輯 (實際應用建議串接 LLM API 會準確非常多)
            let guessCompany = lines.length > 0 ? lines[0] : ""; // 假設第一行是公司
            let guessTitle = lines.find(l => l.match(/經理|總監|專員|主任|工程師|代表/)) || "";
            let guessName = lines.find(l => l.length >= 2 && l.length <= 4 && l !== guessTitle) || "";

            document.getElementById('inpCompany').value = guessCompany;
            document.getElementById('inpTitle').value = guessTitle;
            document.getElementById('inpName').value = guessName;
            document.getElementById('inpRawText').value = text.replace(/\n/g, ' | ');
            
            loader.style.display = 'none';
            editForm.style.display = 'block';
        } catch (e) { 
            loader.innerText = "❌ 辨識出錯：" + e.message; 
        }
    });

    // --- 儲存至 Google Sheets (參考 WeatherData.html 資料寫入) ---
    async function saveToCloud() {
        if (!accessToken) {
            alert("請先完成 Google 授權！");
            return;
        }

        const data = [
            document.getElementById('inpCompany').value,
            document.getElementById('inpTitle').value,
            document.getElementById('inpName').value,
            document.getElementById('inpRawText').value,
            new Date().toLocaleDateString()
        ];

        try {
            // 寫入 Google Sheets 的末端
            const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${TARGET_SPREADSHEET_ID}/values/A:E:append?valueInputOption=USER_ENTERED`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${accessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    values: [data]
                })
            });

            if (response.ok) {
                alert("儲存成功！");
                document.getElementById('editForm').style.display = 'none';
                document.getElementById('fileInput').value = "";
                // 更新本地列表
                localContacts.push({company: data[0], title: data[1], name: data[2], note: data[3]});
                renderContacts(localContacts);
            } else {
                throw new Error("API 回應錯誤");
            }
        } catch (err) {
            alert("儲存失敗：" + err.message);
        }
    }

    // --- 讀取與檢索展示 ---
    async function loadContactsFromCloud() {
        try {
            const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${TARGET_SPREADSHEET_ID}/values/A:E`, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const result = await response.json();
            if (result.values) {
                // 假設第一行是標題，跳過
                localContacts = result.values.slice(1).map(row => ({
                    company: row[0] || "", title: row[1] || "", name: row[2] || "", note: row[3] || ""
                }));
                renderContacts(localContacts);
            }
        } catch (err) {
            console.error("讀取清單失敗", err);
        }
    }

    function renderContacts(contacts) {
        const list = document.getElementById('contactList');
        list.innerHTML = "";
        contacts.forEach(c => {
            list.innerHTML += `
                <div class="contact-card">
                    <div style="font-weight:bold; font-size:1.1em; margin-bottom:5px;">${c.name}</div>
                    <div style="color:#666; font-size:0.9em;">${c.company}</div>
                    <div style="color:#27ae60; font-size:0.9em; margin-bottom:5px;">${c.title}</div>
                    <div style="font-size:0.8em; color:#999; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">備註: ${c.note}</div>
                </div>
            `;
        });
    }

    function filterContacts() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        const filtered = localContacts.filter(c => 
            c.name.toLowerCase().includes(keyword) || 
            c.company.toLowerCase().includes(keyword) || 
            c.title.toLowerCase().includes(keyword)
        );
        renderContacts(filtered);
    }
</script>
</body>
</html>
