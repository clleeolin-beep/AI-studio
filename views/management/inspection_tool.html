<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>監造表單生成工具 (V2.4 多工項組合版)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
        :root { --primary: #2c3e50; --bg: #f4f7f6; --accent: #27ae60; --blue: #2980b9; --orange: #e67e22; --border: #ddd; }
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 頭部區塊 */
        .header { background: #fff; padding: 10px 25px; border-bottom: 2px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 10; }
        .btn-group { display: flex; gap: 8px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; transition: all 0.2s; display: flex; align-items: center; gap: 5px; font-size: 13px; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }
        .btn-blue { background: var(--blue); }
        .btn-green { background: var(--accent); }
        .btn-orange { background: var(--orange); }
        .btn-dark { background: var(--primary); }
        
        /* 佈局區塊 */
        .main { flex: 1; display: flex; padding: 15px; gap: 15px; overflow: hidden; }
        
        /* 左側編輯面板 */
        .form-panel { width: 450px; background: #fff; padding: 20px; overflow-y: auto; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); flex-shrink: 0; display: flex; flex-direction: column; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--primary); font-size: 14px; }
        .input-group input[type="text"], .input-group select { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; }
        
        /* 拖曳節點樣式 (分項工程層級) */
        .minor-group { border: 2px solid var(--accent); border-radius: 8px; margin-bottom: 20px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .minor-header { padding: 10px 15px; background: #e8f5e9; border-bottom: 2px solid var(--accent); cursor: grab; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-radius: 6px 6px 0 0; color: #2e7d32; }
        .minor-header:active { cursor: grabbing; }
        .minor-body { padding: 10px; background: #fafafa; }
        
        /* 單一項目編輯區 */
        .node-section { margin-bottom: 15px; border-left: 3px solid #ccc; padding-left: 10px; }
        .item-row { background: #fff; border: 1px solid #e0e0e0; padding: 10px; margin-bottom: 8px; border-radius: 4px; display: flex; flex-direction: column; gap: 6px; }
        .item-header { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 13px; }
        .item-header input[type="checkbox"] { transform: scale(1.2); cursor: pointer; }
        .item-edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 5px; padding-left: 24px; }
        .item-edit-grid input { padding: 4px 6px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px; width: 100%; box-sizing: border-box; }
        .item-edit-full { grid-column: span 2; }
        
        /* 右側預覽面板 */
        .preview-panel { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; overflow: hidden; }
        .preview-tabs { display: flex; background: #f8f9fa; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; text-align: center; font-weight: bold; color: #666; cursor: pointer; transition: 0.3s; }
        .tab-btn:hover { background: #e9ecef; }
        .tab-btn.active { background: #fff; color: var(--blue); border-bottom: 3px solid var(--blue); }
        .preview-content { flex: 1; overflow: auto; padding: 30px; background: #95a5a6; display: flex; justify-content: center; align-items: flex-start; }

        /* --- 流程圖畫布核心 --- */
        #all-flowcharts-wrapper { background: #fff; padding: 20px 40px; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.2); width: 100%; max-width: 20cm; box-sizing: border-box; }
        .flowchart-container { 
            width: 100%; display: flex; flex-direction: column; position: relative;
            font-family: "DFKai-SB", "標楷體", serif; margin: 0 auto 40px auto; padding-bottom: 20px; border-bottom: 2px dashed #ccc;
        }
        .flowchart-container:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .flowchart-container::before {
            content: ""; position: absolute; left: 75px; top: 30px; bottom: 30px; width: 1.5px; background: #000; z-index: 1;
        }
        .flow-row { display: flex; width: 100%; align-items: center; position: relative; z-index: 2; min-height: 85px; }
        .node-col { width: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; flex-shrink: 0; }
        .node-wrapper { display: flex; flex-direction: column; align-items: center; background: #fff; padding: 5px 0; }
        .node-box { width: 130px; padding: 8px 4px; border: 1.5px solid #000; text-align: center; background: #fff; font-weight: bold; font-size: 14pt; box-sizing: border-box; line-height: 1.2; }
        .node-box.oval { border-radius: 45px; }
        .arrow-head { width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 10px solid #000; margin-bottom: 2px; }
        .detail-col { flex: 1; display: flex; align-items: center; }
        .h-line { width: 35px; border-top: 1.5px dashed #000; flex-shrink: 0; margin-right: -1px; }
        .detail-box { border: 1.5px dashed #000; padding: 10px 15px; font-size: 14pt; background: #fff; line-height: 1.5; display: inline-block; max-width: 100%; word-break: break-all; text-align: left; }
        
        /* 表格預覽樣式 */
        .table-preview { width: 100%; max-width: 25cm; background: #fff; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.2); font-family: "標楷體", serif; box-sizing: border-box; margin-bottom: 20px; }
        .table-preview table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .table-preview th, .table-preview td { border: 1px solid #000; padding: 6px; font-size: 11pt; text-align: left; }
        .table-preview th { text-align: center; background: #f2f2f2; }
        .page-break-indicator { border-top: 2px dashed red; margin: 20px 0 40px 0; text-align: center; color: red; font-size: 12px; font-family: sans-serif; position: relative;}
        .page-break-indicator::after { content: "--- 分頁線 (匯出時自動換頁) ---"; background: #95a5a6; padding: 0 10px; position: relative; top: -8px; color: #fff;}
        
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0; display:flex; align-items:center; gap:10px;">
        🏗️ 監造表單生成工具 <span style="font-size:12px; background:#e74c3c; color:#fff; padding:2px 6px; border-radius:4px;">V2.4 多工項組合版</span>
    </h3>
    <div class="btn-group">
        <input type="file" id="fileInput" accept=".json" onchange="importJSON(event)">
        <button class="btn btn-dark" onclick="document.getElementById('fileInput').click()">📂 匯入 JSON</button>
        <button class="btn btn-dark" onclick="exportJSON()">💾 存檔 JSON</button>
        <div style="width:1px; background:#ddd; margin:0 5px;"></div>
        <button class="btn btn-blue" onclick="exportFlow()">📥 匯出流程圖</button>
        <button class="btn btn-green" onclick="exportStandard()">📋 匯出標準表</button>
        <button class="btn btn-orange" onclick="exportRecord()">📝 匯出紀錄表</button>
    </div>
</div>

<div class="main">
    <div class="form-panel">
        <div class="input-group">
            <label>工程名稱：</label>
            <input type="text" id="projName" value="中和區錦和運動公園整體規劃改善工程" onchange="updateState()">
        </div>
        
        <div class="input-group" style="display:flex; gap:10px; align-items: flex-end; background: #f0f7fa; padding: 15px; border-radius: 8px; border: 1px solid #b3d4fc;">
            <div style="flex:1;">
                <label>選擇分項工程加入：</label>
                <select id="minorSelect"><option>載入中...</option></select>
            </div>
            <button class="btn btn-blue" onclick="addSelectedMinor()">➕ 加入表單</button>
        </div>
        
        <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
        <div style="font-size: 12px; color: #e67e22; margin-bottom: 15px; font-weight: bold;">
            💡 提示：按住綠色標題列可上下拖曳調整「分項工程」順序。帶有「*」號表示檢驗停留點。
        </div>
        
        <div id="formContainer" style="flex:1; overflow-y:auto; padding-right:5px;">
            </div>
    </div>

    <div class="preview-panel">
        <div class="preview-tabs">
            <div class="tab-btn active" onclick="switchTab('flow', this)">流程圖預覽</div>
            <div class="tab-btn" onclick="switchTab('std', this)">標準表預覽</div>
            <div class="tab-btn" onclick="switchTab('rec', this)">紀錄表預覽</div>
        </div>
        <div class="preview-content" id="previewContainer">
            </div>
    </div>
</div>

<script>
    /**
     * @Core 狀態管理與核心資料
     */
    const SS_ID = "1YmRd6S6JY1NpXXc6Ix4qAtXiKQO6-RAjZ-gi_6-9q4g";
    let rawData = [];
    let state = {
        projName: "中和區錦和運動公園整體規劃改善工程",
        selectedMinors: [] // 支援多重分項工程陣列
    };
    let currentTab = 'flow';

    // 1. 資料初始化
    document.addEventListener("DOMContentLoaded", () => {
        window.loader = (json) => {
            if (!json.table) return;
            // 讀取 Google Sheets，增加對 C 欄 (檢驗停留點) 的讀取
            rawData = json.table.rows.map(r => ({
                minor: r.c[1]?.v || "", 
                hp: r.c[2]?.v || "", // 檢驗停留點
                stage: r.c[3]?.v || "", 
                node: r.c[4]?.v || "",
                item: r.c[5]?.v || "", 
                std: r.c[6]?.v || "", 
                timing: r.c[7]?.v || "",
                method: r.c[8]?.v || "", 
                freq: r.c[9]?.v || "", 
                failProc: r.c[10]?.v || ""
            })).filter(r => r.node && r.node !== "施工流程" && r.item);
            
            const minors = [...new Set(rawData.map(r => r.minor))];
            const select = document.getElementById('minorSelect');
            select.innerHTML = minors.map(m => `<option value="${m}">${m}</option>`).join('');
        };
        const s = document.createElement('script');
        s.src = `https://docs.google.com/spreadsheets/d/${SS_ID}/gviz/tq?tqx=responseHandler:loader`;
        document.body.appendChild(s);
    });

    // 2. 加入選定的分項工程
    function addSelectedMinor() {
        const minorName = document.getElementById('minorSelect').value;
        if(!minorName) return;

        const grouped = {};
        rawData.filter(r => r.minor === minorName).forEach(r => {
            if (!grouped[r.node]) grouped[r.node] = [];
            
            // 自動標記停留檢驗點：如果有值，加上星號
            let itemName = r.item;
            if (r.hp && r.hp.trim() !== "") {
                itemName = "* " + itemName;
            }

            grouped[r.node].push({ 
                ...r, 
                item: itemName, // 使用加上星號的名稱
                checked: true, 
                id: 'item_' + Math.random().toString(36).substr(2, 9) 
            });
        });

        const newMinor = {
            id: 'm_' + Math.random().toString(36).substr(2, 9),
            minorName: minorName,
            nodes: Object.keys(grouped).map(nodeName => ({
                id: 'node_' + Math.random().toString(36).substr(2, 9),
                nodeName: nodeName,
                items: grouped[nodeName]
            }))
        };

        state.selectedMinors.push(newMinor);
        renderLeftPanel();
    }

    // 移除分項工程
    function removeMinor(minorId) {
        state.selectedMinors = state.selectedMinors.filter(m => m.id !== minorId);
        renderLeftPanel();
    }

    // 3. 渲染左側可拖曳編輯選單 (分項工程層級)
    function renderLeftPanel() {
        const container = document.getElementById('formContainer');
        container.innerHTML = state.selectedMinors.map((m, mIdx) => `
            <div class="minor-group" data-id="${m.id}">
                <div class="minor-header">
                    <span>≡ ${m.minorName}</span>
                    <button onclick="removeMinor('${m.id}')" style="color:#d32f2f; border:none; background:none; cursor:pointer; font-size:16px;" title="移除此分項">✖</button>
                </div>
                <div class="minor-body">
                    ${m.nodes.map(n => `
                        <div class="node-section">
                            <div style="font-weight:bold; margin-bottom: 8px; color: #555;">📋 流程：${n.nodeName}</div>
                            ${n.items.map(it => `
                                <div class="item-row">
                                    <label class="item-header">
                                        <input type="checkbox" ${it.checked ? 'checked' : ''} onchange="updateItemState('${m.id}', '${n.id}', '${it.id}', 'checked', this.checked)">
                                        <input type="text" value="${it.item}" onchange="updateItemState('${m.id}', '${n.id}', '${it.id}', 'item', this.value)" style="flex:1; border:none; border-bottom:1px dashed #ccc; background:transparent; font-weight:bold; color: ${it.item.includes('*') ? '#e74c3c' : '#333'}">
                                    </label>
                                    <div class="item-edit-grid">
                                        <input type="text" class="item-edit-full" title="抽查標準" placeholder="抽查標準" value="${it.std}" onchange="updateItemState('${m.id}', '${n.id}', '${it.id}', 'std', this.value)">
                                        <input type="text" title="抽查時機" placeholder="抽查時機" value="${it.timing}" onchange="updateItemState('${m.id}', '${n.id}', '${it.id}', 'timing', this.value)">
                                        <input type="text" title="抽查方法" placeholder="抽查方法" value="${it.method}" onchange="updateItemState('${m.id}', '${n.id}', '${it.id}', 'method', this.value)">
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');

        // 針對大層級 (minor-group) 啟用拖曳排序
        new Sortable(container, {
            handle: '.minor-header',
            animation: 150,
            onEnd: function (evt) {
                const movedItem = state.selectedMinors.splice(evt.oldIndex, 1)[0];
                state.selectedMinors.splice(evt.newIndex, 0, movedItem);
                renderPreview();
            }
        });

        renderPreview();
    }

    // 4. 更新狀態邏輯
    function updateState() {
        state.projName = document.getElementById('projName').value;
        renderPreview();
    }

    function updateItemState(minorId, nodeId, itemId, field, value) {
        const minor = state.selectedMinors.find(m => m.id === minorId);
        if(minor) {
            const node = minor.nodes.find(n => n.id === nodeId);
            if(node) {
                const item = node.items.find(i => i.id === itemId);
                if(item) {
                    item[field] = value;
                    renderPreview();
                }
            }
        }
    }

    // 5. JSON 存取功能 (相容新資料結構)
    function exportJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", `表單設定_${state.projName}.json`);
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const loadedState = JSON.parse(e.target.result);
                if(loadedState.selectedMinors) {
                    state = loadedState;
                    document.getElementById('projName').value = state.projName;
                    renderLeftPanel();
                    alert("JSON 設定載入成功！");
                } else {
                    alert("設定檔格式不符 (可能為舊版設定檔)。");
                }
            } catch(err) {
                alert("檔案解析失敗，請確認是否為正確的設定檔。");
            }
        };
        reader.readAsText(file);
    }

    // 6. 右側預覽切換與渲染
    function switchTab(tab, el) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        renderPreview();
    }

    function renderPreview() {
        const container = document.getElementById('previewContainer');
        container.innerHTML = '';
        
        if (state.selectedMinors.length === 0) {
            container.innerHTML = '<div style="margin-top:50px; color:#fff; font-size: 16px;">請從左側點擊「加入表單」以產生預覽</div>';
            return;
        }

        if (currentTab === 'flow') {
            let html = `<div id="all-flowcharts-wrapper">`;
            state.selectedMinors.forEach(m => {
                const activeNodes = m.nodes.filter(n => n.items.some(i => i.checked));
                if(activeNodes.length === 0) return;

                html += `<h2 style="text-align:center; color:#2c3e50; margin: 10px 0 20px 0;">${m.minorName} 流程圖</h2>`;
                html += `<div class="flowchart-container">`;
                html += generateFlowRow("準備", [], "oval", true);
                activeNodes.forEach(n => {
                    const items = n.items.filter(i => i.checked).map(i => i.item);
                    html += generateFlowRow(n.nodeName, items, "rect");
                });
                html += generateFlowRow("完成", [], "oval");
                html += `</div>`;
            });
            html += `</div>`;
            container.innerHTML = html;
        } 
        else if (currentTab === 'std' || currentTab === 'rec') {
            let html = '';
            
            state.selectedMinors.forEach((m, mIdx) => {
                const activeNodes = m.nodes.filter(n => n.items.some(i => i.checked));
                
                activeNodes.forEach((n, nIdx) => {
                    html += `<div class="table-preview"><h2 align="center">${currentTab==='std' ? '標準表' : '施工抽查紀錄表'} - ${m.minorName} (${n.nodeName})</h2>`;
                    
                    if (currentTab === 'rec') {
                        html += `<table style="margin-bottom:10px;"><tr><td width="18%" align="center">工程名稱</td><td>${state.projName}</td></tr><tr><td align="center">分項工程</td><td>${m.minorName}</td></tr></table>`;
                    }

                    html += `<table><tr style="font-weight:bold;">`;
                    if (currentTab === 'std') {
                        html += `<th>階段</th><th>流程</th><th>項目</th><th>抽查標準</th><th>時機</th><th>方法</th><th>頻率</th><th>不合格處理</th><th>紀錄</th>`;
                    } else {
                        html += `<th colspan="3">檢查項目</th><th>標準</th><th width="80pt">實際情形</th><th width="40pt">結果</th>`;
                    }
                    html += `</tr>`;

                    n.items.filter(i => i.checked).forEach((r) => {
                        // 若為 HP 項目，在表格中自動套用紅色字體強調
                        const isHP = r.item.includes('*');
                        const itemStyle = isHP ? `style="color:red; font-weight:bold;"` : ``;

                        html += `<tr>`;
                        if (currentTab === 'std') {
                            html += `<td align="center">${r.stage}</td><td align="center">${n.nodeName}</td><td ${itemStyle}>${r.item}</td><td>${r.std.replace(/\n/g, '<br>')}</td><td align="center">${r.timing}</td><td align="center">${r.method}</td><td align="center">${r.freq}</td><td align="center">${r.failProc}</td><td align="center">抽查紀錄</td>`;
                        } else {
                            html += `<td align="center">${r.stage}</td><td align="center">${n.nodeName}</td><td ${itemStyle}>${r.item}</td><td>${r.std.replace(/\n/g, '<br>')}</td><td></td><td></td>`;
                        }
                        html += `</tr>`;
                    });
                    html += `</table></div>`;
                    
                    // 分頁標示線 (最後一個不用畫)
                    if (!(mIdx === state.selectedMinors.length - 1 && nIdx === activeNodes.length - 1)) {
                        html += `<div class="page-break-indicator"></div>`;
                    }
                });
            });
            container.innerHTML = html;
        }
    }

    function generateFlowRow(txt, itemStrings, shape, isStart = false) {
        // 若文字包含星號，自動套用紅色強調
        const styledItems = itemStrings.map((it, i) => {
            return it.includes('*') ? `<span style="color:red; font-weight:bold;">${i + 1}.${it}</span>` : `${i + 1}.${it}`;
        });
        
        let detailHtml = styledItems.length ? `<div class="h-line"></div><div class="detail-box">${styledItems.join('<br>')}</div>` : '';
        return `
            <div class="flow-row">
                <div class="node-col">
                    <div class="node-wrapper">
                        ${!isStart ? '<div class="arrow-head"></div>' : ''}
                        <div class="node-box ${shape}">${txt}</div>
                    </div>
                </div>
                <div class="detail-col">${detailHtml}</div>
            </div>`;
    }

    // 7. 匯出 Word 引擎 (含動態多重分頁邏輯)
    async function exportFlow() {
        const originalTab = currentTab;
        if(currentTab !== 'flow') { switchTab('flow', document.querySelectorAll('.tab-btn')[0]); }
        
        // 抓取包含所有分項工程的總 Wrapper
        const wrapper = document.getElementById('all-flowcharts-wrapper');
        if(!wrapper) return;

        const img = await html2canvas(wrapper, { scale: 3, useCORS: true });
        const html = `<html><body style="font-family:標楷體; text-align:center;"><img src="${img.toDataURL()}" style="width:100%; max-width: 590px;"></body></html>`;
        saveAs(new Blob(['\ufeff' + html], { type: 'application/msword' }), `綜合流程圖.doc`);
        
        if(originalTab !== 'flow') { switchTab(originalTab, document.querySelectorAll('.tab-btn')[originalTab === 'std'?1:2]); }
    }

    function generateWordHTML(isRecord) {
        let bodyHtml = '';
        let isFirst = true;

        state.selectedMinors.forEach(m => {
            const activeNodes = m.nodes.filter(n => n.items.some(i => i.checked));

            activeNodes.forEach((n) => {
                if (!isFirst) {
                    bodyHtml += `<br clear=all style='mso-special-character:line-break;page-break-before:always'>`;
                }
                isFirst = false;
                
                bodyHtml += `<h2 align="center">${isRecord ? '施工抽查紀錄表' : '標準表'} - ${m.minorName} (${n.nodeName})</h2>`;
                
                if (isRecord) {
                    bodyHtml += `<table border="1" cellpadding="4" style="width:100%; border-collapse:collapse; margin-bottom:10px;"><tr><td width="18%" align="center">工程名稱</td><td>${state.projName}</td></tr><tr><td align="center">分項工程</td><td>${m.minorName}</td></tr></table>`;
                }

                bodyHtml += `<table border="1" cellpadding="4" style="width:100%; border-collapse:collapse;"><tr style="font-weight:bold; background-color:#f2f2f2;">`;
                
                if (!isRecord) {
                    bodyHtml += `<th>階段</th><th>流程</th><th>項目</th><th>抽查標準</th><th>時機</th><th>方法</th><th>頻率</th><th>不合格處理</th><th>紀錄</th>`;
                } else {
                    bodyHtml += `<th colspan="3">檢查項目</th><th>標準</th><th width="80pt">實際情形</th><th width="40pt">結果</th>`;
                }
                bodyHtml += `</tr>`;

                n.items.filter(i => i.checked).forEach((r) => {
                    const isHP = r.item.includes('*');
                    const itemStyle = isHP ? `style="color:red; font-weight:bold;"` : ``;

                    bodyHtml += `<tr>`;
                    if (!isRecord) {
                        bodyHtml += `<td align="center">${r.stage}</td><td align="center">${n.nodeName}</td><td ${itemStyle}>${r.item}</td><td>${r.std.replace(/\n/g, '<br>')}</td><td align="center">${r.timing}</td><td align="center">${r.method}</td><td align="center">${r.freq}</td><td align="center">${r.failProc}</td><td align="center">抽查紀錄</td>`;
                    } else {
                        bodyHtml += `<td align="center">${r.stage}</td><td align="center">${n.nodeName}</td><td ${itemStyle}>${r.item}</td><td>${r.std.replace(/\n/g, '<br>')}</td><td></td><td></td>`;
                    }
                    bodyHtml += `</tr>`;
                });
                bodyHtml += `</table>`;
            });
        });

        const style = isRecord ? 
            `body { font-family: "標楷體"; } table { font-size: 11pt; }` : 
            `@page Section2 { size: 841.9pt 595.3pt; mso-page-orientation: landscape; margin: 36pt; } div.Section2 { page: Section2; } body { font-family: "標楷體"; } table { font-size: 10pt; }`;
        
        return `<html><head><style>${style}</style></head><body><div class="Section2">${bodyHtml}</div></body></html>`;
    }

    function exportStandard() {
        const html = generateWordHTML(false);
        saveAs(new Blob(['\ufeff' + html], { type: 'application/msword' }), `綜合標準表.doc`);
    }

    function exportRecord() {
        const html = generateWordHTML(true);
        saveAs(new Blob(['\ufeff' + html], { type: 'application/msword' }), `綜合抽查紀錄表.doc`);
    }
</script>

</body>
</html>
