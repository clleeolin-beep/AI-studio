<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>監造表單生成工具 (V2.7 統一授權架構版)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        :root { --primary: #2c3e50; --bg: #f4f7f6; --accent: #27ae60; --blue: #2980b9; --orange: #e67e22; --border: #ddd; --danger: #e74c3c; --auth: #8e44ad; }
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 頭部區塊 */
        .header { background: #fff; padding: 10px 25px; border-bottom: 2px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 10; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { padding: 6px 12px; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; transition: all 0.2s; display: flex; align-items: center; gap: 5px; font-size: 13px; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }
        .btn-blue { background: var(--blue); }
        .btn-green { background: var(--accent); }
        .btn-orange { background: var(--orange); }
        .btn-dark { background: var(--primary); }
        .btn-auth { background: var(--auth); }
        .btn-danger { background: var(--danger); }
        
        /* 佈局區塊 */
        .main { flex: 1; display: flex; padding: 15px; gap: 15px; overflow: hidden; }
        
        /* 左側編輯面板 */
        .form-panel { width: 500px; background: #fff; padding: 20px; overflow-y: auto; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); flex-shrink: 0; display: flex; flex-direction: column; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--primary); font-size: 14px; }
        .input-group input[type="text"], .input-group select { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; }
        
        /* 拖曳與風琴節點樣式 */
        .minor-group { border: 2px solid var(--accent); border-radius: 8px; margin-bottom: 15px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .minor-header { padding: 10px 15px; background: #e8f5e9; border-bottom: 2px solid var(--accent); cursor: grab; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-radius: 6px 6px 0 0; color: #2e7d32; user-select: none; }
        .minor-header:active { cursor: grabbing; }
        .minor-body { padding: 10px; background: #fafafa; display: block; }
        .minor-body.collapsed { display: none; }
        
        .node-section { margin-bottom: 15px; border-left: 3px solid #ccc; padding-left: 10px; position: relative; }
        .node-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 8px; color: #555; background: #eee; padding: 5px 10px; border-radius: 4px; cursor: pointer; user-select: none; }
        .node-body { display: block; }
        .node-body.collapsed { display: none; }

        .item-row { background: #fff; border: 1px solid #e0e0e0; padding: 10px; margin-bottom: 8px; border-radius: 4px; display: flex; flex-direction: column; gap: 6px; position: relative; }
        .item-header { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 13px; }
        .item-header input[type="checkbox"] { transform: scale(1.2); cursor: pointer; }
        .item-edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 5px; padding-left: 24px; }
        .item-edit-grid input { padding: 4px 6px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px; width: 100%; box-sizing: border-box; }
        .item-edit-full { grid-column: span 2; }
        
        .action-btn { background: none; border: none; cursor: pointer; font-size: 14px; opacity: 0.6; padding: 2px 5px; transition: 0.2s; }
        .action-btn:hover { opacity: 1; transform: scale(1.1); }
        .add-btn { width: 100%; padding: 8px; background: #f0f0f0; border: 1px dashed #aaa; border-radius: 4px; cursor: pointer; color: #555; font-weight: bold; margin-top: 5px; transition: 0.2s; }
        .add-btn:hover { background: #e0e0e0; }

        /* 右側預覽面板 */
        .preview-panel { flex: 1; background: #95a5a6; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; overflow: hidden; }
        .preview-tabs { display: flex; background: #f8f9fa; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; text-align: center; font-weight: bold; color: #666; cursor: pointer; transition: 0.3s; }
        .tab-btn:hover { background: #e9ecef; }
        .tab-btn.active { background: #fff; color: var(--blue); border-bottom: 3px solid var(--blue); }
        .preview-content { flex: 1; overflow: auto; padding: 30px; display: flex; justify-content: center; align-items: flex-start; }

        /* --- 流程圖畫布核心 (嚴格依照 V44) --- */
        #all-flowcharts-wrapper { background: transparent; width: 100%; max-width: 20cm; display: flex; flex-direction: column; gap: 40px; }
        .flowchart-container { 
            width: 17.5cm; background: #fff; padding: 50px 40px; box-sizing: border-box; 
            display: flex; flex-direction: column; position: relative;
            font-family: "DFKai-SB", "標楷體", serif; box-shadow: 0 0 20px rgba(0,0,0,0.2); margin: 0 auto;
        }
        .flowchart-container::before {
            content: ""; position: absolute; left: calc(40px + 75px); top: 80px; bottom: 80px; width: 1.5px; background: #000; z-index: 1;
        }
        .flow-row { display: flex; width: 100%; align-items: center; position: relative; z-index: 2; min-height: 85px; }
        .node-col { width: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; flex-shrink: 0; }
        .node-wrapper { display: flex; flex-direction: column; align-items: center; background: #fff; padding: 5px 0; }
        .node-box { width: 130px; padding: 8px 4px; border: 1.5px solid #000; text-align: center; background: #fff; font-weight: bold; font-size: 14pt; box-sizing: border-box; line-height: 1.2; }
        .node-box.oval { border-radius: 45px; }
        .arrow-head { width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 10px solid #000; margin-bottom: 2px; }
        .detail-col { flex: 1; display: flex; align-items: center; }
        .h-line { width: 35px; border-top: 1.5px dashed #000; flex-shrink: 0; margin-right: -1px; }
        .detail-box { border: 1.5px dashed #000; padding: 10px 15px; font-size: 14pt; background: #fff; line-height: 1.5; display: inline-block; max-width: 100%; word-break: break-all; text-align: left; }
        
        /* 表格預覽樣式 (嚴格依照 V44) */
        .table-preview { width: 100%; max-width: 25cm; background: #fff; padding: 30px; box-shadow: 0 0 20px rgba(0,0,0,0.2); font-family: "標楷體", serif; box-sizing: border-box; margin-bottom: 40px; }
        .table-preview h2 { text-align: center; margin-top: 0; margin-bottom: 20px; }
        .table-preview table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .table-preview th, .table-preview td { border: 1px solid black; padding: 4px; font-size: 11pt; text-align: left; }
        .table-preview th { font-weight: bold; text-align: center; }
        
        .page-break-indicator { border-top: 2px dashed red; margin: 20px 0 40px 0; text-align: center; color: red; font-size: 12px; font-family: sans-serif; position: relative;}
        .page-break-indicator::after { content: "--- 分頁線 (列印時自動換頁) ---"; background: #95a5a6; padding: 0 10px; position: relative; top: -8px; color: #fff;}
        
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0; display:flex; align-items:center; gap:10px;">
        🏗️ 施工表單生成器 <span style="font-size:12px; background:#e74c3c; color:#fff; padding:2px 6px; border-radius:4px;">V2.7 統一授權架構版</span>
    </h3>
    <div class="btn-group">
        <button id="btnAuth" class="btn btn-auth" onclick="handleAuthClick()">🔑 登入 Google 授權</button>
        <button id="btnSync" class="btn btn-danger" style="display:none;" onclick="syncToCloud()">☁️ 追加修改回存</button>
        <div style="width:1px; background:#ddd; margin:0 5px;"></div>
        
        <input type="file" id="fileInput" accept=".json" onchange="importJSON(event)">
        <button class="btn btn-dark" onclick="document.getElementById('fileInput').click()">📂 匯入 JSON</button>
        <button class="btn btn-dark" onclick="exportJSON()">💾 存檔 JSON</button>
        <div style="width:1px; background:#ddd; margin:0 5px;"></div>
        
        <button class="btn btn-blue" onclick="exportFlow()">📥 匯出流程圖</button>
        <button class="btn btn-green" onclick="exportStandard()">📋 匯出標準表</button>
        <button class="btn btn-orange" onclick="exportRecord()">📝 匯出紀錄表</button>
    </div>
</div>

<div class="main">
    <div class="form-panel">
        <div class="input-group">
            <label>工程名稱：</label>
            <input type="text" id="projName" list="projectList" value="中和區錦和運動公園整體規劃改善工程" onchange="updateState()">
            <datalist id="projectList"></datalist>
        </div>

        <div class="input-group" style="display:flex; gap:10px; background: #fff3e0; padding: 10px; border-radius: 8px; border: 1px solid #ffe0b2;">
            <div style="flex:1;">
                <label style="color:#e67e22;">預設情境套用：</label>
                <select id="presetSelect">
                    <option value="">-- 自訂選擇 --</option>
                    <option value="hill">山坡地工程案件 (拆除-整地-鋼線網-擋土牆-排水-混凝土)</option>
                    <option value="park">公園景觀案件 (整地-排水-鋪面-景觀裝修-植栽)</option>
                </select>
            </div>
            <button class="btn btn-orange" style="align-self: flex-end;" onclick="applyPreset()">🚀 一鍵套用</button>
        </div>
        
        <div class="input-group" style="display:flex; gap:10px; align-items: flex-end; background: #f0f7fa; padding: 15px; border-radius: 8px; border: 1px solid #b3d4fc;">
            <div style="flex:1;">
                <label>選擇分項工程加入：</label>
                <select id="minorSelect"><option>載入中...</option></select>
            </div>
            <button class="btn btn-blue" onclick="addSelectedMinor()">➕ 加入表單</button>
        </div>
        
        <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
        <div style="font-size: 12px; color: #e67e22; margin-bottom: 15px; font-weight: bold;">
            💡 提示：點擊標題列可【展開/收合】。綠色標題列可拖曳排序。
        </div>
        
        <div id="formContainer" style="flex:1; overflow-y:auto; padding-right:5px;">
            </div>
    </div>

    <div class="preview-panel">
        <div class="preview-tabs">
            <div class="tab-btn active" onclick="switchTab('flow', this)">流程圖預覽</div>
            <div class="tab-btn" onclick="switchTab('std', this)">標準表預覽</div>
            <div class="tab-btn" onclick="switchTab('rec', this)">紀錄表預覽</div>
        </div>
        <div class="preview-content" id="previewContainer">
            </div>
    </div>
</div>

<script>
    /**
     * ==========================================
     * @Core Google Sheets API (GIS Fetch 版架構，無須 API_KEY)
     * ==========================================
     */
    // 延續您在植栽工具使用的 CLIENT_ID
    const CLIENT_ID = '615427641075-7g7ikac4oc4s46897ch39av7174n4pmn.apps.googleusercontent.com'; 
    const SS_ID = "1YmRd6S6JY1NpXXc6Ix4qAtXiKQO6-RAjZ-gi_6-9q4g";

    let tokenClient;
    let accessToken = null;
    let gisInited = false;

    // GIS 初始化
    function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/spreadsheets',
            callback: '', 
        });
        gisInited = true;
    }
    
    function handleAuthClick() {
        if (!gisInited) { alert("Google 授權套件尚未載入完成，請稍候再試。"); return; }
        tokenClient.callback = async (resp) => {
            if (resp.error !== undefined) { throw (resp); }
            accessToken = resp.access_token;
            document.getElementById('btnAuth').style.display = 'none';
            document.getElementById('btnSync').style.display = 'flex';
            alert("Google 授權成功！現在您可以將修改後的表單追加寫回資料庫。");
        };
        // 請求授權
        tokenClient.requestAccessToken({prompt: 'consent'});
    }

    /**
     * 追加修改回存 (使用 Fetch API 取代舊版 gapi)
     */
    async function syncToCloud() {
        if (!confirm("確定要將目前畫面上勾選的項目，做為【追加/修改】寫入雲端資料庫嗎？\n這將會在資料庫最下方新增這些資料。")) return;
        
        let appendData = [];
        state.selectedMinors.forEach(m => {
            m.nodes.forEach(n => {
                n.items.filter(i => i.checked).forEach(it => {
                    // 還原星號與純文字
                    let isHP = it.item.includes('*') ? 'HP' : '';
                    let cleanItem = it.item.replace('* ', '').replace('*', '');
                    // 對應欄位: A:大工項(暫無對應填入), B:小工項(minorName), C:檢驗停留點(hp), D:階段, E:流程, F:項目, G:標準, H:時機, I:方法, J:頻率, K:不合格處理, L:紀錄
                    appendData.push([
                        "", m.minorName, isHP, it.stage, n.nodeName, cleanItem,
                        it.std, it.timing, it.method, it.freq, it.failProc, "施工抽查紀錄"
                    ]);
                });
            });
        });

        if (appendData.length === 0) { alert("沒有勾選任何項目可寫入。"); return; }

        try {
            const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SS_ID}/values/工作表1!A:L:append?valueInputOption=USER_ENTERED`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ values: appendData })
            });

            const result = await response.json();
            if (!response.ok) throw new Error(result.error.message);
            
            alert(`成功將 ${appendData.length} 筆資料寫入資料庫！`);
        } catch (err) {
            console.error(err);
            alert("寫入失敗，請確認您是否有該表單的編輯權限。系統訊息：" + err.message);
        }
    }

    /**
     * ==========================================
     * @Core 狀態管理與核心資料讀取
     * ==========================================
     */
    let rawData = [];
    let state = {
        projName: "中和區錦和運動公園整體規劃改善工程",
        selectedMinors: [] 
    };
    let currentTab = 'flow';

    document.addEventListener("DOMContentLoaded", () => {
        // 載入 GIS 授權腳本
        const scriptGis = document.createElement('script'); 
        scriptGis.src = "https://accounts.google.com/gsi/client"; 
        scriptGis.onload = gisLoaded; 
        document.body.appendChild(scriptGis);

        // 公開讀取 Google Sheets (透過 gviz)
        window.loader = (json) => {
            if (!json.table) return;
            rawData = json.table.rows.map(r => ({
                minor: r.c[1]?.v || "", hp: r.c[2]?.v || "", stage: r.c[3]?.v || "", node: r.c[4]?.v || "",
                item: r.c[5]?.v || "", std: r.c[6]?.v || "", timing: r.c[7]?.v || "", method: r.c[8]?.v || "", 
                freq: r.c[9]?.v || "", failProc: r.c[10]?.v || ""
            })).filter(r => r.node && r.node !== "施工流程" && r.item);
            
            const minors = [...new Set(rawData.map(r => r.minor))];
            document.getElementById('minorSelect').innerHTML = minors.map(m => `<option value="${m}">${m}</option>`).join('');
        };
        const s = document.createElement('script');
        s.src = `https://docs.google.com/spreadsheets/d/${SS_ID}/gviz/tq?tqx=responseHandler:loader`;
        document.body.appendChild(s);

        // 讀取案件地圖 CSV
        fetch('公司案例地圖彙整 - 公司已結案案件.csv')
            .then(res => res.text())
            .then(csv => {
                const parsed = Papa.parse(csv, { header: true });
                const datalist = document.getElementById('projectList');
                parsed.data.forEach(row => {
                    if (row['案件簡稱']) datalist.appendChild(new Option(`[${row['案號'] || '無'}] ${row['案件簡稱']} - ${row['契約案名'] || ''}`));
                });
            }).catch(() => {});
    });

    // --- 增刪改查與風琴UI邏輯 ---
    function addSelectedMinor(minorNameOverride = null) {
        const minorName = minorNameOverride || document.getElementById('minorSelect').value;
        if(!minorName) return;

        const grouped = {};
        rawData.filter(r => r.minor === minorName).forEach(r => {
            if (!grouped[r.node]) grouped[r.node] = [];
            let itemName = r.item;
            if (r.hp && r.hp.trim() !== "") itemName = "* " + itemName;

            grouped[r.node].push({ ...r, item: itemName, checked: true, id: 'item_' + Math.random().toString(36).substr(2, 9) });
        });

        state.selectedMinors.push({
            id: 'm_' + Math.random().toString(36).substr(2, 9), minorName: minorName, collapsed: false,
            nodes: Object.keys(grouped).map(nodeName => ({
                id: 'node_' + Math.random().toString(36).substr(2, 9), nodeName: nodeName, collapsed: false, items: grouped[nodeName]
            }))
        });
        renderLeftPanel();
    }

    function removeMinor(minorId, e) { e.stopPropagation(); state.selectedMinors = state.selectedMinors.filter(m => m.id !== minorId); renderLeftPanel(); }
    function addNode(minorId, e) { e.stopPropagation(); const nodeName = prompt("請輸入新流程名稱："); if(!nodeName) return; const minor = state.selectedMinors.find(m => m.id === minorId); minor.nodes.push({ id: 'node_' + Math.random().toString(36).substr(2, 9), nodeName: nodeName, collapsed: false, items: [] }); minor.collapsed = false; renderLeftPanel(); }
    function removeNode(minorId, nodeId, e) { e.stopPropagation(); const minor = state.selectedMinors.find(m => m.id === minorId); minor.nodes = minor.nodes.filter(n => n.id !== nodeId); renderLeftPanel(); }
    function addItem(minorId, nodeId, e) { e.stopPropagation(); const minor = state.selectedMinors.find(m => m.id === minorId); const node = minor.nodes.find(n => n.id === nodeId); node.items.push({ id: 'item_' + Math.random().toString(36).substr(2, 9), checked: true, stage: "施工中", minor: minor.minorName, node: node.nodeName, item: "新增檢驗項目", std: "目視無異常", timing: "施工中", method: "目視", freq: "每次", failProc: "改善" }); node.collapsed = false; renderLeftPanel(); }
    function removeItem(minorId, nodeId, itemId) { const minor = state.selectedMinors.find(m => m.id === minorId); const node = minor.nodes.find(n => n.id === nodeId); node.items = node.items.filter(i => i.id !== itemId); renderLeftPanel(); }
    function toggleCollapse(type, id1, id2 = null) { if(type === 'minor') { const m = state.selectedMinors.find(m => m.id === id1); m.collapsed = !m.collapsed; } else { const m = state.selectedMinors.find(m => m.id === id1); const n = m.nodes.find(n => n.id === id2); n.collapsed = !n.collapsed; } renderLeftPanel(); }

    function applyPreset() {
        const val = document.getElementById('presetSelect').value; if(!val) return;
        let presets = val === 'hill' ? ["拆除工程", "整地工程", "銲接鋼線網", "擋土牆工程", "排水工程", "混凝土工程"] : ["整地工程", "排水工程", "高壓混凝土地磚", "景觀裝修工程", "喬木植栽施工"];
        if(confirm(`即將依序套用情境：\n${presets.join(' -> ')}\n是否繼續？`)) presets.forEach(minor => addSelectedMinor(minor));
    }

    function renderLeftPanel() {
        const container = document.getElementById('formContainer');
        container.innerHTML = state.selectedMinors.map((m) => `
            <div class="minor-group" data-id="${m.id}">
                <div class="minor-header" onclick="toggleCollapse('minor', '${m.id}')">
                    <span>${m.collapsed ? '➕' : '➖'} ≡ ${m.minorName}</span>
                    <div style="display:flex; gap:5px;">
                        <button class="action-btn" onclick="addNode('${m.id}', event)" title="新增大工項">➕流程</button>
                        <button class="action-btn" onclick="removeMinor('${m.id}', event)" style="color:var(--danger);" title="移除此分項">✖</button>
                    </div>
                </div>
                <div class="minor-body ${m.collapsed ? 'collapsed' : ''}">
                    ${m.nodes.map(n => `
                        <div class="node-section">
                            <div class="node-header" onclick="toggleCollapse('node', '${m.id}', '${n.id}')">
                                <span>${n.collapsed ? '▶' : '▼'} 📋 流程：<input type="text" value="${n.nodeName}" onclick="event.stopPropagation()" onchange="updateNodeName('${m.id}', '${n.id}', this.value)" style="width:120px; padding:2px; font-weight:bold; border:1px solid #ccc; background:#fff;"></span>
                                <div style="display:flex; gap:5px;">
                                    <button class="action-btn" onclick="removeItem('${m.id}', '${n.id}', null, event); removeNode('${m.id}', '${n.id}', event)" style="color:var(--danger);" title="移除大工項">✖</button>
                                </div>
                            </div>
                            <div class="node-body ${n.collapsed ? 'collapsed' : ''}">
                                ${n.items.map(it => `
                                    <div class="item-row">
                                        <button class="action-btn" onclick="removeItem('${m.id}', '${n.id}', '${it.id}')" style="position:absolute; right:5px; top:5px; color:var(--danger);">✖</button>
                                        <label class="item-header" style="padding-right:20px;">
                                            <input type="checkbox" ${it.checked ? 'checked' : ''} onchange="updateItemState('${m.id}', '${n.id}', '${it.id}', 'checked', this.checked)">
                                            <input type="text" value="${it.item}" onchange="updateItemState('${m.id}', '${n.id}', '${it.id}', 'item', this.value)" style="flex:1; border:none; border-bottom:1px dashed #ccc; background:transparent; font-weight:bold; color: ${it.item.includes('*') ? '#e74c3c' : '#333'}">
                                        </label>
                                        <div class="item-edit-grid">
                                            <input type="text" class="item-edit-full" title="抽查標準" placeholder="抽查標準" value="${it.std}" onchange="updateItemState('${m.id}', '${n.id}', '${it.id}', 'std', this.value)">
                                            <input type="text" title="抽查時機" placeholder="抽查時機" value="${it.timing}" onchange="updateItemState('${m.id}', '${n.id}', '${it.id}', 'timing', this.value)">
                                            <input type="text" title="抽查方法" placeholder="抽查方法" value="${it.method}" onchange="updateItemState('${m.id}', '${n.id}', '${it.id}', 'method', this.value)">
                                        </div>
                                    </div>
                                `).join('')}
                                <button class="add-btn" onclick="addItem('${m.id}', '${n.id}', event)">+ 新增管理項目 (小工項)</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');

        new Sortable(container, { handle: '.minor-header', animation: 150, onEnd: function (evt) { const movedItem = state.selectedMinors.splice(evt.oldIndex, 1)[0]; state.selectedMinors.splice(evt.newIndex, 0, movedItem); renderPreview(); } });
        renderPreview();
    }

    function updateState() { state.projName = document.getElementById('projName').value; renderPreview(); }
    function updateNodeName(minorId, nodeId, val) { state.selectedMinors.find(m => m.id === minorId).nodes.find(n => n.id === nodeId).nodeName = val; renderPreview(); }
    function updateItemState(minorId, nodeId, itemId, field, value) { state.selectedMinors.find(m => m.id === minorId).nodes.find(n => n.id === nodeId).items.find(i => i.id === itemId)[field] = value; renderPreview(); }
    
    function exportJSON() { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2)); const a = document.createElement('a'); a.href = dataStr; a.download = `表單設定_${state.projName}.json`; document.body.appendChild(a); a.click(); a.remove(); }
    function importJSON(event) { const file = event.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(e) { try { const loaded = JSON.parse(e.target.result); if(loaded.selectedMinors) { state = loaded; document.getElementById('projName').value = state.projName; renderLeftPanel(); alert("JSON 載入成功！"); } } catch(err) { alert("檔案解析失敗"); } }; reader.readAsText(file); }

    /**
     * ==========================================
     * @Core 預覽與 Word 匯出 (嚴格遵循 V44 原始排版)
     * ==========================================
     */
    function switchTab(tab, el) { currentTab = tab; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); renderPreview(); }

    function renderPreview() {
        const container = document.getElementById('previewContainer'); container.innerHTML = '';
        if (state.selectedMinors.length === 0) { container.innerHTML = '<div style="margin-top:50px; color:#fff; font-size: 16px;">請從左側點擊「加入表單」以產生預覽</div>'; return; }

        if (currentTab === 'flow') {
            let html = `<div id="all-flowcharts-wrapper">`;
            state.selectedMinors.forEach(m => {
                const activeNodes = m.nodes.filter(n => n.items.some(i => i.checked));
                if(activeNodes.length === 0) return;
                html += `<div class="flowchart-container"><h2 style="text-align:center; margin-top:0;">${m.minorName} 流程圖</h2>`;
                html += generateFlowRow("準備", [], "oval", true);
                activeNodes.forEach(n => { html += generateFlowRow(n.nodeName, n.items.filter(i => i.checked).map(i => i.item), "rect"); });
                html += generateFlowRow("完成", [], "oval");
                html += `</div>`;
            });
            container.innerHTML = html + `</div>`;
        } else {
            let html = '';
            state.selectedMinors.forEach((m, mIdx) => {
                const activeNodes = m.nodes.filter(n => n.items.some(i => i.checked));
                if(activeNodes.length === 0) return;

                html += `<div class="table-preview"><h2 align="center">${currentTab==='std' ? m.minorName + ' 施工抽查程序及標準表' : '施工抽查紀錄表'}</h2>`;
                if (currentTab === 'rec') html += `<table style="margin-bottom:10px;"><tr><td width="18%" align="center">工程名稱</td><td>${state.projName}</td></tr><tr><td align="center">分項工程</td><td>${m.minorName}</td></tr></table>`;
                
                html += `<table><tr style="font-weight:bold;">`;
                if (currentTab === 'std') html += `<th>階段</th><th>流程</th><th>項目</th><th>抽查標準</th><th>時機</th><th>方法</th><th>頻率</th><th>不合格處理</th><th>紀錄</th><th>備註</th>`;
                else html += `<th colspan="3">檢查項目</th><th>標準</th><th width="80pt">實際情形</th><th width="40pt">結果</th>`;
                html += `</tr>`;

                activeNodes.forEach((n) => {
                    n.items.filter(i => i.checked).forEach((r) => {
                        const isHP = r.item.includes('*');
                        const itemStyle = isHP ? `style="color:red; font-weight:bold;"` : ``;
                        html += `<tr>`;
                        if (currentTab === 'std') html += `<td align="center">${r.stage}</td><td align="center">${n.nodeName}</td><td ${itemStyle}>${r.item}</td><td>${r.std.replace(/\n/g, '<br>')}</td><td align="center">${r.timing}</td><td align="center">${r.method}</td><td align="center">${r.freq}</td><td align="center">${r.failProc}</td><td align="center">施工抽查紀錄</td><td></td>`;
                        else html += `<td align="center">${r.stage}</td><td align="center">${n.nodeName}</td><td ${itemStyle}>${r.item}</td><td>${r.std.replace(/\n/g, '<br>')}</td><td></td><td></td>`;
                        html += `</tr>`;
                    });
                });
                html += `</table></div>`;
                if (mIdx !== state.selectedMinors.length - 1) html += `<div class="page-break-indicator"></div>`;
            });
            container.innerHTML = html;
        }
    }

    function generateFlowRow(txt, itemStrings, shape, isStart = false) {
        const styledItems = itemStrings.map((it, i) => it.includes('*') ? `<span style="color:red; font-weight:bold;">${i + 1}.${it}</span>` : `${i + 1}.${it}`);
        let detailHtml = styledItems.length ? `<div class="h-line"></div><div class="detail-box">${styledItems.join('<br>')}</div>` : '';
        return `<div class="flow-row"><div class="node-col"><div class="node-wrapper">${!isStart ? '<div class="arrow-head"></div>' : ''}<div class="node-box ${shape}">${txt}</div></div></div><div class="detail-col">${detailHtml}</div></div>`;
    }

    async function exportFlow() {
        const origTab = currentTab; if(currentTab !== 'flow') switchTab('flow', document.querySelectorAll('.tab-btn')[0]);
        const wrapper = document.getElementById('all-flowcharts-wrapper'); if(!wrapper) return;
        const img = await html2canvas(wrapper, { scale: 3, useCORS: true });
        const html = `<html><body style="font-family:標楷體; text-align:center;"><img src="${img.toDataURL()}" style="width:100%; max-width: 590px;"></body></html>`;
        saveAs(new Blob(['\ufeff' + html], { type: 'application/msword' }), `綜合流程圖.doc`);
        if(origTab !== 'flow') switchTab(origTab, document.querySelectorAll('.tab-btn')[origTab === 'std'?1:2]);
    }

    function generateWordHTML(isRecord) {
        let bodyHtml = '';
        let isFirst = true;

        state.selectedMinors.forEach(m => {
            const activeNodes = m.nodes.filter(n => n.items.some(i => i.checked));
            if(activeNodes.length === 0) return;

            // 以分項工程做自動分頁
            if (!isFirst) bodyHtml += `<br clear=all style='mso-special-character:line-break;page-break-before:always'>`;
            isFirst = false;
            
            bodyHtml += `<h2 align="center">${isRecord ? '施工抽查紀錄表' : m.minorName + ' 施工抽查程序及標準表'}</h2>`;
            if (isRecord) bodyHtml += `<table border="1" cellpadding="4" style="width:100%; border-collapse:collapse; margin-bottom:10px;"><tr><td width="18%" align="center">工程名稱</td><td padding-left="5px">${state.projName}</td></tr><tr><td align="center">分項工程</td><td padding-left="5px">${m.minorName}</td></tr></table>`;

            bodyHtml += `<table border="1" cellpadding="4" style="width:100%; border-collapse:collapse;"><tr style="font-weight:bold; background-color:#f2f2f2;">`;
            if (!isRecord) bodyHtml += `<th>階段</th><th>流程</th><th>項目</th><th>抽查標準</th><th>時機</th><th>方法</th><th>頻率</th><th>不合格處理</th><th>紀錄</th><th>備註</th>`;
            else bodyHtml += `<th colspan="3">檢查項目</th><th>標準</th><th width="80pt">實際情形</th><th width="40pt">結果</th>`;
            bodyHtml += `</tr>`;

            activeNodes.forEach((n) => {
                n.items.filter(i => i.checked).forEach((r) => {
                    const isHP = r.item.includes('*');
                    const itemStyle = isHP ? `style="color:red; font-weight:bold;"` : ``;
                    bodyHtml += `<tr>`;
                    if (!isRecord) bodyHtml += `<td align="center">${r.stage}</td><td align="center">${n.nodeName}</td><td ${itemStyle}>${r.item}</td><td>${r.std.replace(/\n/g, '<br>')}</td><td align="center">${r.timing}</td><td align="center">${r.method}</td><td align="center">${r.freq}</td><td align="center">${r.failProc}</td><td align="center">施工抽查紀錄</td><td></td>`;
                    else bodyHtml += `<td align="center">${r.stage}</td><td align="center">${n.nodeName}</td><td ${itemStyle}>${r.item}</td><td>${r.std.replace(/\n/g, '<br>')}</td><td></td><td></td>`;
                    bodyHtml += `</tr>`;
                });
            });
            bodyHtml += `</table>`;
        });

        const style = isRecord ? `body { font-family: "標楷體"; } table { font-size: 11pt; }` : `@page Section2 { size: 841.9pt 595.3pt; mso-page-orientation: landscape; margin: 36pt; } div.Section2 { page: Section2; } body { font-family: "標楷體"; } table { font-size: 10pt; }`;
        return `<html><head><style>${style}</style></head><body><div class="Section2">${bodyHtml}</div></body></html>`;
    }

    function exportStandard() { saveAs(new Blob(['\ufeff' + generateWordHTML(false)], { type: 'application/msword' }), `綜合標準表.doc`); }
    function exportRecord() { saveAs(new Blob(['\ufeff' + generateWordHTML(true)], { type: 'application/msword' }), `綜合抽查紀錄表.doc`); }
</script>

</body>
</html>
