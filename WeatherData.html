                    let sortedRows = new Array();
                    let sk = 0;
                    while (sk < skCount) {
                        sortedRows.push(JSON.parse(finalMap.get(sortedKeys[sk])));
                        sk++;
                    }
                    
                    let finalOutput = new Array();
                    finalOutput.push(bundle[stnId].headers[0]);
                    finalOutput.push(bundle[stnId].headers[1]);
                    let fo = 0;
                    while (fo < skCount) {
                        finalOutput.push(sortedRows[fo]);
                        fo++;
                    }

                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssid}/values/A1:ZZ20000:clear`, { method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}` } });
                    const updateRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssid}/values/A1?valueInputOption=USER_ENTERED`, {
                        method: 'PUT', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ values: finalOutput })
                    });

                    if(updateRes.ok) {
                        diag.innerHTML += `<span class="diag-success">   └─ ✅ 絕對對齊寫入成功：新增 ${add} / 強制覆蓋 ${upd} / 雲端總筆數 ${sortedRows.length}。</span><br>`;
                    }
                }
                status.innerText = "✅ 第三區同步完畢。所有防呆機制已運作，不會再產生錯位與重複檔案。";
            } catch (err) { diag.innerHTML += `<span class="diag-err">❌ 錯誤: ${err.message}</span>`; }
        }

        // --- 第四區：排錯與異常偵測功能 ---
        document.getElementById('scanBtn').onclick = () => {
            window.pendingAction = 'scan';
            diagScan.innerHTML = `[${new Date().toLocaleTimeString()}] ⏳ 啟動極限排錯程序...<br>`;
            if (accessToken !== null) { startCloudScan(); }
            else { tokenClient.requestAccessToken({prompt: 'none'}); }
        };

        async function startCloudScan() {
            try {
                const driveRes = await fetch(`https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}' in parents and trashed = false&fields=files(id, name)`, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                const driveData = await driveRes.json();
                const driveFiles = driveData.files || [];
                
                let fileCount = driveFiles.length;
                if (fileCount === 0) { diagScan.innerHTML += `<span class="diag-err">⚠️ 資料夾為空。</span><br>`; return; }
                diagScan.innerHTML += `<span class="diag-success">✅ 共發現 ${fileCount} 個測站，開始裸日期比對排錯...</span><hr>`;

                let fIndex = 0;
                while (fIndex < fileCount) {
                    let fileObj = driveFiles[fIndex];
                    let fileName = fileObj.name;
                    let fileId = fileObj.id;
                    
                    diagScan.innerHTML += `<span><b>測站：${fileName}</b></span><br>`;

                    const getRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${fileId}/values/A1:ZZ20000`, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                    const sheetData = await getRes.json();
                    let values = sheetData.values;
                    if (values === undefined) { values = new Array(); }
                    let vLen = values.length;

                    if (vLen <= 2) { 
                        diagScan.innerHTML += `<span class="diag-err">   └─ ❌ 無有效數據。</span><br><br>`; 
                        fIndex++; 
                        continue; 
                    }

                    let existingMonths = {}; 
                    let dateSeen = {}; 
                    let duplicateDatesCount = 0;
                    let sampleDuplicate = "";

                    let minTime = Infinity; 
                    let maxTime = -Infinity;
                    let minDateStr = ""; 
                    let maxDateStr = "";

                    let i = 2;
                    while (i < vLen) {
                        let row = values[i];
                        if (row !== undefined && row[9] !== undefined) {
                            let rawDateVal = sanitizeString(row[9]);
                            if (rawDateVal !== "") {
                                let cleanDate = formatDateKey(rawDateVal);
                                
                                if (dateSeen[cleanDate] === true) {
                                    duplicateDatesCount++;
                                    if (sampleDuplicate === "") { sampleDuplicate = cleanDate; }
                                } else {
                                    dateSeen[cleanDate] = true;
                                }

                                if (cleanDate.includes('/')) {
                                    let dTime = new Date(cleanDate).getTime();
                                    if (!isNaN(dTime)) {
                                        if (dTime < minTime) { minTime = dTime; minDateStr = cleanDate; }
                                        if (dTime > maxTime) { maxTime = dTime; maxDateStr = cleanDate; }
                                        let dateParts = cleanDate.split('/');
                                        if (dateParts.length >= 2) {
                                            let yM = String(dateParts[0]) + '/' + String(dateParts[1]);
                                            existingMonths[yM] = true;
                                        }
                                    }
                                }
                            }
                        }
                        i++;
                    }

                    if (minDateStr === "" || maxDateStr === "") { 
                        diagScan.innerHTML += `<span class="diag-err">   └─ ❌ 無法解析有效的日期格式。</span><br><br>`; 
                        fIndex++; 
                        continue; 
                    }
                    diagScan.innerHTML += `   └─ 📅 數據範圍：${minDateStr} ~ ${maxDateStr}<br>`;

                    if (duplicateDatesCount > 0) {
                        diagScan.innerHTML += `<span class="diag-err">   └─ ❌ [排錯警報] 發現 ${duplicateDatesCount} 筆假性污染的重複異常！<br>      (例如: ${sampleDuplicate})<br>      💡 請使用第三區重新上傳並點擊同步，系統將自動壓平癒合。</span><br>`;
                    } else {
                        diagScan.innerHTML += `<span class="diag-success">   └─ 🟢 結構良好：無重複日期。</span><br>`;
                    }

                    let minD = new Date(minTime); 
                    let maxD = new Date(maxTime);
                    let startY = minD.getFullYear(); 
                    let startM = minD.getMonth() + 1;
                    let endY = maxD.getFullYear(); 
                    let endM = maxD.getMonth() + 1;

                    let currY = startY; 
                    let currM = startM;
                    let missingMonthsArray = new Array();

                    while (currY < endY || (currY === endY && currM <= endM)) {
                        let stringM = String(currM);
                        let paddedM = stringM;
                        if (stringM.length === 1) { paddedM = '0' + stringM; }
                        let checkYM = String(currY) + '/' + paddedM;
                        
                        if (existingMonths[checkYM] !== true) { 
                            missingMonthsArray.push(checkYM); 
                        }
                        currM++;
                        if (currM > 12) { currM = 1; currY++; }
                    }

                    let missingCount = missingMonthsArray.length;
                    if (missingCount === 0) {
                        diagScan.innerHTML += `<span class="diag-success">   └─ 🟢 月份完整：期間內無遺漏任何月份。</span><br><br>`;
                    } else {
                        let missingReport = "";
                        let m = 0;
                        while (m < missingCount) {
                            missingReport += missingMonthsArray[m];
                            if (m < missingCount - 1) { missingReport += ", "; }
                            m++;
                        }
                        diagScan.innerHTML += `<span class="diag-warn">   └─ ⚠️ [遺漏警報] 缺失 ${missingCount} 個月份：<br>      [ ${missingReport} ]</span><br><br>`;
                    }
                    fIndex++;
                }
                diagScan.innerHTML += `<hr><span class="diag-success">✅ 健康與排錯分析完成。</span><br>`;
            } catch (err) { diagScan.innerHTML += `<span class="diag-err">❌ 掃描失敗: ${err.message}</span>`; }
        }
    </script>
</body>
