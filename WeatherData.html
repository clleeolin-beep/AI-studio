<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>氣候資料智慧工具 V35 (自動對齊版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --blue: #3498db; --danger: #e74c3c; --purple: #8e44ad; }
        body { font-family: "Microsoft JhengHei", sans-serif; line-height: 1.6; max-width: 1000px; margin: 40px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px; border-top: 5px solid var(--primary); }
        .card.cleaner { border-top-color: var(--danger); }
        .card.cloud { border-top-color: var(--purple); }
        h2 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.4em; }
        .desc { color: #7f8c8d; font-size: 0.85em; margin-bottom: 15px; }
        .section { margin-bottom: 15px; padding: 12px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        button { padding: 12px 20px; font-size: 15px; cursor: pointer; color: white; border: none; border-radius: 6px; width: 100%; transition: 0.3s; }
        .btn-merge { background: var(--blue); }
        .btn-clean { background: var(--danger); }
        .btn-cloud { background: var(--purple); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        #status { margin-top: 20px; padding: 15px; border-radius: 6px; background: #2c3e50; color: #ecf0f1; font-size: 0.9em; white-space: pre-line; min-height: 60px; border-left: 5px solid var(--accent); }
    </style>
</head>
<body>

    <div class="card">
        <h2>📂 區塊一：本地彙整 (欄位自動對齊)</h2>
        <p class="desc">支援中途增加觀測項目。系統將自動合併所有欄位，無項目處留白，確保分析不位移。</p>
        <div class="section"><input type="file" id="mergeInput" multiple accept=".csv, .xlsx"></div>
        <button id="mergeBtn" class="btn-merge" disabled>執行彙整並下載 Excel</button>
    </div>

    <div class="card cleaner">
        <h2>🧹 區塊二：10 年滾動清理</h2>
        <p class="desc">基準月份：<span id="baseShow">...</span></p>
        <div class="section"><input type="file" id="cleanInput" accept=".xlsx"></div>
        <button id="cleanBtn" class="btn-clean" disabled>執行清理並下載 Excel</button>
    </div>

    <div class="card cloud">
        <h2>☁️ 區塊三：更新雲端資料庫 (1-AuV...)</h2>
        <div class="section"><input type="file" id="syncInput" accept=".xlsx"></div>
        <button id="syncBtn" class="btn-cloud" disabled>授權並自動更新雲端</button>
    </div>

    <div id="status">系統初始化中...</div>

    <script>
        const CLIENT_ID = '992099032000-u34bqjlpetm2qma995nksbu2ot0rhk6f.apps.googleusercontent.com';
        const CLIMATE_SS_ID = '1-AuVNaVmjnzXP0XqrjjkC8aXVkvn54YTFMYVPadkfXE';
        
        let tokenClient, accessToken = null;
        const status = document.getElementById('status');

        const now = new Date();
        const baseDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
        const cutoffDate = new Date(baseDate.getFullYear() - 10, baseDate.getMonth() + 1, 0, 23, 59, 59);
        document.getElementById('baseShow').innerText = `${baseDate.getFullYear()}-${baseDate.getMonth()+1}`;

        window.onload = () => {
            status.innerText = "✅ 系統就緒。彙整將自動對齊不同時期的觀測項目。";
            if (typeof google !== 'undefined') {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/spreadsheets',
                    callback: (resp) => { accessToken = resp.access_token; startSync(); }
                });
            }
        };

        const cleanVal = (val) => ['/', '-', 'X', '...', 'T'].includes(String(val).trim()) ? '' : val;

        // --- 區塊一：欄位自動對齊彙整 ---
        document.getElementById('mergeInput').onchange = (e) => document.getElementById('mergeBtn').disabled = e.target.files.length === 0;
        document.getElementById('mergeBtn').onclick = async () => {
            const files = Array.from(document.getElementById('mergeInput').files);
            const stationsData = {}; // stn -> [ {date, dataObj} ]
            const stnHeadersEn = {}; // stn -> [ Set of En Headers ]
            const stnEnToCh = {};    // stn -> { EnHeader: ChHeader }
            
            status.innerText = "⏳ 執行欄位對齊分析中...";

            for (const file of files) {
                const results = await new Promise(resolve => {
                    if(file.name.endsWith('.csv')) Papa.parse(file, { skipEmptyLines: true, complete: res => resolve(res.data) });
                    else {
                        const reader = new FileReader();
                        reader.onload = e => {
                            const wb = XLSX.read(e.target.result);
                            resolve(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1}));
                        };
                        reader.readAsArrayBuffer(file);
                    }
                });

                const match = file.name.match(/(\d+)-(\d{4})-(\d{2})/);
                if (!match || results.length < 2) continue;
                const [_, stn, yr, mo] = match;

                if (!stnHeadersEn[stn]) stnHeadersEn[stn] = new Set();
                if (!stnEnToCh[stn]) stnEnToCh[stn] = {};
                if (!stationsData[stn]) stationsData[stn] = [];

                const chHeaderRow = results[0];
                const enHeaderRow = results[1];

                // 建立此測站的欄位對照與聯集
                enHeaderRow.forEach((en, idx) => {
                    stnHeadersEn[stn].add(en);
                    stnEnToCh[stn][en] = chHeaderRow[idx];
                });

                results.slice(2).forEach(row => {
                    if (!row[0] || row[0] === "" || isNaN(row[0])) return;
                    const fullDate = `${yr}/${mo}/${String(row[0]).padStart(2, '0')}`;
                    
                    // 將當前列資料轉為以英文標頭為 Key 的物件
                    const rowObj = {};
                    enHeaderRow.forEach((en, idx) => {
                        rowObj[en] = cleanVal(row[idx]);
                    });
                    rowObj["ObsTime"] = fullDate; // 統一日期格式

                    stationsData[stn].push({ date: fullDate, obj: rowObj });
                });
            }

            const outWb = XLSX.utils.book_new();
            for (const stn in stationsData) {
                // 1. 取得該測站所有出現過的英文標頭，並確保 ObsTime 在第一位
                const allEnHeaders = Array.from(stnHeadersEn[stn]);
                // 2. 排序並去重資料
                const sorted = stationsData[stn].sort((a,b) => a.date.localeCompare(b.date));
                const uniqueDates = new Map();
                sorted.forEach(item => uniqueDates.set(item.date, item.obj));

                // 3. 根據聯集後的標頭，重構每一列資料（無項目處會自動變成 undefined/空值）
                const finalRows = Array.from(uniqueDates.values()).map(rowObj => {
                    return allEnHeaders.map(en => rowObj[en] || "");
                });

                // 4. 準備中英文雙標頭
                const finalChHeader = allEnHeaders.map(en => stnEnToCh[stn][en]);
                const finalEnHeader = allEnHeaders;

                XLSX.utils.book_append_sheet(outWb, XLSX.utils.aoa_to_sheet([finalChHeader, finalEnHeader, ...finalRows]), stn);
            }

            XLSX.writeFile(outWb, `氣候彙整_欄位聯集版.xlsx`);
            status.innerText = "✅ 彙整完成！不同測站/不同時期的欄位已自動對齊並留白。";
        };

        // --- 區塊二：清理邏輯 (保持結構不變) ---
        document.getElementById('cleanInput').onchange = (e) => document.getElementById('cleanBtn').disabled = e.target.files.length === 0;
        document.getElementById('cleanBtn').onclick = async () => {
            const file = document.getElementById('cleanInput').files[0];
            const wb = XLSX.read(await file.arrayBuffer());
            const outWb = XLSX.utils.book_new();
            let summary = "";

            wb.SheetNames.forEach(name => {
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[name], {header: 1});
                if (rows.length <= 2) return;
                const data = rows.slice(2);
                const filtered = data.filter(r => r[0] && new Date(r[0]) > cutoffDate);
                summary += `分頁 [${name}]: 刪除 ${data.length - filtered.length} 筆。\n`;
                XLSX.utils.book_append_sheet(outWb, XLSX.utils.aoa_to_sheet([rows[0], rows[1], ...filtered]), name);
            });
            XLSX.writeFile(outWb, `氣象清理_欄位保留版.xlsx`);
            status.innerText = summary + "✅ 清理下載完成。";
        };

        // --- 區塊三：同步邏輯 ---
        document.getElementById('syncInput').onchange = (e) => document.getElementById('syncBtn').disabled = e.target.files.length === 0;
        document.getElementById('syncBtn').onclick = () => {
            accessToken ? startSync() : tokenClient.requestAccessToken({prompt: 'consent'});
        };

        async function startSync() {
            const file = document.getElementById('syncInput').files[0];
            status.innerText = "🚀 雲端資料庫更新中...";
            try {
                const wb = XLSX.read(await file.arrayBuffer());
                for (const name of wb.SheetNames) {
                    const data = XLSX.utils.sheet_to_json(wb.Sheets[name], {header: 1});
                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CLIMATE_SS_ID}/values/${name}!A1:ZZ10000:clear`, {
                        method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CLIMATE_SS_ID}/values/${name}!A1?valueInputOption=USER_ENTERED`, {
                        method: 'PUT', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ values: data })
                    });
                    status.innerText = `✅ [${name}] 更新成功。`;
                }
                status.innerText = "🎉 雲端所有測站（含差異欄位）同步完成！";
            } catch (err) { status.innerText = `❌ 同步失敗：${err.message}`; }
        }
    </script>
</body>
</html>
