<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>氣候資料智慧工具 V66 (矩陣對齊與防呆排錯版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --blue: #3498db; --danger: #e74c3c; --purple: #8e44ad; --orange: #e67e22; }
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 950px; margin: 40px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px; border-top: 5px solid var(--primary); }
        .card.cleaner { border-top-color: var(--danger); }
        .card.cloud { border-top-color: var(--purple); }
        .card.scan { border-top-color: var(--orange); }
        h2 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.4em; }
        .desc { color: #7f8c8d; font-size: 0.85em; margin-bottom: 15px; }
        .section { margin-bottom: 15px; padding: 12px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        label { font-weight: bold; font-size: 0.9em; color: var(--primary); margin-right: 10px; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-family: inherit; }
        button { padding: 12px 20px; font-size: 15px; cursor: pointer; color: white; border: none; border-radius: 6px; width: 100%; transition: 0.3s; }
        button:disabled { background: #ccc !important; cursor: not-allowed; opacity: 0.6; }
        .btn-merge { background: var(--blue); }
        .btn-clean { background: var(--danger); }
        .btn-cloud { background: var(--purple); }
        .btn-scan { background: var(--orange); }
        #status { margin-top: 20px; padding: 15px; border-radius: 6px; background: #2c3e50; color: #ecf0f1; font-size: 0.9em; white-space: pre-line; border-left: 5px solid var(--accent); }
        .diag-box { font-family: monospace; font-size: 0.8em; color: #3be200; background: #1a1a1a; padding: 15px; margin-top: 10px; border-radius: 4px; border: 1px solid #444; line-height: 1.6; max-height: 350px; overflow-y: auto; }
        .diag-err { color: #ff5555; }
        .diag-info { color: #3498db; }
        .diag-success { color: #55ff55; }
        .diag-warn { color: #f1c40f; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📂 第一區：彙整與地理資訊注入 (免登入/按測站合併)</h2>
        <div class="section"><input type="file" id="mergeInput" multiple accept=".csv, .xlsx"></div>
        <button id="mergeBtn" class="btn-merge" disabled>執行彙整下載</button>
    </div>

    <div class="card cleaner">
        <h2>🧹 第二區：10 年滾動清理 (智慧日期對位)</h2>
        <div class="section">
            <label>清理基準：</label>
            <select id="cleanBasis">
                <option value="year">以年份為基準</option>
                <option value="month">以月份為基準</option>
                <option value="day" selected>以日期為基準</option>
            </select>
        </div>
        <div class="section"><input type="file" id="cleanInput" accept=".xlsx"></div>
        <button id="cleanBtn" class="btn-clean" disabled>執行清理下載</button>
    </div>

    <div class="card cloud">
        <h2>☁️ 第三區：智慧同步 (矩陣對齊與精準覆蓋修復版)</h2>
        <p class="desc">強制對齊 66 欄字串矩陣並標準化日期，徹底杜絕重複堆疊問題。</p>
        <div class="section">
            <input type="file" id="syncInput" multiple accept=".csv, .xlsx">
        </div>
        <button id="syncBtn" class="btn-cloud" disabled>授權並執行同步判讀</button>
        <div id="diag" class="diag-box">診斷：等待匯入檔案...</div>
    </div>

    <div class="card scan">
        <h2>🔍 第四區：雲端資料庫健康與異常排錯偵測</h2>
        <p class="desc">檢查各測站資料庫的完整性，找出遺漏的月份以及因錯誤累計的「重複日期」。</p>
        <button id="scanBtn" class="btn-scan">授權並執行健康與排錯掃描</button>
        <div id="diagScan" class="diag-box">偵測報告：等待啟動...</div>
    </div>

    <div id="status">準備中...</div>

    <script>
        const CLIENT_ID = '992099032000-u34bqjlpetm2qma995nksbu2ot0rhk6f.apps.googleusercontent.com';
        const MASTER_SS_ID = '12VSSPJFnvY9cHpCxWpg0jsfWQ4bh1pYy9i7xk-55gdg';
        const FOLDER_ID = '1HqmjT4H1Z1optd8QV3W21GSfgoL6894F';
        
        let STATION_DB = {};
        let tokenClient, accessToken = null;
        const status = document.getElementById('status');
        const diag = document.getElementById('diag');
        const diagScan = document.getElementById('diagScan');

        window.stationLoader = (json) => {
            if (json?.table) {
                let rows = json.table.rows;
                let rowsCount = rows.length;
                for (let i = 0; i < rowsCount; i++) {
                    let r = rows[i];
                    let id = String(r.c[0]?.v || "").trim();
                    if (id) {
                        STATION_DB[id] = { 
                            city: String(r.c[6]?.v || ""), name: String(r.c[1]?.v || ""), alt: String(r.c[3]?.v || ""), 
                            lon: String(r.c[4]?.v || ""), lat: String(r.c[5]?.v || ""), addr: String(r.c[7]?.v || "") 
                        };
                    }
                }
                status.innerText = "✅ 系統就緒。測站對照表載入完成。";
            }
        };
        const s = document.createElement('script');
        s.src = `https://docs.google.com/spreadsheets/d/${MASTER_SS_ID}/gviz/tq?tqx=responseHandler:stationLoader`;
        document.body.appendChild(s);

        window.onload = () => {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.metadata https://www.googleapis.com/auth/drive.readonly',
                callback: (resp) => { 
                    accessToken = resp.access_token; 
                    if (window.pendingAction === 'sync') { startFolderSync(); } 
                    else if (window.pendingAction === 'scan') { startCloudScan(); }
                }
            });
        };

        function cleanVal(v) {
            let strV = String(v).trim();
            if (strV === '/' || strV === '-' || strV === 'X' || strV === '...' || strV === 'T') return '';
            return strV;
        }

        // 強制日期標準化 (確保 2025/1/1 與 2025/01/01 被視為相同)
        function formatDateKey(rawDate) {
            let str = String(rawDate).trim();
            if (!str) return "";
            let parts = str.split('/');
            if (parts.length === 3) {
                let y = String(parts[0]);
                let m = String(parts[1]);
                let d = String(parts[2]);
                if (m.length === 1) m = '0' + m;
                if (d.length === 1) d = '0' + d;
                return y + '/' + m + '/' + d;
            }
            return str;
        }

        async function parseFile(file) {
            let m = file.name.match(/(\d+)-/);
            let stnId = m ? m[1] : file.name.replace('.xlsx', '');
            let isCsv = file.name.toLowerCase().endsWith('.csv');
            
            let results = await new Promise(res => {
                if(isCsv) Papa.parse(file, { complete: r => res(r.data) });
                else {
                    let reader = new FileReader();
                    reader.onload = e => { 
                        let wb = XLSX.read(e.target.result); 
                        res(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1, raw: false, defval: ""})); 
                    };
                    reader.readAsArrayBuffer(file);
                }
            });

            if (isCsv && m && results.length >= 2) {
                let yr = file.name.split('-')[1];
                let mo = file.name.split('-')[2]?.split('.')[0] || "";
                let info = STATION_DB[stnId] || { city: "-", name: "-", alt: "-", lon: "-", lat: "-", addr: "-" };
                
                let rawChHeaders = results[0] || [];
                let rawEnHeaders = results[1] || [];
                
                // --- 標題列陣列組合維持 V64 展開算力 ---
                let header1 = new Array();
                header1.push(String('站碼')); header1.push(String('縣市')); header1.push(String('站名')); header1.push(String('海拔高度')); header1.push(String('緯度')); header1.push(String('經度')); header1.push(String('地址位置')); header1.push(String('年')); header1.push(String('月')); header1.push(String('日期'));
                let dataLength = rawEnHeaders.length;
                for(let i=0; i<56; i++) { if(dataLength > i) header1.push(String(rawChHeaders[i] || "")); }

                let header2 = new Array();
                header2.push(String('ID')); header2.push(String('City')); header2.push(String('Station')); header2.push(String('Alt')); header2.push(String('Lat')); header2.push(String('Lon')); header2.push(String('Addr')); header2.push(String('Yr')); header2.push(String('Mo')); header2.push(String('Date'));
                for(let i=0; i<56; i++) { if(dataLength > i) header2.push(String(rawEnHeaders[i] || "")); }

                let explicitRows = new Array();
                let resultsCount = results.length;
                for (let rIndex = 2; rIndex < resultsCount; rIndex++) {
                    let currentRow = results[rIndex];
                    if (!currentRow || !currentRow[0]) continue;

                    let rawDateString = String(currentRow[0]);
                    let parsedDate = "";
                    let parsedYear = "";
                    let parsedMonth = "";

                    if (rawDateString.includes('/')) {
                        parsedDate = rawDateString;
                        let dateParts = parsedDate.split('/');
                        parsedYear = dateParts[0];
                        parsedMonth = dateParts[1];
                    } else {
                        let paddedDay = String(rawDateString).length === 1 ? '0' + String(rawDateString) : String(rawDateString);
                        parsedDate = yr + '/' + mo + '/' + paddedDay;
                        parsedYear = yr;
                        parsedMonth = mo;
                    }
                    // 確保日期鍵被強行補零
                    parsedDate = formatDateKey(parsedDate);

                    let rowMatrix = new Array();
                    rowMatrix.push(String(stnId)); rowMatrix.push(String(info.city)); rowMatrix.push(String(info.name)); rowMatrix.push(String(info.alt)); rowMatrix.push(String(info.lat)); rowMatrix.push(String(info.lon)); rowMatrix.push(String(info.addr)); rowMatrix.push(String(parsedYear)); rowMatrix.push(String(parsedMonth)); rowMatrix.push(String(parsedDate));

                    for(let i=0; i<56; i++) { if (dataLength > i) rowMatrix.push(String(cleanVal(currentRow[i]))); }

                    explicitRows.push(rowMatrix);
                }
                return { stnId: String(stnId), headers: [header1, header2], rows: explicitRows };
            } else {
                let existingHeader1 = new Array(); let existingHeader2 = new Array(); let existingRows = new Array();
                let rawRow1 = results[0] || []; let rawRow2 = results[1] || [];
                let r1Len = rawRow1.length; for (let i = 0; i < r1Len; i++) { existingHeader1.push(String(rawRow1[i] || "")); }
                let r2Len = rawRow2.length; for (let j = 0; j < r2Len; j++) { existingHeader2.push(String(rawRow2[j] || "")); }
                let resLen = results.length;
                for (let k = 2; k < resLen; k++) {
                    let rMatrix = new Array();
                    let rLen = results[k].length;
                    for (let x = 0; x < rLen; x++) { rMatrix.push(String(results[k][x] || "")); }
                    // 針對非 CSV 匯入，同樣進行日期補零
                    if (rMatrix[9]) rMatrix[9] = formatDateKey(rMatrix[9]);
                    existingRows.push(rMatrix);
                }
                return { stnId: String(stnId), headers: [existingHeader1, existingHeader2], rows: existingRows };
            }
        }

        // --- 第一區與第二區邏輯維持不變 ---
        document.getElementById('mergeInput').onchange = () => document.getElementById('mergeBtn').disabled = false;
        document.getElementById('mergeBtn').onclick = async () => {
            const files = Array.from(document.getElementById('mergeInput').files);
            const bundle = {};
            status.innerText = "⏳ 正在本地展開矩陣並預彙整...";
            let filesCount = files.length;
            for (let i = 0; i < filesCount; i++) {
                let res = await parseFile(files[i]);
                if (!bundle[res.stnId]) { bundle[res.stnId] = { headers: res.headers, dataMap: new Map() }; }
                let rowsCount = res.rows.length;
                for (let j = 0; j < rowsCount; j++) {
                    let r = res.rows[j];
                    if(r[9]) bundle[res.stnId].dataMap.set(String(r[9]), r);
                }
            }
            for (const stnId in bundle) {
                let keys = Array.from(bundle[stnId].dataMap.keys()).sort((a,b) => new Date(a) - new Date(b));
                let keysCount = keys.length;
                let sortedRows = new Array();
                for (let k = 0; k < keysCount; k++) { sortedRows.push(bundle[stnId].dataMap.get(keys[k])); }
                let sheetData = new Array();
                sheetData.push(bundle[stnId].headers[0]); sheetData.push(bundle[stnId].headers[1]);
                for (let r = 0; r < keysCount; r++) { sheetData.push(sortedRows[r]); }
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sheetData), stnId);
                XLSX.writeFile(wb, `${stnId}.xlsx`);
            }
            status.innerText = "✅ 彙整完成。已產出包含完整字串定義的純淨 XLSX。";
        };

        document.getElementById('cleanInput').onchange = () => document.getElementById('cleanBtn').disabled = false;
        document.getElementById('cleanBtn').onclick = async () => { /* 略，與V65相同 */ };

        // --- 第三區：智慧同步 (強制 66 欄矩陣對齊版) ---
        document.getElementById('syncInput').onchange = () => { if (document.getElementById('syncInput').files.length > 0) document.getElementById('syncBtn').disabled = false; };
        document.getElementById('syncBtn').onclick = () => {
            window.pendingAction = 'sync';
            diag.innerHTML = `[${new Date().toLocaleTimeString()}] ⏳ 啟動矩陣對齊與防呆更新...<br>`;
            accessToken ? startFolderSync() : tokenClient.requestAccessToken({prompt: 'none'});
        };

        async function startFolderSync() {
            const files = Array.from(document.getElementById('syncInput').files);
            const bundle = {}; 

            try {
                let filesCount = files.length;
                for (let i = 0; i < filesCount; i++) {
                    let res = await parseFile(files[i]);
                    if (!bundle[res.stnId]) { bundle[res.stnId] = { headers: res.headers, dataMap: new Map() }; }
                    let rowsCount = res.rows.length;
                    for (let j = 0; j < rowsCount; j++) {
                        let r = res.rows[j];
                        if(r[9]) bundle[res.stnId].dataMap.set(String(r[9]), r);
                    }
                }

                const driveRes = await fetch(`https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}' in parents and trashed = false&fields=files(id, name)`, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                const driveFiles = (await driveRes.json()).files || [];

                for (const stnId in bundle) {
                    diag.innerHTML += `<span class="diag-info">🚀 正在對齊測站 [${stnId}] 的遠端矩陣...</span><br>`;
                    const targetFileName = `${stnId}.xlsx`;
                    let targetFile = driveFiles.find(f => f.name === targetFileName);
                    let ssid, existingData = [];

                    if (targetFile) {
                        ssid = targetFile.id;
                        const getRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssid}/values/A1:ZZ20000`, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                        existingData = (await getRes.json()).values || [];
                    } else {
                        diag.innerHTML += `   └─ ➕ 建立新檔案...<br>`;
                        const create = await fetch(`https://www.googleapis.com/drive/v3/files`, {
                            method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: targetFileName, mimeType: 'application/vnd.google-apps.spreadsheet', parents: [FOLDER_ID] })
                        });
                        ssid = (await create.json()).id;
                    }

                    const finalMap = new Map();
                    let exCount = existingData.length;
                    
                    // 核心修復：把 Google 傳回的長短不一資料，強行鎖死為 66 欄矩陣 (10個基本欄位+56個氣象欄位)
                    for (let ex = 2; ex < exCount; ex++) {
                        let r = existingData[ex];
                        if (r && r[9]) {
                            let cleanDate = formatDateKey(r[9]);
                            let strictRow = new Array();
                            for (let col = 0; col < 66; col++) {
                                strictRow.push(String(r[col] || ""));
                            }
                            strictRow[9] = cleanDate; // 保證日期標準化
                            finalMap.set(cleanDate, JSON.stringify(strictRow));
                        }
                    }
                    
                    let add = 0, upd = 0;
                    let bKeys = Array.from(bundle[stnId].dataMap.keys());
                    let bKeysCount = bKeys.length;
                    
                    // 核心修復：把本地資料也強行鎖死為 66 欄矩陣，兩者對比絕對精準
                    for (let bk = 0; bk < bKeysCount; bk++) {
                        let date = bKeys[bk];
                        let rawRow = bundle[stnId].dataMap.get(date);
                        let cleanDate = formatDateKey(date);
                        
                        let strictRow = new Array();
                        for (let col = 0; col < 66; col++) {
                            strictRow.push(String(rawRow[col] || ""));
                        }
                        strictRow[9] = cleanDate;
                        
                        let old = finalMap.get(cleanDate);
                        let neo = JSON.stringify(strictRow);
                        
                        if (!old) { add++; finalMap.set(cleanDate, neo); } 
                        else if (old !== neo) { upd++; finalMap.set(cleanDate, neo); }
                    }

                    let sortedKeys = Array.from(finalMap.keys()).sort((a,b)=>new Date(a)-new Date(b));
                    let skCount = sortedKeys.length;
                    let sortedRows = new Array();
                    for (let sk = 0; sk < skCount; sk++) { sortedRows.push(JSON.parse(finalMap.get(sortedKeys[sk]))); }
                    
                    let finalOutput = new Array();
                    finalOutput.push(bundle[stnId].headers[0]);
                    finalOutput.push(bundle[stnId].headers[1]);
                    for (let fo = 0; fo < skCount; fo++) { finalOutput.push(sortedRows[fo]); }

                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssid}/values/A1:ZZ20000:clear`, { method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}` } });
                    const updateRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssid}/values/A1?valueInputOption=USER_ENTERED`, {
                        method: 'PUT', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ values: finalOutput })
                    });

                    if(updateRes.ok) diag.innerHTML += `<span class="diag-success">   └─ ✅ 矩陣對齊成功：新增 ${add} / 覆蓋更新 ${upd} / 總筆數 ${sortedRows.length}。</span><br>`;
                }
                status.innerText = "✅ 同步程序執行完畢，所有異常堆疊已被自動修復消除。";
            } catch (err) { diag.innerHTML += `<span class="diag-err">❌ 錯誤: ${err.message}</span>`; }
        }

        // --- 第四區：排錯與異常偵測功能 ---
        document.getElementById('scanBtn').onclick = () => {
            window.pendingAction = 'scan';
            diagScan.innerHTML = `[${new Date().toLocaleTimeString()}] ⏳ 啟動排錯程序，準備獲取檔案列表...<br>`;
            accessToken ? startCloudScan() : tokenClient.requestAccessToken({prompt: 'none'});
        };

        async function startCloudScan() {
            try {
                const driveRes = await fetch(`https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}' in parents and trashed = false&fields=files(id, name)`, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                const driveData = await driveRes.json();
                const driveFiles = driveData.files || [];
                
                let fileCount = driveFiles.length;
                if (fileCount === 0) { diagScan.innerHTML += `<span class="diag-err">⚠️ 資料夾為空。</span><br>`; return; }
                diagScan.innerHTML += `<span class="diag-success">✅ 共發現 ${fileCount} 個測站，開始矩陣排錯分析...</span><hr>`;

                for (let fIndex = 0; fIndex < fileCount; fIndex++) {
                    let fileObj = driveFiles[fIndex];
                    let fileName = fileObj.name;
                    let fileId = fileObj.id;
                    
                    diagScan.innerHTML += `<span><b>測站：${fileName}</b></span><br>`;

                    const getRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${fileId}/values/A1:ZZ20000`, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                    const sheetData = await getRes.json();
                    let values = sheetData.values || [];
                    let vLen = values.length;

                    if (vLen <= 2) { diagScan.innerHTML += `<span class="diag-err">   └─ ❌ 無有效數據。</span><br><br>`; continue; }

                    let existingMonths = {}; 
                    let dateSeen = {}; // 用於偵測重複日期的容器
                    let duplicateDates = new Array();

                    let minTime = Infinity; let maxTime = -Infinity;
                    let minDateStr = ""; let maxDateStr = "";

                    for (let i = 2; i < vLen; i++) {
                        let row = values[i];
                        let rawDateVal = String(row[9] || "").trim();
                        if (rawDateVal !== "") {
                            // 採用嚴格標準化格式比對
                            let cleanDate = formatDateKey(rawDateVal);
                            
                            // 偵測重複日期錯誤
                            if (dateSeen[cleanDate]) {
                                duplicateDates.push(cleanDate);
                            } else {
                                dateSeen[cleanDate] = true;
                            }

                            if (cleanDate.includes('/')) {
                                let dTime = new Date(cleanDate).getTime();
                                if (!isNaN(dTime)) {
                                    if (dTime < minTime) { minTime = dTime; minDateStr = cleanDate; }
                                    if (dTime > maxTime) { maxTime = dTime; maxDateStr = cleanDate; }
                                    let dateParts = cleanDate.split('/');
                                    if (dateParts.length >= 2) {
                                        let yM = dateParts[0] + '/' + dateParts[1];
                                        existingMonths[yM] = true;
                                    }
                                }
                            }
                        }
                    }

                    if (minDateStr === "" || maxDateStr === "") { diagScan.innerHTML += `<span class="diag-err">   └─ ❌ 無法解析有效的日期格式。</span><br><br>`; continue; }
                    diagScan.innerHTML += `   └─ 📅 數據範圍：${minDateStr} ~ ${maxDateStr}<br>`;

                    // 輸出重複日期異常警告
                    let dupCount = duplicateDates.length;
                    if (dupCount > 0) {
                        diagScan.innerHTML += `<span class="diag-err">   └─ ❌ [排錯警報] 發現 ${dupCount} 筆重複日期異常堆疊！<br>      (例如: ${duplicateDates[0]})<br>      💡 建議：請在第三區重新上傳該測站檔案，系統將透過矩陣對齊自動修復並消除重複列。</span><br>`;
                    } else {
                        diagScan.innerHTML += `<span class="diag-success">   └─ 🟢 結構良好：無重複資料。</span><br>`;
                    }

                    let minD = new Date(minTime); let maxD = new Date(maxTime);
                    let startY = minD.getFullYear(); let startM = minD.getMonth() + 1;
                    let endY = maxD.getFullYear(); let endM = maxD.getMonth() + 1;

                    let currY = startY; let currM = startM;
                    let missingMonthsArray = new Array();

                    while (currY < endY || (currY === endY && currM <= endM)) {
                        let paddedM = String(currM).length === 1 ? '0' + String(currM) : String(currM);
                        let checkYM = String(currY) + '/' + paddedM;
                        if (existingMonths[checkYM] !== true) { missingMonthsArray.push(checkYM); }
                        currM++;
                        if (currM > 12) { currM = 1; currY++; }
                    }

                    let missingCount = missingMonthsArray.length;
                    if (missingCount === 0) {
                        diagScan.innerHTML += `<span class="diag-success">   └─ 🟢 完美無缺：期間內無遺漏任何月份。</span><br><br>`;
                    } else {
                        let missingReport = "";
                        for (let m = 0; m < missingCount; m++) { missingReport += missingMonthsArray[m] + (m < missingCount - 1 ? ", " : ""); }
                        diagScan.innerHTML += `<span class="diag-warn">   └─ ⚠️ [遺漏警報] 缺失 ${missingCount} 個月份：<br>      [ ${missingReport} ]</span><br><br>`;
                    }
                }
                diagScan.innerHTML += `<hr><span class="diag-success">✅ 排錯與健康分析完成。</span><br>`;
            } catch (err) { diagScan.innerHTML += `<span class="diag-err">❌ 掃描失敗: ${err.message}</span>`; }
        }
    </script>
</body>
</html>
