<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>氣候資料智慧工具 V27.1 (權限診斷版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --blue: #3498db; --danger: #e74c3c; --purple: #8e44ad; }
        body { font-family: "Microsoft JhengHei", sans-serif; line-height: 1.6; max-width: 1000px; margin: 40px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px; border-top: 5px solid var(--primary); }
        .card.cleaner { border-top-color: var(--danger); }
        .card.cloud { border-top-color: var(--purple); }
        h2 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.4em; }
        .desc { color: #7f8c8d; font-size: 0.85em; margin-bottom: 15px; }
        .section { margin-bottom: 15px; padding: 12px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        button { padding: 12px 20px; font-size: 15px; cursor: pointer; color: white; border: none; border-radius: 6px; width: 100%; transition: 0.3s; }
        .btn-merge { background: var(--blue); }
        .btn-clean { background: var(--danger); }
        .btn-cloud { background: var(--purple); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        #status { margin-top: 20px; padding: 15px; border-radius: 6px; background: #2c3e50; color: #ecf0f1; font-size: 0.9em; white-space: pre-line; min-height: 60px; border-left: 5px solid var(--accent); }
    </style>
</head>
<body>

    <div class="card">
        <h2>📂 區塊一：本地彙整與地理補全</h2>
        <div class="section"><input type="file" id="mergeInput" multiple accept=".csv, .xlsx"></div>
        <button id="mergeBtn" class="btn-merge" disabled>執行彙整並下載 Excel</button>
    </div>

    <div class="card cleaner">
        <h2>🧹 區塊二：動態 10 年清理</h2>
        <p class="desc">基準月份：<span id="baseShow">...</span></p>
        <div class="section"><input type="file" id="cleanInput" accept=".xlsx"></div>
        <button id="cleanBtn" class="btn-clean" disabled>執行清理並下載 Excel</button>
    </div>

    <div class="card cloud">
        <h2>☁️ 區塊三：同步雲端資料庫 (1-AuV...)</h2>
        <p class="desc">直接更新 Google Sheets 氣候資料庫分頁</p>
        <div class="section"><input type="file" id="syncInput" accept=".xlsx"></div>
        <button id="syncBtn" class="btn-cloud" disabled>授權並開始自動更新</button>
    </div>

    <div id="status">正在同步雲端測站庫 (gviz)...</div>

    <script>
        const CLIENT_ID = '992099032000-u34bqjlpetm2qma995nksbu2ot0rhk6f.apps.googleusercontent.com';
        const MASTER_SS_ID = '12VSSPJFnvY9cHpCxWpg0jsfWQ4bh1pYy9i7xk-55gdg';
        const CLIMATE_SS_ID = '1-AuVNaVmjnzXP0XqrjjkC8aXVkvn54YTFMYVPadkfXE';
        
        let STATION_DB = {};
        let tokenClient;
        let accessToken = null;
        const status = document.getElementById('status');

        // 時間計算
        const now = new Date();
        const baseDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
        const baseMonthStr = `${baseDate.getFullYear()}-${(baseDate.getMonth() + 1).toString().padStart(2, '0')}`;
        const cutoffDate = new Date(baseDate.getFullYear() - 10, baseDate.getMonth() + 1, 0, 23, 59, 59);
        document.getElementById('baseShow').innerText = baseMonthStr;

        // 1. 初始化讀取測站清單
        window.stationLoader = (json) => {
            if (json && json.table) {
                json.table.rows.forEach(r => {
                    const id = r.c[0]?.v || "";
                    if (id) STATION_DB[id] = { name: r.c[1]?.v || "", alt: r.c[3]?.v || "", lon: r.c[4]?.v || "", lat: r.c[5]?.v || "", city: r.c[6]?.v || "", addr: r.c[7]?.v || "" };
                });
                status.innerText = "✅ 雲端對照表載入成功。\n請選擇檔案執行本地彙整或雲端同步。";
            }
        };
        const s = document.createElement('script');
        s.src = `https://docs.google.com/spreadsheets/d/${MASTER_SS_ID}/gviz/tq?tqx=responseHandler:stationLoader`;
        document.body.appendChild(s);

        // 2. 初始化 OAuth 授權
        window.onload = () => {
            if (typeof google !== 'undefined') {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/spreadsheets',
                    callback: (resp) => {
                        if (resp.error) {
                            status.innerText = `❌ 授權失敗: ${resp.error}\n原因: ${resp.error_description || '未知'}`;
                            return;
                        }
                        accessToken = resp.access_token;
                        startSync();
                    }
                });
            }
        };

        const cleanVal = (val) => ['/', '-', 'X', '...', 'T'].includes(String(val).trim()) ? '' : val;

        // 區塊一：彙整 (省略內容同前版)
        document.getElementById('mergeInput').onchange = (e) => document.getElementById('mergeBtn').disabled = false;
        document.getElementById('mergeBtn').onclick = async () => { /* 彙整邏輯 */ };

        // 區塊二：清理 (省略內容同前版)
        document.getElementById('cleanInput').onchange = (e) => document.getElementById('cleanBtn').disabled = false;
        document.getElementById('cleanBtn').onclick = async () => { /* 清理邏輯 */ };

        // 3. 雲端同步核心 (診斷增強版)
        document.getElementById('syncInput').onchange = (e) => document.getElementById('syncBtn').disabled = false;
        document.getElementById('syncBtn').onclick = () => {
            if (location.protocol === 'file:') {
                status.innerText = "❌ 偵測到本地執行 (file://)\nGoogle OAuth 僅支援 GitHub Pages (https://) 環境。";
                return;
            }
            tokenClient.requestAccessToken({prompt: 'consent'});
        };

        async function startSync() {
            const file = document.getElementById('syncInput').files[0];
            status.innerText = `🚀 正在連線至 Google Sheets API...`;
            try {
                const wb = XLSX.read(await file.arrayBuffer());
                
                // 測試連線與讀取權限
                const metaRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CLIMATE_SS_ID}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const ssMetadata = await metaRes.json();
                if (ssMetadata.error) {
                    throw new Error(`無法存取試算表: ${ssMetadata.error.message}`);
                }

                const existingSheets = ssMetadata.sheets.map(s => s.properties.title);

                for (const name of wb.SheetNames) {
                    status.innerText = `⏳ 正在處理測站 [${name}]...`;
                    
                    if (!existingSheets.includes(name)) {
                        status.innerText = `➕ 建立新分頁: ${name}`;
                        const addRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CLIMATE_SS_ID}:batchUpdate`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ requests: [{ addSheet: { properties: { title: name } } }] })
                        });
                        if (!addRes.ok) throw new Error(`無法建立分頁 ${name}`);
                    }
                    
                    const data = XLSX.utils.sheet_to_json(wb.Sheets[name], {header: 1});
                    
                    // 清空 A1:ZZ5000
                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CLIMATE_SS_ID}/values/${name}!A1:ZZ5000:clear`, {
                        method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}` }
                    });

                    // 寫入資料
                    const putRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CLIMATE_SS_ID}/values/${name}!A1?valueInputOption=USER_ENTERED`, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ values: data })
                    });

                    if (!putRes.ok) throw new Error(`[${name}] 寫入失敗，請確認是否具備編輯權限。`);
                }
                status.innerText = "🎉 雲端更新成功！\n所有測站資料已更新至最新狀態。";
            } catch (err) {
                status.innerText = `❌ 同步中斷：${err.message}\n💡 提示：請確認您的 Google 帳號擁有該表單的「編輯者」權限。`;
                console.error(err);
            }
        }
    </script>
</body>
</html>
