<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>氣候資料智慧工具 V37 (兼容舊檔版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --blue: #3498db; --danger: #e74c3c; --purple: #8e44ad; }
        body { font-family: "Microsoft JhengHei", sans-serif; line-height: 1.6; max-width: 1000px; margin: 40px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px; border-top: 5px solid var(--primary); }
        .card.cleaner { border-top-color: var(--danger); }
        .card.cloud { border-top-color: var(--purple); }
        h2 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.4em; }
        .desc { color: #7f8c8d; font-size: 0.85em; margin-bottom: 15px; }
        .section { margin-bottom: 15px; padding: 12px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        button { padding: 12px 20px; font-size: 15px; cursor: pointer; color: white; border: none; border-radius: 6px; width: 100%; transition: 0.3s; }
        .btn-merge { background: var(--blue); }
        .btn-clean { background: var(--danger); }
        .btn-cloud { background: var(--purple); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        #status { margin-top: 20px; padding: 15px; border-radius: 6px; background: #2c3e50; color: #ecf0f1; font-size: 0.9em; white-space: pre-line; min-height: 60px; border-left: 5px solid var(--accent); }
    </style>
</head>
<body>

    <div class="card">
        <h2>📂 區塊一：本地彙整 (相容舊 XLSX)</h2>
        <p class="desc">支援同時上傳 CSV 與舊彙整檔。自動解析地理標頭，確保新舊資料合併不偏移。</p>
        <div class="section"><input type="file" id="mergeInput" multiple accept=".csv, .xlsx"></div>
        <button id="mergeBtn" class="btn-merge" disabled>執行彙整並下載 Excel</button>
    </div>

    <div class="card cleaner">
        <h2>🧹 區塊二：10 年滾動清理</h2>
        <div class="section"><input type="file" id="cleanInput" accept=".xlsx"></div>
        <button id="cleanBtn" class="btn-clean" disabled>執行清理並下載 Excel</button>
    </div>

    <div class="card cloud">
        <h2>☁️ 區塊三：更新雲端資料庫 (1-AuV...)</h2>
        <div class="section"><input type="file" id="syncInput" accept=".xlsx"></div>
        <button id="syncBtn" class="btn-cloud" disabled>授權並自動更新雲端</button>
    </div>

    <div id="status">正在載入系統...</div>

    <script>
        const CLIENT_ID = '992099032000-u34bqjlpetm2qma995nksbu2ot0rhk6f.apps.googleusercontent.com';
        const MASTER_SS_ID = '12VSSPJFnvY9cHpCxWpg0jsfWQ4bh1pYy9i7xk-55gdg';
        const CLIMATE_SS_ID = '1-AuVNaVmjnzXP0XqrjjkC8aXVkvn54YTFMYVPadkfXE';
        
        let STATION_DB = {};
        let tokenClient, accessToken = null;
        const status = document.getElementById('status');

        const now = new Date();
        const baseDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
        const cutoffDate = new Date(baseDate.getFullYear() - 10, baseDate.getMonth() + 1, 0, 23, 59, 59);
        document.getElementById('status').innerText = "✅ 系統就緒。";

        window.stationLoader = (json) => {
            if (json && json.table) {
                json.table.rows.forEach(r => {
                    const id = String(r.c[0]?.v || "").trim();
                    if (id) STATION_DB[id] = { name: r.c[1]?.v || "", alt: r.c[3]?.v || "", lon: r.c[4]?.v || "", lat: r.c[5]?.v || "", city: r.c[6]?.v || "", addr: r.c[7]?.v || "" };
                });
                status.innerText = "✅ 雲端對照表載入成功。可讀取新舊資料。";
            }
        };
        const s = document.createElement('script');
        s.src = `https://docs.google.com/spreadsheets/d/${MASTER_SS_ID}/gviz/tq?tqx=responseHandler:stationLoader`;
        document.body.appendChild(s);

        window.onload = () => {
            if (typeof google !== 'undefined') {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: 'https://www.googleapis.com/auth/spreadsheets',
                    callback: (resp) => { accessToken = resp.access_token; startSync(); }
                });
            }
        };

        const cleanVal = (val) => ['/', '-', 'X', '...', 'T'].includes(String(val).trim()) ? '' : val;

        // --- 區塊一：修正後的兼容彙整邏輯 ---
        document.getElementById('mergeInput').onchange = (e) => document.getElementById('mergeBtn').disabled = e.target.files.length === 0;
        document.getElementById('mergeBtn').onclick = async () => {
            const files = Array.from(document.getElementById('mergeInput').files);
            const stationsData = {}; 
            const stnHeadersEn = {}; 
            const stnEnToCh = {};    
            
            status.innerText = "⏳ 正在解析新舊資料併進行聯集對位...";

            for (const file of files) {
                if (file.name.endsWith('.csv')) {
                    const csvData = await new Promise(res => Papa.parse(file, { skipEmptyLines: true, complete: r => res(r.data) }));
                    const match = file.name.match(/(\d+)-(\d{4})-(\d{2})/);
                    if (!match || csvData.length < 2) continue;
                    const [_, stn, yr, mo] = match;

                    processRawData(stn, yr, mo, csvData[0], csvData[1], csvData.slice(2), stationsData, stnHeadersEn, stnEnToCh);
                } else if (file.name.endsWith('.xlsx')) {
                    const wb = XLSX.read(await file.arrayBuffer());
                    wb.SheetNames.forEach(stn => {
                        const rows = XLSX.utils.sheet_to_json(wb.Sheets[stn], {header: 1});
                        if (rows.length < 2) return;
                        
                        // 判斷是否為「地理補全版」(前 10 欄為元數據)
                        const isMetaVersion = rows[0][0] === "站碼" || rows[1][0] === "StationID";
                        const dataStartIdx = isMetaVersion ? 10 : 0;
                        
                        const chHeader = rows[0].slice(dataStartIdx);
                        const enHeader = rows[1].slice(dataStartIdx);
                        const dataRows = rows.slice(2);

                        dataRows.forEach(row => {
                            const obsTime = row[dataStartIdx]; // 原始日期
                            if (!obsTime) return;
                            const dMatch = String(obsTime).match(/(\d{4})\/(\d{2})/);
                            const yr = dMatch ? dMatch[1] : "";
                            const mo = dMatch ? dMatch[2] : "";
                            
                            processRawData(stn, yr, mo, chHeader, enHeader, [row.slice(dataStartIdx)], stationsData, stnHeadersEn, stnEnToCh);
                        });
                    });
                }
            }

            // 輸出 Excel 邏輯 (同 V36，略)
            const outWb = XLSX.utils.book_new();
            const prefixCh = ['站碼', '縣市', '站名', '海拔高度', '緯度', '經度', '地址位置', '年', '月', '日期'];
            const prefixEn = ['StationID', 'City', 'StationName', 'Altitude', 'Latitude', 'Longitude', 'Address', 'Year', 'Month', 'Date'];

            for (const stn in stationsData) {
                const info = STATION_DB[stn] || { name: "未知", city: "未知", alt: "-", lon: "-", lat: "-", addr: "-" };
                const allEnHeaders = Array.from(stnHeadersEn[stn]);
                const sorted = stationsData[stn].sort((a,b) => a.date.localeCompare(b.date));
                const uniqueDates = new Map();
                sorted.forEach(item => uniqueDates.set(item.date, item));

                const finalRows = Array.from(uniqueDates.values()).map(item => {
                    const meta = [stn, info.city, info.name, info.alt, info.lat, info.lon, info.addr, item.yr, item.mo, item.date];
                    const obs = allEnHeaders.map(en => item.obj[en] || "");
                    return [...meta, ...obs];
                });
                XLSX.utils.book_append_sheet(outWb, XLSX.utils.aoa_to_sheet([[...prefixCh, ...allEnHeaders.map(en => stnEnToCh[stn][en])], [...prefixEn, ...allEnHeaders], ...finalRows]), stn);
            }
            XLSX.writeFile(outWb, `氣候地理彙整_聯集修復版.xlsx`);
            status.innerText = "✅ 彙整完成！已成功判讀舊彙整檔並合併新資料。";
        };

        function processRawData(stn, yr, mo, chHeader, enHeader, dataRows, stationsData, stnHeadersEn, stnEnToCh) {
            if (!stnHeadersEn[stn]) stnHeadersEn[stn] = new Set();
            if (!stnEnToCh[stn]) stnEnToCh[stn] = {};
            if (!stationsData[stn]) stationsData[stn] = [];

            enHeader.forEach((en, idx) => {
                if(!en) return;
                stnHeadersEn[stn].add(en);
                stnEnToCh[stn][en] = chHeader[idx];
            });

            dataRows.forEach(row => {
                const dayRaw = row[0];
                if (dayRaw === undefined || dayRaw === "") return;
                const fullDate = String(dayRaw).includes('/') ? dayRaw : `${yr}/${mo}/${String(dayRaw).padStart(2, '0')}`;
                const obsObj = {};
                enHeader.forEach((en, idx) => { obsObj[en] = cleanVal(row[idx]); });
                obsObj["ObsTime"] = fullDate;
                stationsData[stn].push({ date: fullDate, yr: fullDate.split('/')[0], mo: fullDate.split('/')[1], obj: obsObj });
            });
        }

        // 區塊二、三邏輯不變...
        document.getElementById('cleanBtn').onclick = async () => {
            const wb = XLSX.read(await document.getElementById('cleanInput').files[0].arrayBuffer());
            const outWb = XLSX.utils.book_new();
            wb.SheetNames.forEach(name => {
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[name], {header: 1});
                if (rows.length <= 2) return;
                const filtered = rows.slice(2).filter(r => r[9] && new Date(r[9]) > cutoffDate);
                XLSX.utils.book_append_sheet(outWb, XLSX.utils.aoa_to_sheet([rows[0], rows[1], ...filtered]), name);
            });
            XLSX.writeFile(outWb, `清理完成.xlsx`);
            status.innerText = "✅ 清理下載完成。";
        };

        document.getElementById('syncBtn').onclick = () => { accessToken ? startSync() : tokenClient.requestAccessToken({prompt: 'consent'}); };
        async function startSync() {
            const file = document.getElementById('syncInput').files[0];
            const wb = XLSX.read(await file.arrayBuffer());
            for (const name of wb.SheetNames) {
                const data = XLSX.utils.sheet_to_json(wb.Sheets[name], {header: 1});
                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CLIMATE_SS_ID}/values/${name}!A1:ZZ10000:clear`, { method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}` } });
                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CLIMATE_SS_ID}/values/${name}!A1?valueInputOption=USER_ENTERED`, { method: 'PUT', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ values: data }) });
            }
            status.innerText = "🎉 雲端更新成功！";
        }
    </script>
</body>
</html>
