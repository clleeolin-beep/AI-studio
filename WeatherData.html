<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>氣候資料智慧工具 V47 (路徑強制版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --blue: #3498db; --danger: #e74c3c; --purple: #8e44ad; }
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 950px; margin: 40px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px; border-top: 5px solid var(--primary); }
        .card.cloud { border-top-color: var(--purple); }
        h2 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.4em; }
        .section { margin-bottom: 15px; padding: 12px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        button { padding: 12px 20px; font-size: 15px; cursor: pointer; color: white; border: none; border-radius: 6px; width: 100%; transition: 0.3s; }
        .btn-merge { background: var(--blue); }
        .btn-cloud { background: var(--purple); }
        #status { margin-top: 20px; padding: 15px; border-radius: 6px; background: #2c3e50; color: #ecf0f1; font-size: 0.9em; white-space: pre-line; border-left: 5px solid var(--accent); }
        .diag-box { font-family: monospace; font-size: 0.85em; color: #f1c40f; background: #000; padding: 15px; margin-top: 10px; border-radius: 4px; line-height: 1.5; }
        .link-btn { color: #3498db; text-decoration: underline; cursor: pointer; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📂 區塊一：本地彙整</h2>
        <div class="section"><input type="file" id="mergeInput" multiple accept=".csv, .xlsx"></div>
        <button id="mergeBtn" class="btn-merge" disabled>執行彙整下載</button>
    </div>

    <div class="card cloud">
        <h2>☁️ 區塊三：雲端自動同步 (強制歸位版)</h2>
        <p style="font-size:0.85em; color:#666;">目標: 1HqmjT4H1Z1optd8QV3W21GSfgoL6894F</p>
        <div class="section">
            <input type="file" id="syncInput" multiple accept=".xlsx">
        </div>
        <button id="syncBtn" class="btn-cloud">授權並執行強制同步</button>
        <div id="diag" class="diag-box">診斷日誌：等待執行...</div>
    </div>

    <div id="status">準備就緒</div>

    <script>
        const CLIENT_ID = '992099032000-u34bqjlpetm2qma995nksbu2ot0rhk6f.apps.googleusercontent.com';
        const FOLDER_ID = '1HqmjT4H1Z1optd8QV3W21GSfgoL6894F';
        let tokenClient, accessToken = null;

        window.onload = () => {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.metadata',
                callback: (resp) => { accessToken = resp.access_token; startFinalSync(); }
            });
        };

        document.getElementById('syncBtn').onclick = () => {
            if (!document.getElementById('syncInput').files.length) return alert("請選取檔案");
            accessToken ? startFinalSync() : tokenClient.requestAccessToken({prompt: 'consent'});
        };

        async function startFinalSync() {
            const files = Array.from(document.getElementById('syncInput').files);
            const diag = document.getElementById('diag');
            diag.innerHTML = "--- 啟動強制歸位同步 ---\n";

            try {
                // 1. 檢查資料夾權限
                const folderRes = await fetch(`https://www.googleapis.com/drive/v3/files/${FOLDER_ID}?fields=name,owners`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const folderMeta = await folderRes.json();
                diag.innerHTML += `📁 資料夾: ${folderMeta.name} (擁有者: ${folderMeta.owners[0].emailAddress})\n`;

                for (const file of files) {
                    const stnId = file.name.replace('.xlsx', '');
                    diag.innerHTML += `\n[${stnId}] 正在掃描...`;

                    // 2. 尋找檔案 (不限於資料夾，找全域，以防它被建在外面)
                    const searchRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=name contains '${stnId}' and mimeType='application/vnd.google-apps.spreadsheet' and trashed=false&fields=files(id, name, parents)`, {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                    const searchData = await searchRes.json();
                    let targetFile = searchData.files[0];
                    let ssid = targetFile?.id;

                    if (!ssid) {
                        diag.innerHTML += `\n -> 雲端無此檔，建立新檔並搬移至目標資料夾...`;
                        const createRes = await fetch(`https://www.googleapis.com/drive/v3/files`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                name: `${stnId}.xlsx`,
                                mimeType: 'application/vnd.google-apps.spreadsheet',
                                parents: [FOLDER_ID]
                            })
                        });
                        const newFile = await createRes.json();
                        ssid = newFile.id;
                    } else {
                        diag.innerHTML += `\n -> 找到現有檔案 (ID: ${ssid})`;
                        // 檢查是否在正確資料夾，若不在則搬移
                        if (!targetFile.parents || !targetFile.parents.includes(FOLDER_ID)) {
                            diag.innerHTML += `\n -> 位置不正確，執行強制搬移...`;
                            await fetch(`https://www.googleapis.com/drive/v3/files/${ssid}?addParents=${FOLDER_ID}&removeParents=${targetFile.parents?.join(',')}`, {
                                method: 'PATCH', headers: { 'Authorization': `Bearer ${accessToken}` }
                            });
                        }
                    }

                    // 3. 更新資料
                    const wb = XLSX.read(await file.arrayBuffer());
                    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1, defval: ""});
                    
                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssid}/values/A1:ZZ20000:clear`, { method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}` } });
                    const putRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssid}/values/A1?valueInputOption=USER_ENTERED`, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ values: data })
                    });

                    if (putRes.ok) {
                        diag.innerHTML += `\n ✅ 更新成功！ <a class="link-btn" href="https://docs.google.com/spreadsheets/d/${ssid}" target="_blank">點此開啟測站表單確認內容</a>`;
                    }
                }
            } catch (err) {
                diag.innerHTML += `\n ❌ 發生錯誤: ${err.message}`;
            }
        }
        
        // 彙整邏輯 (同 V46，確保檔名簡約)
        document.getElementById('mergeBtn').onclick = async () => { /* ... */ };
    </script>
</body>
</html>
