<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>氣候資料智慧工具 V56 (反應強化穩定版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --blue: #3498db; --danger: #e74c3c; --purple: #8e44ad; }
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 950px; margin: 40px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px; border-top: 5px solid var(--primary); }
        .card.cleaner { border-top-color: var(--danger); }
        .card.cloud { border-top-color: var(--purple); }
        h2 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.4em; }
        .desc { color: #7f8c8d; font-size: 0.85em; margin-bottom: 15px; }
        .section { margin-bottom: 15px; padding: 12px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        label { font-weight: bold; font-size: 0.9em; color: var(--primary); margin-right: 10px; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-family: inherit; }
        button { padding: 12px 20px; font-size: 15px; cursor: pointer; color: white; border: none; border-radius: 6px; width: 100%; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .btn-merge { background: var(--blue); }
        .btn-clean { background: var(--danger); }
        .btn-cloud { background: var(--purple); }
        #status { margin-top: 20px; padding: 15px; border-radius: 6px; background: #2c3e50; color: #ecf0f1; font-size: 0.9em; white-space: pre-line; border-left: 5px solid var(--accent); }
        .diag-box { font-family: monospace; font-size: 0.8em; color: #3be200; background: #1a1a1a; padding: 15px; margin-top: 10px; border-radius: 4px; border: 1px solid #444; line-height: 1.6; max-height: 250px; overflow-y: auto; }
        .diag-err { color: #ff5555; }
        .diag-info { color: #3498db; }
        .diag-success { color: #55ff55; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📂 第一區：彙整與地理資訊注入 (免登入/離線版)</h2>
        <div class="section"><input type="file" id="mergeInput" multiple accept=".csv, .xlsx"></div>
        <button id="mergeBtn" class="btn-merge" disabled>執行彙整下載</button>
    </div>

    <div class="card cleaner">
        <h2>🧹 第二區：10 年滾動清理 (智慧日期對位)</h2>
        <div class="section">
            <label>清理基準：</label>
            <select id="cleanBasis">
                <option value="year">以年份為基準</option>
                <option value="month">以月份為基準</option>
                <option value="day" selected>以日期為基準</option>
            </select>
        </div>
        <div class="section"><input type="file" id="cleanInput" accept=".xlsx"></div>
        <button id="cleanBtn" class="btn-clean" disabled>執行清理下載</button>
    </div>

    <div class="card cloud">
        <h2>☁️ 第三區：智慧同步 (反應與異動即時分析)</h2>
        <p class="desc">自動合併：相同日期若內容變動則覆蓋，新日期則補入。</p>
        <div class="section">
            <input type="file" id="syncInput" multiple accept=".csv, .xlsx">
        </div>
        <button id="syncBtn" class="btn-cloud">授權並執行雲端同步</button>
        <div id="diag" class="diag-box">診斷：等待點擊同步...</div>
    </div>

    <div id="status">準備中...</div>

    <script>
        const CLIENT_ID = '992099032000-u34bqjlpetm2qma995nksbu2ot0rhk6f.apps.googleusercontent.com';
        const MASTER_SS_ID = '12VSSPJFnvY9cHpCxWpg0jsfWQ4bh1pYy9i7xk-55gdg';
        const FOLDER_ID = '1HqmjT4H1Z1optd8QV3W21GSfgoL6894F';
        
        let STATION_DB = {};
        let tokenClient, accessToken = null;
        const status = document.getElementById('status');
        const diag = document.getElementById('diag');

        window.stationLoader = (json) => {
            if (json?.table) {
                json.table.rows.forEach(r => {
                    const id = String(r.c[0]?.v || "").trim();
                    if (id) STATION_DB[id] = { city: r.c[6]?.v || "", name: r.c[1]?.v || "", alt: r.c[3]?.v || "", lon: r.c[4]?.v || "", lat: r.c[5]?.v || "", addr: r.c[7]?.v || "" };
                });
                status.innerText = "✅ 系統就緒。測站對照表載入完成。";
            }
        };
        const s = document.createElement('script');
        s.src = `https://docs.google.com/spreadsheets/d/${MASTER_SS_ID}/gviz/tq?tqx=responseHandler:stationLoader`;
        document.body.appendChild(s);

        window.onload = () => {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.metadata https://www.googleapis.com/auth/drive.readonly',
                callback: (resp) => { accessToken = resp.access_token; startFolderSync(); }
            });
        };

        const cleanVal = (v) => ['/', '-', 'X', '...', 'T'].includes(String(v).trim()) ? '' : v;

        async function processRawToStandard(file) {
            const m = file.name.match(/(\d+)-/);
            if (!m) return null;
            const stnId = m[1];
            const yr = file.name.split('-')[1];
            const mo = file.name.split('-')[2]?.split('.')[0] || "";
            const results = await new Promise(res => { 
                if(file.name.endsWith('.csv')) Papa.parse(file, { complete: r => res(r.data) });
                else {
                    const reader = new FileReader();
                    reader.onload = e => { const wb = XLSX.read(e.target.result); res(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1})); };
                    reader.readAsArrayBuffer(file);
                }
            });
            if (results.length < 2) return null;
            const info = STATION_DB[stnId] || { city: "-", name: "-", alt: "-", lon: "-", lat: "-", addr: "-" };
            const enHeaders = results[1].filter(h => h);
            const chHeaders = results[0].slice(0, enHeaders.length);
            const rows = results.slice(2).filter(r => r[0]).map(row => {
                const dRaw = row[0];
                const date = String(dRaw).includes('/') ? dRaw : `${yr}/${mo}/${String(dRaw).padStart(2, '0')}`;
                return [stnId, info.city, info.name, info.alt, info.lat, info.lon, info.addr, date.split('/')[0], date.split('/')[1], date, ...enHeaders.map((_, i) => cleanVal(row[i]))];
            });
            return { stnId: stnId, data: [['站碼', '縣市', '站名', '海拔高度', '緯度', '經度', '地址位置', '年', '月', '日期', ...chHeaders], ['ID', 'City', 'Station', 'Alt', 'Lat', 'Lon', 'Addr', 'Yr', 'Mo', 'Date', ...enHeaders], ...rows] };
        }

        document.getElementById('mergeInput').onchange = () => document.getElementById('mergeBtn').disabled = false;
        document.getElementById('mergeBtn').onclick = async () => {
            const files = Array.from(document.getElementById('mergeInput').files);
            for (const file of files) {
                const result = await processRawToStandard(file);
                if (result) {
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(result.data), result.stnId);
                    XLSX.writeFile(wb, `${result.stnId}.xlsx`);
                }
            }
        };

        document.getElementById('cleanInput').onchange = () => document.getElementById('cleanBtn').disabled = false;
        document.getElementById('cleanBtn').onclick = async () => {
            const basis = document.getElementById('cleanBasis').value;
            const now = new Date();
            let dynamicCutoff = (basis === 'year') ? new Date(now.getFullYear()-10, 0, 1) : (basis === 'month') ? new Date(now.getFullYear(), now.getMonth()-120, 1) : new Date(now.getFullYear()-10, now.getMonth(), now.getDate());
            const wb = XLSX.read(await document.getElementById('cleanInput').files[0].arrayBuffer());
            const outWb = XLSX.utils.book_new();
            wb.SheetNames.forEach(name => {
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[name], {header: 1});
                const idx = rows[0][0] === "站碼" ? 9 : 0;
                const filtered = rows.slice(2).filter(r => new Date(r[idx]) >= dynamicCutoff);
                XLSX.utils.book_append_sheet(outWb, XLSX.utils.aoa_to_sheet([rows[0], rows[1], ...filtered]), name);
            });
            XLSX.writeFile(outWb, `清理報告_${new Date().getTime()}.xlsx`);
        };

        // 第三區：智慧同步 (強化反應監測)
        document.getElementById('syncBtn').onclick = () => {
            if (!document.getElementById('syncInput').files.length) return alert("請先選擇檔案");
            // 強制重置診斷區
            diag.innerHTML = `[${new Date().toLocaleTimeString()}] ⏳ 正在聯繫 Google API，請稍候...<br>`;
            status.innerText = "⏳ 授權處理中...";
            accessToken ? startFolderSync() : tokenClient.requestAccessToken({prompt: 'consent'});
        };

        async function startFolderSync() {
            const syncFiles = Array.from(document.getElementById('syncInput').files);
            diag.innerHTML += `[${new Date().toLocaleTimeString()}] 🚀 授權成功，啟動分析程序...<br>`;
            
            try {
                // 增加 Cache-Control 防止讀取到舊的 Drive 清單
                const driveRes = await fetch(`https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}' in parents and trashed = false&fields=files(id, name)&t=${new Date().getTime()}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const driveData = await driveRes.json();
                const driveFiles = driveData.files || [];

                for (const file of syncFiles) {
                    let stnId, processedData = [];
                    diag.innerHTML += `<span class="diag-info">📄 處理檔案: ${file.name}...</span><br>`;

                    if (file.name.toLowerCase().endsWith('.csv')) {
                        const result = await processRawToStandard(file);
                        if (!result) { diag.innerHTML += `<span class="diag-err">❌ 無法辨識測站 ID: ${file.name}</span><br>`; continue; }
                        stnId = result.stnId; processedData = result.data;
                    } else {
                        stnId = file.name.replace('.xlsx', '');
                        const wb = XLSX.read(await file.arrayBuffer());
                        processedData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1, defval: ""});
                    }

                    const targetFileName = `${stnId}.xlsx`;
                    let targetFile = driveFiles.find(f => f.name === targetFileName);
                    let ssid, existingData = [];

                    if (targetFile) {
                        ssid = targetFile.id;
                        const getRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssid}/values/A1:ZZ20000`, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                        existingData = (await getRes.json()).values || [];
                    } else {
                        diag.innerHTML += `➕ 雲端尚無此站，正在建立新檔案 [${targetFileName}]...<br>`;
                        const create = await fetch(`https://www.googleapis.com/drive/v3/files`, {
                            method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: targetFileName, mimeType: 'application/vnd.google-apps.spreadsheet', parents: [FOLDER_ID] })
                        });
                        ssid = (await create.json()).id;
                    }

                    // --- 比對邏輯 ---
                    const dataMap = new Map();
                    let addCount = 0; let updateCount = 0; let sameCount = 0;

                    existingData.slice(2).forEach(row => { if (row[9]) dataMap.set(row[9], JSON.stringify(row)); });

                    processedData.slice(2).forEach(row => {
                        const dateKey = row[9];
                        if (!dateKey) return;
                        const oldRowJson = dataMap.get(dateKey);
                        const newRowJson = JSON.stringify(row);

                        if (!oldRowJson) { addCount++; dataMap.set(dateKey, newRowJson); }
                        else if (oldRowJson !== newRowJson) { updateCount++; dataMap.set(dateKey, newRowJson); }
                        else { sameCount++; }
                    });

                    const sortedRows = Array.from(dataMap.keys()).sort((a,b)=>new Date(a)-new Date(b)).map(k => JSON.parse(dataMap.get(k)));
                    const finalOutput = [processedData[0] || [], processedData[1] || [], ...sortedRows];

                    if (addCount > 0 || updateCount > 0) {
                        await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssid}/values/A1:ZZ20000:clear`, { method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}` } });
                        const updateRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssid}/values/A1?valueInputOption=USER_ENTERED`, {
                            method: 'PUT', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ values: finalOutput })
                        });
                        if (updateRes.ok) diag.innerHTML += `<span class="diag-success">✅ ${stnId} 同步成功：新增 ${addCount} / 更新 ${updateCount} / 總筆數 ${sortedRows.length}。</span><br>`;
                    } else {
                        diag.innerHTML += `<span class="diag-info">ℹ️ ${stnId}：與雲端現有資料相同，跳過更新。</span><br>`;
                    }
                }
                status.innerText = "✅ 程序執行完畢。";
            } catch (err) { 
                diag.innerHTML += `<span class="diag-err">❌ 發生錯誤: ${err.message}</span>`;
                console.error(err);
            }
        }
    </script>
</body>
</html>
