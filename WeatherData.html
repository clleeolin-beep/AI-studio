<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>氣候資料智慧工具 V65 (雲端健康偵測版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --blue: #3498db; --danger: #e74c3c; --purple: #8e44ad; --orange: #e67e22; }
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 950px; margin: 40px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px; border-top: 5px solid var(--primary); }
        .card.cleaner { border-top-color: var(--danger); }
        .card.cloud { border-top-color: var(--purple); }
        .card.scan { border-top-color: var(--orange); }
        h2 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.4em; }
        .desc { color: #7f8c8d; font-size: 0.85em; margin-bottom: 15px; }
        .section { margin-bottom: 15px; padding: 12px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        label { font-weight: bold; font-size: 0.9em; color: var(--primary); margin-right: 10px; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-family: inherit; }
        button { padding: 12px 20px; font-size: 15px; cursor: pointer; color: white; border: none; border-radius: 6px; width: 100%; transition: 0.3s; }
        button:disabled { background: #ccc !important; cursor: not-allowed; opacity: 0.6; }
        .btn-merge { background: var(--blue); }
        .btn-clean { background: var(--danger); }
        .btn-cloud { background: var(--purple); }
        .btn-scan { background: var(--orange); }
        #status { margin-top: 20px; padding: 15px; border-radius: 6px; background: #2c3e50; color: #ecf0f1; font-size: 0.9em; white-space: pre-line; border-left: 5px solid var(--accent); }
        .diag-box { font-family: monospace; font-size: 0.8em; color: #3be200; background: #1a1a1a; padding: 15px; margin-top: 10px; border-radius: 4px; border: 1px solid #444; line-height: 1.6; max-height: 350px; overflow-y: auto; }
        .diag-err { color: #ff5555; }
        .diag-info { color: #3498db; }
        .diag-success { color: #55ff55; }
        .diag-warn { color: #f1c40f; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📂 第一區：彙整與地理資訊注入 (免登入/按測站合併)</h2>
        <p class="desc">透過全展開矩陣鎖定欄位格式，產出完全相容 JSON 解析標準的 XLSX 檔案。</p>
        <div class="section"><input type="file" id="mergeInput" multiple accept=".csv, .xlsx"></div>
        <button id="mergeBtn" class="btn-merge" disabled>執行彙整下載</button>
    </div>

    <div class="card cleaner">
        <h2>🧹 第二區：10 年滾動清理 (智慧日期對位)</h2>
        <div class="section">
            <label>清理基準：</label>
            <select id="cleanBasis">
                <option value="year">以年份為基準</option>
                <option value="month">以月份為基準</option>
                <option value="day" selected>以日期為基準</option>
            </select>
        </div>
        <div class="section"><input type="file" id="cleanInput" accept=".xlsx"></div>
        <button id="cleanBtn" class="btn-clean" disabled>執行清理下載</button>
    </div>

    <div class="card cloud">
        <h2>☁️ 第三區：智慧同步 (防重複與純淨寫入)</h2>
        <p class="desc">本地預合併同站資料，並採用原生字串矩陣將資料精準寫入雲端。</p>
        <div class="section">
            <input type="file" id="syncInput" multiple accept=".csv, .xlsx">
        </div>
        <button id="syncBtn" class="btn-cloud" disabled>授權並執行同步判讀</button>
        <div id="diag" class="diag-box">診斷：等待匯入檔案...</div>
    </div>

    <div class="card scan">
        <h2>🔍 第四區：雲端資料庫健康偵測 (起迄與缺漏分析)</h2>
        <p class="desc">一鍵掃描雲端指定資料夾內所有測站，精準算出資料起迄時間，並揪出中間缺失的月份。</p>
        <button id="scanBtn" class="btn-scan">授權並執行雲端健康掃描</button>
        <div id="diagScan" class="diag-box">偵測報告：等待啟動...</div>
    </div>

    <div id="status">準備中...</div>

                let explicitRows = new Array();

                for (let rIndex = 2; rIndex < resultsCount; rIndex++) {

                    if (!currentRow || !currentRow[0]) continue;

                    let parsedDate = "";
                    let parsedYear = "";
                    let parsedMonth = "";

                    if (rawDateString.includes('/')) {
                        parsedDate = rawDateString;
                        let dateParts = parsedDate.split('/');
                        parsedYear = dateParts[0];
                        parsedMonth = dateParts[1];
                    } else {
                        let paddedDay = String(rawDateString).length === 1 ? '0' + String(rawDateString) : String(rawDateString);
                        parsedDate = yr + '/' + mo + '/' + paddedDay;
                        parsedYear = yr;
                        parsedMonth = mo;
                    }

                    let rowMatrix = new Array();
                    rowMatrix.push(String(stnId)); rowMatrix.push(String(info.city)); rowMatrix.push(String(info.name)); rowMatrix.push(String(info.alt)); rowMatrix.push(String(info.lat)); rowMatrix.push(String(info.lon)); rowMatrix.push(String(info.addr)); rowMatrix.push(String(parsedYear)); rowMatrix.push(String(parsedMonth)); rowMatrix.push(String(parsedDate));

                if (!bundle[res.stnId]) { bundle[res.stnId] = { headers: res.headers, dataMap: new Map() }; }
                let rowsCount = res.rows.length;
                for (let j = 0; j < rowsCount; j++) {
                    let r = res.rows[j];
                    if(r[9]) bundle[res.stnId].dataMap.set(String(r[9]), r);
                }
            }

            for (const stnId in bundle) {
                let keys = Array.from(bundle[stnId].dataMap.keys()).sort((a,b) => new Date(a) - new Date(b));
                let keysCount = keys.length;
                let sortedRows = new Array();
                for (let k = 0; k < keysCount; k++) { sortedRows.push(bundle[stnId].dataMap.get(keys[k])); }
                
                let sheetData = new Array();
                sheetData.push(bundle[stnId].headers[0]);
                sheetData.push(bundle[stnId].headers[1]);
                for (let r = 0; r < keysCount; r++) { sheetData.push(sortedRows[r]); }

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sheetData), stnId);
                XLSX.writeFile(wb, `${stnId}.xlsx`);
            }
            status.innerText = "✅ 彙整完成。已產出包含完整字串定義的純淨 XLSX。";
        };

        // --- 第二區邏輯 ---
        document.getElementById('cleanInput').onchange = () => document.getElementById('cleanBtn').disabled = false;
        document.getElementById('cleanBtn').onclick = async () => {
            const basis = document.getElementById('cleanBasis').value;
            const now = new Date();
            let dynamicCutoff = (basis === 'year') ? new Date(now.getFullYear()-10, 0, 1) : (basis === 'month') ? new Date(now.getFullYear(), now.getMonth()-120, 1) : new Date(now.getFullYear()-10, now.getMonth(), now.getDate());
            
            const wb = XLSX.read(await document.getElementById('cleanInput').files[0].arrayBuffer());
            const outWb = XLSX.utils.book_new();
            
            let sheetNames = wb.SheetNames;
            let snCount = sheetNames.length;
            for (let s = 0; s < snCount; s++) {
                let name = sheetNames[s];
                let rows = XLSX.utils.sheet_to_json(wb.Sheets[name], {header: 1, raw: false, defval: ""});
                if (rows.length < 2) continue;
                
                let idx = rows[0][0] === "站碼" ? 9 : 0;
                let filtered = new Array();
                let rCount = rows.length;
                for (let r = 2; r < rCount; r++) {
                    if (new Date(rows[r][idx]) >= dynamicCutoff) { filtered.push(rows[r]); }
                }
                
                let sheetData = new Array();
                sheetData.push(rows[0]);
                sheetData.push(rows[1]);
                let fCount = filtered.length;
                for (let f = 0; f < fCount; f++) { sheetData.push(filtered[f]); }
                
                XLSX.utils.book_append_sheet(outWb, XLSX.utils.aoa_to_sheet(sheetData), name);
            }
            XLSX.writeFile(outWb, `清理報告_${new Date().getTime()}.xlsx`);
        };

        // --- 第三區邏輯 ---
        document.getElementById('syncInput').onchange = () => {
            if (document.getElementById('syncInput').files.length > 0) document.getElementById('syncBtn').disabled = false;
        };

        document.getElementById('syncBtn').onclick = () => {
            window.pendingAction = 'sync';
            diag.innerHTML = `[${new Date().toLocaleTimeString()}] ⏳ 準備同步字串矩陣...<br>`;
            accessToken ? startFolderSync() : tokenClient.requestAccessToken({prompt: 'none'});
        };

        async function startFolderSync() {
            const files = Array.from(document.getElementById('syncInput').files);
            const bundle = {}; 

            try {
                let filesCount = files.length;
                for (let i = 0; i < filesCount; i++) {
                    let res = await parseFile(files[i]);
                    if (!bundle[res.stnId]) { bundle[res.stnId] = { headers: res.headers, dataMap: new Map() }; }
                    let rowsCount = res.rows.length;
                    for (let j = 0; j < rowsCount; j++) {
                        let r = res.rows[j];
                        if(r[9]) bundle[res.stnId].dataMap.set(String(r[9]), r);
                    }
                }

                const driveRes = await fetch(`https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}' in parents and trashed = false&fields=files(id, name)`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const driveFiles = (await driveRes.json()).files || [];

                for (const stnId in bundle) {
                    diag.innerHTML += `<span class="diag-info">🚀 同步測站 [${stnId}]...</span><br>`;
                    const targetFileName = `${stnId}.xlsx`;
                    let targetFile = driveFiles.find(f => f.name === targetFileName);
                    let ssid, existingData = [];

                    if (targetFile) {
                        ssid = targetFile.id;
                        const getRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssid}/values/A1:ZZ20000`, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                        existingData = (await getRes.json()).values || [];
                    } else {
                        diag.innerHTML += `   └─ ➕ 建立新檔案...<br>`;
                        const create = await fetch(`https://www.googleapis.com/drive/v3/files`, {
                            method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: targetFileName, mimeType: 'application/vnd.google-apps.spreadsheet', parents: [FOLDER_ID] })
                        });
                        ssid = (await create.json()).id;
                    }

                    const finalMap = new Map();
                    let exCount = existingData.length;
                    for (let ex = 2; ex < exCount; ex++) {
                        let r = existingData[ex];
                        if (r[9]) finalMap.set(String(r[9]), JSON.stringify(r));
                    }
                    
                    let add = 0, upd = 0;
                    let bKeys = Array.from(bundle[stnId].dataMap.keys());
                    let bKeysCount = bKeys.length;
                    
                    for (let bk = 0; bk < bKeysCount; bk++) {
                        let date = bKeys[bk];
                        let row = bundle[stnId].dataMap.get(date);
                        let old = finalMap.get(date);
                        let neo = JSON.stringify(row);
                        
                        if (!old) { add++; finalMap.set(date, neo); } 
                        else if (old !== neo) { upd++; finalMap.set(date, neo); }
                    }

                    let sortedKeys = Array.from(finalMap.keys()).sort((a,b)=>new Date(a)-new Date(b));
                    let skCount = sortedKeys.length;
                    let sortedRows = new Array();
                    for (let sk = 0; sk < skCount; sk++) { sortedRows.push(JSON.parse(finalMap.get(sortedKeys[sk]))); }
                    
                    let finalOutput = new Array();
                    finalOutput.push(bundle[stnId].headers[0]);
                    finalOutput.push(bundle[stnId].headers[1]);
                    for (let fo = 0; fo < skCount; fo++) { finalOutput.push(sortedRows[fo]); }

                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssid}/values/A1:ZZ20000:clear`, { method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}` } });
                    const updateRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssid}/values/A1?valueInputOption=USER_ENTERED`, {
                        method: 'PUT', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ values: finalOutput })
                    });

                    if(updateRes.ok) diag.innerHTML += `<span class="diag-success">   └─ ✅ 完成：新增 ${add} / 更新 ${upd} / 總筆數 ${sortedRows.length}。</span><br>`;
                }
                status.innerText = "✅ 同步程序執行完畢。";
            } catch (err) { diag.innerHTML += `<span class="diag-err">❌ 錯誤: ${err.message}</span>`; }
        }

        // --- 第四區：雲端資料庫健康偵測 ---
        document.getElementById('scanBtn').onclick = () => {
            window.pendingAction = 'scan';
            diagScan.innerHTML = `[${new Date().toLocaleTimeString()}] ⏳ 啟動雲端連線，準備獲取檔案列表...<br>`;
            accessToken ? startCloudScan() : tokenClient.requestAccessToken({prompt: 'none'});
        };

        async function startCloudScan() {
            try {
                // 1. 抓取目錄下所有檔案
                diagScan.innerHTML += `<span class="diag-info">📡 正在掃描 Google Drive 目錄...</span><br>`;
                const driveRes = await fetch(`https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}' in parents and trashed = false&fields=files(id, name)`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const driveData = await driveRes.json();
                const driveFiles = driveData.files || [];
                
                let fileCount = driveFiles.length;
                if (fileCount === 0) {
                    diagScan.innerHTML += `<span class="diag-err">⚠️ 資料夾內目前沒有任何檔案。</span><br>`;
                    return;
                }

                diagScan.innerHTML += `<span class="diag-success">✅ 共發現 ${fileCount} 個測站檔案，開始解析內容...</span><hr>`;

                // 2. 使用純手工迴圈解析每一個檔案
                for (let fIndex = 0; fIndex < fileCount; fIndex++) {
                    let fileObj = driveFiles[fIndex];
                    let fileName = fileObj.name;
                    let fileId = fileObj.id;
                    
                    diagScan.innerHTML += `<span><b>測站：${fileName}</b></span><br>`;

                    // 抓取試算表內容
                    const getRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${fileId}/values/A1:ZZ20000`, { 
                        headers: { 'Authorization': `Bearer ${accessToken}` } 
                    });
                    const sheetData = await getRes.json();
                    let values = sheetData.values || [];
                    let vLen = values.length;

                    if (vLen <= 2) {
                        diagScan.innerHTML += `<span class="diag-err">   └─ ❌ 檔案為空或無有效數據。</span><br><br>`;
                        continue;
                    }

                    // 3. 矩陣運算抓取日期與月份
                    let existingMonths = {}; // 用於記錄存在的月份 YYYY/MM
                    let minTime = Infinity;
                    let maxTime = -Infinity;
                    let minDateStr = "";
                    let maxDateStr = "";

                    for (let i = 2; i < vLen; i++) {
                        let row = values[i];
                        let dateVal = String(row[9] || "").trim(); // 第 10 欄為日期
                        if (dateVal !== "" && dateVal.includes('/')) {
                            let dTime = new Date(dateVal).getTime();
                            if (!isNaN(dTime)) {
                                if (dTime < minTime) { minTime = dTime; minDateStr = dateVal; }
                                if (dTime > maxTime) { maxTime = dTime; maxDateStr = dateVal; }
                                
                                // 提取 YYYY/MM 作為金鑰
                                let dateParts = dateVal.split('/');
                                if (dateParts.length >= 2) {
                                    let yM = dateParts[0] + '/' + dateParts[1];
                                    existingMonths[yM] = true;
                                }
                            }
                        }
                    }

                    if (minDateStr === "" || maxDateStr === "") {
                        diagScan.innerHTML += `<span class="diag-err">   └─ ❌ 無法解析有效的日期格式。</span><br><br>`;
                        continue;
                    }

                    diagScan.innerHTML += `   └─ 📅 數據範圍：${minDateStr} ~ ${maxDateStr}<br>`;

                    // 4. 計算中間是否有缺失月份 (不依賴高階函數)
                    let minD = new Date(minTime);
                    let maxD = new Date(maxTime);
                    let startY = minD.getFullYear();
                    let startM = minD.getMonth() + 1;
                    let endY = maxD.getFullYear();
                    let endM = maxD.getMonth() + 1;

                    let currY = startY;
                    let currM = startM;
                    let missingMonthsArray = new Array();

                    while (currY < endY || (currY === endY && currM <= endM)) {
                        let paddedM = String(currM).length === 1 ? '0' + String(currM) : String(currM);
                        let checkYM = String(currY) + '/' + paddedM;
                        
                        if (existingMonths[checkYM] !== true) {
                            missingMonthsArray.push(checkYM);
                        }
                        
                        currM++;
                        if (currM > 12) {
                            currM = 1;
                            currY++;
                        }
                    }

                    let missingCount = missingMonthsArray.length;
                    if (missingCount === 0) {
                        diagScan.innerHTML += `<span class="diag-success">   └─ 🟢 完美無缺！期間內無遺漏任何月份。</span><br><br>`;
                    } else {
                        diagScan.innerHTML += `<span class="diag-warn">   └─ ⚠️ 偵測到缺失 ${missingCount} 個月份：</span><br>`;
                        let missingReport = "";
                        for (let m = 0; m < missingCount; m++) {
                            missingReport += missingMonthsArray[m] + (m < missingCount - 1 ? ", " : "");
                        }
                        diagScan.innerHTML += `<span style="color:#e74c3c; font-size:0.9em;">   └─ [ ${missingReport} ]</span><br><br>`;
                    }
                }
                diagScan.innerHTML += `<hr><span class="diag-success">✅ 雲端資料庫掃描分析完畢。</span><br>`;
            } catch (err) {
                diagScan.innerHTML += `<span class="diag-err">❌ 掃描失敗: ${err.message}</span>`;
            }
        }
    </script>
</body>
