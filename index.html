<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio | 惇陽 AI 實驗室</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" href="data:image/x-icon;base64,="> 
    <script src="https://accounts.google.com/gsi/client"></script>
    
    <style>
        /* =========================================
           1. 系統主題變數定義 (精選四款運動風/大學風格)
           ========================================= */
        
        /* 預設：LSU 猛虎紫金 (LSU Purple & Gold) */
        :root, :root[data-theme='lsu'] { 
            --lab-cyan: #FDD023; 
            --lab-bg: #0D0514; /* 調深背景讓發光更明顯 */
            --lab-sidebar: #461D7C; 
            --lab-navbar: #321459;
            --lab-text: #FDD023; 
            --lab-border: rgba(253, 208, 35, 0.15);
            --lab-hover: rgba(253, 208, 35, 0.1);
            --lab-active: rgba(253, 208, 35, 0.2);
        }
        /* 夏威夷戰士 (Hawaii Rainbow Warriors) */
        :root[data-theme='hawaii'] { 
            --lab-cyan: #C8C8C8; 
            --lab-bg: #050505; 
            --lab-sidebar: #024731; 
            --lab-navbar: #012b1d;
            --lab-text: #C8C8C8; 
            --lab-border: rgba(200, 200, 200, 0.15);
            --lab-hover: rgba(200, 200, 200, 0.1);
            --lab-active: rgba(200, 200, 200, 0.2);
        }
        /* 兄弟象 (CTBC Brothers) */
        :root[data-theme='brothers'] { 
            --lab-cyan: #FFD100; 
            --lab-bg: #080C14; 
            --lab-sidebar: #5B626B; 
            --lab-navbar: #081020;
            --lab-text: #FFD100; 
            --lab-border: rgba(255, 209, 0, 0.2);
            --lab-hover: rgba(255, 209, 0, 0.1);
            --lab-active: rgba(255, 209, 0, 0.25);
        }
        /* 台灣隊 (Team Taiwan) */
        :root[data-theme='taiwan'] { 
            --lab-cyan: #E81C24; 
            --lab-bg: #05080E; 
            --lab-sidebar: #003E7E; 
            --lab-navbar: #002A5C;
            --lab-text: #F8F9FA; 
            --lab-border: rgba(255, 255, 255, 0.15);
            --lab-hover: rgba(255, 255, 255, 0.1);
            --lab-active: rgba(232, 28, 36, 0.2);
        }

        /* =========================================
           2. 核心佈局與全域樣式
           ========================================= */
        body, html { 
            background: var(--lab-bg); 
            color: var(--lab-text); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; 
            transition: background 0.4s ease, color 0.4s ease; 
        }
        
        .navbar { 
            background: var(--lab-navbar) !important; 
            border-bottom: 1px solid var(--lab-border); 
            height: 56px; padding: 0 20px; flex-shrink: 0; display: flex; align-items: center; 
            transition: background 0.4s ease, border-color 0.4s ease;
        }
        .navbar-brand { color: var(--lab-cyan) !important; font-weight: 800; text-decoration: none; transition: color 0.4s ease; }
        
        #auth-overlay { position: fixed; inset: 0; background: var(--lab-bg); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: background 0.4s ease; overflow: hidden; }
        
        /* 宇宙模型背景 Canvas 樣式設定 - 加強混合模式 */
        #universe-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 1.0; mix-blend-mode: screen; }
        
        /* 登入框：改為極致玻璃擬態 (Glassmorphism)，讓宇宙纖維可以透過去 */
        .login-box { 
            position: relative; 
            z-index: 1; 
            background: rgba(10, 5, 20, 0.35); /* 極低透明度的深色底 */
            backdrop-filter: blur(12px); /* 毛玻璃效果 */
            -webkit-backdrop-filter: blur(12px);
            padding: 35px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.15); /* 細緻的邊框反光 */
            text-align: center; 
            width: 450px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05); 
            transition: border-color 0.4s ease; 
        }
        
        #main-layout { display: none; height: calc(100vh - 56px); width: 100%; overflow: hidden; }
        .sidebar { width: 280px; min-width: 280px; background: var(--lab-sidebar); border-right: 1px solid var(--lab-border); display: flex; flex-direction: column; height: 100%; overflow-y: auto; transition: background 0.4s ease, border-color 0.4s ease; }

        /* =========================================
           3. 偵錯視窗樣式 (Debug Terminal)
           ========================================= */
        #debug-log-window { 
            position: fixed; bottom: 80px; right: 20px; width: 500px; height: 350px;
            background: rgba(0, 0, 0, 0.85); border: 1px solid var(--lab-cyan); border-radius: 12px;
            z-index: 10000; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
        }
        #debug-header { 
            padding: 8px 15px; background: rgba(255, 255, 255, 0.05); border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center; cursor: move; border-radius: 11px 11px 0 0;
        }
        #debug-log { 
            flex-grow: 1; font-family: 'Consolas', monospace; font-size: 12px; color: #4ade80; 
            padding: 10px; overflow-y: auto; word-break: break-all;
        }

        .content-area { flex-grow: 1; background: var(--lab-bg); position: relative; transition: background 0.4s ease; }
        iframe { width: 100%; height: 100%; border: none; display: block; background: transparent; }

        /* =========================================
           4. 左側選單與收合樣式
           ========================================= */
        .category-item { 
            cursor: pointer; padding: 12px 20px; 
            background: transparent; 
            border-bottom: 1px solid var(--lab-border); 
            display: flex; justify-content: space-between; align-items: center; 
            color: var(--lab-text); font-weight: 600; font-size: 13px; 
            transition: background 0.2s, color 0.4s ease; 
        }
        .category-item:hover { background: var(--lab-hover); }
        .module-group { max-height: 1000px; overflow: hidden; transition: max-height 0.4s ease-out; }
        .module-group.collapsed { max-height: 0; }
        .bi-chevron-down { transition: transform 0.3s; font-size: 10px; opacity: 0.6; }
        .collapsed .bi-chevron-down { transform: rotate(-90deg); }

        .nav-link { 
            color: var(--lab-text); opacity: 0.8; 
            padding: 10px 20px 10px 45px; display: flex; align-items: center; 
            transition: all 0.2s ease; text-decoration: none; cursor: pointer; 
            border-left: 4px solid transparent; font-size: 14px; 
        }
        .nav-link:hover { background: var(--lab-hover); opacity: 1; }
        .nav-link.active { 
            color: var(--lab-cyan); 
            background: var(--lab-active); 
            border-left: 4px solid var(--lab-cyan); 
            opacity: 1; font-weight: 500;
        }

        /* =========================================
           5. 風格切換按鈕容器 (Theme Switcher)
           ========================================= */
        .theme-switcher {
            position: fixed;
            top: 8px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 1050; 
            display: flex;
            gap: 12px;
            background: var(--lab-sidebar);
            padding: 8px 16px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid var(--lab-border);
            transition: background 0.4s ease, border-color 0.4s ease;
        }
        .theme-btn {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s ease, border-color 0.2s ease;
            opacity: 0.8;
            box-sizing: border-box;
        }
        .theme-btn:hover { transform: scale(1.15); opacity: 1; }
        .theme-btn.active { border-color: var(--lab-text); transform: scale(1.15); opacity: 1; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <canvas id="universe-canvas"></canvas>
        
        <div class="login-box">
            <div class="mb-3" style="font-size: 2.8rem; color: var(--lab-cyan); text-shadow: 0 0 20px rgba(253, 208, 35, 0.4); transition: color 0.4s ease;"><i class="bi bi-cpu-fill"></i></div>
            <h2 class="mb-2 fw-bold" style="color: var(--lab-cyan); transition: color 0.4s ease; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">AI Studio Lab</h2>
            <p class="mb-4 small" style="color: #fff; opacity: 0.6;">安全性管制中 (v2.2.3)</p>
            <div id="g_id_onload" data-client_id="387000422543-vsh0lrio7a3kn3nqgrfp8l4ol413bq90.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
            <div class="g_id_signin d-flex justify-content-center" data-type="standard" data-theme="filled_black" data-size="large"></div>
        </div>
    </div>

    <nav class="navbar navbar-dark">
        <a class="navbar-brand me-auto" href="#"><i class="bi bi-intersect me-2"></i>AI STUDIO <span class="badge bg-secondary border border-secondary ms-2 bg-opacity-25" id="sys-version" style="color:var(--lab-cyan); font-weight: normal;">--</span></a>
        <div class="d-flex align-items-center">
            <button class="btn btn-sm me-3" onclick="toggleDebugWindow()" style="color: var(--lab-cyan); border: 1px solid var(--lab-cyan); background: transparent; transition: all 0.3s;"><i class="bi bi-terminal me-1"></i>偵錯</button>
            <span id="user-display" class="me-3 small font-monospace" style="color: var(--lab-text); opacity: 0.7;"></span>
            <button class="btn btn-sm border-0" onclick="logout()" style="color: var(--lab-text); opacity: 0.7;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'"><i class="bi bi-box-arrow-right fs-5"></i></button>
        </div>
    </nav>

    <div id="debug-log-window">
        <div id="debug-header">
            <span style="font-size: 12px; font-weight: bold; color: var(--lab-cyan);">🛠️ SYSTEM DEBUG TERMINAL</span>
            <i class="bi bi-x-lg" style="cursor:pointer; color: #fff;" onclick="toggleDebugWindow()"></i>
        </div>
        <div id="debug-log"></div>
    </div>

    <div id="main-layout" class="d-flex">
        <aside class="sidebar"><div id="menu-container"></div></aside>
        <main class="content-area"><iframe id="main-frame" name="main-frame" src="about:blank"></iframe></main>
    </div>

    <div class="theme-switcher">
        <div class="theme-btn active" style="background: #461D7C; border: 2px solid #FDD023;" onclick="changeTheme('lsu', this)" title="猛虎紫金 (LSU)"></div>
        <div class="theme-btn" style="background: #024731; border: 2px solid #C8C8C8;" onclick="changeTheme('hawaii', this)" title="夏威夷戰士 (Hawaii)"></div>
        <div class="theme-btn" style="background: #5B626B; border: 2px solid #FFD100;" onclick="changeTheme('brothers', this)" title="兄弟象 (Brothers)"></div>
        <div class="theme-btn" style="background: #003E7E; border: 2px solid #E81C24;" onclick="changeTheme('taiwan', this)" title="台灣隊 (Team Taiwan)"></div>
    </div>

<script>
    /**
     * =========================================
     * 第16級可觀測宇宙 - 網狀長城與空洞 (Cosmic Web & Voids)
     * =========================================
     */
    let universeAnimFrameId = null;

    function initUniverseSimulation() {
        const canvas = document.getElementById('universe-canvas');
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // 參數設定：創造極端空洞與長城纖維
        const NUM_NODES = 450;     // 節點數量
        const MAX_LINK_DIST = 260; // 允許連線的最遠距離 (決定纖維連續性)
        const MAX_CONNECTIONS = 3; // 限制每個節點連線數，避免毛線球效應
        const ANCHORS_COUNT = 10;  // 大尺度引力錨點 (創造主要長城軸線)
        const SPACE_SCALE = 3000;  // 宇宙空間尺度 (越大空洞越明顯)

        const nodes = [];
        const links = [];

        // 1. 生成大尺度結構的引力錨點 (宇宙骨架頂點)
        const anchors = [];
        for(let i=0; i<ANCHORS_COUNT; i++) {
            anchors.push({
                x: (Math.random() - 0.5) * SPACE_SCALE,
                y: (Math.random() - 0.5) * SPACE_SCALE,
                z: (Math.random() - 0.5) * SPACE_SCALE
            });
        }

        // 2. 依照錨點連線(纖維)生成星系節點，確保產生巨大空洞
        for (let i = 0; i < NUM_NODES; i++) {
            // 隨機挑選兩個錨點，在它們之間的連線上生成節點
            let a1 = anchors[Math.floor(Math.random() * ANCHORS_COUNT)];
            let a2 = anchors[Math.floor(Math.random() * ANCHORS_COUNT)];
            
            // 內插參數 t (0~1)，決定在連線上的哪個位置
            let t = Math.random();
            let baseX = a1.x + (a2.x - a1.x) * t;
            let baseY = a1.y + (a2.y - a1.y) * t;
            let baseZ = a1.z + (a2.z - a1.z) * t;

            // 加入噪聲擾動 (越小代表纖維越細，越大代表星系團越散)
            let noise = (Math.random() > 0.85) ? 350 : 80; 
            
            nodes.push({
                x: baseX + (Math.random() - 0.5) * noise,
                y: baseY + (Math.random() - 0.5) * noise,
                z: baseZ + (Math.random() - 0.5) * noise,
                size: Math.random() * 2.0 + 0.5, // 質量/發光點大小
                driftX: (Math.random() - 0.5) * 0.1,
                driftY: (Math.random() - 0.5) * 0.1,
                driftZ: (Math.random() - 0.5) * 0.1
            });
        }

        // 3. 預先計算纖維連線 (只連最近的鄰居，保持線條俐落)
        for (let i = 0; i < NUM_NODES; i++) {
            let connections = 0;
            // 尋找距離內的節點
            let neighbors = [];
            for (let j = i + 1; j < NUM_NODES; j++) {
                const dx = nodes[i].x - nodes[j].x;
                const dy = nodes[i].y - nodes[j].y;
                const dz = nodes[i].z - nodes[j].z;
                const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                if (dist < MAX_LINK_DIST) {
                    neighbors.push({ target: j, dist: dist });
                }
            }
            // 只連接最近的幾個點
            neighbors.sort((a, b) => a.dist - b.dist);
            for(let k = 0; k < Math.min(MAX_CONNECTIONS, neighbors.length); k++) {
                links.push({ source: i, target: neighbors[k].target });
            }
        }

        let angleX = 0;
        let angleY = 0;

        function renderUniverse() {
            // 背景清理 - 留下微弱拖影
            ctx.fillStyle = 'rgba(5, 2, 8, 0.4)'; 
            ctx.fillRect(0, 0, width, height);

            // 整個宇宙網緩慢旋轉 (模擬巨觀視角)
            angleX += 0.0003;
            angleY += 0.0007;

            const cosX = Math.cos(angleX), sinX = Math.sin(angleX);
            const cosY = Math.cos(angleY), sinY = Math.sin(angleY);

            const projectedNodes = [];
            const fov = 1100;    // 放大視野
            const viewerZ = 2200;// 鏡頭拉遠，讓空間感更大

            // 4. 進行 3D 空間投影
            for (let i = 0; i < NUM_NODES; i++) {
                let n = nodes[i];
                
                // 天體微小漂移 (暗能量膨脹感)
                n.x += n.driftX; n.y += n.driftY; n.z += n.driftZ;

                // 繞 Y 軸旋轉
                let x1 = n.x * cosY - n.z * sinY;
                let z1 = n.z * cosY + n.x * sinY;
                
                // 繞 X 軸旋轉
                let y2 = n.y * cosX - z1 * sinX;
                let z2 = z1 * cosX + n.y * sinX;

                // 透視投影
                let scale = fov / (fov + z2 + viewerZ);
                let px = width / 2 + x1 * scale;
                let py = height / 2 + y2 * scale;

                projectedNodes.push({ px, py, scale, z: z2 });
            }

            // 5. 繪製暗物質纖維 (極細線條展現空間感)
            ctx.lineWidth = 0.5;
            for (let i = 0; i < links.length; i++) {
                let link = links[i];
                let n1 = projectedNodes[link.source];
                let n2 = projectedNodes[link.target];
                
                // 景深剔除：太遠的不畫
                if (n1.z > -viewerZ + 300 && n2.z > -viewerZ + 300) {
                    let avgZ = (n1.z + n2.z) / 2;
                    let depthAlpha = Math.max(0, 1 - (avgZ + 1000) / 2500); // 衰減計算
                    
                    if (depthAlpha > 0) {
                        // 使用 LSU 猛虎紫 作為暗物質網絡顏色
                        ctx.strokeStyle = `rgba(148, 18, 188, ${depthAlpha * 0.55})`;
                        ctx.beginPath();
                        ctx.moveTo(n1.px, n1.py);
                        ctx.lineTo(n2.px, n2.py);
                        ctx.stroke();
                    }
                }
            }

            // 6. 繪製超星系團節點 (高亮空洞邊緣)
            for (let i = 0; i < NUM_NODES; i++) {
                let p = projectedNodes[i];
                if (p.z > -viewerZ + 100) {
                    let size = Math.max(0.1, nodes[i].size * p.scale * 1.2);
                    let depthAlpha = Math.max(0, 1 - (p.z + 1000) / 2500);
                    
                    if(depthAlpha > 0) {
                        // 使用 LSU 榮耀金 作為星系發光點
                        ctx.fillStyle = `rgba(253, 208, 35, ${depthAlpha * 0.9})`; 
                        ctx.beginPath();
                        ctx.arc(p.px, p.py, size, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // 巨大的黑洞/超星系團核心加上光暈
                        if(nodes[i].size > 2.0) {
                            ctx.fillStyle = `rgba(255, 255, 255, ${depthAlpha * 0.4})`;
                            ctx.beginPath();
                            ctx.arc(p.px, p.py, size * 2.5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }
            }

            universeAnimFrameId = requestAnimationFrame(renderUniverse);
        }

        renderUniverse();
        console.log("[System] 第 16 級可觀測宇宙 (網狀空洞版) 渲染引擎已啟動");
    }

    // 啟動登入背景模型
    window.addEventListener('DOMContentLoaded', initUniverseSimulation);


    /**
     * [手動偵錯程序加回]
     */
    window.sysLog = function(msg, type = '') {
        console.log(`[${type.toUpperCase() || 'LOG'}] ${msg}`);
        
        if (window.DebugInstance && typeof window.DebugInstance.addLog === 'function') {
            window.DebugInstance.addLog(type || 'info', msg);
            return;
        }

        const logBox = document.getElementById('debug-log');
        if (logBox) {
            const div = document.createElement('div');
            const colors = { err: '#f87171', error: '#f87171', success: 'var(--lab-cyan)', warn: '#fbbf24', info: '#94a3b8' };
            div.style.color = colors[type.toLowerCase()] || '#94a3b8';
            div.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
            div.style.padding = '3px 0';
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logBox.appendChild(div);
            logBox.scrollTop = logBox.scrollHeight;
        }
    };

    window.addEventListener('message', (event) => {
        if (event.data && event.data.source === 'AI_STUDIO_APP') {
            const { type, content } = event.data;
            window.sysLog(content, type);
        }
    });

    function base64UrlDecode(str) {
        let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
        while (base64.length % 4) { base64 += '='; }
        return decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    }

    window.handleCredentialResponse = async (response) => {
        window.sysLog("收到憑證，開始驗證...", "success");
        try {
            const payload = JSON.parse(base64UrlDecode(response.credential.split('.')[1]));
            const userEmail = payload.email.toLowerCase();

            const res = await fetch('./manifest.json?v=' + Date.now());
            window.appConfig = await res.json();

            const allowed = (window.appConfig.ai_lab_config.env.ALLOWED_USERS || []).map(u => u.toLowerCase());
            if (allowed.includes(userEmail) || userEmail.endsWith("@dunyang.com.tw")) {
                window.sysLog("驗證通過！解鎖系統。", "success");
                sessionStorage.setItem('ai_lab_auth', 'true');
                sessionStorage.setItem('user_email', userEmail);
                
                if (window.startSystem) {
                    window.startSystem();
                } else {
                    window.dispatchEvent(new CustomEvent('manual-start'));
                }
            } else {
                alert("未經授權: " + userEmail);
            }
        } catch (e) { window.sysLog("解析錯誤: " + e.message, "err"); }
    };

    const dragWin = document.getElementById("debug-log-window");
    const dragHeader = document.getElementById("debug-header");
    let isDragging = false, startX, startY, transX = 0, transY = 0;

    window.toggleDebugWindow = () => {
        dragWin.style.display = (dragWin.style.display === 'none' || dragWin.style.display === '') ? 'flex' : 'none';
    };

    dragHeader.addEventListener('mousedown', (e) => {
        isDragging = true;
        startX = e.clientX - transX;
        startY = e.clientY - transY;
        dragHeader.style.cursor = 'grabbing';
    });
    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        transX = e.clientX - startX;
        transY = e.clientY - startY;
        dragWin.style.transform = `translate(${transX}px, ${transY}px)`;
    });
    document.addEventListener('mouseup', () => {
        isDragging = false;
        dragHeader.style.cursor = 'move';
    });

    window.changeTheme = function(themeName, el) {
        document.documentElement.setAttribute('data-theme', themeName);
        
        document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
        if (el) {
            el.classList.add('active');
        } else {
            const target = document.querySelector(`.theme-btn[onclick*='${themeName}']`);
            if (target) target.classList.add('active');
        }
        
        localStorage.setItem('ai_lab_theme', themeName);
        
        // 切換主題時，同步修改宇宙纖維與星系的顏色
        const canvasColors = {
            'lsu': { line: 'rgba(148, 18, 188,', node: 'rgba(253, 208, 35,' },
            'hawaii': { line: 'rgba(2, 71, 49,', node: 'rgba(200, 200, 200,' },
            'brothers': { line: 'rgba(91, 98, 107,', node: 'rgba(255, 209, 0,' },
            'taiwan': { line: 'rgba(0, 62, 126,', node: 'rgba(232, 28, 36,' }
        };
        window.currentUniverseColors = canvasColors[themeName] || canvasColors['lsu'];

        if (window.sysLog) window.sysLog(`介面風格切換至: ${themeName}`, "info");
    };

    async function initTheme() {
        const savedTheme = localStorage.getItem('ai_lab_theme') || 'lsu'; 
        window.changeTheme(savedTheme);
    }
    
    window.addEventListener('DOMContentLoaded', initTheme);

    // 修改繪圖迴圈，使其能根據主題動態換色
    const originalFillStyle = CanvasRenderingContext2D.prototype.fill;
    const originalStrokeStyle = CanvasRenderingContext2D.prototype.stroke;
    
</script>

<script type="module">
    import AppLoader from './core/AppLoader.js';
    import { debugSystem } from './core/DebugSystem.js';

    /**
     * [核心啟動程序]
     */
    window.startSystem = function() {
        // --- 【效能保護機制】徹底銷毀宇宙模型，釋放資源給主系統 ---
        if (universeAnimFrameId !== null) {
            cancelAnimationFrame(universeAnimFrameId);
            window.sysLog("宇宙背景模型已暫停 (釋放運算資源)", "warn");
        }
        const universeCanvas = document.getElementById('universe-canvas');
        if (universeCanvas) {
            universeCanvas.remove(); // 從 DOM 徹底移除，觸發瀏覽器 GC
        }
        // ----------------------------------------

        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('main-layout').style.display = 'flex';
        document.getElementById('user-display').innerText = sessionStorage.getItem('user_email');
        
        window.DebugInstance = debugSystem; 
        window.sysLog("系統核心解鎖成功 (Kernel Active)", "success");
        
        if (AppLoader && window.appConfig) {
            const loader = new AppLoader(window.appConfig);
            loader.renderMenu('menu-container');
        }
    };

    async function init() {
        try {
            const response = await fetch('./manifest.json?v=' + Date.now());
            window.appConfig = await response.json();
            document.getElementById('sys-version').innerText = window.appConfig.ai_lab_config.version;
            
            if (sessionStorage.getItem('ai_lab_auth') === 'true') {
                window.startSystem();
            }
        } catch (e) { console.error("Init Error", e); }
    }

    window.addEventListener('manual-start', window.startSystem);
    
    init();
    
    window.logout = () => { 
        sessionStorage.clear(); 
        location.reload(); 
    };
</script>
