<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio | 惇陽 AI 實驗室</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root { --lab-cyan: #00f2ff; --lab-bg: #0f172a; --lab-sidebar: #1e293b; }
        body { background: var(--lab-bg); color: white; font-family: 'Segoe UI', Microsoft JhengHei, sans-serif; margin: 0; overflow: hidden; }
        
        /* 導航列 */
        .navbar { background: #000 !important; border-bottom: 1px solid #334155; height: 56px; z-index: 1001; }
        .navbar-brand { color: var(--lab-cyan) !important; font-weight: 800; letter-spacing: 1px; }
        
        /* 登入遮罩 */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--lab-bg); z-index: 2000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: #1e293b; padding: 40px; border-radius: 20px; border: 1px solid #334155; box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center; max-width: 400px; width: 90%; }
        
        /* 主佈局 */
        #main-layout { display: none; height: calc(100vh - 56px); }
        .sidebar { width: 260px; background: var(--lab-sidebar); border-right: 1px solid #334155; overflow-y: auto; }
        .content-area { flex-grow: 1; background: #000; position: relative; }
        
        .nav-link { color: #94a3b8; padding: 12px 20px; display: flex; align-items: center; transition: 0.3s; text-decoration: none; border-left: 4px solid transparent; cursor: pointer; }
        .nav-link:hover { color: var(--lab-cyan); background: rgba(0,242,255,0.05); }
        .nav-link.active { color: var(--lab-cyan); background: rgba(0,242,255,0.1); border-left: 4px solid var(--lab-cyan); }
        
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-box">
            <div class="mb-3" style="font-size: 3rem; color: var(--lab-cyan);"><i class="bi bi-cpu-fill"></i></div>
            <h2 class="mb-2 fw-bold" style="color: var(--lab-cyan);">AI Studio Lab</h2>
            <p class="text-muted mb-4 small">安全性管制中，請使用授權帳號登入</p>
            
            <div id="g_id_onload"
                 data-client_id="615427641075-7g7ikac4oc4s46897ch39av7174n4pmn.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin d-flex justify-content-center" data-type="standard" data-shape="rectangular" data-theme="filled_black" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
            
            <div id="auth-error" class="text-danger mt-3 small" style="display:none;">
                <i class="bi bi-exclamation-triangle-fill me-1"></i> 您未在授權名單中，存取已拒絕。
            </div>
        </div>
    </div>

    <nav class="navbar navbar-dark px-4 d-flex justify-content-between">
        <a class="navbar-brand m-0" href="#">
            <i class="bi bi-intersect me-2"></i>AI STUDIO <span class="badge bg-dark text-cyan border border-info ms-2" id="sys-version" style="color:var(--lab-cyan)">--</span>
        </a>
        <div class="d-flex align-items-center">
            <span id="user-display" class="me-3 small text-muted font-monospace"></span>
            <button class="btn btn-sm btn-outline-danger border-0" onclick="logout()" title="安全登出"><i class="bi bi-box-arrow-right"></i></button>
        </div>
    </nav>

    <div id="main-layout" class="d-flex">
        <aside class="sidebar"><div id="menu-container"></div></aside>
        <main class="content-area"><iframe id="main-frame" name="main-frame" src="views/knowledge/tutorial.html"></iframe></main>
    </div>

    <script type="module">
        import AppLoader from './core/AppLoader.js';
        import DebugSystem from './core/DebugSystem.js';

        let manifest = null;

        /**
         * 系統初始化
         */
        async function bootstrap() {
            try {
                const response = await fetch('./manifest.json');
                if (!response.ok) throw new Error("Manifest Load Failed");
                manifest = await response.json();
                
                // 顯示版本
                document.getElementById('sys-version').innerText = manifest.ai_lab_config.version;

                // 驗證狀態檢查
                const sessionAuth = sessionStorage.getItem('ai_lab_auth');
                const authEnabled = manifest.ai_lab_config.env.ENABLE_GOOGLE_AUTH;

                if (sessionAuth === 'true' || authEnabled === false) {
                    unlockSystem();
                }
            } catch (e) { 
                console.error("[System] Bootstrap Error:", e); 
            }
        }

        /**
         * Google 登入回調
         */
        window.handleCredentialResponse = (response) => {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            const allowedUsers = manifest.ai_lab_config.env.ALLOWED_USERS || [];

            if (allowedUsers.includes(payload.email)) {
                sessionStorage.setItem('ai_lab_auth', 'true');
                sessionStorage.setItem('user_email', payload.email);
                sessionStorage.setItem('user_name', payload.name);
                unlockSystem();
            } else {
                document.getElementById('auth-error').style.display = 'block';
                console.warn("[Auth] 存取被拒:", payload.email);
            }
        };

        /**
         * 解鎖系統並掛載服務
         */
        function unlockSystem() {
            // UI 切換
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-layout').style.display = 'flex';
            
            const savedEmail = sessionStorage.getItem('user_email') || "Guest";
            document.getElementById('user-display').innerText = savedEmail;

            // 1. 初始化 Debug 系統並掛載到 window (讓 iframe 可以 parent.DebugSystem 調用)
            window.DebugSystem = new DebugSystem();

            // 2. 初始化選單渲染器
            const loader = new AppLoader(manifest);
            if (manifest.ai_lab_config && manifest.ai_lab_config.modules) {
                loader.renderMenu('menu-container');
            } else {
                console.error("[System] Manifest 結構錯誤，缺少 modules 陣列。");
            }
            
            window.DebugSystem.log("System", "應用程式環境解鎖成功", "SUCCESS");
        }

        window.logout = () => { 
            sessionStorage.clear(); 
            location.reload(); 
        };

        window.onload = bootstrap;
    </script>
</body>
</html>
