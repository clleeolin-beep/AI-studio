<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>惇陽 AI 實驗室 | 模組化導覽中心</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A5276">

    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: rgba(20, 30, 48, 0.95);
            --primary-blue: #1A5276;
            --accent-cyan: #00f2ff;
            --text-main: #e0e0e0;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
        }

        #app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* 側邊導覽列 */
        #sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--primary-blue);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 25px 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--accent-cyan);
            border-bottom: 1px solid rgba(26, 82, 118, 0.5);
            text-shadow: 0 0 10px var(--accent-cyan);
        }

        #menu-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .menu-group-title {
            font-size: 11px;
            color: #666;
            margin: 15px 0 5px 5px;
            text-transform: uppercase;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            background: rgba(255,255,255,0.03);
        }

        .menu-item:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--accent-cyan);
            transform: translateX(5px);
        }

        .menu-item.active {
            background: var(--primary-blue);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        /* 主視窗區 */
        #main-content {
            flex: 1;
            position: relative;
            background: #000;
        }

        #tool-viewport {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        /* 全域偵錯視窗 (底層) */
        #global-debug {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 380px;
            height: 220px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #ff4444;
            border-radius: 8px;
            display: none; /* 預設隱藏 */
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .debug-header {
            padding: 8px 12px;
            background: #ff4444;
            color: white;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            cursor: move;
        }

        #debug-log {
            flex: 1;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            overflow-y: auto;
            color: #00ff00;
            line-height: 1.4;
        }

        /* 響應式：手機版自動收合側邊欄 */
        @media (max-width: 768px) {
            #sidebar { width: 60px; }
            .sidebar-header, .menu-item span { display: none; }
        }
    </style>
</head>
<body>

<div id="app-container">
    <aside id="sidebar">
        <div class="sidebar-header">AI STUDIO</div>
        <div id="menu-list">
            <div class="menu-group-title">核心工具</div>
            <div class="menu-item active" onclick="switchTool('map.html', this)">
                <span>🌐 空間實績地圖</span>
            </div>
            <div class="menu-item" onclick="switchTool('inspection_tool.html', this)">
                <span>📸 現場會勘記錄</span>
            </div>
            <div class="menu-item" onclick="switchTool('calc.html', this)">
                <span>📐 工程計算引擎</span>
            </div>
            <div class="menu-group-title">專案管理</div>
            <div class="menu-item" onclick="switchTool('Gantt.html', this)">
                <span>📊 專案甘特圖表</span>
            </div>
            <div id="dynamic-modules"></div> </div>
        
        <div style="padding: 15px;">
            <button onclick="toggleDebug()" style="width:100%; background:transparent; color:#666; border:1px solid #444; padding:5px; cursor:pointer; font-size:10px;">系統監控</button>
        </div>
    </aside>

    <main id="main-content">
        <iframe id="tool-viewport" src="map.html"></iframe>
    </main>
</div>

<div id="global-debug">
    <div class="debug-header">
        <span>SYSTEM CONSOLE</span>
        <span onclick="toggleDebug()" style="cursor:pointer;">✖</span>
    </div>
    <div id="debug-log"></div>
</div>

<script>
    const logEl = document.getElementById('debug-log');

    // 1. 切換工具邏輯 (兼容模式)
    function switchTool(url, element) {
        document.getElementById('tool-viewport').src = url;
        
        // 更新 UI 狀態
        document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        element.classList.add('active');
        
        sysLog(`切換至模組: ${url}`);
    }

    // 2. 系統日誌
    function sysLog(msg) {
        const time = new Date().toLocaleTimeString();
        logEl.innerHTML += `<div><span style="color:#888;">[${time}]</span> ${msg}</div>`;
        logEl.scrollTop = logEl.scrollHeight;
        console.log(`[AI Lab] ${msg}`);
    }

    // 3. 自動偵測 Manifest 並動態擴充選單
    async function loadManifest() {
        try {
            const response = await fetch('manifest.json');
            if (!response.ok) throw new Error("Manifest 尚未建置");
            
            const data = await response.json();
            sysLog(`成功讀取系統清冊: ${data.name}`);
            
            // 可以在這裡寫邏輯，比對 manifest 裡的模組，如果選單沒出現就補上去
            // 這是您未來「自動化」的關鍵
        } catch (err) {
            sysLog(`提示: ${err.message}。目前運行於手動兼容模式。`);
        }
    }

    // 4. 偵錯視窗切換
    function toggleDebug() {
        const panel = document.getElementById('global-debug');
        panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    }

    // 啟動
    window.onload = () => {
        sysLog("AI 實驗室核心啟動中...");
        loadManifest();
    };
</script>

</body>
</html>
