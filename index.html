    <style>
        /* =========================================
           1. 系統主題變數定義 (精選四款運動風/大學風格)
           ========================================= */
        
        /* 預設：LSU 猛虎紫金 (LSU Purple & Gold) - Live is gold, love is purple */
        :root, :root[data-theme='lsu'] { 
            --lab-cyan: #FDD023; 
            --lab-bg: #150A21; 
            --lab-sidebar: #461D7C; 
            --lab-navbar: #321459;
            --lab-text: #FDD023; 
            --lab-border: rgba(253, 208, 35, 0.15);
            --lab-hover: rgba(253, 208, 35, 0.1);
            --lab-active: rgba(253, 208, 35, 0.2);
        }
        /* 夏威夷戰士 (Hawaii Rainbow Warriors) - 官方深綠與破浪銀 */
        :root[data-theme='hawaii'] { 
            --lab-cyan: #C8C8C8; 
            --lab-bg: #0a0a0a; 
            --lab-sidebar: #024731; 
            --lab-navbar: #012b1d;
            --lab-text: #C8C8C8; 
            --lab-border: rgba(200, 200, 200, 0.15);
            --lab-hover: rgba(200, 200, 200, 0.1);
            --lab-active: rgba(200, 200, 200, 0.2);
        }
        /* 兄弟象 (CTBC Brothers) - 主色黃、次要灰、最後深藍 */
        :root[data-theme='brothers'] { 
            --lab-cyan: #FFD100; 
            --lab-bg: #0C182E; 
            --lab-sidebar: #5B626B; 
            --lab-navbar: #081020;
            --lab-text: #FFD100; 
            --lab-border: rgba(255, 209, 0, 0.2);
            --lab-hover: rgba(255, 209, 0, 0.1);
            --lab-active: rgba(255, 209, 0, 0.25);
        }
        /* 台灣隊 (Team Taiwan) - CT 藍與熱血紅 */
        :root[data-theme='taiwan'] { 
            --lab-cyan: #E81C24; 
            --lab-bg: #0B1320; 
            --lab-sidebar: #003E7E; 
            --lab-navbar: #002A5C;
            --lab-text: #F8F9FA; 
            --lab-border: rgba(255, 255, 255, 0.15);
            --lab-hover: rgba(255, 255, 255, 0.1);

        /* =========================================
           2. 核心佈局與全域樣式

        body, html { 
            background: var(--lab-bg); 
            color: var(--lab-text); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; 
            transition: background 0.4s ease, color 0.4s ease; 
        }
        
        .navbar { 
            background: var(--lab-navbar) !important; 
            border-bottom: 1px solid var(--lab-border); 
            height: 56px; padding: 0 20px; flex-shrink: 0; display: flex; align-items: center; 
            transition: background 0.4s ease, border-color 0.4s ease;
        }
        .navbar-brand { color: var(--lab-cyan) !important; font-weight: 800; text-decoration: none; transition: color 0.4s ease; }
        
        #auth-overlay { position: fixed; inset: 0; background: var(--lab-bg); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: background 0.4s ease; overflow: hidden; }
        
        /* 宇宙模型背景 Canvas 樣式設定 */
        #universe-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 1.0; }
        
        /* 確保登入框在宇宙背景之上 */
        .login-box { position: relative; z-index: 1; background: var(--lab-sidebar); padding: 30px; border-radius: 16px; border: 1px solid var(--lab-border); text-align: center; width: 450px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); transition: background 0.4s ease, border-color 0.4s ease; backdrop-filter: blur(10px); }
        
        #main-layout { display: none; height: calc(100vh - 56px); width: 100%; overflow: hidden; }
        .sidebar { width: 280px; min-width: 280px; background: var(--lab-sidebar); border-right: 1px solid var(--lab-border); display: flex; flex-direction: column; height: 100%; overflow-y: auto; transition: background 0.4s ease, border-color 0.4s ease; }

        /* =========================================
           3. 偵錯視窗樣式 (Debug Terminal)
           ========================================= */
        #debug-log-window { 
            position: fixed; bottom: 80px; right: 20px; width: 500px; height: 350px;
            background: rgba(0, 0, 0, 0.85); border: 1px solid var(--lab-cyan); border-radius: 12px;
            z-index: 10000; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
        }
        #debug-header { 
            padding: 8px 15px; background: rgba(255, 255, 255, 0.05); border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center; cursor: move; border-radius: 11px 11px 0 0;
        }
        #debug-log { 
            flex-grow: 1; font-family: 'Consolas', monospace; font-size: 12px; color: #4ade80; 
            padding: 10px; overflow-y: auto; word-break: break-all;
        }

        .content-area { flex-grow: 1; background: var(--lab-bg); position: relative; transition: background 0.4s ease; }
        iframe { width: 100%; height: 100%; border: none; display: block; background: transparent; }

        /* =========================================
           4. 左側選單與收合樣式
           ========================================= */
        .category-item { 
            cursor: pointer; padding: 12px 20px; 
            background: transparent; 
            border-bottom: 1px solid var(--lab-border); 
            display: flex; justify-content: space-between; align-items: center; 
            color: var(--lab-text); font-weight: 600; font-size: 13px; 
            transition: background 0.2s, color 0.4s ease; 
        }
        .category-item:hover { background: var(--lab-hover); }
        .module-group { max-height: 1000px; overflow: hidden; transition: max-height 0.4s ease-out; }
        .module-group.collapsed { max-height: 0; }
        .bi-chevron-down { transition: transform 0.3s; font-size: 10px; opacity: 0.6; }
        .collapsed .bi-chevron-down { transform: rotate(-90deg); }

        .nav-link { 
            color: var(--lab-text); opacity: 0.8; 
            padding: 10px 20px 10px 45px; display: flex; align-items: center; 
            transition: all 0.2s ease; text-decoration: none; cursor: pointer; 
            border-left: 4px solid transparent; font-size: 14px; 
        }
        .nav-link:hover { background: var(--lab-hover); opacity: 1; }
        .nav-link.active { 
            color: var(--lab-cyan); 
            background: var(--lab-active); 
            border-left: 4px solid var(--lab-cyan); 
            opacity: 1; font-weight: 500;
        }

        /* =========================================
           5. 風格切換按鈕容器 (Theme Switcher)
           ========================================= */
        .theme-switcher {
            position: fixed;
            top: 8px; /* 移至頂部，完美嵌入 Navbar 內 */
            left: 50%; /* 水平置中 */
            transform: translateX(-50%); /* 修正自身寬度置中 */
            z-index: 1050; /* 確保在 Navbar 之上 */
            display: flex;
            gap: 12px;
            background: var(--lab-sidebar);
            padding: 8px 16px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid var(--lab-border);
            transition: background 0.4s ease, border-color 0.4s ease;
        }
        .theme-btn {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s ease, border-color 0.2s ease;
            opacity: 0.8;
            box-sizing: border-box;
        }
        .theme-btn:hover { transform: scale(1.15); opacity: 1; }
        .theme-btn.active { border-color: var(--lab-text); transform: scale(1.15); opacity: 1; }
    </style>
</head>

<script>
    /**
     * =========================================
     * 宇宙 16 級別模型 - 輕量化纖維網 (Pseudo-3D)
     * 從 Univer.py 抽取的巨型結構演算法，轉化為 Canvas 渲染
     * =========================================
     */
    let universeAnimFrameId = null;

    function initUniverseSimulation() {
        const canvas = document.getElementById('universe-canvas');
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // 參數設定：效能極限的 16 級宇宙網
        const NUM_NODES = 280;     // 節點總數量 (已大幅降低參數)
        const MAX_LINK_DIST = 180; // 形成纖維的極限距離
        const CLUSTER_COUNT = 4;   // 模擬超星系團中心點 (如拉尼亞凱亞、史隆長城)

        const nodes = [];
        const links = [];

        // 1. 生成大尺度結構的引力中心
        const clusters = [];
        for(let i=0; i<CLUSTER_COUNT; i++) {
            clusters.push({
                x: (Math.random() - 0.5) * 1000,
                y: (Math.random() - 0.5) * 1000,
                z: (Math.random() - 0.5) * 1000
            });
        }

        // 2. 依照密度分佈生成星系節點
        for (let i = 0; i < NUM_NODES; i++) {
            // 85% 集中在骨架上，15% 散佈在空洞區
            let c = Math.random() > 0.15 ? clusters[Math.floor(Math.random() * CLUSTER_COUNT)] : {x:0, y:0, z:0};
            let spread = Math.random() > 0.15 ? 250 : 900; 
            
            nodes.push({
                x: c.x + (Math.random() - 0.5) * spread,
                y: c.y + (Math.random() - 0.5) * spread,
                z: c.z + (Math.random() - 0.5) * spread,
                size: Math.random() * 1.5 + 0.5, // 質量/大小
                driftX: (Math.random() - 0.5) * 0.15,
                driftY: (Math.random() - 0.5) * 0.15,
                driftZ: (Math.random() - 0.5) * 0.15
            });
        }

        // 3. 預先計算纖維連線 (取代 cKDTree)，節省每幀運算
        for (let i = 0; i < NUM_NODES; i++) {
            for (let j = i + 1; j < NUM_NODES; j++) {
                const dx = nodes[i].x - nodes[j].x;
                const dy = nodes[i].y - nodes[j].y;
                const dz = nodes[i].z - nodes[j].z;
                const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                
                if (dist < MAX_LINK_DIST) {
                    links.push({ source: i, target: j, dist: dist });
                }
            }
        }

        let angleX = 0;
        let angleY = 0;

        function renderUniverse() {
            // 帶有殘影效果的深色宇宙背景
            ctx.fillStyle = 'rgba(12, 12, 18, 0.3)'; 
            ctx.fillRect(0, 0, width, height);

            // 整個宇宙網緩慢旋轉 (模擬巨觀視角)
            angleX += 0.0004;
            angleY += 0.0009;

            const cosX = Math.cos(angleX), sinX = Math.sin(angleX);
            const cosY = Math.cos(angleY), sinY = Math.sin(angleY);

            const projectedNodes = [];
            const fov = 900;
            const viewerZ = 1300; // 視角拉遠

            // 4. 進行 3D 空間投影
            for (let i = 0; i < NUM_NODES; i++) {
                let n = nodes[i];
                
                // 天體微小漂移
                n.x += n.driftX; n.y += n.driftY; n.z += n.driftZ;

                // 繞 Y 軸旋轉矩陣
                let x1 = n.x * cosY - n.z * sinY;
                let z1 = n.z * cosY + n.x * sinY;
                
                // 繞 X 軸旋轉矩陣
                let y2 = n.y * cosX - z1 * sinX;
                let z2 = z1 * cosX + n.y * sinX;

                // 轉換為螢幕 2D 座標 (透視法)
                let scale = fov / (fov + z2 + viewerZ);
                let px = width / 2 + x1 * scale;
                let py = height / 2 + y2 * scale;

                projectedNodes.push({ px, py, scale, z: z2 });
            }

            // 5. 繪製纖維網絡 (宇宙暗物質骨架)
            ctx.lineWidth = 0.8;
            for (let i = 0; i < links.length; i++) {
                let link = links[i];
                let n1 = projectedNodes[link.source];
                let n2 = projectedNodes[link.target];
                
                // 景深剔除：只畫出現在鏡頭前方的線條
                if (n1.z > -viewerZ + 200 && n2.z > -viewerZ + 200) {
                    let avgZ = (n1.z + n2.z) / 2;
                    let depthAlpha = Math.max(0, 1 - (avgZ + 500) / 1500); // 越深越暗
                    
                    if (depthAlpha > 0) {
                        // 使用紫色系表現暗物質纖維 (契合 LSU Theme)
                        ctx.strokeStyle = `rgba(148, 18, 188, ${depthAlpha * 0.6})`;
                        ctx.beginPath();
                        ctx.moveTo(n1.px, n1.py);
                        ctx.lineTo(n2.px, n2.py);
                        ctx.stroke();
                    }
                }
            }

            // 6. 繪製超星系團節點 (發光核心)
            for (let i = 0; i < NUM_NODES; i++) {
                let p = projectedNodes[i];
                if (p.z > -viewerZ + 100) {
                    let size = Math.max(0.1, nodes[i].size * p.scale * 1.5);
                    let depthAlpha = Math.max(0, 1 - (p.z + 500) / 1500);
                    
                    // 核心高光 (LSU/兄弟象 金黃色)
                    ctx.fillStyle = `rgba(253, 208, 35, ${depthAlpha * 0.9})`; 
                    ctx.beginPath();
                    ctx.arc(p.px, p.py, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            universeAnimFrameId = requestAnimationFrame(renderUniverse);
        }

        renderUniverse();
        console.log("[System] 第 16 級可觀測宇宙 (輕量纖維結構) 渲染引擎已啟動");
    }

    // 啟動登入背景模型
    window.addEventListener('DOMContentLoaded', initUniverseSimulation);


    /**
     * [手動偵錯程序加回]
     */
    window.sysLog = function(msg, type = '') {
        console.log(`[${type.toUpperCase() || 'LOG'}] ${msg}`);
        
        if (window.DebugInstance && typeof window.DebugInstance.addLog === 'function') {
            window.DebugInstance.addLog(type || 'info', msg);
            return;
        }

        const logBox = document.getElementById('debug-log');
        if (logBox) {
            const div = document.createElement('div');
            const colors = { err: '#f87171', error: '#f87171', success: 'var(--lab-cyan)', warn: '#fbbf24', info: '#94a3b8' };
            div.style.color = colors[type.toLowerCase()] || '#94a3b8';
            div.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
            div.style.padding = '3px 0';
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logBox.appendChild(div);
            logBox.scrollTop = logBox.scrollHeight;
        }
    };

    window.addEventListener('message', (event) => {
        if (event.data && event.data.source === 'AI_STUDIO_APP') {
            const { type, content } = event.data;
            window.sysLog(content, type);
        }
    });

    function base64UrlDecode(str) {
        let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
        while (base64.length % 4) { base64 += '='; }
        return decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    }

    window.handleCredentialResponse = async (response) => {
        window.sysLog("收到憑證，開始驗證...", "success");
        try {
            const payload = JSON.parse(base64UrlDecode(response.credential.split('.')[1]));
            const userEmail = payload.email.toLowerCase();

            const res = await fetch('./manifest.json?v=' + Date.now());
            window.appConfig = await res.json();

            const allowed = (window.appConfig.ai_lab_config.env.ALLOWED_USERS || []).map(u => u.toLowerCase());
            if (allowed.includes(userEmail) || userEmail.endsWith("@dunyang.com.tw")) {
                window.sysLog("驗證通過！解鎖系統。", "success");
                sessionStorage.setItem('ai_lab_auth', 'true');
                sessionStorage.setItem('user_email', userEmail);
                
                if (window.startSystem) {
                    window.startSystem();
                } else {
                    window.dispatchEvent(new CustomEvent('manual-start'));
                }
            } else {
                alert("未經授權: " + userEmail);
            }
        } catch (e) { window.sysLog("解析錯誤: " + e.message, "err"); }
    };

    const dragWin = document.getElementById("debug-log-window");
    const dragHeader = document.getElementById("debug-header");
    let isDragging = false, startX, startY, transX = 0, transY = 0;

    window.toggleDebugWindow = () => {
        dragWin.style.display = (dragWin.style.display === 'none' || dragWin.style.display === '') ? 'flex' : 'none';
    };

    dragHeader.addEventListener('mousedown', (e) => {
        isDragging = true;
        startX = e.clientX - transX;
        startY = e.clientY - transY;
        dragHeader.style.cursor = 'grabbing';
    });
    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        transX = e.clientX - startX;
        transY = e.clientY - startY;
        dragWin.style.transform = `translate(${transX}px, ${transY}px)`;
    });
    document.addEventListener('mouseup', () => {
        isDragging = false;
        dragHeader.style.cursor = 'move';
    });

    window.changeTheme = function(themeName, el) {
        document.documentElement.setAttribute('data-theme', themeName);
        
        document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
        if (el) {
            el.classList.add('active');
        } else {
            const target = document.querySelector(`.theme-btn[onclick*='${themeName}']`);
            if (target) target.classList.add('active');
        }
        
        localStorage.setItem('ai_lab_theme', themeName);
        if (window.sysLog) window.sysLog(`介面風格切換至: ${themeName}`, "info");
    };

    async function initTheme() {
        const savedTheme = localStorage.getItem('ai_lab_theme') || 'lsu'; 
        window.changeTheme(savedTheme);
    }
    
    window.addEventListener('DOMContentLoaded', initTheme);
</script>

<script type="module">
    import AppLoader from './core/AppLoader.js';
    import { debugSystem } from './core/DebugSystem.js';

    /**
     * [核心啟動程序]
     */
    window.startSystem = function() {
        // --- 【效能保護機制】徹底銷毀宇宙模型，釋放資源給主系統 ---
        if (universeAnimFrameId !== null) {
            cancelAnimationFrame(universeAnimFrameId);
            window.sysLog("宇宙背景模型已暫停 (釋放運算資源)", "warn");
        }
        const universeCanvas = document.getElementById('universe-canvas');
        if (universeCanvas) {
            universeCanvas.remove(); // 從 DOM 徹底移除，觸發瀏覽器 GC
        }
        // ----------------------------------------

        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('main-layout').style.display = 'flex';
        document.getElementById('user-display').innerText = sessionStorage.getItem('user_email');
        
        window.DebugInstance = debugSystem; 
        window.sysLog("系統核心解鎖成功 (Kernel Active)", "success");
        
        if (AppLoader && window.appConfig) {
            const loader = new AppLoader(window.appConfig);
            loader.renderMenu('menu-container');
        }
    };

    async function init() {
        try {
            const response = await fetch('./manifest.json?v=' + Date.now());
            window.appConfig = await response.json();
            document.getElementById('sys-version').innerText = window.appConfig.ai_lab_config.version;
            
            if (sessionStorage.getItem('ai_lab_auth') === 'true') {
                window.startSystem();
            }
        } catch (e) { console.error("Init Error", e); }
    }

    window.addEventListener('manual-start', window.startSystem);
    
    init();
    
    window.logout = () => { 
        sessionStorage.clear(); 
        location.reload(); 
    };
</script>
</body>
</html>
