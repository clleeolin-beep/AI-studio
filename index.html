<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>惇陽 AI 實驗室 | 模組化控制台</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: rgba(20, 30, 48, 0.95);
            --primary-blue: #1A5276;
            --accent-cyan: #00f2ff;
            --text-main: #e0e0e0;
            --sidebar-width: 260px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
        }

        #app-container { display: flex; height: 100vh; width: 100vw; }

        /* 側邊欄 */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--primary-blue);
            display: flex; flex-direction: column; z-index: 100;
        }

        .sidebar-header {
            padding: 25px 20px; text-align: center; font-size: 1.2rem; font-weight: bold;
            color: var(--accent-cyan); border-bottom: 1px solid rgba(26, 82, 118, 0.5);
            text-shadow: 0 0 10px var(--accent-cyan);
        }

        #menu-list { flex: 1; overflow-y: auto; padding: 15px; }
        .menu-group-title { font-size: 11px; color: #566573; margin: 15px 0 8px 5px; text-transform: uppercase; letter-spacing: 1px; }

        .menu-item {
            display: flex; align-items: center; padding: 12px 15px; margin-bottom: 5px;
            border-radius: 6px; cursor: pointer; transition: all 0.2s;
            background: rgba(255,255,255,0.03); border: 1px solid transparent;
        }

        .menu-item:hover { background: rgba(0, 242, 255, 0.1); border-color: var(--accent-cyan); }
        .menu-item.active { background: var(--primary-blue); border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        /* 主視窗 */
        #main-viewport { flex: 1; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }

        /* 系統狀態列 */
        #status-bar { height: 30px; background: #141e30; border-top: 1px solid var(--primary-blue); font-size: 11px; display: flex; align-items: center; padding: 0 15px; color: #566573; justify-content: space-between; }

        /* 可拖移偵錯視窗 */
        #global-debug {
            position: absolute; bottom: 50px; left: 280px; width: 400px; height: 250px;
            background: rgba(0, 0, 0, 0.9); border: 1px solid #ff4444; border-radius: 8px;
            display: none; flex-direction: column; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .debug-header { padding: 10px; background: #ff4444; color: white; font-size: 12px; font-weight: bold; cursor: move; display: flex; justify-content: space-between; }
        #debug-log { flex: 1; padding: 10px; font-family: 'Consolas', monospace; font-size: 11px; overflow-y: auto; color: #00ff00; }
    </style>
</head>
<body>

<div id="app-container">
    <aside id="sidebar">
        <div class="sidebar-header">AI LAB STUDIO</div>
        <div id="menu-list">
            <div class="menu-group-title">核心工具</div>
            <div class="menu-item active" onclick="switchTool('map.html', this)"><span>🌐 空間實績地圖</span></div>
            <div class="menu-item" onclick="switchTool('Gantt.html', this)"><span>📊 專案進度管理</span></div>
            <div class="menu-item" onclick="switchTool('AI實驗室-Github串聯NAS.html', this)"><span>🔗 NAS 自動化連動</span></div>

            <div class="menu-group-title">工程工具庫</div>
            <div class="menu-item" onclick="switchTool('calc.html', this)"><span>📐 工程換算引擎</span></div>
            <div class="menu-item" onclick="switchTool('green.html', this)"><span>🌿 植栽選取工具</span></div>
            <div class="menu-item" onclick="switchTool('doc.html', this)"><span>📝 公文智能助手</span></div>

            <div class="menu-group-title">數據與環境</div>
            <div class="menu-item" onclick="switchTool('Weather.html', this)"><span>☁️ 氣象監測系統</span></div>
            <div class="menu-item" onclick="switchTool('BusinessCard_Vision.html', this)"><span>🪪 數位名片管理</span></div>
            <div class="menu-item" onclick="switchTool('tutorial.html', this)"><span>📖 操作教學指南</span></div>
        </div>
        
        <div id="status-bar">
            <span id="system-msg">核心啟動完成</span>
            <button onclick="toggleDebug()" style="background:none; border:1px solid #444; color:#888; cursor:pointer; font-size:9px; border-radius:3px;">DEBUG</button>
        </div>
    </aside>

    <main id="main-viewport">
        <iframe id="content-frame" src="modules/map.html"></iframe>
    </main>
</div>

<div id="global-debug">
    <div class="debug-header" id="debug-drag"><span>SYSTEM CONSOLE</span><span onclick="toggleDebug()" style="cursor:pointer;">✖</span></div>
    <div id="debug-log"></div>
</div>

<script>
    const frame = document.getElementById('content-frame');
    const msgEl = document.getElementById('system-msg');
    const debugLog = document.getElementById('debug-log');

    function switchTool(fileName, el) {
        const targetPath = `modules/${fileName}`;
        frame.src = targetPath;
        document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        el.classList.add('active');
        logDebug(`切換模組: ${fileName}`);
        msgEl.innerText = `目前位置: ${fileName}`;
    }

    function logDebug(msg) {
        const time = new Date().toLocaleTimeString();
        debugLog.innerHTML += `<div><span style="color:#888;">[${time}]</span> ${msg}</div>`;
        debugLog.scrollTop = debugLog.scrollHeight;
    }

    function toggleDebug() {
        const panel = document.getElementById('global-debug');
        panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
    }

    // 拖移邏輯
    const debugWin = document.getElementById("global-debug");
    const debugHdr = document.getElementById("debug-drag");
    let isDragging = false, offset = [0, 0];

    debugHdr.onmousedown = (e) => { isDragging = true; offset = [debugWin.offsetLeft - e.clientX, debugWin.offsetTop - e.clientY]; };
    document.onmousemove = (e) => { if (isDragging) { debugWin.style.left = (e.clientX + offset[0]) + "px"; debugWin.style.top = (e.clientY + offset[1]) + "px"; }};
    document.onmouseup = () => isDragging = false;

    window.onload = () => logDebug("AI 實驗室核心環境載入成功。");
</script>

</body>
</html>
