<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio | 惇陽 AI 實驗室</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" href="data:image/x-icon;base64,="> 
    <script src="https://accounts.google.com/gsi/client"></script>
    
    <style>
        :root { --lab-cyan: #00f2ff; --lab-bg: #0f172a; --lab-sidebar: #1e293b; }
        body, html { background: var(--lab-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; }
        
        .navbar { background: #000 !important; border-bottom: 1px solid #334155; height: 56px; padding: 0 20px; flex-shrink: 0; }
        .navbar-brand { color: var(--lab-cyan) !important; font-weight: 800; }
        
        #auth-overlay { position: fixed; inset: 0; background: var(--lab-bg); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: #1e293b; padding: 30px; border-radius: 20px; border: 1px solid #334155; text-align: center; width: 450px; }
        
        #main-layout { display: none; height: calc(100vh - 56px); width: 100%; overflow: hidden; }
        .sidebar { width: 280px; min-width: 280px; background: var(--lab-sidebar); border-right: 1px solid #334155; display: flex; flex-direction: column; height: 100%; overflow-y: auto; }

        #debug-log-window { 
            position: fixed; bottom: 20px; right: 20px; width: 500px; height: 350px;
            background: rgba(0, 0, 0, 0.9); border: 2px solid var(--lab-cyan); border-radius: 12px;
            z-index: 10000; display: none; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); user-select: none;
        }
        #debug-header { 
            padding: 8px 15px; background: var(--lab-sidebar); border-bottom: 1px solid #334155;
            display: flex; justify-content: space-between; align-items: center; cursor: move; border-radius: 10px 10px 0 0;
        }
        #debug-log { 
            flex-grow: 1; font-family: 'Consolas', monospace; font-size: 11px; color: #00ff00; 
            padding: 10px; overflow-y: auto; word-break: break-all; user-select: text;
        }

        .content-area { flex-grow: 1; background: #000; position: relative; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        .category-item { cursor: pointer; padding: 12px 20px; background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-between; align-items: center; color: #cbd5e1; font-weight: 600; font-size: 13px; }
        .module-group { max-height: 1000px; overflow: hidden; transition: max-height 0.4s ease-out; }
        .module-group.collapsed { max-height: 0; }
        .bi-chevron-down { transition: transform 0.3s; font-size: 10px; }
        .collapsed .bi-chevron-down { transform: rotate(-90deg); }

        .nav-link { color: #94a3b8; padding: 10px 20px 10px 45px; display: flex; align-items: center; transition: 0.3s; text-decoration: none; cursor: pointer; border-left: 4px solid transparent; font-size: 14px; }
        .nav-link:hover { color: var(--lab-cyan); background: rgba(0,242,255,0.05); }
        .nav-link.active { color: var(--lab-cyan); background: rgba(0,242,255,0.1); border-left: 4px solid var(--lab-cyan); }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-box">
            <div class="mb-3" style="font-size: 2.5rem; color: var(--lab-cyan);"><i class="bi bi-cpu-fill"></i></div>
            <h2 class="mb-2 fw-bold" style="color: var(--lab-cyan);">AI Studio Lab</h2>
            <p class="text-muted mb-4 small">安全性管制中 (v2.2.3)</p>
            <div id="g_id_onload" data-client_id="387000422543-vsh0lrio7a3kn3nqgrfp8l4ol413bq90.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
            <div class="g_id_signin d-flex justify-content-center" data-type="standard" data-theme="filled_black" data-size="large"></div>
        </div>
    </div>

    <nav class="navbar navbar-dark d-flex justify-content-between">
        <a class="navbar-brand m-0" href="#"><i class="bi bi-intersect me-2"></i>AI STUDIO <span class="badge bg-dark text-cyan border border-info ms-2" id="sys-version" style="color:var(--lab-cyan)">--</span></a>
        <div class="d-flex align-items-center">
            <button class="btn btn-sm btn-outline-info me-3" onclick="toggleDebugWindow()"><i class="bi bi-terminal me-1"></i>偵錯</button>
            <span id="user-display" class="me-3 small text-muted font-monospace"></span>
            <button class="btn btn-sm btn-outline-danger border-0" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
        </div>
    </nav>

    <div id="debug-log-window">
        <div id="debug-header">
            <span style="font-size: 12px; font-weight: bold; color: var(--lab-cyan);">🛠️ SYSTEM DEBUG TERMINAL</span>
            <i class="bi bi-x-lg" style="cursor:pointer;" onclick="toggleDebugWindow()"></i>
        </div>
        <div id="debug-log"></div>
    </div>

    <div id="main-layout" class="d-flex">
        <aside class="sidebar"><div id="menu-container"></div></aside>
        <main class="content-area"><iframe id="main-frame" name="main-frame" src="about:blank"></iframe></main>
    </div>

<script>
    /**
     * [AI Lab 核心監聽機制]
     * 監聽來自所有子 Iframe (如 MapEditor) 的跨域訊息
     */
    window.addEventListener('message', (event) => {
        if (event.data && event.data.source === 'AI_STUDIO_APP') {
            const { type, content } = event.data;
            window.sysLog(content, type || 'info');
        }
    });

    // 1. 基礎日誌工具：優化對接邏輯
    window.sysLog = function(msg, type = '') {
        const typeKey = type.toLowerCase();
        console.log(`[${typeKey.toUpperCase() || 'LOG'}] ${msg}`);
        
        const logBox = document.getElementById('debug-log');
        if (logBox) {
            const div = document.createElement('div');
            // 統一顏色規範
            const colors = { err: '#ff4b4b', error: '#ff4b4b', success: '#00f2ff', warn: '#ffbb33' };
            div.style.color = colors[typeKey] || '#0f0';
            div.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
            div.style.padding = '2px 0';
            div.innerText = `[${new Date().toLocaleTimeString('zh-TW', {hour12:false})}] ${msg}`;
            
            logBox.appendChild(div);
            logBox.scrollTop = logBox.scrollHeight;
        }
    };

    function base64UrlDecode(str) {
        let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
        while (base64.length % 4) { base64 += '='; }
        return decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    }

    window.handleCredentialResponse = async (response) => {
        window.sysLog("收到憑證，開始驗證...", "success");
        try {
            const payload = JSON.parse(base64UrlDecode(response.credential.split('.')[1]));
            const userEmail = payload.email.toLowerCase();
            window.sysLog("使用者身份：" + userEmail);

            if (!window.appConfig) {
                const res = await fetch('./manifest.json?v=' + Date.now());
                window.appConfig = await res.json();
            }

            const allowed = (window.appConfig.ai_lab_config.env.ALLOWED_USERS || []).map(u => u.toLowerCase());
            if (allowed.includes(userEmail) || userEmail.endsWith("@dunyang.com.tw")) {
                window.sysLog("驗證通過！解鎖系統介面。", "success");
                sessionStorage.setItem('ai_lab_auth', 'true');
                sessionStorage.setItem('user_email', userEmail);
                if (window.startSystem) window.startSystem();
            } else {
                window.sysLog("權限拒絕：" + userEmail, "err");
                alert("您不在授權名單中: " + userEmail);
            }
        } catch (e) { window.sysLog("解析錯誤: " + e.message, "err"); }
    };

    window.toggleDebugWindow = () => {
        const win = document.getElementById('debug-log-window');
        if (!win) return;
        win.style.display = (win.style.display === 'none' || win.style.display === '') ? 'flex' : 'none';
    };

    // 視窗拖移邏輯保持不變
    const dragWin = document.getElementById("debug-log-window");
    const dragHeader = document.getElementById("debug-header");
    let isDragging = false, startX, startY, transX = 0, transY = 0;

    dragHeader.addEventListener('mousedown', (e) => {
        isDragging = true;
        startX = e.clientX - transX;
        startY = e.clientY - transY;
        dragHeader.style.cursor = 'grabbing';
    });
    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        transX = e.clientX - startX;
        transY = e.clientY - startY;
        dragWin.style.transform = `translate(${transX}px, ${transY}px)`;
    });
    document.addEventListener('mouseup', () => {
        isDragging = false;
        if(dragHeader) dragHeader.style.cursor = 'move';
    });
</script>

<script type="module">
    import AppLoader from './core/AppLoader.js';
    import { DebugSystem } from './core/DebugSystem.js';

    window.startSystem = function() {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('main-layout').style.display = 'flex';
        document.getElementById('user-display').innerText = sessionStorage.getItem('user_email');
        
        // 優先啟動偵錯系統
        if (DebugSystem) {
            window.DebugInstance = new DebugSystem(); 
            window.sysLog("系統核心解鎖成功 (DebugSystem Active)", "success");
        }
        
        // 載入應用選單
        if (AppLoader && window.appConfig) {
            const loader = new AppLoader(window.appConfig);
            loader.renderMenu('menu-container');
        }
    };

    async function init() {
        try {
            const response = await fetch('./manifest.json?v=' + Date.now());
            window.appConfig = await response.json();
            document.getElementById('sys-version').innerText = window.appConfig.ai_lab_config.version;
            if (sessionStorage.getItem('ai_lab_auth') === 'true') window.startSystem();
        } catch (e) { console.error("Init Error", e); }
    }
    init();
    window.logout = () => { sessionStorage.clear(); location.reload(); };
</script>
</body>
</html>
