<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>惇陽 AI 實驗室 | AI Studio v2.0</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A5276">

    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: rgba(20, 30, 48, 0.95);
            --primary-blue: #1A5276;
            --accent-cyan: #00f2ff;
            --text-main: #e0e0e0;
            --sidebar-width: 260px;
            --sidebar-collapsed-width: 70px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
        }

        #app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* --- 側邊導覽列 --- */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--primary-blue);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* 收折狀態樣式 */
        #sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
        }

        .sidebar-header {
            padding: 25px 10px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-cyan);
            border-bottom: 1px solid rgba(26, 82, 118, 0.3);
            white-space: nowrap;
            overflow: hidden;
        }

        #sidebar.collapsed .sidebar-header {
            font-size: 0.8rem;
        }

        #menu-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            scrollbar-width: thin;
        }

        /* 分類標題樣式 */
        .category-header {
            font-size: 11px;
            color: #566573;
            margin: 15px 0 8px 12px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            transition: opacity 0.2s;
        }

        #sidebar.collapsed .category-header {
            opacity: 0;
            margin: 10px 0;
        }

        /* 選單項目樣式 */
        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
            overflow: hidden;
        }

        #sidebar.collapsed .menu-item {
            padding: 12px 0;
            justify-content: center;
        }

        .menu-item:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--accent-cyan);
        }

        .menu-item.active {
            background: var(--primary-blue);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .menu-item span {
            margin-left: 12px;
            white-space: nowrap;
            transition: opacity 0.2s;
        }

        #sidebar.collapsed .menu-item span {
            display: none;
        }

        .menu-icon {
            font-size: 1.2rem;
            min-width: 24px;
            text-align: center;
        }

        /* 收折按鈕 */
        .collapse-btn {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(26, 82, 118, 0.5);
            color: var(--accent-cyan);
            font-size: 1.2rem;
            transition: background 0.2s;
        }

        .collapse-btn:hover {
            background: rgba(0, 242, 255, 0.1);
        }

        /* 主視窗區 */
        #main-viewport {
            flex: 1;
            position: relative;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 系統狀態列 */
        #status-bar {
            height: 30px;
            background: #141e30;
            border-top: 1px solid var(--primary-blue);
            font-size: 11px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: #566573;
            justify-content: space-between;
        }

        #global-debug {
            position: absolute;
            bottom: 50px;
            left: 280px;
            width: 450px;
            height: 280px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #ff4444;
            border-radius: 8px;
            display: none;
            flex-direction: column;
            z-index: 9999;
        }

        .debug-header {
            padding: 10px;
            background: #ff4444;
            color: white;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            cursor: move;
        }

        #debug-log {
            flex: 1;
            padding: 10px;
            font-family: monospace;
            font-size: 11px;
            overflow-y: auto;
            color: #00ff00;
            background: #000;
        }
    </style>
</head>
<body>

<div id="app-container">
    <aside id="sidebar">
        <div class="sidebar-header">AI STUDIO</div>
        <div id="menu-list">
            <div style="padding: 20px; color: #444; font-size: 12px;">系統載入中...</div>
        </div>
        
        <div class="collapse-btn" onclick="toggleSidebar()" title="切換選單寬度">◀</div>

        <div id="status-bar">
            <span id="system-msg">核心啟動中...</span>
            <button style="background:none; border:1px solid #444; color:#888; font-size:10px; cursor:pointer;" onclick="toggleDebug()">DEBUG</button>
        </div>
    </aside>

    <main id="main-viewport">
        <iframe id="content-frame" name="tool-frame" src="about:blank"></iframe>
    </main>
</div>

<div id="global-debug">
    <div class="debug-header" id="debug-drag">
        <span>SYSTEM MONITOR</span>
        <span onclick="toggleDebug()" style="cursor:pointer;">✖</span>
    </div>
    <div id="debug-log"></div>
</div>

<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const btn = document.querySelector('.collapse-btn');
        sidebar.classList.toggle('collapsed');
        btn.innerText = sidebar.classList.contains('collapsed') ? '▶' : '◀';
    }

    function toggleDebug() {
        const panel = document.getElementById('global-debug');
        panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
    }

    // 拖移邏輯
    (function() {
        const win = document.getElementById("global-debug");
        const hdr = document.getElementById("debug-drag");
        let isDrag = false, offset = [0, 0];
        hdr.onmousedown = (e) => { isDrag = true; offset = [win.offsetLeft - e.clientX, win.offsetTop - e.clientY]; };
        document.onmousemove = (e) => { if (isDrag) { win.style.left = (e.clientX + offset[0]) + "px"; win.style.top = (e.clientY + offset[1]) + "px"; }};
        document.onmouseup = () => isDrag = false;
    })();
</script>

<script src="core/DebugSystem.js"></script>
<script src="core/AppLoader.js"></script>

</body>
</html>
