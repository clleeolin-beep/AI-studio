<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio | 惇陽 AI 實驗室</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" href="data:image/x-icon;base64,="> 
    <script src="https://accounts.google.com/gsi/client"></script>
    
    <style>
        :root { --lab-cyan: #00f2ff; --lab-bg: #0f172a; --lab-sidebar: #1e293b; }
        body { background: var(--lab-bg); color: white; font-family: 'Segoe UI', Microsoft JhengHei, sans-serif; margin: 0; overflow: hidden; }
        .navbar { background: #000 !important; border-bottom: 1px solid #334155; height: 56px; z-index: 1001; }
        .navbar-brand { color: var(--lab-cyan) !important; font-weight: 800; letter-spacing: 1px; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--lab-bg); z-index: 2000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: #1e293b; padding: 30px; border-radius: 20px; border: 1px solid #334155; box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center; max-width: 450px; width: 90%; }
        #main-layout { display: none; height: calc(100vh - 56px); }
        .sidebar { width: 260px; background: var(--lab-sidebar); border-right: 1px solid #334155; overflow-y: auto; }
        .content-area { flex-grow: 1; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        #debug-console { 
            width: 100%; height: 180px; background: #000; color: #0f0; 
            font-family: monospace; font-size: 11px; padding: 12px; 
            margin-top: 25px; border-radius: 8px; border: 1px solid #00f2ff;
            overflow-y: auto; text-align: left; line-height: 1.5;
        }
        .log-item { border-bottom: 1px solid #1a1a1a; padding: 2px 0; }
        .log-err { color: #ff4b4b; }
        .log-success { color: #00f2ff; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-box">
            <div class="mb-3" style="font-size: 2.5rem; color: var(--lab-cyan);"><i class="bi bi-cpu-fill"></i></div>
            <h2 class="mb-2 fw-bold" style="color: var(--lab-cyan);">AI Studio Lab</h2>
            <p class="text-muted mb-4 small">權限驗證中 (Base64URL 協議版)</p>
            
            <div id="g_id_onload"
                 data-client_id="387000422543-vsh0lrio7a3kn3nqgrfp8l4ol413bq90.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin d-flex justify-content-center" data-type="standard" data-shape="rectangular" data-theme="filled_black" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
            
            <div id="debug-console"></div>
        </div>
    </div>

    <nav class="navbar navbar-dark px-4 d-flex justify-content-between">
        <a class="navbar-brand m-0" href="#"><i class="bi bi-intersect me-2"></i>AI STUDIO <span class="badge bg-dark text-cyan border border-info ms-2" id="sys-version" style="color:var(--lab-cyan)">--</span></a>
        <div class="d-flex align-items-center">
            <span id="user-display" class="me-3 small text-muted font-monospace"></span>
            <button class="btn btn-sm btn-outline-danger border-0" onclick="logout()" title="安全登出"><i class="bi bi-box-arrow-right"></i></button>
        </div>
    </nav>

    <div id="main-layout" class="d-flex">
        <aside class="sidebar"><div id="menu-container"></div></aside>
        <main class="content-area"><iframe id="main-frame" name="main-frame" src="views/knowledge/tutorial.html"></iframe></main>
    </div>

    <script>
        const debugEl = document.getElementById('debug-console');
        window.sysLog = function(msg, type = '') {
            const div = document.createElement('div');
            div.className = 'log-item' + (type ? ' log-' + type : '');
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            if(debugEl) {
                debugEl.appendChild(div);
                debugEl.scrollTop = debugEl.scrollHeight;
            }
        };
        window.sysLog("Base64URL 協議初始化...");
    </script>

    <script>
        /**
         * Base64URL 解碼器 (解決 atob 報錯)
         */
        function base64UrlDecode(str) {
            // 1. 替換網址安全字元
            let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
            
            // 2. 補足長度使之成為 4 的倍數 (Padding)
            const pad = base64.length % 4;
            if (pad) {
                if (pad === 1) throw new Error("無效的 Base64URL 字串");
                base64 += new Array(5 - pad).join('=');
            }

            // 3. 使用 atob 轉換並處理 Unicode 亂碼問題
            try {
                return decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            } catch (err) {
                throw new Error("atob 解析失敗: " + err.message);
            }
        }

        window.handleCredentialResponse = async function(response) {
            window.sysLog("收到憑證，啟動安全解析...", "success");
            try {
                // 取得 JWT Payload 段落
                const parts = response.credential.split('.');
                if (parts.length < 2) throw new Error("JWT 格式不完整");

                // 使用 Base64URL 協議解析
                const jsonPayload = base64UrlDecode(parts[1]);
                const payload = JSON.parse(jsonPayload);
                const userEmail = payload.email.toLowerCase();
                window.sysLog("解碼成功: " + userEmail, "success");

                // 確保配置已準備好
                if (!window.appConfig) {
                    window.sysLog("正在手動重新抓取設定檔...");
                    const res = await fetch('./manifest.json?v=' + Date.now());
                    window.appConfig = await res.json();
                }

                const allowedUsers = (window.appConfig.ai_lab_config.env.ALLOWED_USERS || []).map(u => u.toLowerCase());
                
                if (allowedUsers.includes(userEmail) || userEmail.endsWith("@dunyang.com.tw")) {
                    window.sysLog("授權通過，正在加載系統...", "success");
                    sessionStorage.setItem('ai_lab_auth', 'true');
                    sessionStorage.setItem('user_email', userEmail);
                    if (typeof window.startSystem === 'function') {
                        window.startSystem();
                    } else {
                        window.sysLog("系統模組載入中，請稍候 1.5 秒...");
                        setTimeout(window.startSystem, 1500);
                    }
                } else {
                    window.sysLog("存取遭拒：您不在授權清單內。", "err");
                }
            } catch (e) {
                window.sysLog("協議解析錯誤: " + e.message, "err");
                console.error(e);
            }
        };
    </script>

    <script type="module">
        import * as AM from './core/AppLoader.js';
        import * as DS from './core/DebugSystem.js';

        const AppLoader = AM.default || AM.AppLoader;
        const DebugSystem = DS.default || DS.DebugSystem;

        window.startSystem = function() {
            try {
                const overlay = document.getElementById('auth-overlay');
                const layout = document.getElementById('main-layout');
                if (!overlay || !layout) return;

                overlay.style.display = 'none';
                layout.style.display = 'flex';
                document.getElementById('user-display').innerText = sessionStorage.getItem('user_email');
                
                if (DebugSystem) window.DebugSystem = new DebugSystem();
                
                if (AppLoader && window.appConfig) {
                    const loader = new AppLoader(window.appConfig);
                    loader.renderMenu('menu-container');
                    window.sysLog("介面初始化完成。", "success");
                } else {
                    throw new Error("AppLoader 模組未就緒");
                }
            } catch (e) {
                window.sysLog("系統啟動失敗: " + e.message, "err");
            }
        };

        async function init() {
            try {
                window.sysLog("加載設定檔...");
                const response = await fetch('./manifest.json?v=' + Date.now());
                window.appConfig = await response.json();
                document.getElementById('sys-version').innerText = window.appConfig.ai_lab_config.version;
                window.sysLog("設定檔加載完成。", "success");

                if (sessionStorage.getItem('ai_lab_auth') === 'true') {
                    window.sysLog("偵測到已有工作階段，自動進入...");
                    window.startSystem();
                }
            } catch (e) {
                window.sysLog("初始化失敗: " + e.message, "err");
            }
        }
        init();
        window.logout = () => { sessionStorage.clear(); location.reload(); };
    </script>
</body>
</html>
