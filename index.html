<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>惇陽 AI 實驗室 | 模組化控制台</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A5276">

    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: rgba(20, 30, 48, 0.95);
            --primary-blue: #1A5276;
            --accent-cyan: #00f2ff;
            --text-main: #e0e0e0;
            --sidebar-width: 260px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
        }

        #app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* 側邊導覽列 */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--primary-blue);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 25px 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-cyan);
            border-bottom: 1px solid rgba(26, 82, 118, 0.5);
            text-shadow: 0 0 10px var(--accent-cyan);
        }

        #menu-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .menu-group-title {
            font-size: 11px;
            color: #566573;
            margin: 15px 0 8px 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 5px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
        }

        .menu-item:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--accent-cyan);
        }

        .menu-item.active {
            background: var(--primary-blue);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        /* 主內容區 */
        #main-viewport {
            flex: 1;
            position: relative;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        /* 系統狀態列 (底部) */
        #status-bar {
            height: 30px;
            background: #141e30;
            border-top: 1px solid var(--primary-blue);
            font-size: 11px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: #566573;
        }
    </style>
</head>
<body>

<div id="app-container">
    <aside id="sidebar">
        <div class="sidebar-header">AI LAB STUDIO</div>
        <div id="menu-list">
            
            <div class="menu-group-title">核心引擎</div>
            <div class="menu-item active" onclick="switchTool('map.html', this)">
                <span>🌐 空間實績地圖</span>
            </div>
            <div class="menu-item" onclick="switchTool('Gantt.html', this)">
                <span>📊 專案進度管埋</span>
            </div>
            <div class="menu-item" onclick="switchTool('AI實驗室-Github串聯NAS.html', this)">
                <span>🔗 NAS 自動化連動</span>
            </div>

            <div class="menu-group-title">工程工具庫</div>
            <div class="menu-item" onclick="switchTool('calc.html', this)">
                <span>📐 工程換算引擎</span>
            </div>
            <div class="menu-item" onclick="switchTool('green.html', this)">
                <span>🌿 植栽選取工具</span>
            </div>
            <div class="menu-item" onclick="switchTool('doc.html', this)">
                <span>📝 公文智能助手</span>
            </div>

            <div class="menu-group-title">現場與環境</div>
            <div class="menu-item" onclick="switchTool('Weather.html', this)">
                <span>☁️ 氣象監測系統</span>
            </div>
            <div class="menu-item" onclick="switchTool('BusinessCard_Vision.html', this)">
                <span>🪪 數位名片管理</span>
            </div>
            <div class="menu-item" onclick="switchTool('tutorial.html', this)">
                <span>📖 操作教學指南</span>
            </div>

        </div>
        
        <div id="status-bar">
            <span id="system-msg">核心啟動完成 | V1.0.0</span>
        </div>
    </aside>

    <main id="main-viewport">
        <iframe id="content-frame" src="modules/map.html"></iframe>
    </main>
</div>

<script>
    /**
     * 切換工具邏輯
     * @param {string} fileName - 位於 modules/ 內的檔案名稱
     * @param {HTMLElement} el - 點擊的選單元素
     */
    function switchTool(fileName, el) {
        const frame = document.getElementById('content-frame');
        const msgEl = document.getElementById('system-msg');
        
        // 自動拼接路徑
        const targetPath = `modules/${fileName}`;
        frame.src = targetPath;

        // UI 狀態切換
        document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        el.classList.add('active');

        // 更新狀態列
        msgEl.innerText = `載入模組: ${fileName} ... 成功`;
        console.log(`[System] Loading module from: ${targetPath}`);
    }

    // 初始化讀取 Manifest (為日後功能擴充預留)
    async function initSystem() {
        try {
            const resp = await fetch('manifest.json');
            const config = await resp.json();
            console.log("System Config Loaded:", config.name);
        } catch (e) {
            console.warn("Manifest loading failed, running in manual mode.");
        }
    }

    window.onload = initSystem;
</script>

</body>
</html>
