<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>氣象大數據分析系統 v9.6 - 專業完整版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/highcharts-more.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --accent: #2563eb; --success: #059669; --bg: #f8fafc; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1500px; margin: auto; }
        
        /* 地圖導航區 */
        #map { height: 350px; border-radius: 15px; margin-bottom: 25px; border: 3px solid var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .info-header { border-left: 10px solid var(--accent); background: #eef2ff; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        
        /* 獨立分析區塊 - 顯式定義架構 */
        .analysis-block { display: grid; grid-template-columns: 350px 1fr; gap: 20px; border-top: 5px solid var(--accent); padding-top: 20px; margin-top: 10px; }
        .control-panel { background: #fdfdfd; padding: 20px; border-radius: 12px; border: 1px solid #eee; }
        .btn-update { background: var(--success); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        .btn-update:hover { background: #047857; }
        
        .option-group { background: #fffbeb; padding: 12px; border-radius: 8px; margin-top: 10px; border: 1px solid #fef3c7; }
        .year-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 8px; font-size: 13px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="map"></div>

    <div class="card info-header">
        <div id="stDisplay"><h3>📡 請點擊地圖標記載入測站資料</h3></div>
        <div id="stMeta" style="color: #64748b;">狀態：待命</div>
    </div>

    <div class="card analysis-block">
        <div class="control-panel">
            <h4>🌡️ 氣溫分析</h4>
            <div id="temp-fields-ui"></div>
            <div class="option-group">
                <strong>年度篩選：</strong>
                <div id="temp-years-ui" class="year-grid"></div>
            </div>
            <button class="btn-update" onclick="drawTemperature()">🔄 更新氣溫圖表</button>
        </div>
        <div id="chart-temp" style="height: 450px;"></div>
    </div>

    <div class="card analysis-block">
        <div class="control-panel">
            <h4>🌧️ 降雨分析</h4>
            <div id="precp-fields-ui"></div>
            <div class="option-group">
                <strong>年度篩選：</strong>
                <div id="precp-years-ui" class="year-grid"></div>
            </div>
            <button class="btn-update" onclick="drawPrecipitation()">🔄 更新降雨圖表</button>
        </div>
        <div id="chart-precp" style="height: 450px;"></div>
    </div>

    <div class="card analysis-block">
        <div class="control-panel">
            <h4>🌬️ 風玫瑰頻率圖</h4>
            <p style="font-size: 12px; color: #666;">基於 16 方位與風速等級累計天數</p>
            <div class="option-group">
                <strong>分析年份：</strong>
                <div id="wind-years-ui" class="year-grid"></div>
            </div>
            <button class="btn-update" onclick="drawWindRose()">🔄 更新風玫瑰圖</button>
        </div>
        <div id="chart-wind" style="height: 500px;"></div>
    </div>

    <div class="card">
        <h3>📅 測站長期統計平均表 (10年累計)</h3>
        <div id="full-table-container" style="overflow-x: auto;"></div>
    </div>
</div>

<script>
    // --- 配置資訊 ---
    const GOOGLE_SHEET_ID = "1-AuVNaVmjnzXP0XqrjjkC8aXVkvn54YTFMYVPadkfXE";
    const STATION_CONFIG = [
        { id: "466920", name: "台北", lat: 25.0376, lon: 121.5149, gid: "1863261962" },
        { id: "466900", name: "淡水", lat: 25.1648, lon: 121.4489, gid: "1350175591" },
        { id: "466881", name: "新北", lat: 24.9592, lon: 121.5252, gid: "1071066236" }
    ];

    const DIRECTIONS = ['北', '北北東', '東北', '東北東', '東', '東南東', '東南', '南南東', '南', '南南西', '西南', '西南西', '西', '西北西', '西北', '北北西'];
    const SPEED_LABELS = ['0-1 m/s', '1-2 m/s', '2-3 m/s', '3-4 m/s', '>4 m/s'];
    const SPEED_COLORS = ['#44546a', '#5b9bd5', '#70ad47', '#ffc000', '#ed7d31'];

    // --- 資料緩衝區 ---
    let activeHeaders = [], activeRows = [], yearlyDataMap = {}, monthlyAvgMap = {};

    // --- 地圖初始化 ---
    const map = L.map('map').setView([25.05, 121.5], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    STATION_CONFIG.forEach(st => {
        L.marker([st.lat, st.lon]).addTo(map)
            .bindTooltip(`<b>${st.name}測站</b>`, { permanent: true, direction: 'top' })
            .on('click', () => syncData(st));
    });

    // --- 資料同步 (徹底物理隔離) ---
    async function syncData(st) {
        document.getElementById('stDisplay').innerHTML = `<h3>🔄 正在獲取：${st.name} 數據...</h3>`;
        document.getElementById('stMeta').innerText = "連線中...";

        // 換站時徹底清空緩衝區
        activeHeaders = []; activeRows = []; yearlyDataMap = {}; monthlyAvgMap = {};

        const url = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/export?format=csv&gid=${st.gid}&t=${Date.now()}`;

        try {
            const response = await fetch(url);
            const csvData = await response.text();
            
            Papa.parse(csvData, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    activeRows = results.data;
                    activeHeaders = results.meta.fields;
                    
                    document.getElementById('stDisplay').innerHTML = `<h3>📍 當前測站：${st.name} (${st.id})</h3>`;
                    document.getElementById('stMeta').innerText = `成功同步 ${activeRows.length} 筆資料`;

                    calculateClimateStats();
                    buildControlUI();
                    
                    // 自動執行全項目繪圖
                    drawTemperature();
                    drawPrecipitation();
                    drawWindRose();
                    renderFullTable();
                }
            });
        } catch (e) {
            alert("讀取失敗，請確認 Google Sheet 權限。");
        }
    }

    function calculateClimateStats() {
        const dataBuffer = {};
        activeRows.forEach(r => {
            const y = r["年"], m = r["月"];
            if (y && m) {
                if (!dataBuffer[y]) dataBuffer[y] = {};
                if (!dataBuffer[y][m]) { 
                    dataBuffer[y][m] = {}; 
                    activeHeaders.forEach(h => dataBuffer[y][m][h] = []); 
                }
                activeHeaders.forEach(h => {
                    const v = parseFloat(r[h]);
                    if (!isNaN(v)) dataBuffer[y][m][h].push(v);
                });
            }
        });

        yearlyDataMap = {};
        for (let y in dataBuffer) {
            yearlyDataMap[y] = {};
            for (let m = 1; m <= 12; m++) {
                yearlyDataMap[y][m] = {};
                activeHeaders.forEach(h => {
                    const arr = dataBuffer[y][m][h] || [];
                    if (arr.length === 0) yearlyDataMap[y][m][h] = 0;
                    else if (h.includes("降水")) yearlyDataMap[y][m][h] = arr.reduce((s, v) => s + v, 0).toFixed(1);
                    else yearlyDataMap[y][m][h] = (arr.reduce((s, v) => s + v, 0) / arr.length).toFixed(2);
                });
            }
        }

        monthlyAvgMap = {};
        for (let m = 1; m <= 12; m++) {
            monthlyAvgMap[m] = {};
            activeHeaders.forEach(h => {
                let sum = 0, count = 0;
                Object.keys(yearlyDataMap).forEach(y => {
                    let val = parseFloat(yearlyDataMap[y][m][h]);
                    if (val !== 0) { sum += val; count++; }
                });
                monthlyAvgMap[m][h] = count > 0 ? (sum / count).toFixed(2) : 0;
            });
        }
    }

    function buildControlUI() {
        const years = Object.keys(yearlyDataMap).sort();
        const yearHTML = years.map(y => `<label><input type="checkbox" class="y-select" value="${y}"> ${y}</label>`).join('');
        
        document.getElementById('temp-years-ui').innerHTML = yearHTML;
        document.getElementById('precp-years-ui').innerHTML = yearHTML;
        document.getElementById('wind-years-ui').innerHTML = yearHTML;

        // 顯式指定欄位
        document.getElementById('temp-fields-ui').innerHTML = activeHeaders.filter(h => h.includes("氣溫")).map((h, i) => 
            `<label style="display:block;"><input type="checkbox" class="t-f-select" value="${h}" ${i==0?'checked':''}> ${h}</label>`
        ).join('');
        document.getElementById('precp-fields-ui').innerHTML = activeHeaders.filter(h => h.includes("降水")).map((h, i) => 
            `<label style="display:block;"><input type="checkbox" class="p-f-select" value="${h}" ${i==0?'checked':''}> ${h}</label>`
        ).join('');
    }

    // --- 獨立繪圖函式 (顯式定義) ---

    function drawTemperature() {
        const selF = Array.from(document.querySelectorAll('.t-f-select:checked')).map(i => i.value);
        const selY = Array.from(document.querySelectorAll('#temp-years-ui .y-select:checked')).map(i => i.value);
        let opts = { chart: { type: 'line' }, title: { text: '氣溫分析' }, xAxis: { categories: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'] }, series: [], credits: { enabled: false } };
        selF.forEach(f => {
            opts.series.push({ name: `10年平均 ${f}`, data: Array.from({length:12}, (_,i)=>parseFloat(monthlyAvgMap[i+1][f])), lineWidth: 4, color: '#333' });
            selY.forEach(y => opts.series.push({ name: `${y}年 ${f}`, data: Array.from({length:12}, (_,i)=>parseFloat(yearlyDataMap[y][i+1][f])) }));
        });
        Highcharts.chart('chart-temp', opts);
    }

    function drawPrecipitation() {
        const selF = Array.from(document.querySelectorAll('.p-f-select:checked')).map(i => i.value);
        const selY = Array.from(document.querySelectorAll('#precp-years-ui .y-select:checked')).map(i => i.value);
        let opts = { chart: { type: 'column' }, title: { text: '降雨分析' }, xAxis: { categories: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'] }, series: [], credits: { enabled: false } };
        selF.forEach(f => {
            opts.series.push({ name: `10年平均 ${f}`, data: Array.from({length:12}, (_,i)=>parseFloat(monthlyAvgMap[i+1][f])), color: '#2563eb' });
            selY.forEach(y => opts.series.push({ name: `${y}年 ${f}`, data: Array.from({length:12}, (_,i)=>parseFloat(yearlyDataMap[y][i+1][f])) }));
        });
        Highcharts.chart('chart-precp', opts);
    }

    function drawWindRose() {
        const selY = Array.from(document.querySelectorAll('#wind-years-ui .y-select:checked')).map(i => i.value);
        let opts = { chart: { polar: true, type: 'column' }, title: { text: '風玫瑰圖' }, xAxis: { categories: DIRECTIONS, tickmarkPlacement: 'on' }, plotOptions: { column: { stacking: 'normal', groupPadding: 0, pointPlacement: 'on' } }, series: [], credits: { enabled: false } };
        
        const mat = Array.from({length: 16}, () => new Array(5).fill(0));
        const rng = [[0,1], [1,2], [2,3], [3,4], [4,99]];

        activeRows.forEach(r => {
            if (selY.length === 0 || selY.includes(String(r["年"]))) {
                const s = parseFloat(r["風速(m/s)(WS)"]), d = parseFloat(r["風向(360degree)(WD)"]);
                if (!isNaN(s) && !isNaN(d)) {
                    let dI = Math.floor((d + 11.25) / 22.5) % 16;
                    let sI = rng.findIndex(g => s >= g[0] && s < g[1]);
                    if (sI !== -1) mat[dI][sI]++;
                }
            }
        });

        rng.forEach((r, i) => opts.series.push({ name: SPEED_LABELS[i], data: mat.map(row => row[i]), color: SPEED_COLORS[i] }));
        Highcharts.chart('chart-wind', opts);
    }

    function renderFullTable() {
        const fs = activeHeaders.filter(h => h.includes("氣溫") || h.includes("降水") || h.includes("風速"));
        let h = `<table><tr><th>月份</th>${fs.map(f => `<th>${f}</th>`).join('')}</tr>`;
        for (let m = 1; m <= 12; m++) {
            h += `<tr><td>${m}月</td>${fs.map(f => `<td>${monthlyAvgMap[m][f] || 0}</td>`).join('')}</tr>`;
        }
        document.getElementById('full-table-container').innerHTML = h + `</table>`;
    }

    // 預設載入第一站
    syncData(STATION_CONFIG[0]);
</script>
</body>
</html>
