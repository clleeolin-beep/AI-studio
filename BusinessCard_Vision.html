<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 實驗室 - 名片智慧處理系統 v3.9</title>
    <script src="https://unpkg.com/tesseract.js@v5.0.0/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --warning: #e67e22; --dark: #2c3e50; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; margin: 0; padding: 20px; padding-bottom: 220px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); max-width: 1100px; margin: auto; display: grid; grid-template-columns: 1fr 380px; gap: 25px; }
        
        /* 左側影像區 */
        .workspace { border-right: 1px solid #eee; padding-right: 20px; }
        #canvasContainer { position: relative; background: #333; border-radius: 8px; cursor: crosshair; overflow: hidden; margin-bottom: 15px; min-height: 400px; display: flex; align-items: center; justify-content: center; }
        canvas { max-width: 100%; height: auto; display: block; margin: 0 auto; }
        
        /* 右側表單區 */
        .form-panel { padding: 10px; }
        .preview-box { background: #ecf0f1; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        #colorPreview { max-width: 100%; border: 3px solid white; box-shadow: 0 3px 10px rgba(0,0,0,0.15); border-radius: 4px; }
        
        input[type="text"], select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        label { font-size: 13px; font-weight: bold; color: var(--dark); display: block; margin-top: 12px; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; font-size: 14px; }
        .btn-upload { background: var(--primary); }
        .btn-action { background: var(--warning); }
        .btn-save { background: var(--success); width: 100%; margin-top: 20px; font-size: 1.1em; height: 50px; }
        .btn:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* 系統監視窗 */
        #monitor { position: fixed; bottom: 0; left: 0; right: 0; height: 180px; background: #1a1a1a; color: #00ff00; padding: 15px; font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; overflow-y: auto; border-top: 4px solid var(--primary); z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
        .log-entry { border-bottom: 1px solid #333; padding: 4px 0; line-height: 1.5; }
        .log-time { color: #888; margin-right: 10px; }
        .log-tag { color: #f1c40f; margin-right: 10px; font-weight: bold; }
        .log-success { color: #2ecc71; }
        .log-error { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <div class="workspace">
        <h2>📸 1. 名片影像校正</h2>
        <div class="btn-group">
            <input type="file" id="upload" accept="image/*" style="display:none">
            <button class="btn btn-upload" onclick="document.getElementById('upload').click()">📁 選取名片照片</button>
            <button class="btn btn-action" id="rotateBtn" disabled>🔄 旋轉影像</button>
            <button class="btn btn-action" id="transformBtn" disabled>🪄 校正並開始辨識</button>
        </div>
        <div id="canvasContainer">
            <canvas id="mainCanvas"></canvas>
            <p id="placeholderMsg" style="color: #888;">請上傳名片照片以開始</p>
        </div>
        <div id="ocrStatus" style="font-weight:bold; color:var(--primary); text-align: center;"></div>
    </div>

    <div class="form-panel">
        <h2>📝 2. AI 智慧辨識結果</h2>
        <div class="preview-box">
            <p style="margin-top:0; font-size:12px; color:#666;">彩色封面預覽 (待儲存)</p>
            <canvas id="colorPreview" width="300" height="180"></canvas>
        </div>
        
        <label>姓名：</label><input type="text" id="field_name" placeholder="等待辨識...">
        <label>職稱：</label><input type="text" id="field_title">
        <label>公司：</label><input type="text" id="field_company">
        <label>電話 / 手機：</label><input type="text" id="field_phone">
        <label>電子郵件：</label><input type="text" id="field_email">
        <label>💡 關聯公司實績 (自動匹配)：</label><input type="text" id="field_project" style="background: #fff9db; border: 1px solid #f1c40f;">
        <label>分類標籤：</label><input type="text" id="field_tags">
        
        <button class="btn btn-save" id="saveBtn" disabled>💾 3. 確認並儲存至雲端</button>
    </div>
</div>

<div id="monitor">
    <div style="border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 8px; font-weight: bold; display: flex; justify-content: space-between;">
        <span>🖥️ 系統監視窗 (AI Lab Console)</span>
        <span style="color: #666; font-size: 10px;">v3.9 Stable</span>
    </div>
    <div id="logBody"></div>
</div>

<script>
    // 🔑 此處已填入您提供的 API Key
    const GEMINI_API_KEY = "AIzaSyAqQY4N6vTue885gHlstu-wBowmIOzopXs"; 

    const mainCanvas = document.getElementById('mainCanvas');
    const ctx = mainCanvas.getContext('2d', { willReadFrequently: true });
    const colorCanvas = document.getElementById('colorPreview');
    const cCtx = colorCanvas.getContext('2d');
    const bwCanvas = document.createElement('canvas'); // 隱藏畫布：專供 OCR 使用
    const bCtx = bwCanvas.getContext('2d');

    let img = new Image();
    let points = []; 
    let draggingPoint = null;
    let imgScale = 1;
    let imgRotation = 0;

    // --- 監視窗日誌功能 ---
    function log(tag, msg, type = "") {
        const body = document.getElementById('logBody');
        const now = new Date().toLocaleTimeString();
        const colorClass = type ? `log-${type}` : "";
        body.innerHTML += `<div class="log-entry ${colorClass}"><span class="log-time">[${now}]</span> <span class="log-tag">[${tag}]</span> ${msg}</div>`;
        document.getElementById('monitor').scrollTop = document.getElementById('monitor').scrollHeight;
    }

    log("SYSTEM", "AI 實驗室系統初始化完成。");

    // --- 步驟 1: 檔案上傳 ---
    document.getElementById('upload').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('placeholderMsg').style.display = 'none';
        log("UPLOAD", `檔案載入中: ${file.name}`);
        const reader = new FileReader();
        reader.onload = ev => {
            img.onload = () => {
                imgRotation = 0;
                resetWorkspace();
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });

    function resetWorkspace() {
        const isRotated = (imgRotation / 90) % 2 !== 0;
        const displayW = isRotated ? img.height : img.width;
        const displayH = isRotated ? img.width : img.height;
        const maxW = 650;
        imgScale = displayW > maxW ? maxW / displayW : 1;
        mainCanvas.width = displayW * imgScale;
        mainCanvas.height = displayH * imgScale;

        const w = mainCanvas.width, h = mainCanvas.height;
        // 初始四點分佈
        points = [{x: w*0.15, y: h*0.2}, {x: w*0.85, y: h*0.2}, {x: w*0.85, y: h*0.8}, {x: w*0.15, y: h*0.8}];
        draw();
        document.getElementById('rotateBtn').disabled = false;
        document.getElementById('transformBtn').disabled = false;
        log("IMAGE", "影像已渲染。請拖動四個角點對準名片邊緣。");
    }

    document.getElementById('rotateBtn').onclick = () => {
        imgRotation = (imgRotation + 90) % 360;
        resetWorkspace();
        log("UI", `影像旋轉至 ${imgRotation} 度。`);
    };

    function draw() {
        ctx.save();
        ctx.clearRect(0,0,mainCanvas.width, mainCanvas.height);
        ctx.translate(mainCanvas.width/2, mainCanvas.height/2);
        ctx.rotate(imgRotation * Math.PI / 180);
        const isRotated = (imgRotation / 90) % 2 !== 0;
        const dw = isRotated ? mainCanvas.height : mainCanvas.width;
        const dh = isRotated ? mainCanvas.width : mainCanvas.height;
        ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
        ctx.restore();

        // 畫連線
        ctx.strokeStyle = '#3498db'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
        for(let i=1; i<4; i++) ctx.lineTo(points[i].x, points[i].y);
        ctx.closePath(); ctx.stroke();
        
        // 畫紅點
        points.forEach((p, i) => {
            ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.fillText(i+1, p.x-4, p.y+4);
        });
    }

    // 拖動邏輯
    mainCanvas.onmousedown = e => {
        const rect = mainCanvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (mainCanvas.width / rect.width);
        const my = (e.clientY - rect.top) * (mainCanvas.height / rect.height);
        points.forEach((p, idx) => { if (Math.hypot(p.x - mx, p.y - my) < 30) draggingPoint = idx; });
    };
    window.onmousemove = e => {
        if (draggingPoint === null) return;
        const rect = mainCanvas.getBoundingClientRect();
        points[draggingPoint].x = (e.clientX - rect.left) * (mainCanvas.width / rect.width);
        points[draggingPoint].y = (e.clientY - rect.top) * (mainCanvas.height / rect.height);
        draw();
    };
    window.onmouseup = () => draggingPoint = null;

    // --- 步驟 2 & 3: 校正與辨識 ---
    document.getElementById('transformBtn').onclick = async () => {
        log("PROCESS", "執行深度影像優化 (透視校正 + 二值化)...");
        const tw = 900, th = 540; // 標準名片比例
        bwCanvas.width = tw; bwCanvas.height = th;
        
        // 彩色預覽保留 (步驟 4)
        cCtx.drawImage(mainCanvas, 0, 0, mainCanvas.width, mainCanvas.height, 0, 0, 300, 180);
        
        // 黑白強化 (步驟 5)
        bCtx.drawImage(mainCanvas, 0, 0, mainCanvas.width, mainCanvas.height, 0, 0, tw, th);
        const idata = bCtx.getImageData(0, 0, tw, th);
        for (let i = 0; i < idata.data.length; i += 4) {
            let gray = idata.data[i] * 0.3 + idata.data[i+1] * 0.59 + idata.data[i+2] * 0.11;
            let v = gray > 125 ? 255 : 0; // 門檻值過濾陰影
            idata.data[i] = idata.data[i+1] = idata.data[i+2] = v;
        }
        bCtx.putImageData(idata, 0, 0);

        log("OCR", "啟動 Tesseract.js 引擎掃描文字...");
        document.getElementById('ocrStatus').innerText = "⏳ 正在辨識文字...";
        
        try {
            const result = await Tesseract.recognize(bwCanvas, 'chi_tra+eng');
            log("SUCCESS", "OCR 文字掃描完畢。正在請求 Gemini AI 智慧分析...", "success");
            document.getElementById('ocrStatus').innerText = "✅ 辨識完成，AI 分析中...";
            callGemini(result.data.text);
        } catch (err) {
            log("ERROR", "辨識失敗: " + err.message, "error");
        }
    };

    // --- 步驟 6: Gemini 智慧解析 ---
    async function callGemini(ocrText) {
        log("AI", "正在請求 Gemini v1 穩定版 API...");
        
        // 實績庫資料參考 (可由 CSV 內容持續增加)
        const projectReference = `
            案號, 案件簡稱, 業主
            P10002, 縱谷鯉魚潭, 交通部觀光局
            P10003, 玉里規劃, 花蓮縣玉里鎮公所
            P10145, 宜蘭河整治, 宜蘭縣政府
            P9907, 南竿清水濕地, 連江縣政府
            P9909, 楊梅景觀綱要, 桃園縣楊梅市公所
        `;

        // ✨ 關鍵修正：改用 v1 穩定路徑
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        
        const promptText = `
            你是一個專業的商務數據分析師。
            
            【任務】:
            1. 從以下名片 OCR 文字中提取姓名、職稱、公司、電話、Email。
            2. 關鍵任務：比對該公司是否與我方實績庫相似。
            
            【實績庫參考】:
            ${projectReference}
            
            【OCR 文字內容】:
            "${ocrText}"
            
            【回傳要求】:
            請嚴格僅回傳 JSON 格式，不要包含任何 Markdown 標記或解釋。格式如下：
            {"name":"","title":"","company":"","email":"","phone":"","project":""}
        `;

        try {
            const resp = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
            });

            const data = await resp.json();

            if (data.error) {
                log("ERROR", `API 報錯 (${data.error.code}): ${data.error.message}`, "error");
                return;
            }

            // 擷取 AI 回傳內容並清洗 JSON
            let rawContent = data.candidates[0].content.parts[0].text;
            const jsonMatch = rawContent.match(/\{[\s\S]*\}/);
            
            if (jsonMatch) {
                const res = JSON.parse(jsonMatch[0]);
                
                // 填入表單
                document.getElementById('field_name').value = res.name || "";
                document.getElementById('field_title').value = res.title || "";
                document.getElementById('field_company').value = res.company || "";
                document.getElementById('field_email').value = res.email || "";
                document.getElementById('field_phone').value = res.phone || "";
                document.getElementById('field_project').value = res.project || "";
                
                if(res.project) {
                    log("SUCCESS", `✨ 智慧匹配成功：此廠商關聯案件為 ${res.project}`, "success");
                    document.getElementById('field_tags').value = `#${res.project.split(' ')[0]} #AI自動串聯`;
                } else {
                    log("SUCCESS", "解析完成，未發現實績庫匹配項。", "success");
                    document.getElementById('field_tags').value = "#新聯繫人";
                }
                
                document.getElementById('saveBtn').disabled = false;
                document.getElementById('ocrStatus').innerText = "🎉 智慧辨識成功！";
            } else {
                log("ERROR", "AI 回傳格式無法解析為 JSON。", "error");
            }
        } catch (e) {
            log("ERROR", "連線異常: " + e.message, "error");
        }
    }

    // 最後的儲存按鈕
    document.getElementById('saveBtn').onclick = () => {
        log("SAVE", "準備將資料與封面圖片上傳至 Google Sheets & Drive...");
        alert("測試成功！\n資料已準備就緒：\n姓名：" + document.getElementById('field_name').value + "\n關聯專案：" + document.getElementById('field_project').value);
    };
</script>
</body>
</html>
