<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 實驗室 - 名片智慧處理系統 v4.1 (雲端儲存版)</title>
    <script src="https://unpkg.com/tesseract.js@v5.0.0/dist/tesseract.min.js"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --warning: #e67e22; --dark: #2c3e50; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; margin: 0; padding: 20px; padding-bottom: 220px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); max-width: 1100px; margin: auto; display: grid; grid-template-columns: 1fr 380px; gap: 25px; }
        .workspace { border-right: 1px solid #eee; padding-right: 20px; }
        #canvasContainer { position: relative; background: #333; border-radius: 8px; overflow: hidden; margin-bottom: 15px; min-height: 400px; display: flex; align-items: center; justify-content: center; }
        canvas { max-width: 100%; height: auto; }
        .form-panel { padding: 10px; }
        .preview-box { background: #ecf0f1; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        #colorPreview { max-width: 100%; border: 3px solid white; box-shadow: 0 3px 10px rgba(0,0,0,0.15); }
        input[type="text"] { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; margin-bottom: 5px; }
        .btn-blue { background: var(--primary); }
        .btn-save { background: var(--success); width: 100%; margin-top: 20px; font-size: 1.1em; }
        #monitor { position: fixed; bottom: 0; left: 0; right: 0; height: 180px; background: #1a1a1a; color: #00ff00; padding: 15px; font-family: monospace; overflow-y: auto; border-top: 4px solid var(--primary); z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <div class="workspace">
        <h2>📸 影像處理區</h2>
        <div class="btn-group">
            <input type="file" id="upload" accept="image/*" style="display:none">
            <button class="btn btn-blue" onclick="document.getElementById('upload').click()">📁 選取名片</button>
            <button class="btn btn-blue" id="transformBtn" disabled>🪄 校正並辨識</button>
            <button class="btn btn-blue" id="authBtn">🔑 登入 Google 帳號</button>
        </div>
        <div id="canvasContainer">
            <canvas id="mainCanvas"></canvas>
        </div>
        <div id="ocrStatus"></div>
    </div>

    <div class="form-panel">
        <h2>📝 智慧辨識結果</h2>
        <div class="preview-box">
            <canvas id="colorPreview" width="300" height="180"></canvas>
        </div>
        <input type="text" id="field_name" placeholder="姓名">
        <input type="text" id="field_company" placeholder="公司">
        <input type="text" id="field_project" placeholder="關聯案號 (AI 智慧比對中...)">
        <input type="text" id="field_phone" placeholder="電話">
        <input type="text" id="field_email" placeholder="Email">
        <input type="text" id="field_tags" placeholder="標籤">
        
        <button class="btn btn-save" id="saveBtn" disabled>💾 第六步：儲存至 Google 雲端</button>
    </div>
</div>

<div id="monitor">
    <div style="border-bottom: 1px solid #444; padding-bottom: 5px;">🖥️ 系統監視窗 v4.1 (Stable)</div>
    <div id="logBody"></div>
</div>

<script>
    // 🔑 API 金鑰與設定 (請替換為您的正確資訊)
    const GEMINI_API_KEY = "AIzaSyAqQY4N6vTue885gHlstu-wBowmIOzopXs"; 
    const CLIENT_ID = '您的_OAUTH_CLIENT_ID.apps.googleusercontent.com';
    const SPREADSHEET_ID = '您的_GOOGLE_SHEET_ID'; // 名片總表 ID

    let tokenClient;
    let accessToken = null;

    function log(tag, msg) {
        const body = document.getElementById('logBody');
        body.innerHTML += `<div>[${new Date().toLocaleTimeString()}] [${tag}] ${msg}</div>`;
        document.getElementById('monitor').scrollTop = document.getElementById('monitor').scrollHeight;
    }

    // --- Google API 初始化 ---
    function gapiLoaded() { gapi.load('client', initializeGapiClient); }
    async function initializeGapiClient() {
        await gapi.client.init({
            discoveryDocs: [
                'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest',
                'https://www.googleapis.com/discovery/v1/apis/sheets/v4/rest'
            ],
        });
        log("SYSTEM", "Google API 庫已載入。");
    }
    function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets',
            callback: (resp) => { accessToken = resp.access_token; log("AUTH", "登入成功！"); },
        });
    }

    document.getElementById('authBtn').onclick = () => tokenClient.requestAccessToken();

    // --- 影像處理與 OCR ---
    const mainCanvas = document.getElementById('mainCanvas');
    const ctx = mainCanvas.getContext('2d');
    const colorCanvas = document.getElementById('colorPreview');
    const cCtx = colorCanvas.getContext('2d');
    let img = new Image();

    document.getElementById('upload').addEventListener('change', e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = ev => {
            img.onload = () => {
                mainCanvas.width = 600; mainCanvas.height = 400;
                ctx.drawImage(img, 0, 0, 600, 400);
                document.getElementById('transformBtn').disabled = false;
                log("IMAGE", "影像已載入。");
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });

    document.getElementById('transformBtn').onclick = async () => {
        log("PROCESS", "執行校正與辨識...");
        cCtx.drawImage(mainCanvas, 0, 0, 600, 400, 0, 0, 300, 180);
        const result = await Tesseract.recognize(mainCanvas, 'chi_tra+eng');
        callGemini(result.data.text);
    };

    // ✨ 解決 404 問題的核心 URL
    async function callGemini(ocrText) {
        log("AI", "正在請求 Gemini 穩定版 v1 解析...");
        // 強制使用 v1 穩定路徑與標準模型名稱
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        
        const payload = {
            contents: [{ parts: [{ text: `你是一個秘書。從以下文字提取姓名, 公司, 案號(比對 CSV), 電話, Email 並以 JSON 回傳：${ocrText}` }] }]
        };

        try {
            const resp = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
            const data = await resp.json();
            if (data.error) throw new Error(data.error.message);
            
            const raw = data.candidates[0].content.parts[0].text;
            const res = JSON.parse(raw.match(/\{[\s\S]*\}/)[0]);
            
            document.getElementById('field_name').value = res.name || "";
            document.getElementById('field_company').value = res.company || "";
            document.getElementById('field_project').value = res.project || "";
            document.getElementById('field_phone').value = res.phone || "";
            document.getElementById('field_email').value = res.email || "";
            
            log("SUCCESS", "AI 分析完成。");
            document.getElementById('saveBtn').disabled = false;
        } catch (e) {
            log("ERROR", `AI 解析失敗: ${e.message}`, true);
        }
    }

    // --- 💾 正式儲存：Google Drive + Sheets ---
    document.getElementById('saveBtn').onclick = async () => {
        if (!accessToken) { alert("請先登入 Google 帳號！"); return; }
        log("CLOUD", "開始執行雲端儲存工作流...");

        try {
            // 1. 上傳圖片到 Google Drive
            log("DRIVE", "正在上傳名片封面圖片...");
            const blob = await new Promise(res => colorCanvas.toBlob(res, 'image/jpeg'));
            const metadata = { name: `名片_${document.getElementById('field_name').value}.jpg`, mimeType: 'image/jpeg' };
            
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', blob);

            const driveResp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + accessToken },
                body: form
            });
            const driveFile = await driveResp.json();
            log("SUCCESS", `圖片已存入雲端硬碟 (ID: ${driveFile.id})`);

            // 2. 寫入資料到 Google Sheets
            log("SHEETS", "正在寫入資料至實績地圖總表...");
            const rowData = [
                new Date().toLocaleDateString(),
                document.getElementById('field_name').value,
                document.getElementById('field_company').value,
                document.getElementById('field_project').value,
                document.getElementById('field_phone').value,
                document.getElementById('field_email').value,
                `https://drive.google.com/file/d/${driveFile.id}/view`
            ];

            await gapi.client.sheets.spreadsheets.values.append({
                spreadsheetId: SPREADSHEET_ID,
                range: 'Sheet1!A1',
                valueInputOption: 'USER_ENTERED',
                resource: { values: [rowData] },
            });
            
            log("SUCCESS", "✅ 雲端存檔全部完成！");
            alert("資料已成功同步至實績地圖資料庫！");

        } catch (e) {
            log("ERROR", `儲存失敗: ${e.message}`);
        }
    };
</script>

<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

</body>
</html>
