<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 實驗室 - 模型診斷與選取工具</title>
    <script src="https://unpkg.com/tesseract.js@v5.0.0/dist/tesseract.min.js"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        :root { --primary: #6366f1; --dark: #0f172a; --accent: #ec4899; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f1f5f9; margin: 0; padding: 20px; }
        .diag-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        .model-selector-box { background: #f8fafc; border: 2px solid #e2e8f0; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        input[type="text"] { width: 70%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 5px; font-family: monospace; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-blue { background: var(--primary); }
        .btn-pink { background: var(--accent); }
        #monitor { height: 400px; background: #0f172a; color: #34d399; padding: 15px; font-family: 'Consolas', monospace; font-size: 13px; overflow-y: auto; border-radius: 8px; margin-top: 20px; line-height: 1.6; }
        .highlight { color: #f472b6; font-weight: bold; }
        .method-tag { font-size: 10px; background: #334155; padding: 2px 5px; border-radius: 3px; margin-left: 5px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="diag-container">
    <h2>🧪 模型清單診斷工具</h2>
    <p style="color: #64748b;">請先點擊「🔑 登入並掃描」，系統將列出您帳號下所有可用的模型 ID。</p>
    
    <div class="model-selector-box">
        <label><b>當前選定模型：</b></label><br><br>
        <input type="text" id="manualModelInput" placeholder="請從下方列表複製 ID 填入此處...">
        <button class="btn btn-pink" onclick="confirmModel()">✅ 確認選擇</button>
        <p id="selectedStatus" style="font-size: 12px; color: #6366f1; margin-top: 10px;">尚未選定</p>
    </div>

    <button class="btn btn-blue" id="authBtn">🔑 1. 登入 Google 並開始掃描</button>
    
    <div id="monitor">
        <div style="color: #818cf8; border-bottom: 1px solid #334155; padding-bottom: 5px; margin-bottom: 10px;">
            [系統狀態] 等待登入以獲取 API 模型列表...
        </div>
        <div id="logBody"></div>
    </div>
</div>

<script>
    const CLIENT_ID = "615427641075-7g7ikac4oc4s46897ch39av7174n4pmn.apps.googleusercontent.com";
    const KEY_DOC_ID = "1cbhhhJbkJnrQYXnl-xgnscGR0uzZem6x7s1cI7kV6oM"; 
    let GEMINI_API_KEY = null;
    let accessToken = null;
    let tokenClient;
    let selectedModelID = "";

    function log(tag, msg, isHighlight = false) {
        const body = document.getElementById('logBody');
        const style = isHighlight ? 'class="highlight"' : '';
        body.innerHTML += `<div ${style}>[${tag}] ${msg}</div>`;
        document.getElementById('monitor').scrollTop = document.getElementById('monitor').scrollHeight;
    }

    // --- 核心：抓取並列出所有模型細節 ---
    async function listAllModels() {
        log("SCAN", "開始抓取完整模型清單...");
        try {
            // 同時檢查 v1 與 v1beta 以確保資訊最完整
            const versions = ['v1beta', 'v1'];
            for (let ver of versions) {
                log("API", `正在查詢版本: ${ver}...`);
                const resp = await fetch(`https://generativelanguage.googleapis.com/${ver}/models?key=${GEMINI_API_KEY}`);
                const data = await resp.json();
                
                if (data.models) {
                    log("SUCCESS", `--- 在 ${ver} 中找到 ${data.models.length} 個模型 ---`, true);
                    data.models.forEach(m => {
                        const methods = m.supportedGenerationMethods.join(', ');
                        const isGenerator = m.supportedGenerationMethods.includes('generateContent') ? "✅ 可解析" : "❌ 不支援解析";
                        log("ID", `<span class="highlight">${m.name}</span> <span class="method-tag">${isGenerator}</span>`);
                        // 如果包含配額表看到的關鍵字，特別標記
                        if(m.name.includes('gemma') || m.name.includes('gemini-3')) {
                            log("INFO", `   └─ 💡 這是您配額表中的高額度模型候選者！`);
                        }
                    });
                }
            }
            log("FINISH", "掃描結束。請複製上方 <span class='highlight'>models/xxxx</span> ID 並與我討論。", true);
        } catch (e) {
            log("ERROR", "掃描過程發生錯誤: " + e.message);
        }
    }

    function confirmModel() {
        selectedModelID = document.getElementById('manualModelInput').value.trim();
        if(!selectedModelID) return alert("請輸入模型 ID");
        document.getElementById('selectedStatus').innerText = `已選定：${selectedModelID} (準備進行解析測試)`;
        log("SELECT", `手動設定模型為：${selectedModelID}`, true);
    }

    // --- Google 授權與金鑰讀取 ---
    async function fetchApiKey() {
        log("DRIVE", "正在從雲端讀取 API Key...");
        try {
            const url = `https://www.googleapis.com/drive/v3/files/${KEY_DOC_ID}/export?mimeType=text/plain`;
            const resp = await fetch(url, { headers: { 'Authorization': 'Bearer ' + accessToken } });
            if (resp.ok) {
                GEMINI_API_KEY = (await resp.text()).trim();
                log("SUCCESS", "金鑰載入成功！啟動掃描流程...");
                await listAllModels();
            } else { log("ERROR", "讀取金鑰文件失敗，請確認權限。"); }
        } catch (e) { log("ERROR", "連線失敗。"); }
    }

    function gisInit() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/drive.readonly',
            callback: (resp) => {
                accessToken = resp.access_token;
                log("AUTH", "授權成功！");
                fetchApiKey();
            }
        });
    }
    document.getElementById('authBtn').onclick = () => tokenClient.requestAccessToken();

    window.onload = gisInit;
</script>
</body>
</html>
