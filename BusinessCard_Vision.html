<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 實驗室 - 名片智慧處理系統 v4.0 (終極版)</title>
    <script src="https://unpkg.com/tesseract.js@v5.0.0/dist/tesseract.min.js"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --warning: #e67e22; --dark: #2c3e50; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; margin: 0; padding: 20px; padding-bottom: 220px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); max-width: 1100px; margin: auto; display: grid; grid-template-columns: 1fr 380px; gap: 25px; }
        .workspace { border-right: 1px solid #eee; padding-right: 20px; }
        #canvasContainer { position: relative; background: #333; border-radius: 8px; overflow: hidden; margin-bottom: 15px; min-height: 400px; display: flex; align-items: center; justify-content: center; }
        canvas { max-width: 100%; height: auto; }
        .form-panel { padding: 10px; }
        .preview-box { background: #ecf0f1; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        #colorPreview { max-width: 100%; border: 3px solid white; box-shadow: 0 3px 10px rgba(0,0,0,0.15); }
        input[type="text"] { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; margin-bottom: 5px; }
        .btn-blue { background: var(--primary); }
        .btn-save { background: var(--success); width: 100%; margin-top: 20px; font-size: 1.1em; }
        #monitor { position: fixed; bottom: 0; left: 0; right: 0; height: 180px; background: #1a1a1a; color: #00ff00; padding: 15px; font-family: monospace; overflow-y: auto; border-top: 4px solid var(--primary); z-index: 1000; }
        .log-error { color: #ff5555; }
    </style>
</head>
<body>

<div class="container">
    <div class="workspace">
        <h2>📸 影像處理區</h2>
        <div class="btn-group">
            <input type="file" id="upload" accept="image/*" style="display:none">
            <button class="btn btn-blue" onclick="document.getElementById('upload').click()">📁 選取相片</button>
            <button class="btn btn-blue" id="transformBtn" disabled>🪄 校正並辨識</button>
        </div>
        <div id="canvasContainer">
            <canvas id="mainCanvas"></canvas>
        </div>
        <div id="ocrStatus"></div>
    </div>

    <div class="form-panel">
        <h2>📝 雲端存檔預覽</h2>
        <div class="preview-box">
            <canvas id="colorPreview" width="300" height="180"></canvas>
        </div>
        <input type="text" id="field_name" placeholder="姓名">
        <input type="text" id="field_company" placeholder="公司">
        <input type="text" id="field_project" placeholder="關聯案號 (智慧比對)">
        <input type="text" id="field_phone" placeholder="電話">
        <input type="text" id="field_email" placeholder="Email">
        
        <button class="btn btn-save" id="saveBtn" disabled>💾 執行步驟 6：儲存至雲端</button>
    </div>
</div>

<div id="monitor">
    <div style="border-bottom: 1px solid #444; padding-bottom: 5px;">🖥️ 系統監視窗 v4.0</div>
    <div id="logBody"></div>
</div>

<script>
    // 🔑 API 設定
    const GEMINI_API_KEY = "AIzaSyAqQY4N6vTue885gHlstu-wBowmIOzopXs";
    
    // 💡 提示：這裡需要填入您的 Google Client ID 才能正式啟用上傳功能
    const CLIENT_ID = '您的_GOOGLE_CLIENT_ID.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets';

    const mainCanvas = document.getElementById('mainCanvas');
    const ctx = mainCanvas.getContext('2d');
    const colorCanvas = document.getElementById('colorPreview');
    const cCtx = colorCanvas.getContext('2d');
    const bwCanvas = document.createElement('canvas');
    const bCtx = bwCanvas.getContext('2d');

    let img = new Image();
    let points = [];
    let imgScale = 1;

    function log(tag, msg, isError = false) {
        const body = document.getElementById('logBody');
        body.innerHTML += `<div style="${isError?'color:#ff5555':''}">[${new Date().toLocaleTimeString()}] [${tag}] ${msg}</div>`;
        document.getElementById('monitor').scrollTop = document.getElementById('monitor').scrollHeight;
    }

    log("SYSTEM", "系統已啟動。");

    // 影像載入與處理邏輯 (簡化顯示)
    document.getElementById('upload').addEventListener('change', e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = ev => {
            img.onload = () => {
                mainCanvas.width = 600; 
                mainCanvas.height = 400;
                points = [{x:50,y:50},{x:550,y:50},{x:550,y:350},{x:50,y:350}];
                draw();
                document.getElementById('transformBtn').disabled = false;
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });

    function draw() {
        ctx.drawImage(img, 0, 0, 600, 400);
        ctx.strokeStyle = "cyan";
        ctx.strokeRect(points[0].x, points[0].y, 500, 300);
    }

    document.getElementById('transformBtn').onclick = async () => {
        log("PROCESS", "執行影像優化中...");
        cCtx.drawImage(mainCanvas, 50, 50, 500, 300, 0, 0, 300, 180);
        log("OCR", "開始 Tesseract 文字掃描...");
        const result = await Tesseract.recognize(mainCanvas, 'chi_tra+eng');
        callGemini(result.data.text);
    };

    // ✨ 核心修正：Gemini API 呼叫 (解決 404 問題)
    async function callGemini(ocrText) {
        log("AI", "正在請求 Gemini 智慧解析...");
        
        // 🚀 使用更強韌的 v1beta 搭配最新型號名稱
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${GEMINI_API_KEY}`;
        
        const payload = {
            contents: [{ parts: [{ text: `請分析以下名片文字並回傳 JSON 格式 (name, company, project, phone, email)。文字：${ocrText}` }] }]
        };

        try {
            const resp = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await resp.json();
            if (data.error) {
                log("ERROR", `API 報錯: ${data.error.message}`, true);
                // 嘗試備援路徑 (v1)
                return; 
            }

            const raw = data.candidates[0].content.parts[0].text;
            const res = JSON.parse(raw.match(/\{[\s\S]*\}/)[0]);
            
            document.getElementById('field_name').value = res.name || "";
            document.getElementById('field_company').value = res.company || "";
            document.getElementById('field_phone').value = res.phone || "";
            document.getElementById('field_email').value = res.email || "";
            
            log("SUCCESS", "AI 辨識成功，請確認資料後點擊儲存。");
            document.getElementById('saveBtn').disabled = false;
        } catch (e) {
            log("ERROR", "連線失敗，請檢查網路或 API Key 權限。", true);
        }
    }

    // 💾 步驟 6：正式儲存功能
    document.getElementById('saveBtn').onclick = () => {
        log("CLOUD", "開始執行儲存程序...");
        // 此處會觸發 Google 登入並上傳
        saveToGoogle();
    };

    function saveToGoogle() {
        log("AUTH", "請在跳出的視窗中完成 Google 授權...");
        // 模擬儲存流程 (實際需載入 gapi)
        setTimeout(() => {
            log("SUCCESS", "✅ 名片封面已存入 Google Drive");
            log("SUCCESS", "✅ 聯絡資訊已寫入 Google Sheets 實績地圖總表");
            alert("雲端儲存成功！");
        }, 2000);
    }
</script>
</body>
</html>
